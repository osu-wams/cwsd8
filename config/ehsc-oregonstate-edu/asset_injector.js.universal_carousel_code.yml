  //from infographic JS    
  var slideIndex;
  const queryString = window.location.search;
  ////console.log(queryString);
  var slide = null;
  const urlParams = new URLSearchParams(queryString);
  if (/^([a-zA-Z0-9-]{5,})$/.test(urlParams.get('slide'))){
  	slide = urlParams.get('slide');
  }
  	
  const allCarousels = document.getElementsByClassName('thumbnail-list');
  	
  for(i=0; i < allCarousels.length ; i++){
  	
  	if (allCarousels[i].getElementsByClassName(slide).length > 0){
  		setMedia(slide,i);
  	}
  	else{
  		loadSlideName = allCarousels[i].childNodes[0].getAttribute('data-searchname');
  		setMedia(loadSlideName,i);
  	}
  }

  function slideShift(i, carouselNumber = 0){
  	//get the current slide name from the main gallery 
  	imageContainer = document.getElementsByClassName('fullImageContainer')[carouselNumber];
  	currentSlideName = imageContainer.getElementsByClassName('mySlides')[0].getAttribute('data');
  	//get the slide number from the slides list based on slide name into n
  	currentMedia = document.getElementsByClassName('thumbnail-list')[carouselNumber].getElementsByClassName(currentSlideName)[0];
  	currentMediaSlideNumber = Number(currentMedia.getElementsByClassName('columnSlideNumber')[0].innerHTML);
  	medaTotalSlides = Number(currentMedia.getElementsByClassName('columnTotalSlides')[0].innerHTML);
  	
  	if (currentMediaSlideNumber + i > medaTotalSlides){
  		currentMediaSlideNumber = 0;
  	}
  	else if (currentMediaSlideNumber + i < 1){
  		currentMediaSlideNumber =  medaTotalSlides + 1;
  	}
  	
  	//get the slide name from the shift i (n + i)
  	allSlides = document.getElementsByClassName('thumbnail-list')[carouselNumber].childNodes;
  	loadSlideName = allSlides[Number(currentMediaSlideNumber) + Number(i) - 1].getAttribute('data-searchname');
  	//call the setMedia function
  	setMedia(loadSlideName,carouselNumber);
  }

  function scrollContainerRight(carouselNumber = 0){
  	document.getElementsByClassName('thumbnail-list-container')[carouselNumber].scrollLeft += (Math.round(document.getElementById("thumbnail-list-container").offsetWidth / 100) * 100);
  	document.getElementsByClassName('arrow-left')[carouselNumber].setAttribute('style','display:block;');

  	const limit = document.getElementsByClassName('thumbnail-list-container')[carouselNumber].offsetWidth;
  	const position = (document.getElementsByClassName("thumbnail-list")[carouselNumber].offsetWidth) - (document.getElementById('thumbnail-list-container').scrollLeft);
  	if (limit == position){
  		document.getElementsByClassName('arrow-right')[carouselNumber].setAttribute('style','display:none;');
  	}
  }

  function scrollContainerLeft(carouselNumber = 0){
  	document.getElementsByClassName('thumbnail-list-container')[carouselNumber].scrollLeft -= (Math.round(document.getElementById("thumbnail-list-container").offsetWidth / 100) * 100);
  	const limit = document.getElementsByClassName('thumbnail-list-container')[carouselNumber].offsetWidth;
  	const position = document.getElementsByClassName('thumbnail-list-container')[carouselNumber].scrollLeft;
  	document.getElementsByClassName('arrow-right')[carouselNumber].setAttribute('style','display:block;');
  	if (position == 0){
  		document.getElementsByClassName('arrow-left')[carouselNumber].setAttribute('style','display:none;');
  	}
  }

  function setMedia(slideName,carouselNumber = 0){
  	
  	// Let's get the main slide container so we can compare values
  	imageContainer = document.getElementsByClassName('fullImageContainer')[carouselNumber];
  	existingMediaSlideName = imageContainer.getElementsByClassName('mySlides')[0].getAttribute('data');
  	
  	if (slideName != existingMediaSlideName){
  		
  		//carouselNumber = 1;
  		/*		mediaTitle
  			mediaSlideName
  			mediaUrl
  			mediaThumbnailLink
  			mediaThumbnail
  			mediaPdfLink
  			mediaPdfFile
  			mediaDescription
  			mediaKeywords
  			mediaLanguage*/
  		
  		mediaToLoad = document.getElementsByClassName('thumbnail-list')[carouselNumber].getElementsByClassName(slideName)[0];
  		//console.log(mediaToLoad);
  		//get the Media Type, so we can show/hide the proper content div and load it properly
  		mediaType = mediaToLoad.getElementsByClassName('columnMediaType')[0].innerHTML;
  		
  		mediaTitle = mediaToLoad.getElementsByClassName('columnMediaTitle')[0].innerHTML;
  		mediaSlideName = mediaToLoad.getElementsByClassName('columnMediaSlideName')[0].innerHTML;
  		mediaUrl = mediaToLoad.getElementsByClassName('columnMediaUrl')[0].innerHTML;
  		mediaSlideNumber = mediaToLoad.getElementsByClassName('columnSlideNumber')[0].innerHTML;
  		medaTotalSlides = mediaToLoad.getElementsByClassName('columnTotalSlides')[0].innerHTML;
  		mediaThumbnail = mediaToLoad.getElementsByClassName('columnMediaThumbnail')[0].getElementsByTagName('img')[0];
  		mediaPdfLink = mediaToLoad.getElementsByClassName('columnMediaPdfLink')[0].innerHTML;
  		mediaDescription = mediaToLoad.getElementsByClassName('columnMediaDescription')[0].innerHTML;
  		//mediaLanguage = mediaToLoad.getElementsByClassName('columnMediaLanguage')[0].innerHTML;
  		
  		
  		
  		const windowWidth = window.innerWidth; //looking for 900 or greater.
  		const mobileCheck = mobileAndTabletCheck();
  		
  		
  		imageContainer.getElementsByClassName('titleText')[0].innerHTML = mediaTitle;
  		imageContainer.getElementsByClassName('mySlides')[0].setAttribute('data',mediaSlideName);
  		
  		
  		document.getElementsByClassName('pdf_object')[carouselNumber].hidden = true
  		document.getElementsByClassName('vid_object')[carouselNumber].hidden = true
  		document.getElementsByClassName('img_object')[carouselNumber].hidden = true
  		console.log(mediaType);
  		//console.log(mediaThumbnail);
  		if(mediaType == 'pdf'){
  			
  			imageContainer.getElementsByClassName('slideNumber')[0].innerHTML = mediaSlideNumber + ' / ' + medaTotalSlides +  ": " + mediaDescription + "<br><a href='" + mediaPdfLink + "'>View or download PDF" + "</a> | " + "<a class='media_link_copy' onClick=\"linkCopy('" + window.location.origin + window.location.pathname + "?slide=" + mediaSlideName +  "#gallery');\">Copy a link to this PDF <i class='fa-solid fa-arrow-up-right-from-square fa-xs'></i></a>";
  			
  			if (windowWidth > 899 && !mobileCheck){	
  				document.getElementsByClassName('pdf_object')[carouselNumber].setAttribute('data',mediaPdfLink + '#navpanes=0');
  				document.getElementsByClassName('pdf_object')[carouselNumber].hidden = false;
  				document.getElementsByClassName('img_object')[carouselNumber].alt = mediaTitle;
  			}
  			//else we set it as an image
  			else{
  				document.getElementsByClassName('img_object')[carouselNumber].src = mediaThumbnail.src;
  				document.getElementsByClassName('img_object')[carouselNumber].alt = mediaTitle;
  				document.getElementsByClassName('img_object')[carouselNumber].hidden = false;
  			}

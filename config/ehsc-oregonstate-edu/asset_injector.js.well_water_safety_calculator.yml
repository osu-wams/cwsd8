id: well_water_safety_calculator
label: 'Well water safety calculator'
code: |-
  // Helpers
    function getNum(id) {
      const v = parseFloat(document.getElementById(id)?.value);
      return isFinite(v) ? v : 0;
    }
    function setValue(id, val) {
      const el = document.getElementById(id);
      if (!el) return;
      if (typeof val === 'number') {
        // keep two decimals where appropriate
        el.value = Number.isFinite(val) ? (Math.round(val * 100) / 100).toString() : '';
      } else {
        el.value = (val ?? '').toString();
      }
    }
    function showHide(id, show) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.toggle('hidden', !show);
    }

    // Core math (kept consistent with your original logic):
    // - calcBleachFromVolume: cups = gallons * 0.01 (per original code)
    // - calcWaterDepth: feet depth = wellDepth - staticLevel
    // - calcWaterVolume: gallons = feet * (gallons/foot for given diameter)
    function round2(n) { return Math.round(n * 100) / 100; }

    function calcBleachFromVolume(elementId) {
      const gallons = getNum(elementId);
      const cups = gallons * 0.01; // matches original code
      return round2(cups);
    }

    function calcWaterDepth(wellDepthId, staticLevelId) {
      const depth = getNum(wellDepthId) - getNum(staticLevelId);
      return round2(Math.max(depth, 0));
    }

    function calcWaterVolume(wellDiameterId, feetId) {
      // wellDiameterId holds "gallons per foot" for that diameter in the original code
      const gpf = getNum(wellDiameterId);
      const feet = getNum(feetId);
      const gallons = gpf * feet;
      return round2(Math.max(gallons, 0));
    }

    // Convert a decimal number in an input (by id) to a mixed fraction string like "3 1/2"
    // We preserve your original cutoffs but guard against missing decimals.
    function toFraction(elementId) {
      const raw = document.getElementById(elementId)?.value ?? '';
      if (raw === '') return '';
      const n = parseFloat(raw);
      if (!isFinite(n)) return '';

      const majorInt = Math.floor(n);
      const minor = n - majorInt;

      // thresholds from original code
      let frac = '';
      if (minor > 0 && minor <= 0.251) frac = '1/4';
      else if (minor <= 0.334)       frac = '1/3';
      else if (minor <= 0.51)        frac = '1/2';
      else if (minor <= 0.6667)      frac = '2/3';
      else if (minor <= 0.75)        frac = '3/4';
      else if (minor < 1)            return String(majorInt + 1); // round up to next whole

      return (majorInt === 0 ? '' : String(majorInt)) + (frac ? (majorInt ? ' ' : '') + frac : (majorInt ? '' : ''));
    }

code: |
  //var collection = document.getElementsByClassName("custom-image-album");
  //var subCollection = collection.querySelector('.field-items');
  //console.log(subCollection);

  const albumElement = document.getElementsByClassName('field--name-field-infographics')[0].getElementsByClassName('field__items')[0].getElementsByClassName('infographic-item');//querySelectorAll(".field-items > .field-item");
  //const parentHTML = parent.innerHTML;
  //console.log(albumElement);
  //var fieldItemElements = albumElement.getElementsByClassName('field-items')[0];
  //var fieldItemElementArray = fieldItemElements.querySelectorAll('.field-item');

  // Now create and append to iDiv
  //var innerDiv = document.createElement('div');
  //innerDiv.className = 'custom-image-gallery';
  const galleryElement = document.getElementsByClassName('field--name-field-infographics')[0];

  const galleryTitle = document.createElement('h3');
  galleryTitle.innerHTML = 'Infographics';
  galleryElement.appendChild(galleryTitle);

  // The variable iDiv is still good... Just append to it.
  //galleryElement.appendChild(innerDiv);

  //create the outside container
  const containerContainer = document.createElement('div');
  containerContainer.className = 'container';

  //create the outside container
  const fullImageContainer = document.createElement('div');
  fullImageContainer.className = 'fullImageContainer';

  //create the thumbnail list  div
  const thumbnailListContainer = document.createElement('div');
  thumbnailListContainer.setAttribute('id','thumbnail-list-container');

  //create the inner list div
  const thumbnailList = document.createElement('div');
  thumbnailList.className = 'thumbnail-list';
  thumbnailList.setAttribute('style','width:' + (albumElement.length * 100) + 'px');



  for(i=0; i < albumElement.length ; i++){
  	
  	var pdfPath = null;
  	var pdfLink = null;

  	const mySlidesContainer = document.createElement('div');
  	mySlidesContainer.className = 'mySlides';
  	
  	var searchName = albumElement[i].getElementsByClassName('field--name-field-search-name')[0].getElementsByClassName('field__item')[0].innerHTML;
  	mySlidesContainer.setAttribute('data-searchname',searchName);
  	
  	
  	//Grab the image, alt text, and image title
  	var image = albumElement[i].getElementsByClassName('field--name-field-infographic-thumbnail')[0].getElementsByClassName('field__item')[0].getElementsByTagName('img')[0];//albumElement[i].getElementsByTagName('img')[0];
  	//  var image = albumElement[i].getElementsByTagName('img')[0];

  	
  	
  	//create the displayed picture container
  	
  	
  	
  	//grab the main title field
  	var mainTitle = albumElement[i].getElementsByClassName('field--name-field-title')[0].getElementsByClassName('field__item')[0].innerHTML;
  	
  	
  	const titleTextContainer = document.createElement('h6');
  	titleTextContainer.className = 'titleText';
  	titleTextContainer.innerHTML = mainTitle;
  	mySlidesContainer.appendChild(titleTextContainer);
  	
  	
  	
  	
  	//grab the description field
  	var description = albumElement[i].getElementsByClassName('field--name-field-description')[0].getElementsByClassName('field__item')[0].innerHTML;

  	
  	//grab the key words, store them in a hidden field?
  	var imageKeywords = albumElement[i].getElementsByClassName('field--name-field-description')[0].getElementsByClassName('field__item')[0].innerHTML;

  	
  	//grab the pdf link (if available)
  	if (albumElement[i].getElementsByClassName('field--name-field-external-pdf-path')[0] != null){
  		pdfPath = albumElement[i].getElementsByClassName('field--name-field-external-pdf-path')[0].getElementsByClassName('field__item')[0].innerHTML;
  	}
  	
  	//grab the attached pdf (if available) (only use the inner text, not the link itself)
  	if (albumElement[i].getElementsByClassName('field--name-field-pdf-file')[0] != null){
  		pdfLink = albumElement[i].getElementsByClassName('field--name-field-pdf-file')[0].getElementsByClassName('field__item')[0].getElementsByClassName('file')[0].getElementsByTagName('a')[0].href;
  	}
  	
  	var finalPdfLink = '';
  	
  	if (pdfLink != null){
  		finalPdfLink = pdfLink;
  	}
  	else {
  		finalPdfLink = pdfPath
  	}
  	
  	
  		//console.log(fieldItemElementArray[i].innerHTML);
  	//console.log(albumElement[i]);
  	/*console.log(image.src);
  	console.log(image.alt);
  	console.log(image.title);
  	
  	console.log(pdfLink);
    	console.log(pdfPath);
  	console.log(imageKeywords);
  	console.log(description);
  	console.log(mainTitle);*/
    
    //const numberTextContainer = document.createElement('div');
  	//numberTextContainer.className = 'numberText';
    //numberTextContainer.innerHTML = (i+1) + ' / ' + (albumElement.length) + ' ' + image.title;
    //mySlidesContainer.appendChild(numberTextContainer);
    
    
      const slideCaption = document.createElement('div');
  	slideCaption.className = 'slideCaption';
  	
  	const slideNumber = document.createElement('p')
  	slideNumber.innerHTML = (i+1) + ' / ' + (albumElement.length) +  ': ' + description
  	
  	var br = document.createElement('br');
  	slideNumber.appendChild(br);
  	
  	const slideCaptionLink = document.createElement('a');
  	slideCaptionLink.innerHTML = 'View or download PDF';
  	slideCaptionLink.setAttribute('href', finalPdfLink); //image.alt
  	slideCaptionLink.setAttribute('target','_blank');
  	//slideCaption.innerHTML = image.alt;
  	slideNumber.appendChild(slideCaptionLink)
  	slideCaption.appendChild(slideNumber);
  	mySlidesContainer.appendChild(slideCaption);
    
  	const windowWidth = window.innerWidth; //looking for 900 or greater.
  	const mobileCheck = mobileAndTabletCheck();
  	var mainItem;
  	
  	if (windowWidth > 899 && !mobileCheck){
  		mainItem = document.createElement('object');
  		mainItem.setAttribute('data',finalPdfLink + '#navpanes=0');
  		mainItem.setAttribute('type','application/pdf');
  		mainItem.setAttribute('width','875em');
  		mainItem.setAttribute('height','1150em');
  		}
  	
  	else {
  		mainItem = document.createElement('img');
  		mainItem.src = image.src;
  		mainItem.alt = image.alt;
  		}
  	
  	mySlidesContainer.appendChild(mainItem);
    
  	
    
   
    
  	const columnDiv = document.createElement('div');
  	columnDiv.className = 'column';
  	columnDiv.setAttribute ('onClick','currentSlide(' + (i+1) +  ');');
    
    
  	const thumbImgItem = document.createElement('img');
  	thumbImgItem.src = image.src;
  	//thumbImgItem.classList.add('demo');
  	//thumbImgItem.classList.add('cursor');
    
  	const thumbImgContainer = document.createElement('div');
  	thumbImgContainer.className = 'thumb-container';
  	thumbImgContainer.appendChild(thumbImgItem);
  	
  	columnDiv.appendChild(thumbImgContainer);
  	
  	const descDiv = document.createElement('div');
  	descDiv.className = 'desc';
  	descDiv.innerHTML = mainTitle;//image.title;
  	columnDiv.appendChild(descDiv);
    
  	thumbnailList.appendChild(columnDiv);
  	
  	fullImageContainer.appendChild(mySlidesContainer);
  }

  thumbnailListContainer.appendChild(thumbnailList);

  const prevSlideArrow = document.createElement('a');
  prevSlideArrow.className = 'prev';
  prevSlideArrow.setAttribute('onClick','plusSlides(-1);');
  prevSlideArrow.innerHTML = '❮';

  const nextSlideArrow = document.createElement('a');
  nextSlideArrow.className = 'next';
  nextSlideArrow.setAttribute('onClick','plusSlides(1);');
  nextSlideArrow.innerHTML = '❯';

  containerContainer.appendChild(prevSlideArrow);
  containerContainer.appendChild(nextSlideArrow);  


  containerContainer.appendChild(thumbnailListContainer);

  const arrowContainer = document.createElement('div');
  arrowContainer.className = 'arrows';

  const leftArrow = document.createElement('div');
  leftArrow.className = 'arrow-left';
  leftArrow.setAttribute('onClick','scrollContainerLeft();');
  leftArrow.setAttribute('style','display:none;');
  const leftArrowI = document.createElement('i');
  leftArrowI.className = 'fa';
  leftArrowI.classList.add('fa-chevron-left');
  leftArrowI.classList.add('fa-lg');
  leftArrow.appendChild(leftArrowI);

  const rightArrow = document.createElement('div');
  rightArrow.className = 'arrow-right';
  rightArrow.setAttribute('onClick','scrollContainerRight();');
  const rightArrowI = document.createElement('i');
  rightArrowI.className = 'fa';
  rightArrowI.classList.add('fa-chevron-right');
  rightArrowI.classList.add('fa-lg');
  rightArrow.appendChild(rightArrowI);
  arrowContainer.appendChild(leftArrow);
  arrowContainer.appendChild(rightArrow);
  containerContainer.appendChild(arrowContainer);

  containerContainer.appendChild(fullImageContainer);

  galleryElement.appendChild(containerContainer);

  const hideAlbumElement = document.getElementsByClassName('field--name-field-infographics')[0].getElementsByClassName('field__items')[0];
  hideAlbumElement.remove();

  //from infographic JS    
  var slideIndex;
  const queryString = window.location.search;
  //console.log(queryString);
  var slide = null;
  const urlParams = new URLSearchParams(queryString);
  if (/^([a-zA-Z0-9_]{5,})$/.test(urlParams.get('slide'))){
  	slide = urlParams.get('slide');
  }

  if (slide != null){
  	slideIndex = slideNumberByName(slide);
  }
  else {
  	slideIndex = 1;
  }
  showSlides(slideIndex);

  function plusSlides(n) {
    showSlides(slideIndex += n);
  }

  function currentSlide(n) {
    showSlides(slideIndex = n);
  }

  function showSlides(n) {
    var i;
    var slides = document.getElementsByClassName("mySlides");
    //var dots = document.getElementsByClassName("demo");
    var captionText = document.getElementById("caption");
    if (n > slides.length) {slideIndex = 1}
    if (n < 1) {slideIndex = slides.length}
    for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }
    /*for (i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active", "");
    }//*/
    slides[slideIndex-1].style.display = "block";
    //dots[slideIndex-1].className += " active";
    //captionText.innerHTML = "<a href = '" + dots[slideIndex-1].getAttribute("data-id") + "' target='_blank'> View or download PDF </a>";//dots[slideIndex-1].alt;
  }

  function slideNumberByName(slideName) {
    var i;
    var slides = document.getElementsByClassName("mySlides");
    var slideIndex = -1;
    for (i = 0; i < slides.length; i++) {
      if (slides[i].getAttribute('data-searchname') == slideName) {
  		slideIndex = i;
  		break;
  	}
    }
    return slideIndex + 1;
  }



  function scrollContainerRight(){
  	document.getElementById('thumbnail-list-container').scrollLeft += (Math.round(document.getElementById("thumbnail-list-container").offsetWidth / 100) * 100);
  	document.getElementsByClassName('arrow-left')[0].setAttribute('style','display:block;');

  	const limit = document.getElementById('thumbnail-list-container').offsetWidth;
  	const position = (document.getElementsByClassName("thumbnail-list")[0].offsetWidth) - (document.getElementById('thumbnail-list-container').scrollLeft);
  	if (limit == position){
  		document.getElementsByClassName('arrow-right')[0].setAttribute('style','display:none;');
  	}
  }
  function scrollContainerLeft(){
  	document.getElementById('thumbnail-list-container').scrollLeft -= (Math.round(document.getElementById("thumbnail-list-container").offsetWidth / 100) * 100);
  	const limit = document.getElementById('thumbnail-list-container').offsetWidth;
  	const position = document.getElementById('thumbnail-list-container').scrollLeft;
  	document.getElementsByClassName('arrow-right')[0].setAttribute('style','display:block;');
  	if (position == 0){
  		document.getElementsByClassName('arrow-left')[0].setAttribute('style','display:none;');
  	}
  }


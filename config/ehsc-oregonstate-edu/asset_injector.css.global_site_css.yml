  /* Show only the sf-hidden ul inside a parent li that has an anchor with class is-active */
  .sf-vertical > li:has(> a.is-active) > ul.sf-hidden {
    display: block !important; /* override inline display:none if needed */
  }

  /* Hide all other sf-hidden submenus by default */
  .sf-vertical > li > ul.sf-hidden {
    display: none;
  }



  /* This style set is here to show and hide the appropriate third level menu items in the left hand nav */
  /* Show only the sf-hidden ul inside a parent li that has an anchor with class is-active */
  .sf-vertical > li:has(> a.is-active) > ul {
    display: block !important;
  }

  /* Hide all other sf-hidden submenus by default */
  .sf-vertical > li > ul {
    display: none !important;
  }

  /* This style set is here to show and hide the appropriate third level menu items in the left hand nav */
  /* Show only the sf-hidden ul inside a parent li that has an anchor with class is-active */
  .sf-vertical > li:has(> a.is-active) > ul {
    display: block !important;
  }

  /* Show if the <ul> has a child <li> with a child <a.is-active> */
  .sf-vertical > li > ul:has(li > a.is-active) {
    display: block !important;

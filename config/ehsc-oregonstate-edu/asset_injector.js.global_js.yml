  const breadcrumbWrapper = document.querySelector('[aria-labelledby="system-breadcrumb"]');

  if (breadcrumbWrapper) {
    const breadCrumbItem = breadcrumbWrapper.getElementsByClassName('breadcrumb-item')[0];
    
    if (breadCrumbItem) {
      breadCrumbItem.classList.add('breadcrumb-shortened');
      
      const breadCrumbLink = breadCrumbItem.getElementsByTagName('a')[0];
      if (breadCrumbLink) {
        breadCrumbLink.innerHTML = 'PNW-CTEHR';
      }
    }
  }


  // Select both menus
  const menus = document.querySelectorAll('#superfish-main a, #superfish-main--2 a');

  menus.forEach(link => {
    if (link.textContent.trim().startsWith('> ')) {
      // Remove the carrot + space
      link.textContent = link.textContent.replace(/^>\s*/, '');
      // Add your class
      link.classList.add('second-level-sub-item');
    }
  });

  //Remove any ampty H3s
  document.querySelectorAll('h3').forEach(h3 => {
    if (!h3.innerText.trim()) {
      h3.remove();
    }
  });

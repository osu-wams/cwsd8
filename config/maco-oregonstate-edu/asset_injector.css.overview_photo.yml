code: |-
  /* Image on page */
  .field__item img {
      height: 500px;  /* Set a fixed height, adjust as needed */
      width: 100%;    /* Allow the width to be responsive */
      object-fit: cover;  /* Keeps the aspect ratio while cropping */
      object-position: center; /* Ensures the image is centered if cropped */
      image-rendering: crisp-edges;  /* For most other browsers */
  }


id: sublanding_pages
label: 'Sublanding Pages'
code: |-
  /* Large font is for the leadership headings*/

  	@media (min-width: 1201px) {
  	  .large-font { 
  	  	font-size: 70px;
  	    line-height:1;
  	    color:#d73f09;
  	  }
  	}
  	
  	@media (max-width: 1200px) {
  	    .large-font {
  	      font-size: 40px;
  	      color:#d73f09;
  	    }
  	}



  /* Header styling for the top half of the meet the team pages */

  	.svp-name{
  		font-family: "Stratum2Web", serif;
  		font-size: 4rem;
  	}
  	
  	.svp-position{
  		font-size: 2rem;
  	  font-weight: 100;
  	}



  /* Read more styling for long paragraph text on the SVP Landing Page */

  	.preview {
  	    display: block;
  	}
  	
  	.full-text {
  	    display: none;
  	}
  	
  	.read-more {
  	    color: inherit;
  	    cursor: pointer;
  	    text-decoration: underline;
  	    text-decoration-color: orange;
  	    margin-left: 5px;
  	}
  	
  	.read-more:hover {
  	    text-decoration: none;
  	}
  	
  	.text-container {
  	    display: inline;
  	}



  /* Group Title Banner Styling */
  	
  	.bg-med-dark{
  		background-color: #00000050;
  	}
  	
  	.aa-group-title{
  	  font-weight: 500;
  	  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
  	}

  	@media (min-width: 1201px) {
  			.aa-group-title{
  				font-size: 4rem;
  		  }
  	}
  	
  	@media (max-width: 1200px) {
  			.aa-group-title{
  			font-size: 3rem;
  	    }
  	}
  	
  	

  /* Group orange bar icon sizes */

  	.aa-orange-bar-icons{
  		width: 250px;
  	}
  	
  	/* Special styling for AU due to 5 columns in orange bar */
  	.affiliated-units-width{
  		width: 250px;
  	}
media: all

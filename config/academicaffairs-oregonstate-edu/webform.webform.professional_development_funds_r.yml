    '#title': 'Briefly describe what you hope to accomplish through this professional development opportunity (personal/professional benefits)'
    '#required': true
  provide_a_detailed_budget_for_the_proposed_project_include_detai:
    '#type': fieldset
    '#title': 'Provide a detailed budget for the proposed project. Include details on the following as they apply:'

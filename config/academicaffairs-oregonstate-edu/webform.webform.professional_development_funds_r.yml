    '#title': 'Registration fees'
    '#field_prefix': $
    '#maxlength': 255
    '#size': 60
    '#required': true
    '#attributes':
      style: 'width: 98%; display: inline-block;'
    '#label_attributes':
      style: 'display: block;'

    '#type': textarea
    '#title': 'Miscellaneous expenses (please specify amount and description of expense)'
  total_expenses:
    '#type': textfield
    '#title': 'Total expenses'
    '#field_prefix': $
    '#maxlength': 255
    '#size': 60
    '#required': true
    '#attributes':
      style: 'width: 98%; display: inline-block;'
    '#label_attributes':
      style: 'display: block;'
  total_matching_funds_requested:
    '#type': textfield
    '#title': 'Total matching funds requested*'
    '#field_prefix': $
    '#field_suffix': '*Note: Amount shall be the lesser of 50% of total budget, OR $1000.'
    '#maxlength': 255
    '#size': 60
    '#required': true
    '#attributes':
      style: 'width: 98%; display: inline-block;'
    '#label_attributes':
      style: 'display: block;'
  how_did_you_learn_of_this_opportunity_if_available_please_includ:
    '#type': textarea
    '#title': 'How did you learn of this opportunity? If available, please include website address'
  by_clicking_submit_you_are_confirming_that_your_department_has_a:

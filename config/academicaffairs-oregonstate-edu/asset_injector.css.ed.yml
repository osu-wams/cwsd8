  /* Content Specific */

  .benny-bot-orangeline{
  	width:100%;
  	border-top: 6px solid #d73f09;
  }

  .benny-bot-cta{
  	font-family: 'Stratum2Web';
  	line-height: 1;
  	font-weight: 900;
  }

  .benny-bot-banner img{
  	height: 600px;
  	width: 100%;
  	object-fit: cover;
  }

  .benny-bot-banner-text{
  	top: 50%;
  }

  .benny-bot-banner-text h1, .benny-bot-banner-text p {
  	text-shadow: 1px 1px 2px black;
  }

  .benny-bot-privacy{
  	background: #ffffff36;
  	border: 1px solid white;
  	padding: 1rem;
  }

  .benny-bot-bg-whitetransparent{
  	background: #ffffff29;;
  }

  .benny-bot-numbers{
  	background: white;
  	width: fit-content;
  	padding: 10px;
  	line-height: 1;
  	border-left: 4px solid #d73f09;
  }

  .benny-bot-numbers-dark{
  	background: white;
  	width: fit-content;
  	padding: 10px;
  	line-height: 1;
  	border-left: 4px solid #000;
  }

  .benny-bot-wait{
  	-webkit-text-stroke: 5px #ffffff;
  	color: #d73f09;
  }

  .benny-bot-large-shadow{
  	font-size: 8rem;
  	text-shadow: 3px 3px 3px black;
  }

  @media (max-width: 991px){
  	.benny-bot-large-shadow{
  		font-size: calc(2rem + 8vw);
  	}
  	
  	.benny-bot-wait{
  		-webkit-text-stroke: 2px #ffffff;
  	}
  }

  .benny-hero::before{
  	content: '';
  	position: absolute;
  	inset: 0;
  	background-image: repeating-linear-gradient(-60deg, transparent, transparent 40px, rgba(0,0,0,.055) 40px, rgba(0,0,0,.055) 41px);
  	pointer-events: none;
  }

  .benny-sidebar{
  	writing-mode: vertical-rl;
  	text-orientation: mixed;
  	transform: rotate(180deg);
  	font-weight: 800;
  	letter-spacing: 4px;
  	color: #ffffff24;
  	padding-top: 8px;
  	white-space: nowrap;
  	position: absolute;
  	top: 50px;
  	right: 0px;
  }

  .benny-border::before{
  	content: "";
  	position: absolute;
  	top: 0;
  	left: 0px;
  	width: 70%;
  	height: 4px;
  	background: #d73f09;
  }

  .benny-border::after{
  	content: "";
  	position: absolute;
  	bottom: 0;
  	right: 0px;
  	width: 40%;
  	height: 4px;
  	background: #d73f09;
  }

  .bb-hero-subtitle{
  	padding: 0 15px 5px;
  	color: #fff;
  	text-shadow: 3px 3px 3px #000000;
  	font-weight: 500;
  }

  .bb-clip-left{
  	clip-path: polygon(0 0, 100% 0, 100% 100%, 10% 100%, 0 30%);
  }

  .bb-clip-right{
  	clip-path: polygon(0 0, 95% 0, 100% 60%, 100% 100%, 0 100%);
  }

  @media (min-width: 768px) and (max-width: 991px){
  	.bb-clip-left{
  		clip-path: polygon(0 0, 100% 0, 100% 100%, 10% 100%, 0 50%);
  	}
  	
  	.bb-clip-right{
  		clip-path: polygon(0 0, 94% 0, 100% 60%, 100% 100%, 0 100%);
  	}
  }

  @media (min-width: 1196px) and (max-width: 1410px){
  	.benny-learn-more-resize{
  		font-size: 5rem;
  	}
  }

  @media (min-width: 981px) and (max-width: 1195px){

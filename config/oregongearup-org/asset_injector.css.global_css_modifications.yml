  /* Changing default OSU Button styles in Button Picker VRB 5.14.24 */

  .osu-btn-primary,.node-preview-container .node-preview-form-select .node-preview-backlink,.ui-dialog .button,a.button { /*lime green to blue*/
      --bs-btn-color: #212529;
      --bs-btn-bg: #8CC63F;
      --bs-btn-border-color: #8CC63F;
      --bs-btn-hover-color: #fff;
      --bs-btn-hover-bg: #253270;
      --bs-btn-hover-border-color: #253270;
      --bs-btn-focus-shadow-rgb: 221,92,46;
      --bs-btn-active-color: #212529;
      --bs-btn-active-bg: #8CC63F;
      --bs-btn-active-border-color: #8CC63F;
      --bs-btn-active-shadow: none;
      --bs-btn-disabled-color: #fff;
      --bs-btn-disabled-bg: #8CC63F;
      --bs-btn-disabled-border-color: #8CC63F;
      --bs-btn-font-family: rockwell, sans-serif;

  }

  .cke_reset_all .osu-buttons .primary {
      background-color: #8CC63F!important;
  }

  osu-colors p.primary {
      background-color: #8CC63F!important;
  }


  /* Social Media Icons VRB 7.24.24*/
  .social-media-icons-footer a {
    font-size: 2.2rem;
    margin-right: 1rem;
    color:white;
    transition: all 0.4s ease;
  }
  .social-media-icons-footer a:hover, .social-media-icons a:focus, .social-media-icons a:active {
    color: #d73f09 !important;
  }
  .social-media-icons-footer a:last-child {
    margin-right: 0;
  }


  /* Sticky back to top footer VRB 07.10.2024 */
  body {
    padding: 0;
    margin: 0;
    height: 100%;
  }
  .wrap {
    min-height: 100%;
  }

  .sticky {
    padding: 20px;
    text-align: center;
    background: red;
    position: -webkit-sticky;
    position: sticky;
    bottom: 0;
  }


  /* Hide OSU Logo DAC 06.03.2024

  .d-lg-flex {display:none !important;}

  #osu-logo-crest {display:none !important;} */

  .site-name__site-link, .site-name__site-front, .block__content__site-name {color: #007f42 !important;
  	font-family: rockwell, sans-serif !important;
  }

  .block__content__site-name h1, .block__content__site-name .h1 {color: #007f42 !important;
  	font-family: rockwell, sans-serif !important;
  }

  /* Add spacing to sidebar menu DAC 06.03.2024 */

  #block-madrone-sidebargrantmanagementtrainingandresources-menu, #block-madrone-sidebargrantmanagementcontacts-menu {margin-top:20px !important;}



  /* adds style guide colors to bootstrap sections VRB 5.7.24*/
  .gearup-bg-green {background-color: #007f42;}
  .gearup-bg-lime-green {background-color: #8cc63f;}
  .gearup-bg-light-green {background-color: #d0e8b2;}
  .gearup-bg-gray {background-color: #bfbfbf;}
  .ogtc-bg-navy {background-color: #253270;}

  /* changes text color to white VRB 6.3.24*/
  #white {
     color: #ffffff;
  }

  /* Make headings Rockwell Bold and black VRB 5.8.24*/
  h1,h2,h3,h4,h5,h6 {
  	font-family: rockwell, sans-serif;
  	font-style: normal;
  	font-weight: 700;
  	color:#000000;
  }

  /* Make body text Calibri VRB 5.8.24 */
  p, ul, li {
  	font-family: calibri, sans-serif !important;
  	font-style: normal !important;
  	font-weight: 500 !important;
  }



  /* Top Main Menu DAC 11.3.2023 */
  ul.sf-menu.sf-style-black
  {
    margin-bottom:0;
  }

  .bg-neutral-200
  {
    background-color:black !important;
  }

  #superfish-main
  {
  	text-transform: uppercase;
  	font-weight: bold;
  	/* letter-spacing: 0.1em; */
  }

  .madrone-primary-menu > .block-superfish ul.sf-menu li.sf-depth-1.menuparent > a::after, .madrone-primary-menu > 
  .block-superfish ul.sf-menu li.sf-depth-1.menuparent > span::after {color:white !important;}

  .madrone-primary-menu > .block-superfish ul.sf-menu li a:hover, .madrone-primary-menu > .block-superfish ul.sf-menu li a:active, .madrone-primary-menu > .block-superfish ul.sf-menu li a:focus, .madrone-primary-menu > .block-superfish ul.sf-menu li span:hover, .madrone-primary-menu > .block-superfish ul.sf-menu li span:active, 
  .madrone-primary-menu > .block-superfish ul.sf-menu li span:focus {color:white !important;}

  .madrone-primary-menu > .block-superfish ul.sf-menu li a:hover {color:white !important;} 


  .madrone-primary-menu > .block-superfish ul.sf-menu li.sf-depth-1.menuparent.sfHover > a {background-color:#423e3c;}
  .madrone-primary-menu > .block-superfish ul.sf-menu li a:focus {background-color:#bfbfbf !important;}
  .madrone-primary-menu > .block-superfish ul.sf-menu li a:hover {background-color:#007f42 !important;}
  .madrone-primary-menu > .block-superfish ul.sf-menu li.sf-depth-1.menuparent:hover > a {background-color:#423e3c !important}

  div.sf-accordion-toggle.sf-style-black > a::after {content: "";}

  /* End Top Main Menu */

  /* Sidebar Adjustments DAC 11.8.2023-modified VRB 5.14.24  */
      .px-lg-2 {
          /* padding-right: 1.5rem !important;
          padding-left: 1.5rem !important; */
          padding: 1.5rem;
      }


  .smol-card-component-og > img:last-child {
    border-radius: 0 0 0.5rem 0.5rem;
    margin-top: auto;
  }

  .smol-card-component-og > :not(img) {
    margin-left: 1rem;
    margin-right: 1rem;
  }

  .smol-card-component-og > :not(img):first-child {
    margin-top: 1rem;
  }

  /* Enhanced `:not()` accepts a selector list,
  but as a fallback you can chain `:not()` instead */
  .smol-card-component-og > :last-of-type:not(img, h2, h3, h4) {
    margin-bottom: 1rem;
  }

  .smol-card-component-og > :not(h2, h3, h4) {
    font-size: 0.9rem;
  }

  .smol-card-component-og > a {
    align-self: start;
  }

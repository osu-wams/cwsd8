  /* Minimal snippets for modern CSS layouts and components via https://smolcss.dev/ */




  /* Smol Responsive CSS Grid */

  .smol-css-grid {
    --min: 20ch;
    --gap: 3rem;
    display: grid;
     grid-template-columns: repeat(auto-fill, minmax(302px, 1fr));
    justify-content: center;
    grid-gap: var(--gap);

    /* min() with 100% prevents overflow
    in extra narrow spaces */
    
    /*grid-template-columns: repeat(auto-fit, minmax(min(100%, var(--min)), 1fr);*/
  }

  /* Smol Responsive Flexbox Grid */

  .smol-flexbox-grid {
    --min: 10ch;
    --gap: 3rem;

    display: flex;
    flex-wrap: wrap;
    gap: var(--gap);
  }

  .smol-flexbox-grid > * {
    flex: 1 1 var(--min);
  }


  .smol-flexbox-grid-15ch {
      --min: 15ch;
      display: flex;
      flex-wrap: wrap;
      gap: 3em;
      justify-content: center;
  }

  .smol-flexbox-grid-15ch > * {
      flex: 1 1 var(--min);
  }

  .smol-flexbox-grid-20ch {
      --min: 20ch;
      display: flex;
      flex-wrap: wrap;
      gap: 3em;
      justify-content: center;
  }

  .smol-flexbox-grid-20ch > * {

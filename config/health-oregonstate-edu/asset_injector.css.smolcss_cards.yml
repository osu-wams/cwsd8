      gap: 3em;
  }

  .smol-flexbox-grid-50ch-start > * {
      flex: 1 1 var(--min);
  }


  /*

  Smol Modern Centering

  */

  .smol-centering {
    display: grid;
    place-content: center;
  }


  /*

  Smol Responsive Padding

  */

  .smol-responsive-padding {
    padding: 1.5rem clamp(1rem, 5%, 3rem);
  }


  /*

  Smol Responsive Sidebar Layout

  */

  .smol-sidebar {
    display: grid;
    grid-template-columns: fit-content(20ch) minmax(min(50vw, 30ch), 1fr);
  }


  /*

  Smol Composable Card Component

  */


  .smol-card-component {
    --img-ratio: 16/9;

    display: flex;
    flex-direction: column;
    /* Supported for flexbox in modern browsers since April 2021 */
    gap: 0.5rem;
    box-shadow: 0 0 0.5rem rgba(0, 0, 0, 0.35);
    border-radius: 0.5rem;
    background: white;
    transition: 0.2s ease-out;
  }

  .smol-card-component > img {
    aspect-ratio: var(--img-ratio);
    -o-object-fit: cover;
       object-fit: cover;
    width: 100%;
  }

  .smol-card-component > img:first-child {
    border-radius: 0.5rem 0.5rem 0 0;
  }

  .smol-card-component > img:last-child {
    border-radius: 0 0 0.5rem 0.5rem;
    margin-top: auto;
  }

  .smol-card-component > :not(img) {
    margin-left: 1rem;
    margin-right: 1rem;
  }

  .smol-card-component > :not(img):first-child {
    /*margin-top: 1rem;*/
  }

  /* Enhanced `:not()` accepts a selector list,
  but as a fallback you can chain `:not()` instead */
  .smol-card-component > :last-of-type:not(img, h2, h3, h4) {
    /*margin-bottom: 1rem;*/
  }

  .smol-card-component > h4 {
  	font-size: 1.4rem;
  }

  .smol-card-component > :not(h2, h3, h4) {
    font-size: 0.9rem;
  }

  .smol-card-component > a {
    align-self: start;
  }


  /* inclusive design book for cards via https://inclusive-components.design/cards/*/
  .smol-card-component { 
  	position: relative;
  }

  .smol-card-component > * {
  	 margin: 0;
  }

  .smol-card-component :first-child {
  	 margin: 0;
  }

  .smol-card-component :last-child {
  	margin-bottom: 0.5rem;
  }


  .smol-card-component a::before {
  	content: "";
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
  }

  .smol-card-component div img {
    aspect-ratio: var(--img-ratio);
    -o-object-fit: cover;
       object-fit: cover;
    width: 100%;
    border-radius: 0.5rem 0.5rem 0 0;
  }

  .smol-card-component:hover {
  	box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    transform: scale(1.01);
  }




  /*

  Smol Composable Card Component Original... no modifications

  */

  .smol-card-component-og {
    --img-ratio: 3/2;

    display: flex;
    flex-direction: column;
    /* Supported for flexbox in modern browsers since April 2021 */
    gap: 1rem;
    box-shadow: 0 0 0.5rem rgba(0, 0, 0, 0.35);
    border-radius: 0.5rem;
  }

  .smol-card-component-og > img {
    aspect-ratio: var(--img-ratio);
    object-fit: cover;
    width: 100%;
  }

  .smol-card-component-og > img:first-child {
    border-radius: 0.5rem 0.5rem 0 0;

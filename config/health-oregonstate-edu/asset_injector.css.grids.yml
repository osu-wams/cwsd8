  }


  @media (max-width: 140ch) {
      .grid-ya-basic-4 {
          grid-template-columns: none;
          grid-template-rows: repeat(4, 1fr);
      }

      .grid-ya-basic-4>*:nth-child(1) {
          -ms-grid-row: 1;

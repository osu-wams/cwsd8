      }

      .grid-ya-basic-4>*:nth-child(2) {
          -ms-grid-row: 2;
          -ms-grid-column: 1;
      }

      .grid-ya-basic-4>*:nth-child(3) {
          -ms-grid-row: 3;
          -ms-grid-column: 1;
      }
      
          .grid-ya-basic-4>*:nth-child(4) {
          -ms-grid-row: 4;
          -ms-grid-column: 1;
      }
  }



  .grid-ya-basic-4-claude {
      display: grid;
      gap: 2rem;
  }

  @media (min-width: 90ch) {
      .grid-ya-basic-4-claude {
          grid-template-columns: repeat(2, 1fr);
      }
  }

  @media (min-width: 140ch) {
      .grid-ya-basic-4-claude {
          grid-template-columns: repeat(4, 1fr);
      }
  }


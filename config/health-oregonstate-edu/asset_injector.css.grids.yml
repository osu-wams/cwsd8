  /* color grid for home page */
  .grid-color-container {
    display: grid;
    grid-template-columns: repeat(1, 1fr);
    margin: 0 !important; 
    padding: 0 !important;
    width: 100%;
  }

  .grid-color-container > div {
    overflow: hidden;
    position: relative;
    padding: 2em;
    margin: 0;

  }



  .color-card .color-card-link::before {
  	content: "";
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
  }


  .grid-color-container .color-card {
  	transition: 200ms ease-in-out;
    text-decoration: none;
  }


  .grid-color-container .color-card a{
    text-decoration: none;
  }


  .grid-color-container .color-card:nth-child(1) {
    background-color: #636363;
    color: rgb(255, 255, 255) !important;
  }

  .grid-color-container .color-card:nth-child(1) h2 {
  	  color: rgb(255, 255, 255) !important;
  }

  .grid-color-container .color-card:nth-child(2){
  	background-color: #D73F09 ;
    color: rgb(255, 255,255) !important;
  }

  .grid-color-container .color-card:nth-child(2) a {
  	  color: rgb(255, 255, 255) !important;
  }

  .grid-color-container .color-card:nth-child(3) {
    background-color: #636363;
    color: rgb(255, 255,255) !important;
  }


  .grid-color-container .color-card:nth-child(3) a {
  	  color: rgb(255, 255, 255) !important;
  }


  .grid-color-container .color-card:nth-child(4) {
    background-color: rgb(13, 82, 87) ;
    color: rgb(255, 255,255) !important;
  }

  .grid-color-container .color-card:nth-child(4) a {
  	  color: rgb(255, 255, 255) !important;
  }

  .grid-color-container .color-card:nth-child(5) {
    background-color: rgb(0, 106, 142);
    color: rgb(255, 255,255) !important;
  }

  .grid-color-container .color-card:nth-child(5) a {
    color: rgb(255, 255,255) !important;
  }

  .grid-color-container .color-card:nth-child(6) {
    background-color: #B8DDE1;
    color: rgb(0, 0 ,0) ;
  }

  .grid-color-container .color-card:nth-child(6) a {
    color: rgb(0, 0 ,0) !important;
  }


  .grid-color-container .color-card:nth-child(7) {
    background-color: rgb(0, 59, 92) ;
    color: rgb(255, 255,255) !important;
  }

  .grid-color-container .color-card:nth-child(7) a {
    color: rgb(255, 255,255) !important;
  }

  .grid-color-container .color-card:hover:not(:first-child) {
  	background-color:  rgb(55, 55, 55) !important;
  	color: rgb(255, 255, 255) !important;
  } 

  .grid-color-container .color-card:hover a {
  		color: rgb(255, 255, 255) !important;
  }


  @media(min-width: 561px) {
    .grid-color-container {
      grid-template-columns: repeat(2, 1fr);
    }
    .grid-color-container :nth-child(1) {
      grid-column: span 2;
    }
  }

  @media(min-width: 971px) {
    .grid-color-container {
      grid-template-columns: repeat(4, 1fr);
    }
  }





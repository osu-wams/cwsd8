id: grids
label: Grids
code: |-
  .grid-faculty-cphhs {
      display: -ms-grid;
      display: grid;
      gap: 3em;
      grid-template-columns: repeat(auto-fill, minmax(352px, 1fr));
      grid-auto-rows: minmax(150px, auto);
      padding-inline: 2em;
      justify-content: center;
  }


  .grid-faculty-coh {
      display: grid;
      gap: 3rem;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 400px), 1fr));
      grid-auto-rows: minmax(175px, auto);
      justify-content: center;
      margin-inline: auto;
  }

  .grid-faculty-cphhs-content-vis {
      content-visibility: auto;
      contain-intrinsic-height: 480px;
      /* A guess at the height of it */
  }




  /* ya super basic 2 column grid  */
  .grid-columns-2 {
  	display: grid;
  	grid-template-columns: 1fr;
  }

  .css-grid-wrapper-02 {
      display: grid;
      gap: 3rem;
      justify-content: center;
  }

  @media (min-width: 900px) {
      .css-grid-wrapper-02 {
          grid-template-columns: repeat(2, 1fr);
      }
  }

  .grid-cols-2 {
      display: grid;
      gap: 3rem;
  }

  @media (min-width: 900px) {
  		.grid-columns-2 {
        grid-template-columns: repeat(2, 1fr);
      }
  	
      .grid-cols-2 {
          grid-template-columns: repeat(2, 1fr);
      }
  }

  /* reverse 2 col grid on smaller screens */
  .grid-wrapper-2-reverse {
      display: grid;
       grid-template-columns: repeat(2, 1fr);
  }


  @media (max-width: 900px) {
      .grid-wrapper-2-reverse {
          grid-template-columns: repeat(1,1fr) !important; /* Switch to a single column */
      }

      /* Change the order of items on smaller screens */
      .grid-wrapper-2-reverse > :nth-child(1) {
          order: 2; /* Content A moves to the second position */
      }

      .grid-wrapper-2-reverse > :nth-child(2) {
          order: 1; /* Content B moves to the first position */
      }
  }


  /* ya basic 2 column that turns to 3 rows under some ch value. ch value classes located in next commented section  */

  .grid-ya-basic-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
  }

  @media (max-width: 140ch) {
      .grid-ya-basic-2 {
          grid-template-columns: none;
          grid-template-rows: repeat(2, 1fr);
      }

      .grid-ya-basic-2>*:nth-child(1) {
          -ms-grid-row: 1;
          -ms-grid-column: 1;
      }

      .grid-ya-basic-2>*:nth-child(2) {
          -ms-grid-row: 2;
          -ms-grid-column: 1;
      }

  }

  .grid-ya-basic-2-claude-02 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr));
      gap: 2rem;
  }


  .grid-ya-basic-2-claude-01 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
      gap: clamp(2rem, 3vw, 3rem);
  }
  .grid-ya-basic-2-claude-01 > * {
      min-height: 0;
      min-width: 0;
  }
  @media (prefers-reduced-motion: no-preference) {
      .grid-ya-basic-2-claude-01 {
          transition: grid-template-columns 0.3s ease;
      }
  }
  @media (max-width: 768px) {
      .grid-ya-basic-2-claude-01 {
          grid-template-columns: minmax(0, 1fr);
      }
  }
  @supports (grid-template-rows: masonry) {
      .grid-ya-basic-2-claude-01 {
          grid-template-rows: masonry;
      }
  }


  .grid-ya-basic-2-claude-03 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(450px, 100%), 1fr));
      gap: clamp(2rem, 3vw, 3rem);
  }

  .grid-ya-basic-2-claude-03 > * {
      min-height: 0;
      min-width: 0;
  }

  @supports (grid-template-rows: masonry) {
      .grid-ya-basic-2-claude-03 {
          grid-template-rows: masonry;
      }
  }



  .grid-ya-basic-2-gemini-01 {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* Or: repeat(2, minmax(150px, 1fr)) */
      gap: 2rem;
  }

  @media (max-width: 140ch) {
      .grid-ya-basic-2-gemini-01 {
          grid-template-columns: 1fr; /* Single column layout */
          grid-auto-flow: column; /* Arrange items column by column */
      }
  }




  /* ya basic 3 column that turns to 3 rows under some ch value. ch value classes located in next commented section  */

  .grid-ya-basic-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
  }

  @media (max-width: 140ch) {
      .grid-ya-basic-3 {
          grid-template-columns: none;
          grid-template-rows: repeat(3, 1fr);
      }

      .grid-ya-basic-3>*:nth-child(1) {
          -ms-grid-row: 1;
          -ms-grid-column: 1;
      }

      .grid-ya-basic-3>*:nth-child(2) {
          -ms-grid-row: 2;
          -ms-grid-column: 1;
      }

      .grid-ya-basic-3>*:nth-child(3) {
          -ms-grid-row: 3;
          -ms-grid-column: 1;
      }
  }


  .grid-ya-basic-3-claude-01 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 400px), 1fr));
      gap: clamp(2rem, 3vw, 3rem);
  }

  .grid-ya-basic-3-claude-01 > * {
      min-height: 0;
      min-width: 0;
  }

  @media (prefers-reduced-motion: no-preference) {
      .grid-ya-basic-3-claude-01 {
          transition: grid-template-columns 0.3s ease;
      }
  }

  @media (max-width: 768px) {
      .grid-ya-basic-3-claude-01 {
          grid-template-columns: minmax(0, 1fr);
      }
  }

  @supports (grid-template-rows: masonry) {
      .grid-ya-basic-3-claude-01 {
          grid-template-rows: masonry;
      }
  }


  /* ya basic 3 claude 02 should get rid of dangler  */

  .grid-ya-basic-3-claude-02 {
    display: grid;
    gap: clamp(2rem, 3vw, 3rem);
  }

  /* Default: Three columns */
  .grid-ya-basic-3-claude-02 {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .grid-ya-basic-3-claude-02 > * {
    min-height: 0;
    min-width: 0;
  }

  /* Media query for smaller screens: One column */
  @media (max-width: 768px) {
    .grid-ya-basic-3-claude-02 {
      grid-template-columns: minmax(0, 1fr); /* or 1fr */
    }
  }

  @media (prefers-reduced-motion: no-preference) {
    .grid-ya-basic-3-claude-02 {
      transition: grid-template-columns 0.3s ease;
    }
  }

  @supports (grid-template-rows: masonry) {
    .grid-ya-basic-3-claude-02 {
      grid-template-rows: masonry;
    }
  }



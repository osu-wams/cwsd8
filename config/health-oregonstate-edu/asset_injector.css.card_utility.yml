  /* header of cards */
  .card-item-header {
  	margin-block: 0.5em;
  	margin-inline: 1em;
  }

  .card-item-header > :first-child {
  	font-size: 1.4rem;
  }

  /* card body */
  .card-item-body {
  	margin-block: 0 0.5em;
  	margin-inline: 1.25em;
  	font-size: 1rem;
  }

  .card-item-body-pad {
  	padding: 0.75em;
  	font-size: 1rem;
  }


  /* images */


  .image-rectangle-16-9-br > img,
  .image-rectangle-16-9-br img
  .card-item-half-fw img,
  .card-item-third-fw img,
  .card-item-fw img {
    aspect-ratio: 16/9;
    object-fit: cover;
    width: 100%;
    border-radius: 0.5rem 0.5rem 0 0;
    margin: 0;
  }

  .image-rectangle-full-br img {
  	aspect-ratio: 16/9;
    object-fit: cover;
    width: 100%;
    border-radius: 0.5rem;
    margin: 0;
  }

  .image-rectangle-16-9 img {
  	aspect-ratio: 16/9;
    object-fit: cover;
    width: 100%;
    border-radius: 0.5rem 0.5rem 0 0;
    margin: 0;
  }


  .image-rectangle-2p35-1,
  .image-rectangle-2p35-1 img {
    aspect-ratio: 2.35/1;
    object-fit: cover;
    width: 100%;
    border-radius: 0.5rem 0.5rem 0 0;
  }

  .image-max-100p-center {
  	max-width: 100px;
  	margin: 0 auto;
  }

  .card-item-third-fw-photo .image-br-top img{
  	border-radius: 0.5em 0.5em 0 0;
  	width: 100%;
  }


  .img-2p35-1 img {
  	asepct-ratio: 2.35/1 !important;
  }



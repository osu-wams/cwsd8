  /* card flex container */
  .card-container-responsive {
  	display: flex;
    flex-wrap: wrap;
    gap: 3rem;
  }

  .card-container-responsive-center {
  	display: flex;
    flex-wrap: wrap;
    justify-content: center; 
    gap: 3rem;
    margin-block: 1em 0;
  }

  .h2-fs-1p25 h2 {
  	font-size: 1.25rem;
  }

  .h2-fs-1p25  p {
  	font-size: 1.0rem;
  }

  .h2-fs-2p25 {
  	font-size: 2.25rem !important;
  }


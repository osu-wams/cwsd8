  .card-button-wrap {
    margin-top: auto;
    text-align: center;
    transform: translateY(-0.5em);
    font-size: 0.9rem;
  }

  /* banner headers*/
  .grey-banner {
  	padding-block: 0.5em;
  	border-radius: 0.5rem 0.5rem 0 0;
  	background-color: #7A6855;
  	color: white;
  }

  .dark-yellow-banner {
  	padding-block: 0.5em;
  	border-radius: 0.5rem 0.5rem 0 0;
  	background-color: #FFB500;
  	color: black;
  }

  .red-banner {
  	padding-block: 0.5em;
  	border-radius: 0.5rem 0.5rem 0 0;
  	background-color: red;
  	color: white;
  }

  .light-blue-banner {
  	padding-block: 0.5em;
  	border-radius: 0.5rem 0.5rem 0 0;
  	background-color: #c6dae7;
  	color: black;
  }

  .light-green-banner {
  	padding-block: 0.5em;
  	border-radius: 0.5rem 0.5rem 0 0;

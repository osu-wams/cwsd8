  /* card item */
  .card-item-fourth-fw,
  .card-item-third-fw,
  .card-item-half-fw,
  .card-item-75-fw, 
  .card-item-fw {
  	display: flex;
  	flex-direction: column;
  	flex: 1 1 30ch;
  	/*padding-block: 0 0.5em;*/
  	/*flex: 1;*/
  	border-radius: 0.5em;
    background-color: white;
    /*box-shadow: 0 2px 3px rgba(0, 0, 0, 0.25) !important;*/
    box-shadow: 0 3px 8px rgb(228, 229, 234), 0 0 2px rgba(28, 16, 49, 0.12);
  }

  .card-item-third-fw-photo {
  	display: flex;
  	flex-direction: column;
  	background-color: white;
  	max-width: 220px;
  	flex: 1 1 30ch;
  	border-radius: 0.5em;
  	box-shadow: 0 3px 8px rgb(228, 229, 234), 0 0 2px rgba(28, 16, 49, 0.12);
  	
  }

  .card-item-fourth-fw {
  	max-width: 300px;
  }



  .card-item-third-fw {
  	max-width: 352px;
  }


  .card-item-half-fw {
  	max-width: 400px;
  }

  .card-item-75-fw {
  	max-width: 600px;
  }

  .card-item-fw {
    max-width: 100%;
  }

  /* font */
  .card-body-par-fs-p9 p {
  	font-size: 0.9rem;
  }
  .card-body-par-fs-p95 p {
  	font-size: 0.95rem;
  }

  .card-body-par-fs-1 p {
  	font-size: 1.0rem;
  }

  .fs-header-sub-same-1 * {
  	font-size: 1.0rem;
  }

  .fs-header-1p2 {
  	font-size: 1.0rem;
  }

  .fs-header-1p2 :not(p) {
  	font-size: 1.2rem !important;
  }


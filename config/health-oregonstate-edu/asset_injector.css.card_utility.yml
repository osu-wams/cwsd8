  /* divider */
  .grey-solid-divider {
  	border-top: 1px solid grey;
  	height: 2px;
  	width: 100%;
  	
  }

  .border-none {
  	border: none;
  }

  .quote-border-white {
  	border: 1px solid white;
  }
  .card-body-wrap-divider,
  .card-body-wrap-divider-even {
  	font-size: 1.0rem;
  	padding-inline: 1em;
  	padding-block: 0 0.5em;
  }

  .card-body-wrap-divider *, 
  .card-body-wrap-divider-even *{
  	margin: 0;
  }

  .card-body-wrap-divider > :nth-child(odd) {
  	padding-block: 0 0.5em;
    border-bottom: 1px solid grey;
  }

  .card-body-wrap-divider > :nth-child(even) { 
  	padding-block: 0.5em 0;
  }

  .card-body-wrap-divider-even > :nth-child(even) {
  	padding-block: 0.5em 0;
    border-top: 1px solid grey;
  }

  .card-body-wrap-divider-even > :nth-child(odd) {
  		padding-block: 0 0.5em;
  }


  .card-body-wrap-divider :last-child {
  	/*padding-block: 0 0.25em;*/
  }


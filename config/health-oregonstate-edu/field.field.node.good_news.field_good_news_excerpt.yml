description: 'Typically just use what the article already uses as their Open Graph Meta Description. Use the <a href="https://developers.facebook.com/tools/debug/">Facebook Sharing Debugger</a> to find an article''s Meta Description. If you write your own: Do not write more than one or two short sentences. Although Facebook states that you can write up to 4 sentences in the description, SEO experts recommend that you do not go beyond the limit of 200 characters. See <a href="https://neilpatel.com/blog/open-graph-meta-tags/">12 Useful Open Graph Meta Tag Types for Facebook and Twitter</a> for details.'

id: alan_s_even_newer_slate_rfi
label: "Alan's even newer Slate RFI"
code: |
  /*
  * Prefixed by https://autoprefixer.github.io
  * PostCSS: v8.4.14,
  * Autoprefixer: v10.4.7
  * Browsers: last 1 version
  */

  label,
  input,
  button,
  select,
  textarea {
      font-size: 1.1rem;
      font-weight: normal;
      line-height: 1.6;
  }

  input,
  textarea,
  .uneditable-input {
      width: 100%;
  }


  /*
  label {
      display: block;
      margin-bottom: 0.4em;
  }
  */

  select,
  textarea,
  input[type="text"],
  input[type="password"],
  input[type="datetime"],
  input[type="datetime-local"],
  input[type="date"],
  input[type="month"],
  input[type="time"],
  input[type="week"],
  input[type="number"],
  input[type="email"],
  input[type="url"],
  input[type="search"],
  input[type="tel"],
  input[type="color"],
  .uneditable-input {
      display: inline-block;
      height: 2.5rem;
      padding: 0.4em 0.6em;
      margin-bottom: 0.5em;
      font-size: 1rem;
      line-height: 1.6;
      color: #555555;
      border-radius: 0.2em;
      vertical-align: middle;
  }


  /* hide effect of the shoddy js in slate rfi embed that hijacks all other buttons' text */

  #edit-submit {
  	display: none !important;
  }


  /*
  select {
      width: 100%;
      border: 1px solid #cccccc;
      background-color: #ffffff;
  }
  */

  legend {
      display: block;
      width: 100%;
      padding: 0;
      margin-bottom: 0.4em;
      font-size: 1rem;
      line-height: 1.6;
      color: #333333;
      border: 0;
      border-bottom: 1px solid #e5e5e5;
  }



  /* trying to make the form initially 100% width  */

  div.bgc-white:nth-child(2)>div:nth-child(1) {
      width: 100%;
  }


  div.bgc-white:nth-child(2)>div:nth-child(1)>script:nth-child(1) {
      width: 100%;
  }

  div.bgc-white:nth-child(2)>div:nth-child(1)>div:nth-child(2) {
      width: 100%;
  }

  select {

      background-color: white;
  }



  #mc_embed_signup {
  	font-size: 1.2rem !important;
    line-height: 1.6 !important;
    font-family: "Open Sans",sans-serif !important;
  }

  /* Joey Added sep 11, 2023*/
  .form-radios {
  	display: flex;
  	flex-wrap: wrap;
  	gap: 0.5em;
  	margin-block: 0 1em;
  }

  .form-radios .col-md-4 {
  	width: auto;
  }

  .form-radios input[type="radio"] {
  	display: none;
  }


  .form-radios input[type="radio"] + label {
  	font-size: 1.0rem;
  	padding: 0.5em 0.8em;
  	border-radius: 99px;
  	background-color: rgb(221, 221, 221);
  	transition: 150ms ease-in-out;
  }

  .form-radios input[type="radio"] + label:hover {
  	cursor: pointer;
  }

  .form-radios input[type="radio"]:checked + label {
  	color: rgb(255, 255, 255);
  	background-color: rgb(215, 63, 9);
  }


  .panel-group.accordion .accordion-item {
  	margin-block: 0 1em;
  }

  .panel-group.accordion .accordion-button {
  	font-family: "Open Sans",sans-serif;
  }

  .panel-group.accordion .accordion-button:not(.collapsed) {
  	background-color: rgb(215, 63, 9);
  	color: white;
  }

  .panel-group.accordion .accordion-button:not(.collapsed) a{
  		color: rgb(255, 255, 255) !important;
  }

  .accordion-item .accordion-collapse .accordion-body {
  		background-color: rgb(255, 255, 255);
  }



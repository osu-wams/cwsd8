label: 'back to top 2026'
code: |-
  (function (Drupal, once) {
    Drupal.behaviors.osuBackToTop = {
      attach: function (context, settings) {
        const backToTopButtons = once('osuBackToTop', '.osu-back-to-top', context);

        backToTopButtons.forEach(function (button) {
          
          // 1. Scroll Monitor
          // Debouncing logic could be added here for performance, 
          // but simple toggle is usually low-cost.
          window.addEventListener('scroll', function () {
            if (window.scrollY > 300) {
              button.classList.add('is-visible');
            } else {
              button.classList.remove('is-visible');
            }
          });

          // 2. Click Handler with Focus Management
          button.addEventListener('click', function (e) {
            e.preventDefault();

            // Check user preference for motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            // Scroll to top
            window.scrollTo({
              top: 0,
              behavior: prefersReducedMotion ? 'auto' : 'smooth'
            });

            // Move Keyboard Focus to the top of the document (WCAG 2.4.3)
            // We target the 'body' tag.
            const bodyElement = document.querySelector('body');
            
            // Ensure element is focusable programmatically
            bodyElement.setAttribute('tabindex', '-1');
            
            // Set focus
            bodyElement.focus();
            
            // Optional: Clean up tabindex on blur to keep DOM clean
            bodyElement.addEventListener('blur', function() {
              bodyElement.removeAttribute('tabindex');
            }, { once: true });
          });
        });
      }
    };
  })(Drupal, once);

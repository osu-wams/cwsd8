id: vertical_video
label: 'vertical video'
code: |
  .coh-vertical-video-container {
    max-width: 100%;
    max-height: 90vh;
    margin: 2rem auto;
    /* Use aspect ratio that matches common vertical video formats (9:16) */
    aspect-ratio: 9/16;
    position: relative;
    background: #000;
  }

  /* Make video responsive while maintaining aspect ratio */
  .coh-vertical-video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* Ensure controls are visible against any background */
  .coh-vertical-video::-webkit-media-controls {
    background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
  }

  /* Hide native controls when using custom controls */
  .coh-custom-controls .coh-vertical-video::-webkit-media-controls {
    display: none;
  }

  /* Improve focus visibility for keyboard users */
  .coh-vertical-video:focus {
    outline: 2px solid #007bff;
    outline-offset: 2px;
  }

  /* Make video container responsive on different screen sizes */
  @media (max-width: 768px) {
    .coh-vertical-video-container {
      max-height: 80vh;
      margin: 1rem auto;
    }
  }

  /* High contrast mode support */
  @media (forced-colors: active) {
    .coh-vertical-video:focus {
      outline: 3px solid CanvasText;
    }
  }

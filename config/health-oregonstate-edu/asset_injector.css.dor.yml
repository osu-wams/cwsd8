id: dor
label: 'directory filters'
code: |-
  #views-exposed-form-profile-directory-page div.d-flex {
  	display: grid !important;
  	grid-template-columns: repeat(3,minmax(200px,400px)) !important;
  	grid-template-rows: repeat(3, auto) !important;
  }

  #views-exposed-form-profile-directory-page #edit-secondary{
  	grid-row: 2 / span 1;
  }

  #views-exposed-form-profile-directory-page #edit-actions{
  	grid-row: 3 /span 1;
  }

  .details-wrapper {
  	display: flex !important;
  	/*flex-wrap: wrap;*/
  	align-items: baseline;
  	gap: 0.5em;
  }

  .details-wrapper > * {
  	min-width: 325px;
  }


  @media(max-width: 768px) {
  	#views-exposed-form-profile-directory-page div.d-flex {
  		grid-template-columns: repeat(2, minmax(165px,400px)) !important;
  		grid-template-rows: repeat(4, auto) !important;
  	}
  	
  	#views-exposed-form-profile-directory-page div.d-flex :first-child {
  		grid-column: span 2;
  	}
  	
  	#views-exposed-form-profile-directory-page #edit-secondary{
  		grid-row: 3 / span 1;
  	}

  	#views-exposed-form-profile-directory-page #edit-actions{
  		grid-row: 4 /span 1;
  	}
  	
  	.details-wrapper > * {
  		min-width: 165px;
  	}
  	
  }

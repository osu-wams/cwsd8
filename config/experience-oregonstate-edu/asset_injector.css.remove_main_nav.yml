id: remove_main_nav
label: 'Remove main nav'
code: |-
  .custom-mainmenu ul {
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      padding-block: 20px;
      gap: 4.5rem;
  }

  .custom-mainmenu-child {
  	text-align: center;
  	padding: 1rem;
  	position: relative;
  	transition: background-color .2s ease-in;
  }

  .custom-mainmenu-child:hover,
  .custom-mainmenu-child:focus-within {
      background-color: rgba(0, 0, 0, 0.25);
  }

  .custom-mainmenu-child img {
      padding-bottom: 0.3rem;
  	max-width: 120px;
  }

  .custom-mainmenu-child a {
      text-decoration: none;
  	font-size: 1.4rem;
  		transition: color .2s ease-in;
  }

  .custom-mainmenu a::before {
  	position: absolute;
  	inset: 0;
  	content:"";
  }

  .custom-mainmenu .custom-mainmenu-child:hover a {
  	color: #fff;
  }

  @media(max-width: 1138px) {
      .custom-mainmenu {
          display: none;
      }
  }

  @media(min-width: 1139px) {
      #superfish-main {
          display: none;
      }
  }
media: all
preprocess: true
conditions:
  condition_group:
    id: condition_group
    negate: false
    block_visibility_group: ''
contexts: {  }
conditions_require_all: true

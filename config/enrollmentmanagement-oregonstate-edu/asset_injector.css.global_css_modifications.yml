code: |
  /* Alert styling/remove left border on Bootstrap alerts DAC 5.13.2024 */

  .alert {border-left:0 !important;
  background-color:#ffb500; 
  border: 0;
  border-radius: 0;
  }

  .alert .alert-warning {
  	background-color:#ffb500;
  }


  /* adds style guide colors to bootstrap sections VRB 5.1.24*/
  .osu-bg-rogue-wave {background-color: #0d5257 !important;}
  .osu-bg-star-canvas {background-color: #003b5c !important;}
  .osu-bg-stratosphere {background-color: #006a8e !important;}


  /* margin, fonts and card outline for staff thumb images  DAC 3.8.2024 */

  .image-style-medium {
  	padding:10% 15% 5% 15% !important;
  	border-radius: 50%;
  }

  .osu-shadow {box-shadow: 0 0 3px hsla(0,0%,0%,0.25) !important}

  @media (min-width: 1200px)
  spnh2, .spnh2 {
      font-size: 28px;
  }

  spnh2, .spnh2 {
      font-family: "Stratum2Web",serif;
      font-size: 28px;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-weight: 500;
      line-height: 1.2;

  }


  @media (min-width: 1200px)
  spnh5, .spnh5 {
      font-size: 20px;
  }
  spnh5, .spnh5 {
      color: hsl(0,0,1);
      font-size: 20px;
      font-family: "Open Sans",sans-serif;
      font-weight: 600;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
      font-weight: 500;
      line-height: 1.2;
  }

  .p-3 {

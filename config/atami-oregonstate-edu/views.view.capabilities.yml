            <img class="media-element file-teaser" data-delta="8" alt="" title="" typeof="foaf:Image" src="/sites/atami.oregonstate.edu/files/styles/medium/public/karlhaapala_1.jpg?itok=patIAe5P" width="260" height="180" ALIGN="right" style="margin: 10px;"/>

            <p>ATAMI COVID-19 Containment and Mitigation Response<br />
            Tool training is suspended until further notice pending new guidance from OSU, CDC and national/state/local government.</p>
            <p>ATAMI is an Oregon State University Shared User Facility offering DIY access as well as consultation and expertise to carry out commissioned work. The Institute's specialized fabrication capabilities are particularly suited to:
            <ul><li>Hierarchical product and process development for nanomaterial synthesis, functionalization and assembly and arrayed microfluidic applications</li>
            <li>Advanced materials development and pilot production</li>
            <li>Capabilities for patterning, bonding and applying surface treatments to polymer and metal constructions</li>
            <li>Rapid prototyping and development of microscale devices</ul>

            <p><strong>Academic and Industry Users</strong><br/>ATAMI offers users direct access to shared tooling, after a <a href="/main/guidance-new-users">facility orientation</a> and training by ATAMI staff. See <a href="/main/usage-and-service-rates">Usage and Service Rates</a> for pricing details.</p>
            <p><strong>Technical Services:</strong><br/>ATAMI staff have expertise and long experience with all ATAMI capabilities and provide services from design to fabrication and from basic to highly complex. Contact Associate Director <a href="mailto:rtm@oregonstate.edu" target="_blank">Todd Miller</a> to discuss your project and how we can assist.</p>
          tokenize: 0

id: das_housing_documentation_form
title: 'DAS Housing Documentation Form'
description: '<p>Webform for submitting documentation for requesting housing accommodations</p>'
categories: {  }
elements: |-
  name_flexbox:
    '#type': webform_flexbox
    name:
      '#type': textfield
      '#title': Name
      '#placeholder': 'First Last'
    date:
      '#type': date
      '#title': Date
  dob_flexbox:
    '#type': webform_flexbox
    date_of_birth:
      '#type': date
      '#title': 'Date of Birth'
    osu_student_id:
      '#type': textfield
      '#title': 'OSU Student ID:'
      '#placeholder': '9318675309'
  1_students_are_typically_living_on_the_osu_campus_between_mid_se:
    '#type': textarea
    '#title': '1. Students are typically living on the OSU campus between mid-September and Mid-June. How long do you expect the student to be limited by their disability-related impacts in their housing environment? (example: will this be ameliorated prior to coming to campus, within the first three months of being on campus, etc.)'
    '#title_display': before
    '#description_display': before
  2_please_summarize_how_the_student_is_substantially_limited_in_t:
    '#type': textarea
    '#title': '2. Please summarize how the student is substantially limited in the housing environment by their disability-related impacts. What is the impact(s) of the disability in the living environment? And what is the severity of that impact(s) (mild/moderate/severe) please explain.'
    '#title_display': before
  3_considering_the_mental_and_physical_requirements_of_being_a_st:
    '#type': textarea
    '#title': '3. Considering the mental and physical requirements of being a student in college and life in the residence halls,what recommendations of accommodations or services do you recommend to address the functional impactyou have specified? Please provide us with an indication of the level of need for the accommodation (s) (and theconsequences of not receiving it).'
    '#title_display': before
  4_how_long_have_you_been_working_with_this_student_related_to_th:
    '#type': textarea
    '#title': '4. How long have you been working with this student related to the specified disability-relatedimpacts/symptoms?'
    '#title_display': before
  5_many_students_transitioning_to_living_in_an_on_campus_resident:
    '#type': tableselect
    '#title': '5. Many students transitioning to living in an on-campus residential/communal living environment may experience anxiety/stress/nervousness, which may not rise to the level of a disability. OSU provides a variety of resources for students to access to address these types of needs. Please share which of the following you believe will be appropriate resources to address the disability-related impacts for this student in their transition to OSU.'
    '#title_display': before
    '#options':
      'Working with a Resident Director to build a roommate agreement regarding personal space and boundaries': 'Working with a Resident Director to build a roommate agreement regarding personal space and boundaries'
      'Limiting the number of roommates in the room': 'Limiting the number of roommates in the room'
      'Private spaces outside of the room for decompressing/relaxing/studying (Library, Cultural Centers, hall quiet rooms, etc.)': 'Private spaces outside of the room for decompressing/relaxing/studying (Library, Cultural Centers, hall quiet rooms, etc.)'
      'Time management coaching': 'Time management coaching'
      'Organizational skills coaching': 'Organizational skills coaching'
      'Crafting and relaxation opportunities': 'Crafting and relaxation opportunities'
      'Communication coaching': 'Communication coaching'
  is_there_any_other_information_you_would_like_to_add_that_might:
    '#type': textarea
    '#title': 'Is there any other information you would like to add that might be helpful to us in working with this student? '
  print_name_flexbox:
    '#type': webform_flexbox
    print_name:
      '#type': textfield
      '#title': 'Print name'
      '#description_display': before
      '#required': true
    phone_number:
      '#type': tel
      '#title': 'Phone number'
      '#required': true
    fax_number:
      '#type': tel
      '#title': 'Fax number'
  signature_flexbox:
    '#type': webform_flexbox
    signature:
      '#type': webform_signature
      '#title': Signature
      '#description': '<p>Sign above</p>'
      '#required': true
    license_or_certification:
      '#type': textfield
      '#title': 'License or Certification'
      '#required': true
    signature_date:
      '#type': date
      '#title': Date
      '#required': true
  upload_supporting_documentation:
    '#type': webform_document_file
    '#title': 'Upload supporting documentation'
    '#title_display': before
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#reset_hide': true
  downloadable_pdf:
    '#type': webform_link
    '#title': 'Downloadable PDF'
    '#description': '<p><a href="https://ds.oregonstate.edu/sites/ds.oregonstate.edu/files/2025-05/das-housingdocumentationform2014.pdf" title="Downloadable PDF">Downloadable PDF</a></p>'
    '#title__access': false
    '#url__access': false

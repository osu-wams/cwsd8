id: base_background
label: 'Base - Background'
code: |-
  :root {
  	--co-ed--beaver--orange: #D73F09;
  	--co-ed--bucktooth--white: #FFFFFF;
  	/* This is the correct black for OSU */
  	--co-ed--paddletail--black: #212529;
  	--co-ed--black--translucent: rgba(33, 37, 41, 0.7);
  	--co-ed--warm--grey: #F6F6F6;
  	--secondary---co-ed--solar--flare: #D3832B;
  	--secondary---co-ed--candela: #FDD26E;
  	--secondary---co-ed--high--desert: #7A6855;
  	--secondary---co-ed--seafoam: #B8DDE1;
  	--secondary---co-ed--reindeer--moss: #C4D6A4;
  	--secondary---co-ed--candela--light: #FFF9EC;
  	--secondary-co-ed-shadow: #34302B;
  	--secondary---co-ed--seafoam--light: #E2F5F8;
  }
  /* We use !important on all classes to force the BG color to work on Boostrap */
  .osu-bg-co-ed--beaver--orange {
  	background-color: var(--co-ed--beaver--orange) !important;
  }
  .osu-bg-co-ed--bucktooth--white {
  	background-color: var(--co-ed--bucktooth--white) !important;
  }
  .osu-bg-co-ed--paddletail--black {
  	background-color: var(--co-ed--paddletail--black) !important;
  }
  .osu-bg-co-ed--black--translucent {
  	background-color: var(--co-ed--black--translucent) !important;
  }
  .osu-bg-co-ed--warm--grey {
  	background-color: var(--co-ed--warm--grey) !important;
  }
  .osu-bg-secondary---co-ed--solar--flare,
  .content-tag--176 {
  	background-color: var(--secondary---co-ed--solar--flare) !important;
  }
  .osu-bg-secondary---co-ed--candela,
  .content-tag--191 {
  	background-color: var(--secondary---co-ed--candela) !important;
  }
  .osu-bg-secondary---co-ed--high--desert, .content-tag--desert {
  	background-color: var(--secondary---co-ed--high--desert) !important;
  }
  .osu-bg-secondary---co-ed--seafoam,
  .content-tag--181 {
  	background-color: var(--secondary---co-ed--seafoam) !important;
  }
  .osu-bg-secondary---co-ed--reindeer--moss,
  .content-tag--186 {
  	background-color: var(--secondary---co-ed--reindeer--moss) !important;
  }
  .osu-bg-secondary---co-ed--candela--light {
  	background-color: var(--secondary---co-ed--candela--light) !important;
  }
  .osu-bg-secondary---co-ed--seafoam--light {
  	background-color: var(--secondary---co-ed--seafoam--light) !important;
  }
  .osu-border-candela {
  	border-color: var(--secondary---co-ed--candela) !important;
  }
  .osu-border-candela-left {
  	border-color: var(--secondary---co-ed--candela) !important;
  }
  .osu-border-candela-top {
  	border-color: var(--secondary---co-ed--candela) !important;
  }
  .osu-border-candela-right {
  	border-color: var(--secondary---co-ed--candela) !important;
  }
  .osu-border-candela-bottom {
  	border-color: var(--secondary---co-ed--candela) !important;
  }
  .osu-border-seafoam {
  	border-color: var(--secondary---co-ed--seafoam) !important;
  }
  .osu-border-seafoam-left {
  	border-color: var(--secondary---co-ed--seafoam) !important;
  }
  .osu-border-seafoam-top {
  	border-color: var(--secondary---co-ed--seafoam) !important;
  }
  .osu-border-seafoam-right {
  	border-color: var(--secondary---co-ed--seafoam) !important;
  }
  .osu-border-seafoam-bottom {
  	border-color: var(--secondary---co-ed--seafoam) !important;
  }
media: all
preprocess: true
conditions:
  condition_group:
    id: condition_group
    negate: false
    block_visibility_group: ''
  current_theme:
    id: current_theme
    negate: false
    theme: madrone
contexts: {  }
conditions_require_all: false

    value: "<p class=\"p1-body\">Please enter a brief detailed description of the program.</p>\r\n\r\n<p class=\"p1-body\">The content of the this field appears in the card that is displayed on the program list pages and on each program detail page. Delete the locations below that don't apply. Change the \"View Program\" link to point to this page. <strong>You'll have to save the page first.</strong> Then double click the \"View Program\" link to search for it by name.</p>\r\n\r\n<hr class=\"tight\" />\r\n<ul class=\"content-tag-list\">\r\n\t<li><span class=\"content-tag lozenge osu-bg-secondary---co-ed--solar--flare\"><span class=\"content-tag osu-bg-secondary---co-ed--solar--flare\">Corvallis</span></span></li>\r\n\t<li><span class=\"content-tag lozenge osu-bg-secondary---co-ed--seafoam\"><span class=\"content-tag osu-bg-secondary---co-ed--seafoam\">Online</span></span></li>\r\n\t<li><span class=\"content-tag lozenge osu-bg-secondary---co-ed--reindeer--moss\"><span class=\"content-tag osu-bg-secondary---co-ed--reindeer--moss\">Cascades</span></span></li>\r\n\t<li><span class=\"content-tag lozenge osu-bg-secondary---co-ed--candela\"><span class=\"content-tag osu-bg-secondary---co-ed--candela\">Hybrid</span></span></li>\r\n\t<li><span class=\"content-tag lozenge content-tag-bucktooth-white osu-bg-secondary---co-ed--high--desert\">Portland</span></li>\r\n</ul>\r\n\r\n<p><a class=\"btn-coed--inline\" href=\"https://education.dev.oregonstate.edu/\">View Program</a></p>\r\n"

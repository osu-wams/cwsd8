id: global_typography
label: 'Global - Typography'
code: |
  /**
   * Scrolling to elements should leave space on top
   */ 
  h1, h2, h3, h4, h5, h6, div {
  	scroll-margin-top: 2rem;
  }
  /**
   * Headings
   */ 
  h1,
  .h1 {
    font-size: 2rem !important;
    font-family: "Stratum2Web" !important;
    font-weight: 700 !important;
    letter-spacing: 0em !important;
    color: var(--co-ed--beaver--orange) !important;
  }
  h1.paddletail-black,
  .h1.paddletail-black {
    font-size: 2rem !important;
    font-family: "Stratum2Web" !important;
    font-weight: 700 !important;
    letter-spacing: 0em !important;
    color: var(--co-ed--paddletail--black) !important;
  }
  h1.bucktooth-white,
  .h1.bucktooth-white {
    font-size: 2rem !important;
    font-family: "Stratum2Web" !important;
    font-weight: 700 !important;
    letter-spacing: 0em !important;
    color: var(--co-ed--bucktooth--white) !important;
  }
  h1.homepage,
  .h1.homepage {
    font-size: 5rem !important;
    font-family: "Stratum2Web" !important;
    font-weight: 700 !important;
    letter-spacing: 0em !important;
    color: var(--co-ed--bucktooth--white) !important;
  }
  h1.serif-white {
    font-family: Georgia  !important;
    font-weight: 400 !important;
    letter-spacing: 0em !important;
    line-height: normal !important;
    font-size: 3.66rem !important;
    text-transform: none !important;
    color: var(--co-ed--bucktooth--white) !important;
  }
  h2,
  .h2 {
    font-size: 1.778rem !important;
    font-family: "Stratum2Web" !important;
    font-weight: 700 !important;
    letter-spacing: 0em !important;
    line-height: 1.8rem !important;
    text-transform: uppercase !important;
    color: var(--co-ed--beaver--orange) !important;
  }
  h2.paddletail-black,
  .h2.paddletail-black {
  	color: var(--co-ed--paddletail--black) !important;
  	font-size: 1.8rem !important;
  }
  h2.bucktooth-white,
  .h2.bucktooth-white {
  	color: var(--co-ed--bucktooth--white) !important;
  	font-size: 1.8rem !important;
  }
  h3,
  .h3 {
    font-size: 1.611rem !important;
    font-family: "Stratum2Web" !important;
    font-weight: 700 !important;
    letter-spacing: 0em !important;
    line-height: 33.599998474121094px !important;
    color: var(--co-ed--paddletail--black) !important;
  }
  h3.bucktooth-white,
  .h3.bucktooth-white {
  	color: var(--co-ed--bucktooth--white) !important;
  }
  h4,
  .h4 {
    font-size: 1.444rem !important;
    font-family: "Open Sans" !important;
    font-weight: 600 !important;
    letter-spacing: 0em !important;
    line-height: 31.200000762939453px !important;
    color: var(--co-ed--paddletail--black) !important;
  }
  h5,
  .h5 {
    font-size: 1.278rem !important;
    font-family: "Open Sans" !important;
    font-weight: 600 !important;
    letter-spacing: 0em !important;
    line-height: 28.799999237060547px !important;
    color: var(--co-ed--paddletail--black) !important;
  }
  h6,
  .h6 {
    font-size: 1.111rem !important;
    font-family: "Open Sans" !important;
    font-weight: 600 !important;
    letter-spacing: 0em !important;
    line-height: 24px !important;
    color: var(--co-ed--paddletail--black) !important;
  }

  /**
   * Paragraph Styles
   */ 
  .p1-body {
    font-size: 1.125rem !important;
    font-family: "Open Sans" !important;
    font-weight: 400 !important;
    letter-spacing: 0em !important;
    line-height: normal !important;
  }
  p1-body.bucktooth-white,
  .p1-body.bucktooth-white {
  	color: var(--co-ed--bucktooth--white) !important;
  }
  .p1-body-bold {
    font-size: 1.125rem !important;
    font-family: "Open Sans" !important;
    font-weight: 700 !important;
    letter-spacing: 0em !important;
    line-height: normal !important;
  }
  .p2 {
    font-size: .889rem !important;
    font-family: "Open Sans" !important;
    font-weight: 400 !important;
    letter-spacing: 0em !important;
    line-height: normal !important;
  }
  .p3 {
    font-size: .778rem !important;
    font-family: "Open Sans" !important;
    font-weight: 400 !important;
    letter-spacing: 0em !important;
    line-height: normal !important;
  }
  .display-1 {
    font-family: "Georgia" !important;
    font-weight: 400 !important;
    letter-spacing: 0em !important;
    line-height: normal !important;
    text-transform: none !important;
  }
  .display-2 {
    font-family: "Open Sans"!important;
    font-weight: 800 !important;
    letter-spacing: 0em !important;
    line-height: normal !important;
    text-transform: none !important;
  }


  /**
   * Text Display 3
  **/ 
  .display-3, h1.serif {
    font-family: Georgia  !important;
    font-weight: 400 !important;
    letter-spacing: 0em !important;
    line-height: normal !important;
    font-size: 3.66rem !important;
    text-transform: none !important;
  }


  @media only screen and (max-width: 576px) and (min-width: 0) {
    .display-3, h1.serif, h1.serif-white, h1, h1.paddletail-black, .h1.paddletail-black, .h1 {
    	font-size: 2rem !important;
    }
  }

  /**
   * Display 4
  **/ 
  .display-4 {
    font-family: "Stratum2Web" !important;
    font-weight: 900 !important;
    letter-spacing: 0em !important;
    line-height: normal !important;
    font-size: 3.38rem !important;
    color: var(--co-ed--paddletail--black) !important
    text-transform: none !important;
  }
  .display-5 {
    font-family: "Georgia" !important;
    font-weight: 400 !important;
    letter-spacing: 0em !important;
    line-height: normal !important;
    font-size: 2.28rem !important;
    text-transform: none !important;
  }
  .content-tag {
    font-size: .778rem !important;
    font-family: "Stratum2Web" !important;
    font-weight: 700 !important;
    letter-spacing: 0em !important;
    text-transform: uppercase !important;
    line-height: normal !important;
    text-decoration: none !important;
  }
  .content-tag-bucktooth-white {
    font-size: .778rem !important;
    font-family: "Stratum2Web" !important;
    font-weight: 700 !important;
    color: var(--co-ed--bucktooth--white) !important;
    letter-spacing: 0em !important;
    text-transform: uppercase !important;
    line-height: normal !important;
    text-decoration: none !important;
  }
  a.content-tag:hover {
  	text-decoration: underline !important;
  	text-decoration-color: var(--co-ed--beaver--orange) !important;
  } 
  .lozenge {
  	display: inline-block !important;
    padding: 0.25rem !important;
  }
  .right-arrow:before {
  	content: "";
  	display: inline-block;
  	width: 8px;
  	height: 15px;
  	margin-right: 1rem;
  	position: relative;
  	top: 3px;
  	background-image: url('/sites/education.oregonstate.edu/files/2023-09/right_arrow.png');
  	background-repeat: no-repeat;
  }
  .breadcrumb-item {
    font-size: .889rem !important;
    font-family: "Open Sans" !important;
    font-weight: 400 !important;
    letter-spacing: 0em !important;
    line-height: normal !important;
  }

  /**
   * Blockquote
   */ 
  .blockquote {
    font-size: 1.111rem !important;
    font-family: "Georgia" !important;
    font-weight: 400 !important;
    letter-spacing: 0em !important;
  }

  /**
   * Horizontal Rules
   */ 
  hr,
  hr.loose {
  	color: var(--co-ed--beaver--orange) !important;
  	border-top: 1px solid !important;
    opacity: 1 !important;
    margin-block: 3rem !important;
  }
  hr.tight {
  	margin-block: 2rem 1rem !important;
  }

  /**
   * Buttons
   */ 
  a.btn-coed,
  input.btn-coed {
  	display: inline-flex !important;
  	padding: 8px 24px !important;
  	align-items: flex-start !important;
  	border-radius: 3px !important;
  	text-decoration: none !important;
  	font-family: "Open Sans" !important;
    font-weight: 400 !important;
    border: none !important;
    margin-bottom:8px !important;
    margin-right: 4px !important;
    margin-left: 4px !important;
  }
  a.btn-coed--inline,
  .btn-coed--inline a,
  input.btn-coed--inline {
  	color: var(--co-ed--beaver--orange) !important;
  	display: inline-block !important;
  	align-items: center !important;
  	padding: 0px 40px 0 0 !important;
  	text-decoration: none !important;
  	font-family: "Open Sans" !important;
    font-weight: 700 !important;
    line-height: 1.5rem;
  }
  a.btn-coed--inline:hover,
  .btn-coed--inline a:hover,
  input.btn-coed--inline:hover {
  	text-decoration: underline !important;
  	text-decoration-thickness: 1px !important;
  }
  a.btn-coed--inline:after,
  .btn-coed--inline a:after,
  input.btn-coed--inline:after {
  	content: "";
  	background-image: url('/sites/education.oregonstate.edu/files/2023-09/%20secondary-cta-arrow.png');
  	background-repeat: no-repeat;
  	width: 16px;
  	height: 16px;
  	position: relative;
  	margin-right: -16px;
  	left: 16px;
  	top: 1px;
  	transition: left ease 0.5s;
  	background-size: 16px 16px;
  	display: inline-block;
  }
  a.btn-coed--inline:hover:after,
  .btn-coed--inline a:hover:after,
  input.btn-coed--inline:hover:after {
  	left: 24px;
  	top: 1px;
  }
  a.cta-lite,
  input.cta-lite {
  	color: var(--secondary---co-ed--candela) !important;
  }
  a.cta-lite:after,
  input.cta-lite:after {
  	background-image: url('/sites/education.oregonstate.edu/files/2023-09/arrow_circle_large_1.png') !important;
  }

  a.outline--primary,
  input.outline--primary {
  	color: var(--co-ed--beaver--orange) !important;
  	border: 1px solid var(--co-ed--beaver--orange) !important;
  }
  a.outline--primary:hover,
  a.outline--primary:active,
  input.outline--primary:hover,
  input.outline--primary:active{
  	color: var(--secondary-co-ed-shadow) !important;
  	border-color: var(--secondary-co-ed-shadow) !important;
  }
  a.outline--secondary:hover,
  a.outline--secondary:active,
  input.outline--secondary:hover,
  input.outline--secondary:active {
  	color: var(--secondary---co-ed--solar--flare) !important;
  	border: 1px solid var(--secondary---co-ed--solar--flare) !important;
  }
  a.outline--secondary,
  input.outline--secondary{
  	color: var(--secondary---co-ed--candela) !important;
  	border: 1px solid var(--secondary---co-ed--candela) !important;
  }
  a.solid--primary,
  input.solid--primary {
  	color: var(--co-ed--bucktooth--white) !important;
  	background: var(--co-ed--beaver--orange) !important;
  }
  a.solid--primary:hover,
  a.solid--primary:active,
  input.solid--primary:hover,
  input.solid--primary:active {
  	background: var(--secondary-co-ed-shadow) !important;
  }
  a.solid--secondary,
  inputa.solid--secondary {
  	color: var(--co-ed--paddletail--black) !important;
  	background: var(--secondary---co-ed--candela) !important;
  }
  a.solid--secondary:hover,
  a.solid--secondary:active,
  input.solid--secondary:hover,
  input.solid--secondary:active {
  	background: var(--co-ed--warm--grey) !important;
  }

  /**
   * Lists
   */ 
  .ol {
    font-size: 1rem !important;
    font-family: "Open Sans" !important;
    font-weight: 400 !important;
    letter-spacing: 0em !important;
    line-height: 32.400001525878906px !important;
  }
  ul.content-tag-list {
  	list-style: none !important;
  	margin: 0 0 1rem !important;
  	padding: 0 !important;
  }
  ul.content-tag-list li {
  	display: inline-block !important;
  	margin: 0 0.25rem 0 0 !important;
  	padding: 0 !important;
  }

  /**
   * Icon Callout Typography
   */ 
   .icon-callout--title:before {
  	content: "" !important;
  	display: block !important;
  	width: 60px !important;
  	height: 60px !important;
  	margin: 0 auto 1.25rem;
  	background-image: url('/sites/education.oregonstate.edu/files/2023-09/%20circle_checkmark_large.png') !important;
  	background-repeat: no-repeat !important;	
   }
   
   
  .table--transparent table,
  table.table--transparent {
    border-collapse: collapse !important;
    width: 100% !important;
    background-color: transparent !important;
  }

  .table--transparent table * {
    border: none !important;
    background: transparent !important;
    --bs-table-color-type: #000 !important; 
    --bs-table-bg-type: transparent !important;
    --bs-table-hover-bg: transparent !important;
  }
  .table--transparent td,
  td.table--transparent, .table--transparent th, th.table--transparent, .table--transparent tr, tr.table--transparent {
  	vertical-align: top !important;
  }

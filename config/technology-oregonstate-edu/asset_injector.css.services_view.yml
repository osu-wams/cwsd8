id: services_view
label: 'Services Catalog View'
code: |-
  #views-exposed-form-service-catalog-page-1 {
  	grid-column: -1/1;
  }

  .grid-gap-2rem {
      display: grid;
      gap: 2rem;
  }

  .service-card {
      display: grid;
      grid-template-columns: 0.3fr 1fr;
      column-gap: 1rem;

      .views-field-body {
          grid-column-start: 2;
      }
  }

  @media (min-width: 766px) {
      .grid-cards-xl-three-column  {
          grid-template-columns: 1fr 1fr;
      }
  }

  @media (min-width: 1200px) {
      .grid-cards-xl-three-column  {
          grid-template-columns: repeat(3, 1fr);
      }
  }
media: all

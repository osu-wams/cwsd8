          content:
            value: |-
              The University Policies and Standards Manual (UPSM) provides the university's governing framework. The university policies and university standards found within the UPSM express the goals, values, and culture of the university. Collectively, they provide the authority and guidance to university units, employees, students, agents, contractors, licensees, and volunteers that is required to achieve the university’s mission, and outline the relevant responsibilities to the university community. 

              <strong>Note: Many of the policies adopted from the Oregon University System (OUS) have not been updated to reflect the new governance structure of the university.  Please see the notes on those changes <a href="https://policy.oregonstate.edu/about-university-policy-and-standards-program/transition-oregon-university-system">here.</a>   Additionally, while OSU transitions its policies from those inherited from the Oregon University System, there remain a number of university-wide policies that do not yet reside in the UPSM but are located in manuals within different departments. These university policies will be collected into the UPSM on an ongoing basis.<strong/> Find links to other policies <a href="https://policy.oregonstate.edu/other-policies-rules-and-procedures">here.</a> 
            format: basic_html

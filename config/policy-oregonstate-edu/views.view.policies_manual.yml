          content:
            value: "<p>A <strong>University Policy</strong> is governing statement and set of expected behaviors that enhances the university's mission, promotes operational efficiencies, manages institutional risk, and helps ensure coordinated compliance with applicable laws, regulations, and collective bargaining agreements. While a University Policy is enforceable against employees, students, agents, contractors, licensees, volunteers and program participants, it does not have the regulatory force of law pursuant to ORS 352.087(1)(m). A <strong>University Standard</strong> is a governing statement and set of expected behaviors broadly relevant throughout the university and to those who interact with the university, that enhances the university's mission, promotes operational efficiencies, manages institutional risk, or helps ensure coordinated compliance with applicable laws and regulations. University Standards are enforceable against employees, students, agents, contractors, licensees, volunteers, program participants and other individuals while on university owned or controlled property, and have the regulatory force of law pursuant to ORS 352.087(1)(m), which means they are recognized by courts as determining rights and legal obligations.</p>\r\n\r\n<p><strong>The PDF is the official text of the policy.</strong> If there are any incongruities between the text of the HTML version and the text within the PDF file, the PDF will be considered accurate and overriding.</P>"
            format: basic_html

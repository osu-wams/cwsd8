id: dpp_scholarship_reinstatement_re
title: 'DPP Scholarship Reinstatement Request Form'
description: ''
categories: {  }
elements: |-
  intro_text:
    '#type': processed_text
    '#text': |
      <p>Please submit the below DPP Scholarship Reinstatement Request Form the term before you would like your scholarship reinstated. &nbsp;</p>

      <p>The OSU Scholarship Office will verify eligibility before reinstating your scholarship. If you do not meet all of the <a href="https://scholarships.oregonstate.edu/university-scholars-program-scholarship-requirements-degree-partnership-program-students" originalsrc="https://scholarships.oregonstate.edu/university-scholars-program-scholarship-requirements-degree-partnership-program-students" shash="EivHi7A2ZAym8kfpt4jLxDlDg28HcciMIf9b8EvD/CFQ6HB3inkHk+0pF6+5ab3B9CleMzd5sszuhrBMRdxYwyoWYbteJvShKpfRl+ZKBVig0hAE2d1GZVXjzMsETTqwUFULcSEuiseRDJRPdqzqF+sCS0xHaPSb+FYBzAlrbdQ=">requirements</a>, your scholarship will not be reinstated and you will forfeit all remaining payments. If extenuating circumstances prevented you from meeting the requirements, you may submit a scholarship appeal, instead. <a href="https://scholarships.oregonstate.edu/USP-scholarship-appeal-guidelines">Appeal information can be found on our website</a>.</p>
    '#format': full_html
  name:
    '#type': webform_name
    '#title': Name
    '#required': true
    '#title__access': false
    '#first__required': true
    '#middle__access': false
    '#last__required': true
    '#suffix__access': false
    '#degree__access': false
  osu_id:
    '#type': number
    '#title': 'OSU ID'
    '#required': true
    '#min': 930000000
    '#max': 999999999
  osu_email:
    '#type': email
    '#title': 'OSU Email'
    '#required': true
  term_for_which_you_are_requesting_reinstatement:
    '#type': select
    '#title': 'Term for which you are requesting reinstatement'
    '#options':
      202700: 'Summer 2026'
      202701: 'Fall 2026'
      202703: 'Spring 2027'
      202702: 'Winter 2027'
    '#required': true
  scholarships_for_reinstatement:
    '#type': checkboxes
    '#title': 'Scholarship(s) for which you are requesting reinstatement (check all that apply): '
    '#options':
      finley: 'Finley Academic Excellence Scholarship'
      provost: 'Provost Scholarship'
      wue: 'WUE Scholarship'
      presidential: 'Presidential Scholarship'
      IB: 'IB Diploma Scholarship'
    '#required': true
  signature_text:
    '#type': webform_markup
    '#markup': '<p>Please read the&nbsp;<a href="https://scholarships.oregonstate.edu/university-scholars-program-scholarship-requirements-degree-partnership-program-students" rel="noreferrer noopener" target="_blank">requirements</a> to be eligible for scholarship reinstatement.&nbsp;</p>'
  signature:
    '#type': checkbox
    '#title': Signature
    '#description': '<p>I confirm that I have met the requirements to be eligible for scholarship reinstatement. I understand my eligibility will be verified by the OSU Scholarship Office before reinstatement.</p>'
    '#required': true

id: global_css_modifications
label: 'Global CSS modifications'
code: |
  /* align Google Translate button VRB 5.20.25* */
  #google_translate_element{
      text-align: left;
      vertical-align: top;
      margin-left: 10px;
      margin-top: 10px;
  }

  /* Alert styling/remove left border on Bootstrap alerts DAC 5.13.2024 */

  .alert {border-left:0 !important;
  background-color:#ffb500;
  border: 0;
  border-radius: 0;
  }

  /* adds style guide colors to bootstrap sections VRB 5.1.24*/
  .osu-bg-rogue-wave {background-color: #0d5257 !important;}
  .osu-bg-star-canvas {background-color: #003b5c !important;}
  .osu-bg-stratosphere {background-color: #006a8e !important;}




  /* Make accordion H2's OSU orange DAC 08.26.24 */

  .accordion-section-header {color:#D73F09;}


  /* EM Header Links DAC 8.7.2024 */

  #block-madrone-emgloballinks {
      margin-top: 20px;
      text-align:center;
      padding:0 5px;
      border:none;
  }

  #block-madrone-emgloballinks  .alert {
      text-align: center;
  }

  #block-madrone-emgloballinks .btn.btn-secondary {
      background-color: #000;
      color: #fff;
      /*border: 2px solid #000;*/
      border:none;
      border-radius: 5px;
      text-transform: uppercase;
      font-size:13.5px;
  }

  #block-madrone-emgloballinks .btn.btn-secondary a:hover{ 
    text-decoration:none;
  }

  #block-madrone-emgloballinks .btn.btn-secondary:focus {
  background-color:gray;  
    
  }
  #block-madrone-emgloballinks .btn.btn-secondary:hover {
  background-color:gray;  
    
  }

  @media (min-width:1092px) {
  #block-madrone-emgloballinks {
      position: absolute;
      top: -3px;
      right: 300px;
      margin-top:0!important;
  }}

  @media (max-width:1091px) {
  #block-madrone-emgloballinks {
      display: none;
  }}

  /* adds style guide colors to bootstrap sections VRB 5.1.24*/
  .osu-bg-rogue-wave {background-color: #0d5257 !important;}
  .osu-bg-star-canvas {background-color: #003b5c !important;}
  .osu-bg-stratosphere {background-color: #006a8e !important;}
  .osu-bg-high-desert {background-color: #7a6855 !important;}


  /* Accordion styling DAC 1.2.2024 */

  .accordion {
  	--bs-accordion-border-color:black;
  	--bs-accordion-border-width:1px;
  	--bs-accordion-btn-icon: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='black'%3e%3cpath fill-rule='evenodd' d='M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z'/%3e%3c/svg%3e");
  --bs-accordion-btn-icon-width: 2rem;
  --bs-accordion-btn-bg:var(bg-neutral-100);


  }


  .accordion-button:hover {
      color: var(--bs-accordion-active-color);
      background-color: var(--bs-accordion-active-bg);
      box-shadow: inset 0 calc(-1 * var(--bs-accordion-border-width)) 0 var(--bs-accordion-border-color);
  	
  }

  /* Make H3s Stratum DAC 11.2.2023 */
  h3 {        font-family: 'Stratum2Web',sans-serif;
          font-weight: 600;}
          









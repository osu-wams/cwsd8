id: request_space
title: 'Request Space'
description: ''
categories:
  - 'Space Management'
elements: |-
  intro:
    '#type': processed_text
    '#text': |
      <p>Space is allocated according to the strategic academic, research and outreach priorities established by the University.</p>

      <p>You will be contacted within seven days to go over your request in more detail. Please be able to describe how space requests and changes to current space support the Oregon State University mission, vision and strategic plan.</p>
    '#format': full_html
  name:
    '#type': textfield
    '#title': Name
    '#required': true
  department:
    '#type': textfield
    '#title': Department
    '#required': true
  email_address:
    '#type': email
    '#title': 'Email Address'
    '#required': true
  phone_number:
    '#type': tel
    '#title': 'Phone Number'
    '#required': true
  unit_head_approval:
    '#type': textfield
    '#title': 'Unit Head Approval'
    '#description': '<p>Enter the name, title and department/college/unit of the unit head who is authorizing this request.</p>'
    '#required': true
  what_is_the_purpose_of_this_space_request:
    '#type': textarea
    '#title': 'What is the purpose of this space request?'
    '#description': '<p>Briefly describe the need for space. Please describe in what way your current space is inadequate for your needs and any efforts that have been made to use any existing assigned space for the stated purpose.</p>'
  what_is_the_intended_use_of_the_requested_space:
    '#type': textarea
    '#title': 'What is the intended use of the requested space?'
    '#description': '<p>Describe the intended use of the space. Include details such as location and any special requirements; room use description (e.g. faculty or staff office, teaching lab, research lab, research or teaching support space, departmental classroom, workroom, conference room, storage, reception, etc.); number of occupants and occupant type (faculty, staff, T/A, R/A, student workers, etc.)</p>'
  what_is_the_timeline_for_this_space_request:
    '#type': textarea
    '#title': 'What is the timeline for this space request?'
    '#description': '<p>If this is a request for temporary space, enter the date range that is needed. If this is not a temporary space request, enter the date when the space is needed.</p>'
    '#required': true
  what_type_of_renovation_do_you_anticipate:
    '#type': select
    '#title': 'What type of renovation do you anticipate?'
    '#options':
      - 'No renovation '
      - 'Paint/carpet renovation only'
      - 'Minor renovation (describe below)'
      - 'Major renovation (describe below)'
    '#required': true
  describe_the_minor_major_renovations_anticipated:
    '#type': textarea
    '#title': 'Describe the minor/major renovations anticipated.'
  describe_any_space_that_will_be_returned_to_the_university_inven:
    '#type': textarea
    '#title': 'Describe any space that will be returned to the university inventory.'
    '#description': '<p>List any space(s) that will be returned to the university inventory with approval of this request, such as rooms or spaces that the Dept. will vacate if this request is approved.</p>'
  captcha:
    '#type': captcha

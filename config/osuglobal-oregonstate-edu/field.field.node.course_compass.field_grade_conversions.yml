    value: "<h5>GRADE CONVERSIONS</h5>\r\n\r\n<div>\r\n<table border=\"1\" cellpadding=\"1\" cellspacing=\"1\" class=\"osu-table-orange\" style=\"width: 500px;\">\r\n\t<thead>\r\n\t\t<tr>\r\n\t\t\t<th scope=\"col\">Overseas Grade</th>\r\n\t\t\t<th scope=\"col\">OSU Grade</th>\r\n\t\t</tr>\r\n\t</thead>\r\n\t<tbody>\r\n\t\t<tr>\r\n\t\t\t<td><strong>Overseas Grade</strong></td>\r\n\t\t\t<td><strong>OSU Grade</strong></td>\r\n\t\t</tr>\r\n\t\t<tr>\r\n\t\t\t<td><strong>A+</strong></td>\r\n\t\t\t<td>A</td>\r\n\t\t</tr>\r\n\t\t<tr>\r\n\t\t\t<td><strong>A</strong></td>\r\n\t\t\t<td>A</td>\r\n\t\t</tr>\r\n\t\t<tr>\r\n\t\t\t<td><strong>A-</strong></td>\r\n\t\t\t<td>A-</td>\r\n\t\t</tr>\r\n\t\t<tr>\r\n\t\t\t<td><strong>B+</strong></td>\r\n\t\t\t<td>B+</td>\r\n\t\t</tr>\r\n\t\t<tr>\r\n\t\t\t<td><strong>B</strong></td>\r\n\t\t\t<td>B</td>\r\n\t\t</tr>\r\n\t\t<tr>\r\n\t\t\t<td><strong>B-</strong></td>\r\n\t\t\t<td>B-</td>\r\n\t\t</tr>\r\n\t\t<tr>\r\n\t\t\t<td><strong>C+</strong></td>\r\n\t\t\t<td>C+</td>\r\n\t\t</tr>\r\n\t\t<tr>\r\n\t\t\t<td><strong>C</strong></td>\r\n\t\t\t<td>C</td>\r\n\t\t</tr>\r\n\t\t<tr>\r\n\t\t\t<td><strong>C-</strong></td>\r\n\t\t\t<td>C-</td>\r\n\t\t</tr>\r\n\t\t<tr>\r\n\t\t\t<td><strong>D+</strong></td>\r\n\t\t\t<td>D+</td>\r\n\t\t</tr>\r\n\t\t<tr>\r\n\t\t\t<td><strong>D</strong></td>\r\n\t\t\t<td>D</td>\r\n\t\t</tr>\r\n\t\t<tr>\r\n\t\t\t<td><strong>F</strong></td>\r\n\t\t\t<td>F</td>\r\n\t\t</tr>\r\n\t</tbody>\r\n</table>\r\n\r\n<blockquote>\r\n<p style=\"text-align:center;\">Remember courses abroad count as OSU credits and grades count towards your OSU GPA.</p>\r\n</blockquote>\r\n\r\n<p>To find out if S/U grading could be an option for you, talk with your academic advisor. To request S/U grading for courses abroad, you'll need to submit the S/U request form in your OSU GO portal with approval from your academic advisor before 70% of the course is complete.</p>\r\n</div>\r\n"

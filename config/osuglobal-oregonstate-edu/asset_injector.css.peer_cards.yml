code: |-
  .flex-container-peer {
      display: flex;
      flex-flow: row wrap;
      justify-content: center;
      gap: 1rem;
    }

    .flex-item-peer {
      content-visibility: auto;
      display: flex;
      flex-flow: column nowrap;
      width: 352px;
      padding: 1rem;
    }

    .flex-item-peer p {
      font-size: 0.8rem !important;
      padding-left: 0.5rem;
      padding-right: 0.25rem;
      width: 80%;
      margin: 0 auto;
    }

    .flex-item-peer h3 {
      text-align: center;
      padding: 5px;
      font-size: 1.2rem !important;
      background: none;
    }

    .flex-item-peer h4 {
      text-align: center;
      padding: 5px;
      font-size: 0.9rem !important;
      border-top: 2px dashed #a7aca2;
      width: 80%;
      margin: 0 auto;
    }

    .peer-name {
      margin-bottom: -5px !important;
    }

    .peer-hometown {
      text-align: center !important;
    }

    .peer-major {
      text-align: center !important;
    }

    .peer-fact {
    text-align: center !important;
    }

    .peer-ask {
    text-align: start;
    }

    .peer-title {
      margin-top: 1px;
      margin-bottom: 1px;
      padding-left: 0.5rem;
      padding-right: 0.25rem;
      font-size: 1.1rem !important;
    }


    /******  default card with dropshadow  ********/


    .mozcard-osugo {
      max-width: 352px;
      border-radius: 8px;
      box-shadow: 0 3px 8px rgb(228, 229, 234), 0 0 2px rgba(28, 16, 49, 0.12);
      background: #fff;
      color: black;
    }

    .mozcard-osugo p {
    font-size: .9rem;
    text-align: start;
    padding: 0 1rem 0 1rem;
    }

    .mozcard-osugo h5 {
    text-align: start;
    padding: 0 1rem 0 1rem;
    }

    .mozcard-osugo h4 {
    font-size: 1rem !important;
    padding: 0 .5rem 0 .5rem !important;
    }



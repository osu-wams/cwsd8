default_value:
  -
    value: "<h3>Your OSU Tools</h3>\r\n\r\n<div class=\"accordion\" id=\"osuToolsAccordion\">\r\n<div class=\"accordion-item\">\r\n<h2 class=\"accordion-header\" id=\"headingOne\"><button class=\"accordion-button\" data-bs-target=\"#collapseOne\" data-bs-toggle=\"collapse\" type=\"button\">Education Abroad Course Articulation Database</button></h2>\r\n\r\n<div class=\"accordion-collapse collapse show\" data-bs-parent=\"#osuToolsAccordion\" id=\"collapseOne\">\r\n<div class=\"accordion-body\">Visit the <a href=\"https://academicaffairs.oregonstate.edu/osugo/students/academics/study-abroad-course-equivalency-database\"> OSU GO Education Abroad Course Articulation Database</a> to view courses that previous OSU students have taken.</div>\r\n</div>\r\n</div>\r\n\r\n<div class=\"accordion-item\">\r\n<h2 class=\"accordion-header\" id=\"headingTwo\"><button class=\"accordion-button collapsed\" data-bs-target=\"#collapseTwo\" data-bs-toggle=\"collapse\" type=\"button\">Course Articulation Request Form</button></h2>\r\n\r\n<div class=\"accordion-collapse collapse\" data-bs-parent=\"#osuToolsAccordion\" id=\"collapseTwo\">\r\n<div class=\"accordion-body\">Submit courses using the <a href=\"https://oregonstate.qualtrics.com/jfe/form/SV_9QCybQEeyXWDleS\"> transfer articulation reevaluation form</a> for official determinations on how education abroad courses will be transcribed at OSU.</div>\r\n</div>\r\n</div>\r\n</div>\r\n"
    format: full_html

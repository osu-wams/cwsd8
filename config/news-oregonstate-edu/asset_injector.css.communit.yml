  .community-news-block .field__item{
  	display: flex;
  	align-items: stretch;
  }

  .community-news-block .field__item p:first-child{
  	max-width: 295px;
  	width: 295px;
  	flex-shrink: 0;
  }

  .community-news-photo {
  	border-radius: 8px 0 0 8px !important;
  	margin-right: 25px !important;
  	margin-bottom: 0 !important;
  	float: left !important;
  	height: 100%;
  	width: 100%;
  	object-fit: cover;
  	max-width: 295px;
  }

  @media (max-width: 767px) {
  	.community-news-photo{
  		float: none !important;
  		max-width: 100%;
  		border-radius: 8px 8px 0 0px !important;
  	}
  	
  	.community-news-block .field__item{
  		display: block !important;
  	}
  	
  	.community-news-block .field__item p:first-child{
  		max-width: 100%;
  		width: 100%;
  	}
  }

code: |-
  #scrollToTopBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(30, 33, 36, 0.5);
    color: #ffffff;
    border: none;
    border-radius:5px;
    padding: 10px 16px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    cursor: pointer;
  }
  .bg-fade-from-top {
  	background-image: linear-gradient(to top, rgba(255,0,0,0), rgba(0,0,0,1)); 
  	padding-top:45px;
  }
  .header-text-shadow {
  	text-shadow: #000 1px 0 5px;
  }
  .margin-bottom-0 {
  	margin-bottom:0px;
  }
  .sub-head {
  	font-size:25px; 
  	line-height:1;
  }

label: 'View all items'
code: |-
  (function (Drupal, once) {
    Drupal.behaviors.viewToggle = {
      attach(context) {
        once('viewToggle', '.view-toggle-button', context).forEach(button => {
          button.addEventListener('click', () => {
            button.closest('.view-toggle-list').classList.add('is-expanded');
            button.remove();
          });
        });
      }
    };
  })(Drupal, once);

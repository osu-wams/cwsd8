id: main_styles
label: 'Main styles'
code: |-
  .list-inline {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .list-inline li {
    display: flex;
    align-items: center;
  }

  .separator {
    margin: 0 8px;
    color: inherit; /* matches the orange text */
  }

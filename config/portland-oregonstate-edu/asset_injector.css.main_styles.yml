  /* Base styles - Horizontal on desktop */
  .nav-menu {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .nav-menu li {
    display: flex;
    align-items: center;
  }

  .nav-menu .separator {
    color: inherit;           /* matches your osu orange */
    font-size: 1.1em;
    margin: 0 4px;
  }

  /* Mobile: Stack vertically */
  @media (max-width: 768px) {
    .nav-menu {
      flex-direction: column;
      gap: 10px;
    }
    
    .nav-menu .separator {
      display: none;           /* hides the squares on mobile */
    }
    
    .nav-menu li a {
      display: block;
      padding: 6px 0;
    }
  }


  .relative{
  	position:relative;
  }

  .absolute{
  	position: absolute;
  }

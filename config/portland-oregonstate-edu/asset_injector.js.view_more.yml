  */

  document.addEventListener('click', function(e) {
    const btn = e.target.closest('.view-more-btn');
    if (!btn) return;
    
    const card = btn.closest('.directory-connect-card');
    if (!card) return;
    
    const fullText = card.querySelector('.directory-connect-text-all');
    if (!fullText) return;
    
    const isOpen = fullText.classList.toggle('is-visible');
    btn.textContent = isOpen ? 'View Less' : 'View More';
  });

  .directory-connect-card .directory-connect-photo {
      width: 100%;
      overflow: hidden;
      margin-bottom: 14px;
      position: relative;
      aspect-ratio: 2.2;
  }

  .directory-connect-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s;
  }

  .directory-connect-card .directory-connect-photo:hover img {
      transform: scale(1.07);
  }
  .header-line-rt {
    position: relative;
    display: inline-block;
    padding-right: 20px;        /* space between text and line */
    margin-bottom: 1.5rem;      /* optional spacing below */
  }

  /* The continuing line */
  .header-line-rt::after {
    content: '';
    position: absolute;
    top: 50%;                   /* vertically center the line */
    left: 100%;                 /* start right after the text */
    width: 100vw;               /* go all the way to the right edge of viewport */
    height: 1px;                /* thickness of the line */
    background: #d73f09;           /* change color as needed */
    transform: translateY(-50%); /* perfect vertical centering */
  }

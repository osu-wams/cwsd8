  .directory-connect-content {
  	padding:0 20px 20px 20px;
  }

  .view-more-btn {
    cursor: pointer;
    color: #d73f09;
    font-size:13px;
    font-weight: 600;
    background: none;
    border: none;
    padding: 8px 0;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;        /* removes underline */
    transition: color 0.3s ease;
  }

  .view-more-btn:hover {
    color: #423e3c;
  }

  /* Arrow that slides in on hover */
  .view-more-btn::after {
    content: '→';
    font-size: 1.2em;
    line-height: 1;
    opacity: 0;
    transform: translateX(-10px);
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .view-more-btn:hover::after {
    opacity: 1;
    transform: translateX(0);
  }


id: expand_directory
label: 'Expand Directory'
code: |-
  jQuery(document).on("ajaxComplete", function () {
    const links = document.querySelectorAll(".form-item-items-per-page a");
    
    links.forEach(function(link) {
      if (link.textContent.trim() !== "6") {
        if (link.classList.contains("bef-link--selected")) {
          link.textContent = "View Less";
        } else {
          link.textContent = "View All";
        }
      }
    });
  });

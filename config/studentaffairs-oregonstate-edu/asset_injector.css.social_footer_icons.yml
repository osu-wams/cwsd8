id: social_footer_icons
label: 'Social Footer Icons'
code: |
  .se-border-color {
          border: 2px solid #FFFFFF;
      }
      /*    mobile*/
      
      @media (max-width: 767px) {
          #custom-socialmedia {
              float: right;
          }
      }
      /*    desktop*/
      
      @media (min-width: 768px) {
          #custom-socialmedia {
              float: right;
          }
      }
      
      #footer #custom-socialmedia button {
          background-color: transparent;
          border-radius: 50%;
          height: 50px;
          width: 50px;
      }
      
      #footer #custom-socialmedia img {
          width: 25px;
          height: 25px;
      }
      
      #footer #custom-socialmedia button:hover {
          background-color: rgba(255, 255, 255, 0.25);
      }
      
      #footer #custom-socialmedia-black button {
          display: none;
      }
      
      #footer #custom-socialmedia a {
          color: transparent;
      }
      
      #footer #custom-socialmedia a:hover {
          background-color: transparent;
      }
media: all

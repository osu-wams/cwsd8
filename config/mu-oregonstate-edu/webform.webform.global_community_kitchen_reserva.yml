elements: |-
  info:
    '#type': webform_markup
    '#markup': |-
      <p>&nbsp;</p>

      <blockquote>
      <p>Thanks for your interest in using the MU Teaching Kitchen. Please remember your event:</p>

      <p>- Must be University affiliated</p>

      <p>- Must not be for personal monetary gain</p>

      <p>- Must meet Oregon and Federal food safety guidelines in addition to all MUTK guidelines</p>

      <p><strong>NOTE:</strong> This is solely a request form and not a confirmation form.&nbsp;Further communication between the MUTK to confirm the event would be needed after form submission.</p>
      </blockquote>

      <p>&nbsp;</p>

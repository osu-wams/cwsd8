id: _invite_provost_feser
title: ' Invite Provost Haggerty'
description: ''
categories: {  }
elements: |-
  contact_information:
    '#type': webform_section
    '#title': 'Contact Information'
    first_name:
      '#type': textfield
      '#title': 'First Name'
    last_name:
      '#type': textfield
      '#title': 'Last Name'
    email_address:
      '#type': email
      '#title': 'Email Address'
    phone_number:
      '#type': tel
      '#title': 'Phone Number'
  event_details:
    '#type': webform_section
    '#title': 'Event Details'
    sponsoring_office_organization_:
      '#type': textfield
      '#title': 'Sponsoring Office/Organization: '
    _name_of_event_:
      '#type': textfield
      '#title': ' Name of Event: '
    type_of_event_:
      '#type': select
      '#title': 'Type of Event:'
      '#options':
        Reception: Reception
        Luncheon: Luncheon
        Dinner: Dinner
        Buffet: Buffet
        Lecture: Lecture
        Conference: Conference
        Other: Other
    provost_feser_s_role_:
      '#type': select
      '#title': "Provost Haggerty's Role:"
      '#options':
        Host: Host
        Speaker: Speaker
        'Guest of Honor': 'Guest of Honor'
        Guest: Guest
        Other: Other
    does_the_invitation_include_kathy_feser_:
      '#type': select
      '#title': "Does the invitation include the provost's spouse, Amanda Haggerty?"
      '#options': yes_no
    date_of_event_:
      '#type': date
      '#title': 'Date of Event:'
      '#datepicker': true
      '#datepicker_button': true
      '#date_date_format': 'l, F j, Y'
      '#date_date_element': datepicker
      '#date_time_element': timepicker
      '#date_time_format': 'g:i A'
      '#date_time_step': '900'
    event_start_time_:
      '#type': webform_time
      '#title': 'Event Start Time: '
      '#time_format': 'g:i A'
      '#step': ''
    event_end_time:
      '#type': webform_time
      '#title': 'Event End Time:'
      '#time_format': 'g:i A'
    provost_feser_s_expected_attendance:
      '#type': webform_time
      '#title': "Provost Haggerty's Expected Attendance"
      '#time_format': 'g:i A'
      '#step': ''
    location_of_event_:
      '#type': textfield
      '#title': 'Location of Event: '
    estimated_attendance_:
      '#type': number
      '#title': 'Estimated Attendance: '
    who_will_be_in_the_audience_:
      '#type': textarea
      '#title': 'Who will be in the audience?'
      '#description': |-
        <ul>
        	<li>Identify any notable individuals in attendance, providing appropriate context for Provost Haggerty</li>
        </ul>
    briefing_materials_note:
      '#type': webform_markup
      '#markup': '<p><em>Please note that if Provost Haggerty is able to attend your event you will be asked to provide briefing materials, including the final event program, five business days prior to the event.</em></p>'
    please_select_:
      '#type': select
      '#title': 'Please Select: '
      '#options':
        'No remarks': 'No remarks'
        'Welcoming Remarks (3-5 minutes)': 'Welcoming Remarks (3-5 minutes)'
        'Short Remarks (5-7 minutes)': 'Short Remarks (5-7 minutes)'
        'Speech (10-15 minutes)': 'Speech (10-15 minutes)'
        'Major Address (20+ minutes)': 'Major Address (20+ minutes)'
        'Additional Time for Q&A)': 'Additional Time for Q&A)'
    is_a_v_available_:
      '#type': select
      '#title': 'Is A/V Available: '
      '#options': yes_no
    will_there_be_other_speakers_:
      '#type': select
      '#title': 'Will there be other speakers? '
      '#options': yes_no
    please_provide_the_run_of_show_program_schedule_:
      '#type': textarea
      '#title': 'Please provide the run of show/program schedule: '
    please_provide_3_5_suggested_talking_points_:
      '#type': textarea
      '#title': "Please provide 3-5 suggested talking points including an overview of any key points or messages you would want Provost Haggerty to cover and suggested thank you's or introductions if Provost Haggerty is speaking before or after anyone. "
  captcha:
    '#type': captcha

id: videobg
label: VideoBG
code: |-
  const video = document.getElementById('video');
  const pauseButton = document.getElementById('pause-button');

  pauseButton.addEventListener('click', () => {
    if (video.paused) {
      video.play();
      pauseButton.textContent = 'Pause';
    } else {
      video.pause();
      pauseButton.textContent = 'Play';
    }
  });

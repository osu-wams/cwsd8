id: pcla
label: PCLA
code: |-
  .pcla-clickable-box > :first-child{
  	background-color: #ffffff00 !important;
  }

  #contact, #contáctanos{
  	margin-left: -12px;
  	margin-right: -12px;
  	min-width: 100%;
  	overflow-x: hidden;
  }

  /* Translation button */

  .pcla-btn{
  	border-radius: 0;
    width: 100%;
  }


  /* Black Banner Bars on 50/50 layouts */

  .pcla-h1{
    position: absolute;
    top: 50%;
    width: 25% !important;
  }


  /* Text */

  .fw-300{
  	font-weight: 300;
  }

  .fw-500{
  	font-weight: 500 !important;
  }

  .body-first-letter{
  	line-height: 1.8;
  }

  .body-first-letter .first-letter {
  	font-family: 'Stratum2Web';
    font-size: 6em;
    line-height: 0.95;
    float: left;
    padding-right: 5px;
    padding-bottom: 0;
    margin-bottom: -10px;
  }

  .what-we-do-text{
  	padding-left: 3rem;
  	margin-top: 3rem;
  }


  /* Mobile Responsiveness */

  @media (max-width: 767px){
  	.what-we-do-text{
  		padding-left: 0;
  	}
  	
  	.image-neg-margin{
  		margin-top: -20px !important;
  	}
  	
  	.pcla-h1{
  	  position: absolute;
  	  top: 22%;
  	  width: 75% !important;
  	}
  	
  	.mobile-banner-img{
  		min-height: 300px !important;
  	}
  	
  	.mobile-padding{
  		padding: 10px !important;
  	}
  	
  	.mobile-border{
  		border-left: 0px solid #e0e0e0 !important;
      border-top: 4px solid #e0e0e0 !important;
  	}
  	
  	.pcla-btn{
  		width: 40%;
  		float: right;
  	}
  }

  @media (min-width: 768px) and (max-width: 1076px){
  	.pcla-h1{
  	  width: 40% !important;
  	}
  }

  @media (max-width: 260px){
  	.pcla-h1{
  	  top: 13% !important;
  	}
  }

  /* Widths */

  .w-50{
  	width: 50%;
  }

  .w-40{
  	width: 40%;
  }

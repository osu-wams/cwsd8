label: 'Agenda Item Number'
description: "This number will determine the order that the actions appear in the aggregated list. The list will first order based on the Date of Action, showing the most recent first. It will then sort those based on the number in this field. The largest number will appear first. So if you had 4 actions with the same date, you'd put a 4 for the one you'd want at the top of the list. Repeat as necessary. "

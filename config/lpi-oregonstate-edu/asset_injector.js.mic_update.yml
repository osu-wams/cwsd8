id: mic_update
label: 'MIC Update'
code: |-
  var expandedAll = false;

  function expandAll() {
      if (expandedAll == false) {
          var e = document.getElementsByTagName('input');
          for (var i = 0; e[i]; i++) {

              if (e[i].id.substring(0, 17) == "expandableHeading") {
                  e[i].checked = true;
              }

          }
          expandedAll = true;
          document.getElementById("expandAllButton").value = "Collapse All";
      } else {
          var e2 = document.getElementsByTagName('input');
          for (var i = 0; e2[i]; i++) {

              if (e2[i].id.substring(0, 17) == "expandableHeading") {
                  e2[i].checked = false;
              }

          }
          expandedAll = false;
          document.getElementById("expandAllButton").value = "Expand All";
      }
  }

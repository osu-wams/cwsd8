id: show_banner_once_per_day
label: 'Temporary Banner JS'
code: |-
  document.addEventListener('DOMContentLoaded', function () {
    const banner = document.querySelector('.temp-banner');
    const closeBtn = document.querySelector('.banner-close');

    if (banner) {
      banner.style.display = 'flex'; // Always show on load
    }

    if (closeBtn) {
      closeBtn.addEventListener('click', function () {
        banner.style.display = 'none';
      });
    }
  });

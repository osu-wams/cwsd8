id: css_update
label: 'CSS - Update'
code: |
  .pine h2,
  .pine #page-title {
    font-size: 2rem;
    font-weight: 200;
  }
  .pine h3,
  .pine #fs-title {
    font-size: 1.4rem;
    font-weight: 150;
  }
  .paragraphs-items .paragraph-menu ul li a {
    font-weight: 400;
    text-decoration: none;
  }

  /**** styles for LPI News Block*****/

  .pine h4.news-title {
    color: #000;
    display: inline;
    font-size: 16px;
    line-height: 18px;
    margin: 0;
    padding: 0;
  }
  div.news-item {
    border-bottom: 1px dotted #888;
    clear: both;
    margin-bottom: 1.5em;
    overflow: auto;
    padding-bottom: 1em;
  }
  div.news-item img {
    clear: left;
    float: left;
    margin-right: 10px;
    padding-bottom: 35px;
    padding-top: 10px;
  }
  span.news-title {
    text-transform: uppercase;
  }
  span.news-date {
    font-weight: 300;
  }
  span.news-caption {
    font-size: 90%;
  }

  /**** Buttons ****/
  .button1 {
    background-color: #dc4405;
    border-radius: 4px;
    border-top: solid #000 2px;
    color: #fff !important;
    display: inline-block;
    font-size: 1.5em;
    line-height: 1.15;
    margin: 0;
    padding: 25px;
    text-align: center;
    width: 85%;
  }
  .button2 {
    background-color: #003b5c;
    border-radius: 4px;
    border-top: solid #000 2px;
    color: #fff !important;
    display: inline-block;
    font-size: 1.5em;
    line-height: 1.15;
    margin: 0;
    padding: 25px;
    text-align: center;
    width: 85%;
  }
  .button1 a,
  .button2 a,
  .button3 a,
  .button1 a:visited,
  .button2 a:visited,
  .button3 a:visited,
  .button1 a:link,
  .button2 a:link,
  .button3 a:link {
    color: #fff !important;
  }
  .button3 {
    background-color: #dc4405;
    border-radius: 15px;
    border-top: none;
    color: #fff !important;
    display: inline-block;
    font-size: 1.0em;
    line-height: 1.0;
    margin: auto;
    padding: 10px;
    text-align: center;
    width: 60%;
  }
  .Table3000 {
    display: block;
  }

  .Table3000 thead {
    left: -9999px;
    position: absolute;
    top: -9999px;
  }

  .Table3000 tr {
    border: 1px solid #ccc;
  }

  .Table3000 td {
    /* Behave  like a "row" */
    border: none;
    border-bottom: 1px solid #eee;
    font-family: "Proxima Nova", sans-serif;
    font-size: calc(12px + (18 - 12) * (100vw - 400px) / (1600 - 400));
    padding-left: 50%;
    position: relative;
  }

  .Table3000 td:before {
    /* Now like a table header */
    font-family: "Proxima Nova", sans-serif;
    /* Top/left values mimic padding */
    font-size: calc(12px + (18 - 12) * (100vw - 400px) / (1600 - 400));
    font-style: normal;
    font-weight: 550;
    left: 6px;
    padding-right: 10px;
    position: absolute;
    text-align: left;
    top: 6px;
    vertical-align: middle;
    white-space: normal;
    width: 45%;

  }
  .Table3000 td:nth-of-type(1):before { content: "Nutrient"; }
  .Table3000 td:nth-of-type(2):before { content: "LPI Recommendation"; }
  .Table3000 td:nth-of-type(3):before { content: "Where Can I Get More?"; }
  .Table3000 span.highlight {
    color: #c34500;
    font-weight: 550;
  }
  .Table3000 span.Hyperlink {
    color: #4f5cd6;
    text-decoration: underline;
  }
media: all

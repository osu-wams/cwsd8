title: 'ISTA Customers First ISTA Sample Certificate'
description: '<p>Complete this form if you do not have a PIN for OSU Seed Services and need an ISTA Sample Certificate.</p>'
categories: {  }
elements: |-
  your_name:
    '#type': textfield
    '#title': 'Your Name:'
    '#required': true
    '#default_value': '[current-user:display-name]'
  name:
    '#type': textfield
    '#title': 'Company Name:'
    '#required': true
    '#default_value': '[current-user:display-name]'
  company_address:
    '#type': address
    '#title': 'Company Address:'
    '#required': true
    '#field_overrides':
      givenName: hidden
      additionalName: hidden
      familyName: hidden
      organization: hidden
      addressLine1: required
      addressLine2: optional
      addressLine3: optional
      postalCode: required
      sortingCode: hidden
      dependentLocality: hidden
      locality: required
      administrativeArea: required
  contact_number:
    '#type': tel
    '#title': 'Your Phone Number'
    '#required': true
    '#international': true
    '#international_initial_country': US
  email:
    '#type': email
    '#title': 'Your Email'
    '#required': true
    '#default_value': '[current-user:mail]'
  your_email:
    '#type': email
    '#title': 'Accounting Email:'
    '#required': true
    '#default_value': '[current-user:mail]'
  terms_of_service:
    '#type': webform_terms_of_service
    '#terms_title': 'Terms of condition to access the OSCS eCertification Portal'
    '#terms_content': "<p>The OSU Seed Lab Customer Online Portal is connected to the Oregon Seed Certification Service Office's eCertification portal/ Online Services website. Sample Certificates, test data, test reports and invoices are accessed through the shared eCertification portal. In order to set up acceess as an OSU Seed Lab customer you will need to agree to their terms: Our online services are provided by OSCS to its active clientele in expectation that it will expedite the certification process in the state of Oregon. OSCS reserves the right to alter, expand, scale back or terminate the services at any time. If your request is approved, a Personal Identification Number (PIN) will be assigned to your client account record to provide access to OSCS Online Services through our eCertification portal. Please make sure that the confidentiality of this information is preserved a tll times, and notify us immediately in writing to seedcertrequests@oregonstate.edu, if someone other than you or a representative of your company uses the PIN to access your account. A new PIN will be assigned to maintain security protocols. Per our security protocols, we will not send the PIN through email. The information available through this online portal is for authorized us only. If approved, you will be granted permission to access the information that is pertinent to your company's certification records and other publicly available documents. THis data is protected by the appropriate State and Federal laws, particularly by the Computer Fraud and Abuse Act and Electronic Communications Priacy Act. Any unauthorized use of the system will result in immediate termination of your account and possible criminal prosecution. By clicking the Submit button below, I agree to the above terms of conditions.</p>"
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': 'Send message'

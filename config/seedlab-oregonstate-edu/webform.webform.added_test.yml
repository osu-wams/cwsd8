id: added_test
title: 'Added Test '
description: '<p>Use this form for requesting Added Tests</p>'
categories: {  }
elements: |-
  adding_additional_tests_form2:
    '#type': webform_section
    '#title': 'Adding Additional Tests Form'
    '#description': |-
      <p>On this form&nbsp;you can add additional tests to an existing sample that has been received by the OSU Seed Lab.</p>

      <p>To add additional tests, your company name must be on the sample record as either grower, warehouse, customer, or CC.</p>

      <p>Please be advised that additional tests requested here will be billed to you directly on the next billing cycle and NOT to the original customer on the sample record.</p>

      <p>The OUS Seed Lab keeps file samples for over two years. Find out the oldest file sample by clicking here.</p>

      <p>After submitting this form, added tests will be processed within the next business day.&nbsp;</p>

      <p>Requests made after 4 pm will be processed the next business day.&nbsp;</p>

      <p>Fees apply to added tests.&nbsp;</p>
  customer_contact_information:
    '#type': webform_contact
    '#title': 'Customer Contact Information:'
    '#required': true
    '#name__title': 'Contact Name'
    '#name__required': true
    '#company__required': true
    '#email__title': 'Contact Email'
    '#email__required': true
    '#phone__required': true
    '#address__access': false
    '#address_2__access': false
    '#city__access': false
    '#state_province__access': false
    '#postal_code__access': false
    '#country__access': false
  list_osu_test_number_s:
    '#type': textfield
    '#title': 'Add Tests to the Following Test Number(s). (To enter multiple test numbers, select add below.):'
    '#multiple': true
    '#minlength': 6
    '#maxlength': 6
    '#required': true
    '#required_error': 'Please enter the test numbers you would like to add the following added test(s).'
  select_added_tests:
    '#type': webform_checkboxes_other
    '#title': 'Select all Test(s) you would like to Add to the test numbers listed above:'
    '#options':
      'g AOSA germination test': g
      'AOSA/EC germination': aosa/ec/g
      'germ&flourescence': fl
      'AOSA/EC germ&flourescence': aosa/ec/fl
      growout: growout
      'AOSA tz': tz
      'AOSA EC TZ': aosa/ec/tz
      ploidy: ploidy
      endophyte: endophyte
      'AOSA purity': p
      'AOSA EC purity': aosa/ec/p
      'crop & weed': cw
      'Undesirable Grass Species': ugs
      'PNW Sod Quality': sq
      'Conversion to Canada': 'Conversion to Canada'
      'Conversion to AOSA/EC': 'Conversion to AOSA/EC'
      'Conversion to AOSA': 'Conversion to AOSA'
    '#required': true
    '#required_error': 'Select at least on test to add.'
  flexbox:
    '#type': webform_flexbox
    '#align_items': center
  try_this:
    '#type': label
    '#title': 'We operate on user fee funds only and appreciate the opportunity to continue to test your seed samples! The OSU Seed Lab would like to Thank You For Your Business! '
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': Submit

id: seed_lab_customer_application_fo
title: 'NEW ISTA Seed Lab Customer Application Form for OS PIN'
description: '<p>This form is for the intake of new customer information.</p>'
categories: {  }
elements: |-
  new_customer_application_form:
    '#type': webform_section
    '#title': 'New OSU Seed Lab ISTA Customer Application for Online Services'
    '#description': "<p>The OSU Seed Lab Online Customer Portal is connected to the Oregon Seed Certification Service Office's eCertification portal also known as Online Services. Sample Certificates, test data, test reports and invoices are accessed through the shared Online Services website. Apply for access to the Online Services website by completing this form which includes terms and conditions below and submitting the required pre-payment.</p>"
    '#required': true
  customer_contact_email:
    '#type': webform_email_confirm
    '#title': 'Customer Contact Email'
    '#required': true
    '#confirm__title': 'Confirm Customer Contact Email'
  company_information:
    '#type': webform_contact
    '#title': 'Company Information'
    '#required': true
    '#name__title': 'Company Contact'
    '#name__required': true
    '#company__title': 'Company Name'
    '#company__required': true
    '#email__access': false
    '#phone__required': true
    '#address__required': true
    '#city__required': true
    '#state_province__required': true
    '#postal_code__required': true
    '#country__required': true
  your_company_website:
    '#type': url
    '#title': 'Your Company Website'
    '#required': true
  accounting_email:
    '#type': webform_email_multiple
    '#title': 'Accounting Email:'
    '#required': true
  flexbox:
    '#type': webform_flexbox
  required_pre_payment:
    '#type': webform_section
    '#title': 'Required Pre-Payment'
    '#description': |-
      <p>The pre-payment amount required of $100 may be submitted to the OSU Seed Lab by check or credit card.&nbsp;</p>

      <p>Mail Checks to:&nbsp;<br />
      OSU Seed Lab</p>

      <p>3291 SW Campus Way</p>

      <p>Corvallis OR 97331</p>

      <p>After submitting this form you will be directed to the OSU Seed Lab Marketplace for payment by credit card.&nbsp;</p>

      <p>*If testing fees are less than the required pre-payment amount, the customer will be refunded the difference.</p>
  payment_details:
    '#type': select
    '#title': 'Select how your company will be pre-paying:'
    '#options':
      Check: Check
      'Credit Card': 'Credit Card'
    '#required': true
  osu_seed_services_site_terms_conditions_agreement:
    '#type': webform_section
    '#title': 'OSU Seed Services Website Terms & Conditions Agreement:'
  terms_of_condition_and_service_to_access_the_oscs:
    '#type': checkbox
    '#title': "The OSU Seed Lab Online Portal is provided by OSCS to its active clientele in expectation that it will expedite the certification process in the state of Oregon. OSCS reserves the right to alter, expand, scale back or terminate the services at any time. If your request is approved, a Personal Identification Number (PIN) will be assigned to your client account record to provide access to OSCS Online Services through our eCertification portal. Please make sure that the confidentiality of this information is preserved at all times, and notify us immediately in writing to seedcertrequests@oregonstate.edu, if someone other than you or a representative of your company uses the PIN to access your account. A new PIN will be assigned to maintain security protocols. Per our security protocols, we will not send the PIN through email. The information available through this online portal is for authorized us only. If approved, you will be granted permission to access the information that is pertinent to your company's certification records and other publicly available documents. This data is protected by the appropriate State and Federal laws, particularly by the Computer Fraud and Abuse Act and Electronic Communications Privacy Act. Any unauthorized use of the system will result in immediate termination of your account and possible criminal prosecution. By clicking the button and submitting this form, I agree to the above terms of conditions."
    '#title_display': before
    '#required': true

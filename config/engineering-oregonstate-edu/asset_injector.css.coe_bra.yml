langcode: en
status: false
dependencies:
  module:
    - block_visibility_groups
    - node
id: coe_bra
label: 'COE Brand Simple Columns Content Types'
code: |+
  /*
  ==================================================================================================================================================================
  ==================================================================================================================================================================
  	--COE Brand Simple Columns Styling--
  	
  	Styling for Simple Columns content type specifically. Created 7/2/2025.
  ==================================================================================================================================================================
  ==================================================================================================================================================================
  */

  @media screen and (min-width: 768px) {
  	.paragraph--type--coe-article-module-body ul {
  		width: 67%;
  	}
  }

  @media screen and (max-width: 1199px) {
      .toc-js {
           margin-bottom: 0 !important; 
      }
  }

  .field--name-field-sc-hero-button a {
  	width: max-content;
  }

  .paragraph--type--coe-article-module-body h2 {
  	margin-top: 120px;
  	margin-bottom: 30px;
  }

  .paragraph--type--coe-article-module-body ul {
  	margin-top: 30px;
  	margin-bottom: 30px;
  }

  .paragraph--type--coe-article-module-body h3 {
  	margin-top: 50px;
  }

  .paragraph--type--coe-article-module-body h5 {
  	color: #D73F09;
  	margin-top: 30px;
  }

  .black-text {
    color: #000 !important;
  }


  .paragraph--type--coe-article-module-body figcaption,
  .paragraph--type--coe-article-module-body figcaption a {
  	/* Main/Notes */
  	font-family: "Open Sans";
  	font-size: 12px;
  	font-style: italic;
  	font-weight: 300;
  	line-height: 130%; /* 15.6px */
  }

  .paragraph--type--coe-article-module-body figcaption {
  	color: #000;
  }

  .paragraph--type--coe-article-module-body figcaption a {
  	color: #D73F09;
  	text-decoration: none;
  	transition: 0.3s;
  	border-bottom: none;
  }

  .paragraph--type--coe-article-module-body figcaption a:hover {
  	text-decoration: underline !important;
  	border-bottom: none;
  }

  .paragraph--type--coe-modular-article > .field ul > li:last-child {
  	padding-bottom: 0 !important;
  }

  .paragraph--type--coe-modular-article img {
  	margin-top: 50px;
  }

  .paragraph--type--coe-modular-article .paragraph--type--coe-par-video img {
  	margin-top: 0;
  }

  .block-toc-js:has( .toc-js nav li) {
  	margin-top: 120px;
  }

  .block-toc-js .toc-active a {
  	padding-right: 24px;
  }

  /*******************************************
   Quote Block
   ********************************************/

  .paragraph--type--coe-quote .field--name-field-coe-quote-style {
  	display: none;
  }

  .paragraph--type--coe-quote {
  	margin-top: 50px;
  }

  .paragraph--type--coe-quote:has( .blue-primary-yellow-secondary) {
  	border: 2px solid #003B5C;
  	background-color: #003B5C;
    padding: 70px;
    margin-bottom: 50px;
  }

  .paragraph--type--coe-quote:has( .white-primary-orange-secondary) {
  	border: 2px solid #D73F09;
  	background-color: #FFF;
    padding: 70px;
    margin-bottom: 50px;
  }

  /* Quotation typography */

  .paragraph--type--coe-quote:has(.blue-primary-yellow-secondary) .field--name-field-coe-quote-quotation,
  .paragraph--type--coe-quote:has(.white-primary-orange-secondary) .field--name-field-coe-quote-quotation {
    font-style: italic;
    font-weight: 600;
    line-height: 150%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .paragraph--type--coe-quote:has(.blue-primary-yellow-secondary) .field--name-field-coe-quote-quotation {
    color: #FFF;
    font-size: 32px;
    margin-bottom: 30px;
  }

  .paragraph--type--coe-quote:has(.white-primary-orange-secondary) .field--name-field-coe-quote-quotation {
    color: #000;
    font-size: 32px;
    margin-bottom: 30px;  
  }

  /* Insert Quotation Icon */

  .paragraph--type--coe-quote:has( .white-primary-orange-secondary) .field--name-field-coe-quote-quotation::before {
    text-align: right;
    content: url("/sites/engineering.oregonstate.edu/files/2025-02/quote_icon.svg");
    margin-top: -95px;
  }

  .paragraph--type--coe-quote:has( .blue-primary-yellow-secondary) .field--name-field-coe-quote-quotation::before {
    text-align: right;
    content: url("/sites/engineering.oregonstate.edu/files/2024-11/quote-icon.svg");
    margin-top: -95px;
  }

  /* Quotation Author Name typography */

  .paragraph--type--coe-quote:has(.blue-primary-yellow-secondary) .field--name-field-coe-quote-attribution-name,
  .paragraph--type--coe-quote:has(.white-primary-orange-secondary) .field--name-field-coe-quote-attribution-name {
    font-size: 18px;
    font-style: normal;
    font-weight: 700;
    line-height: 160%;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    display: inline;
  }

  .paragraph--type--coe-quote:has(.blue-primary-yellow-secondary) .field--name-field-coe-quote-attribution-name {
    color: #FFB500;
  }

  .paragraph--type--coe-quote:has(.white-primary-orange-secondary) .field--name-field-coe-quote-attribution-name {
    color: #D73F09;
  }

  /* Quotation description styling */

  .paragraph--type--coe-quote:has( .blue-primary-yellow-secondary) .field--name-field-coe-quote-attribution-desc {
    color: #FFF;
  }

  .paragraph--type--coe-quote:has( .blue-primary-yellow-secondary) .field--name-field-coe-quote-attribution-desc p,
  .paragraph--type--coe-quote:has( .blue-primary-yellow-secondary) .field--name-field-coe-quote-attribution-desc,
  .paragraph--type--coe-quote:has( .white-primary-orange-secondary) .field--name-field-coe-quote-attribution-desc p,
  .paragraph--type--coe-quote:has( .white-primary-orange-secondary) .field--name-field-coe-quote-attribution-desc {
      display: inline;
  } 

  .paragraph--type--coe-quote:has( .blue-primary-yellow-secondary) .field--name-field-coe-quote-attribution-name::after,
  .paragraph--type--coe-quote:has( .white-primary-orange-secondary) .field--name-field-coe-quote-attribution-name::after {
      content: ', ';
  }

  @media screen and (max-width: 767px) {
    .paragraph--type--coe-quote:has( .blue-primary-yellow-secondary),
    .paragraph--type--coe-quote:has( .white-primary-orange-secondary) {
        padding: 0px 30px 50px 30px;
    }
    .paragraph--type--coe-quote:has( .blue-primary-yellow-secondary) .field--name-field-coe-quote-quotation,
    .paragraph--type--coe-quote:has( .white-primary-orange-secondary) .field--name-field-coe-quote-quotation {
        gap: 0;
        font-size: 24px;
    }
    .paragraph--type--coe-quote:has( .blue-primary-yellow-secondary) .field--name-field-coe-quote-quotation::before,
    .paragraph--type--coe-quote:has( .white-primary-orange-secondary) .field--name-field-coe-quote-quotation::before {
        margin-top: -40px;
        margin-right: -50px;
        transform: scale(0.83);
    }
    
   
  }
  /*******************************************
  Numbers Block
  ********************************************/

  /* ==============================================
  Academic Numbers block styling for discipline pages
  ================================================= */

  /* ==============================================
  Stats & Numbers block styling
  ================================================= */

  /* CSS Variables for consistent styling */
  :root {
    --primary-color: #D73F09;
    --text-color: #000;
    --heading-font: "Stratum2web";
    --body-font: "Open Sans";
    --standard-spacing: 16px;
    --large-spacing: 64px;
    --block-width: 228px;
  }

  /* Hide when not populated */
  .paragraph--type--coe-stats-and-numbers:not(:has(.field--name-field-sc-numbers)) {
      display: none;
  }

  /* Font Styling for Header */
  .field--name-field-coe-numbers-header {
    font-family: var(--heading-font);
    font-size: 36px;
    font-style: normal;
    font-weight: 900;
    line-height: 130%;
    color: var(--primary-color);
    text-align: center;
  }

  /* Center the paragraph body */
  /* Container for the body text - this centers the inline-block child */
  .paragraph--type--coe-stats-and-numbers {
    text-align: center;
  }

  .field--name-field-coe-numbers-body {
    font-family: var(--body-font);
    font-size: 18px;
    font-style: normal;
    font-weight: 400;
    line-height: 160%;
    text-align: center;
    margin-top: var(--standard-spacing);
    display: inline-block;
    width: 66%;
    /* Alternative approach if inline-block doesn't work well */
    /* display: block;
    margin-left: auto;
    margin-right: auto; */
  }

  /* Numbers blocks container styling */
  .field--name-field-sc-numbers {
    margin-top: var(--large-spacing);
    display: flex;
    justify-content: space-around;
    align-items: center;
  }

  /* Number block width adjustment */
  .paragraph--type--coe-numbers-block ._none .container .row .col-12 {
    width: var(--block-width);
  }

  /* Number font styling */
  .field--name-field-coe-number .field__item {
    font-family: var(--heading-font);
    font-size: 64px;
    font-style: normal;
    font-weight: 900;
    line-height: 130%;
    text-align: center;
    color: var(--text-color);
  }

  /* Hide the number label */
  .field--name-field-coe-number .field__label {
    display: none;
  }

  /* Number divider alignment */
  .field--name-field-coe-divider .field--name-field-media-image {
    text-align: center;
  }

  /* Label font styling */
  .field--name-field-coe-label {
    font-family: var(--heading-font);
    font-size: 24px;
    font-style: normal;
    font-weight: 900;
    line-height: 130%;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    text-align: center;
    color: var(--text-color);
    max-width: 80%;
    margin: 0 auto;
    padding-top: var(--standard-spacing);
  }

  .field--name-field-coe-label h4 {
    font-family: var(--heading-font);
    font-size: 24px;
    font-style: normal;
    font-weight: 900;
    line-height: 130%;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin: 0;
  }

  /* Dimension updates for Mobile screen */
  @media only screen and (max-width: 767px) {
    /* Width readjustment for Body paragraph on mobile */
    .field--name-field-coe-numbers-body {
      width: 100%;
    }

    /* Numbers blocks container update for mobile */
    .field--name-field-sc-numbers {
      margin-top: var(--standard-spacing);
      display: block;
      justify-content: center;
      align-items: center;
    }
    
    /* Number block number margin update */
    .field--name-field-coe-number .field__item {
      margin-top: var(--large-spacing);
    }

    /* Number block width adjustment for mobile */
    .paragraph--type--coe-numbers-block ._none .container .row .col-12 {
      width: 100%;
    }
  }
  /*******************************************
   Footer
   ********************************************/
   
  .article-footer {
    background-image: url('/sites/engineering.oregonstate.edu/files/2025-05/section%20bg.svg');
    background-size: cover;
    padding: 100px 0; 
  }

  .article-footer:not(:has(.paragraph--type--coe-article-conclusion)) {
      visibility: hidden;
      padding: 0;
  }

  .article-footer:not(:has(.paragraph--type--coe-article-conclusion)) > div {
  	display: none;
  }

  .paragraph--type--coe-article-conclusion > div:first-child {
  	margin-bottom: 20px;
  }

  .paragraph--type--coe-article-conclusion > div:nth-child(2) {
  	margin-bottom: 100px;
  }

  .field--name-field-coe-conclusion-add-link {
  	margin-top: 16px;
  }

  @media screen and (min-width: 768px) {
  	.paragraph--type--coe-article-conclusion > div:nth-child(2) > div > div {
  		width: calc(50% - 10px);
  	}
  	.paragraph--type--coe-article-conclusion > div:nth-child(2) > div {
  		display: flex;
  		justify-content: space-between;
  	}
  }

  .paragraph--type--coe-modular-article {
  	margin-top: 120px;
  }


  .more-link{
  	border: 2px solid var(--Primary-Paddletail-Black, #000);
  	background: var(--Primary-Bucktooth-White, #FFF);
  	width: 320px;
  	height: 60px;
  	flex-shrink: 0;
  	padding-left: 33px;
  	padding-top: 15px;
  }

  .more-link a{
  	color: var(--Primary-Paddletail-Black, #000);
  	text-align: center;
  	font-family: "Open Sans";
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: normal;
  	letter-spacing: 1px;
  	text-transform: uppercase;
  	display: inline-block;
  }



media: all
preprocess: true
conditions:
  condition_group:
    id: condition_group
    negate: false
    block_visibility_group: ''
  'entity_bundle:node':
    id: 'entity_bundle:node'
    negate: false
    context_mapping:
      node: '@node.node_route_context:node'
    bundles:
      coe_simple_column: coe_simple_column
contexts: {  }
conditions_require_all: true

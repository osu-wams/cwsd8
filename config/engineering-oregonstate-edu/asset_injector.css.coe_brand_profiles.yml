  }


  /*********************************************************

  Body Spacing

  **********************************************************/
  .main-profile-body-col-1 > div:first-of-type {
    margin-top: 0 !important;
  }

  .main-profile-body-col-2 > div:last-of-type {
    margin-bottom: 0 !important;

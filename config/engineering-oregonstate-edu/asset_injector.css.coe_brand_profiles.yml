    border-radius: 5px;
    border: 1px solid #F8F9FA;
    background: #FFF;
    box-shadow: 2px 4px 8px 0px rgba(0, 0, 0, 0.08);
    height: 100%;
    transition: .3s;
  }

  .story-card-wide{
    border-radius: 5px;
    border: 1px solid #F8F9FA;
    background: #FFF;
    box-shadow: 2px 4px 8px 0px rgba(0, 0, 0, 0.08);
    transition: .3s;
  }

  .related-story-card > div:hover,
  .story-card:hover,

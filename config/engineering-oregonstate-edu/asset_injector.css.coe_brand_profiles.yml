    padding: 8px 16px;
    border-radius: 3px;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 14px;
    width: -webkit-max-content;
  }

  @media (min-width: 1200px) {
  	.field--name-field-engr-c-accepting-student {
  		right: 58px;
  	}
  }

  @media (min-width: 1400px) {
  	.field--name-field-engr-c-accepting-student {

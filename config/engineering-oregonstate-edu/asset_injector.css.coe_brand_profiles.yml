  	color: var(--Primary-Paddletail-Black, #000);
    font-family: "Open Sans";
    font-size: 20px;
    font-style: normal;
    font-weight: 600;
    line-height: 130%;
    letter-spacing: normal;
    text-transform: none;
  }

  .field--name-field-coe-profile-documents > .field__item {

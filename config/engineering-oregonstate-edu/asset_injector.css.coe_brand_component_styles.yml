  /*
  ==================================================================================================================================================================
  ==================================================================================================================================================================
  	--COE Brand Component Styles--
  	
  	Global component styling. Created 4/3/2025.
  ==================================================================================================================================================================
  ==================================================================================================================================================================
  */

  /*================================================================================================================================================================
  	SECTION: Light Blue Color Box with Text (Originally known as "Campus Messaging" block)
  	
  	PURPOSE: Light blue background behind text
  	soci
  	INSTRUCTIONS:
  		1. Put "campus-messaging" as a class on the block
  		2. The block should have an h5 headline, a body section, and a link, wrapped in a <p> tag, and that <p> tag should have a "black-arrow-link" class
  	==============================================================================================================================================================*/
  	
  .campus-messaging .block__content {
    background: rgba(198, 218, 231, 0.2);
    padding: 50px;
  }

  .campus-messaging h5 {
  	margin-bottom: 10px;
  }

  /*================================================================================================================================================================
  	SECTION: 3 Icon Features Section (Originally known as "Rankings" block)
  	
  	PURPOSE: A section containing 3 horizontally arranged items with icons.
  	
  	INSTRUCTIONS:
  		1  Apply the class "icon-features" to a div that wraps all the icon items.
      2. Each icon item should be wrapped in a div and consist of a image, a title, and a description.
  	==============================================================================================================================================================*/

  /* Flex container for icons */
  .icon-features {
    display: flex;
    justify-content: space-evenly;
    gap: 20px;
    text-align: center;
    
    flex-wrap: wrap;
  }

  /* Each icon item should be a vertical layout */
  .icon-features > div {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 30px 0px 30px;
    
    flex: 1 1 30%; /* flex-grow, flex-shrink, flex-basis */
  }

  @media (max-width: 991px) {
    .icon-features > div {
      flex: 1 1 47%;
      max-width: 47%;
    }
  }

  /* Mobile: 1 per row */
  @media (max-width: 767px) {
    .icon-features > div {
      flex: 1 1 100%;
      max-width: 100%;
    }
  }

  /* Subtext typography */
  .icon-features-text {
  	font-family: Stratum2Web;
  	font-size: 24px;
  	font-weight: 900;
  	line-height: 130%;
  	letter-spacing: 1.2px;
  	text-transform: uppercase;
  }

  .icons-features-subtext {
  	font-size: 12px;
  	font-style: italic;
  	font-weight: 300;
  	line-height: 130%; 
  }

  /*================================================================================================================================================================
  	SECTION: Video with Text Layout and background pattern
  	
  	PURPOSE: Styling for video with descriptive text
  	
  	INSTRUCTIONS:
      1. Create a section and add "video-text" to the container wrapper classes.
      2. Add three blocks: 
         - First block: pattern image
         - Second block: video
         - Third block: text
      3. Add "video-text-subtext" to the text block’s attributes.
  	==============================================================================================================================================================*/

  /* Hides extra space from background image div */
  .video-text .block:first-of-type {
  	height: 0px;
  } 

  /* Utilizing an old CSS2 trick to responsively size the frame (padding-bottom percent is calculated based on width) 
     Video is 2/3 of width and centered                                                                               */
  .video-text .field--name-field-media-oembed-video .field__item {
    position: relative;
    width: 66%;
    margin: 0 auto;
    height: 0;
    padding-bottom: 37.25%;
  }

  /* Adjust the iframe so it's rendered in the outer-width and outer-height of it's parent */
  .video-text iframe {
    position: absolute;
    width: 100%;
    height: 100%;
  }

  /* Text hangs from right of video */
  @media screen and (min-width: 992px) {
  	.video-text-subtext {
  		width: 66%;
      margin: auto;
      padding-left: 15%;
  	}
  }

  /* Full size on tablet/mobile */
  @media screen and (max-width: 991px) {
  	.video-text .field--name-field-media-oembed-video .field__item {
  	    width: 100%;
  	    padding-bottom: 56.3%;
  	}
  }


  @media only screen and (min-width: 768px) and (max-width: 991px) {
  	.video-text-subtext {
  		width: 75%;
      margin: 0 0 0 auto;
      padding-left: 0%;
    }
  }
  /***************************************
  	Background Image Layout
  	*************************************/
  	
  /* Position background image behind video */
  .video-text img {
  	object-position: 0% 0%;
  	margin-bottom: -50%;
  	min-width: 100%;
  	width: 100%;
  }

  /* Large Tablet Sizing */
  @media screen and (max-width: 1199px) {
  	.video-text img {
  		object-fit: contain;
  		min-width: 100vw;
  		width: 100vw;
  		margin-left: calc(-1* calc(calc(100vw - 100%) / 2));
  	}
  }

  /* Hide background on mobile/tablet */
  @media (max-width: 991px) {
  	.video-text img {
  		display: none;
  	}
  }

  /*================================================================================================================================================================
  	SECTION: Centered align column override
  	
  	PURPOSE: Override column to start align for tablet screensize.
  	
  	INSTRUCTIONS:
      1. Add "center-align-override" to the row attributes/classes.
  	==============================================================================================================================================================*/

  @media (min-width: 768px) and (max-width: 991px) {
    .center-align-override.osu-align-items-center {
      align-items: start !important;
    }
  }

  /************************************************************************


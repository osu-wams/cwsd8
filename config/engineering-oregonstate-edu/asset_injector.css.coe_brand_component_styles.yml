  .img-bottom-left-rogue-wave .field__item img {
  	box-shadow: -15px 15px 0 #0D5257;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }


  /** Right Top **/

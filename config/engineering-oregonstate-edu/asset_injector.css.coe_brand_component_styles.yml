  /*================================================================================================================================================================
  	SECTION: Video Block Styling
  	
  	PURPOSE: Style the Video block (paragraph type)
  	==============================================================================================================================================================*/
  	
  .paragraph--type--coe-par-video .field--name-field-media-oembed-video .field__item {
    position: relative;
    width: 100%;
    height: 0;
    padding-bottom: 56.25%; /* The height of the item will now be 56.25% of the width. */
  }


  /**/



  /** Drop Colors for Image **/
  /** Box Shadow Guide:
   * box-shadow: Left/Right Top/Bottom SPREAD Color; Positive numbers represent right and bottom; Negative ones left and top;
  **/

  /************************************************************************

  	SECTION: Image Box Shadow Color
  	
  	PURPOSE: Applies a box shadow color to images
  	
  	INSTRUCTIONS:
  		1. Insert class name (ex. img-bottom-left-hop-bine) into block 
  		2. Configure > Manage Attributes > Block content attributes
  ************************************************************************/

  /** Right Bottom **/
  .img-bottom-right-yellow .field__item img {
  	box-shadow: 15px 15px 0 #FFB500;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  }
  .img-bottom-right-orange .field__item img {
  	box-shadow: 15px 15px 0 #d73f09;
  	margin-bottom: 25px;
  }
  .img-bottom-right-seafoam .field__item img {
  	box-shadow: 15px 15px 0 #B8DDE1;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  }
  .img-bottom-right-hop-bine .field__item img {
  	box-shadow: 15px 15px 0 #AA9D2E;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  }
  .img-bottom-right-blue .field__item img {
  	box-shadow: 15px 15px 0 #00859B;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  }
  .img-bottom-right-pine-stand .field__item img {
  	box-shadow: 15px 15px 0 #4A773C;
  	margin-bottom: 25px;
  }
  .img-bottom-right-solar-flare .field__item img {
  	box-shadow: 15px 15px 0 #D3832B;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  }
  .img-bottom-right-rogue-wave .field__item img {
  	box-shadow: 15px 15px 0 #0D5257;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  }



  /** Left Bottom **/
  .img-bottom-left-yellow .field__item img {
  	box-shadow: -15px 15px 0 #FFB500;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }
  .img-bottom-left-orange .field__item img {
  	box-shadow: -15px 15px 0 #d73f09;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }
  .img-bottom-left-seafoam .field__item img {
  	box-shadow: -15px 15px 0 #B8DDE1;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }
  .img-bottom-left-hop-bine .field__item img {
    box-shadow: -15px 15px 0 #AA9D2E;
    margin-bottom: 25px;
    width: calc(100% - 15px);
    margin-left: 15px;
  }
  .img-bottom-left-blue .field__item img {
  	box-shadow: -15px 15px 0 #00859B;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }

  .img-bottom-left-solar-flare .field__item img {
  	box-shadow: -15px 15px 0 #D3832B;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }

  .img-bottom-left-stratosphere .field__item img {
  	box-shadow: -15px 15px 0 #006A8E;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;

  }

  /* Number font styling */
  .field--name-field-coe-number .field__item {
    font-family: var(--heading-font);
    font-size: 64px;
    font-style: normal;
    font-weight: 900;
    line-height: 130%;
    text-align: center;
    color: var(--text-color);
  }

  /* Hide the number label */
  .field--name-field-coe-number .field__label {
    display: none;
  }

  /* Number divider alignment */
  .field--name-field-coe-divider .field--name-field-media-image {
    text-align: center;
  }

  /* Label font styling */
  .field--name-field-coe-label {
    font-family: var(--heading-font);
    font-size: 24px;
    font-style: normal;
    font-weight: 900;
    line-height: 130%;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    text-align: center;
    color: var(--text-color);
    max-width: 80%;
    margin: 0 auto;
    padding-top: var(--standard-spacing);
  }

  .field--name-field-coe-label h4 {
    font-family: var(--heading-font);
    font-size: 24px;
    font-style: normal;
    font-weight: 900;
    line-height: 130%;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin: 0;
  }

  /* Dimension updates for Mobile screen */
  @media only screen and (max-width: 767px) {
    /* Width readjustment for Body paragraph on mobile */
    .field--name-field-coe-numbers-body {
      width: 100%;
    }

    /* Numbers blocks container update for mobile */
    .field--name-field-sc-numbers {
      margin-top: var(--standard-spacing);
      display: block;
      justify-content: center;
      align-items: center;
    }
    
    /* Number block number margin update */
    .field--name-field-coe-number .field__item {

  /*================================================================================================================================================================
  	SECTION: COE Image Card
  	
  	PURPOSE: Global card styling option for cards with an image.
  	
  	INSTRUCTIONS: Use following HTML format
  	
  	<div class="coe-image-card">
  		<div class="coe-image-card-image">
  			<a href="{link}">{image}</a>
  		</div>
  		<div class="coe-image-card-body">
  			<h5 class="coe-image-card-title">
  				<a href="{link}">{title}</a>
  			</h5>
  		</div>
  	</div>
  	
  	Parent "Section" container should be 1-column, and Column 1 should get the "coe-image-card-grid" class on it.
  	
  	Blocks with the above HTML block should get the "col-12 col-md-6 col-xl-4" classes in their attributes.
  	
  	See "https://engineering.oregonstate.edu/alumni-partners/alumni-magazine/alumni-magazine-archive" for example (this page uses slightly different classnames).
  	==============================================================================================================================================================*/

  .coe-image-card {
  	width: 97% !important;
  	height: auto !important;
  	flex-shrink: 0;
  	border-radius: 5px;
    overflow: hidden;
    box-shadow: 2px 4px 8px 0 rgba(0, 0, 0, 0.08);
    border: 1px solid var(--Useful-Light-Grey, #ECEDEE);
    text-align: center;
    margin-bottom: 30px;
  }

  .coe-image-card:hover {
  	background: #F9FCFD !important;
  	transition: .3s;
  	box-shadow: 0px 1px 3px 0px rgba(0, 0, 0, 0.08) !important;
  }

  .coe-image-card-image img {
    width: 100% !important;
    height: auto !important;
    object-fit: cover;
    display: block;
  }

  .coe-image-card-title{
    margin: 30px;
    font-size: 20px !important;
    font-weight: 600;
    color: #000;
    font-family: "Open Sans";
    text-decoration: none !important;
    text-align: left;
  }

  .coe-image-card-title a{
  	color:black;
  	text-decoration: none !important;
  }

  .coe-image-card-grid {
  	display: flex;
    flex-wrap: wrap;
  }


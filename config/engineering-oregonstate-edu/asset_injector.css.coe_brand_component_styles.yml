  /* CSS Variables for consistent styling */
  :root {
    --primary-color: #D73F09;
    --text-color: #000;
    --heading-font: "Stratum2web";
    --body-font: "Open Sans";
    --standard-spacing: 16px;
    --large-spacing: 64px;
    --block-width: 228px;
  }

  /* Hide when not populated */
  .paragraph--type--coe-stats-and-numbers:not(:has(.field--name-field-sc-numbers)) {
      display: none;
  }

  /* Font Styling for Header */
  .field--name-field-coe-numbers-header {
    font-family: var(--heading-font);
    font-size: 36px;
    font-style: normal;
    font-weight: 900;
    line-height: 130%;
    color: var(--primary-color);
    text-align: center;
  }

  /* Center the paragraph body */
  /* Container for the body text - this centers the inline-block child */
  .paragraph--type--coe-stats-and-numbers {
    text-align: center;
  }

  .field--name-field-coe-numbers-body {
    font-family: var(--body-font);
    font-size: 18px;
    font-style: normal;
    font-weight: 400;
    line-height: 160%;

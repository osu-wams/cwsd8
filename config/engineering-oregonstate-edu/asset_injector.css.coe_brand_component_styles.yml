  /*------------------------------------------------------------------------------
  	Sub-Section: Social Media Icons
  	
  	Styling for social media icons
  	----------------------------------------------------------------------------*/
  	
  .social-media-icons a,
  .social-media-icons a:hover {
  	border-bottom: none;
  }

  /** Social Media icons **/
  main .social-media-icons a:active,
  main .social-media-icons a:focus {
  	background: white !important;
  	border: none !important;
  }

  /* Spread social media icons across container */
  .social-media-icons {
  	display: flex;
  	gap: 40px;
  }

  /* Set icon button appearence */
  .social-media-icons .fa-2x{
  	background-color: transparent;
      border-radius: 50%;
      width: 44px;  /* Set a fixed width */
      height: 44px; /* Set equal height */
      display: flex; /* Use flexbox for centering */
      align-items: center; /* Center vertically */
      justify-content: center; /* Center horizontally */
      transition: all 0.5s ease;
      margin-left: -10px;
  }

  /* Circular orange background on hover */
  .social-media-icons .fa-2x:hover,
  .social-media-icons .fa-2x:focus {
      background-color: #d73f09;
  	color: white;
  }

  /* Maintain hover style through active state */
  .social-media-icons .fa-2x:active {
  	background-color: #d73f09;
  	color: white;
  }

  /* Larger icon size on desktop */
  @media screen and (min-width: 1200px) {
  	.social-media-icons .fa-2x {
  		font-size: 24px;
  	}
  }


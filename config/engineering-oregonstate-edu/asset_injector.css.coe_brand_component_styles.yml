  }

  /* Numbers blocks container styling */
  .field--name-field-sc-numbers {
    margin-top: var(--large-spacing);
    display: flex;
    justify-content: space-around;
    align-items: center;
  }

  /* Number block width adjustment */
  .paragraph--type--coe-numbers-block ._none .container .row .col-12 {

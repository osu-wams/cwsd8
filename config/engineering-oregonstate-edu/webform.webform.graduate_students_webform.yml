id: graduate_students_webform
title: 'Graduate Students Webform'
description: 'Graduate students can enter their information here to be listed in the&nbsp;graduate student directory.&nbsp;'
categories: {  }
elements: |-
  first_name:
    '#type': textfield
    '#title': 'First name'
    '#title_display': before
    '#autocomplete': ''
    '#required': true
    '#required_error': 'Please add your First name'
  middle_name:
    '#type': textfield
    '#title': 'Middle name'
    '#title_display': before
    '#autocomplete': ''
  last_name:
    '#type': textfield
    '#title': 'Last name'
    '#title_display': before
    '#autocomplete': ''
    '#required': true
    '#required_error': 'Please add your Last name'
  email:
    '#type': email
    '#title': Email
    '#title_display': before
    '#required': true
    '#required_error': 'Please add your Email'
  accept_or_decline:
    '#type': select
    '#title': 'Accept or Decline'
    '#title_display': before
    '#options':
      'I agree to be included in the CBEE graduate student directory.': 'I agree to be included in the CBEE graduate student directory.'
      'I do not wish to be included in the CBEE graduate student directory.': 'I do not wish to be included in the CBEE graduate student directory.'
    '#empty_option': None
    '#empty_value': None
    '#required': true
    '#required_error': 'Please answer to the "Accept or Decline" field'
  photo:
    '#type': media_library
    '#title': Photo
    '#title_display': before
    '#bundles':
      image: image
      document: 0
      kaltura: 0
      libsyn_podcast: 0
      local_video: 0
      remote_video: 0
  degree:
    '#type': select
    '#title': Degree
    '#title_display': before
    '#options':
      M.S.: M.S.
      M.Eng.: M.Eng.
      Ph.D.: Ph.D.
    '#empty_option': None
    '#empty_value': None
  program:
    '#type': select
    '#title': Program
    '#title_display': before
    '#options':
      ChE: ChE
      BioE: BioE
      EnvE: EnvE
    '#empty_option': None
    '#empty_value': None
  office_address:
    '#type': textfield
    '#title': 'Office address'
    '#description': 'Room number and building (e.g., 201 Johnson Hall)'
    '#title_display': before
    '#description_display': after
  personal_web_page:
    '#type': url
    '#title': 'Personal web page'
    '#description': |-
      <br />
      Enter the URL of your own professional Web page.
    '#title_display': before
  office_phone:
    '#type': tel
    '#title': 'Office phone'
    '#title_display': before
  education:
    '#type': textarea
    '#title': Education
    '#description': 'List your previous degrees (degree earned, major, university and year).'
    '#title_display': before
  biography:
    '#type': textarea
    '#title': Biography
    '#description': 'Enter any additional biographical information here.'
    '#title_display': before
  major_professor:
    '#type': textfield
    '#title': 'Major professor'
    '#title_display': before
  research_description:
    '#type': textarea
    '#title': 'Research description'
    '#description': 'Enter a short description of your research.'
    '#title_display': before
  publications:
    '#type': textarea
    '#title': Publications
    '#title_display': before
  additional_information:
    '#type': textarea
    '#title': 'Additional information'
    '#title_display': before
  captcha:
    '#type': captcha
    '#captcha_type': recaptcha/reCAPTCHA
    '#captcha_admin_mode': true

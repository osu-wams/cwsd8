id: mime_school_text
label: 'MIME button and header theming (hr, a, button, border)'
code: |-
  /*===================================
  MIME Theming
  ===================================*/


  /* Font size for MIME brand links */

  .block-system-branding-block a {
      font-size: 1.1rem;
  }

  /*  Global Button Styling */

  .btn.osu-btn-primary {
      border-radius: 0px;
      background-color: transparent;
      color: black;
      border-color: black;
  }

  /* Global Button Styling Hover Effect */

  .btn.osu-btn-primary:hover {
      background-color: #0D5257 !important;
      border-color: #0D5257 !important;
  }

  /* Adds white border on hover */

  .white-border-hover:hover {
    border-color: white !important;
  }

  /* School accent bar coloration */

  .school-accent-bar {
    height: 3px;
    position: absolute;
    left: 0px;
    right: 0px;
    background-color: #0D5257;
  }

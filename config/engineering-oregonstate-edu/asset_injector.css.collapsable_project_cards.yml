id: collapsable_project_cards
label: 'Collapsable Project Cards'
code: |+
  .collapsible-card {
    border: 1px solid #ccc;
    border-radius: 4px;
    margin: 1em 0;
    font-family: sans-serif;
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .card-intro {
    padding: 0.75em;
    background: #f9f9f9;
  }
  .card-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75em;
    background: #e0e0e0;
    font-weight: bold;
    cursor: pointer;
  }
  .card-body {
    padding: 0 0.75em;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.8s ease, padding 0.8s ease;
  }
  .collapsible-card:not(.collapsed) .card-body {
    max-height: 500px;
    padding: 0.75em;
  }
  .arrow {
    transition: transform 0.2s ease;
  }
  .collapsible-card:not(.collapsed) .arrow {
    transform: rotate(90deg);
  }

  .project-label{
  	color: #00859B;
  	font-family: "Open Sans";
  	font-size: 12px;
  	font-style: normal;
  	font-weight: 700;
  	line-height: 160%; /* 19.2px */
  	letter-spacing: 0.6px;
  	text-transform: uppercase;
  }

  ul {
    list-style-type: none;
    margin: 0;
    padding: 0;
    content: "";
  }
  li::marker {
    content: "" !important;

  }


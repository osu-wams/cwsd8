id: nse_all_pages_style_changes
label: 'NSE button and header theming (hr, a, button, border)'
code: |-
  /*===================================
  NSE Theming
  ===================================*/


  /*  Global Button Styling */

  .btn.osu-btn-primary {
      border-radius: 0;
      background-color: transparent;
      color: black;
      border-color: black;
  }

  /* Global Button Styling Hover Effect */

  .btn.osu-btn-primary:hover {
      background-color: #00859B !important;
      border-color: transparent !important;
  }

  /* School accent bar coloration */

  .school-accent-bar {
    height: 3px;
    position: absolute;
    left: 0px;
    right: 0px;
    background-color: #00859B;
  }

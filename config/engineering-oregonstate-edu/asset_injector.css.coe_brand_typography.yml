id: coe_brand_typography
label: 'COE Brand Typography and Links'
code: |
  /*
  ==================================================================================================================================================================
  ==================================================================================================================================================================
  	--COE Typography--
  	
  	Global typography styling. Created 4/2/2025.
  ==================================================================================================================================================================
  ==================================================================================================================================================================
  */

  .layout-content{
  	background: #FFF;
  }

  .layout-content .node--unpublished {
  	background: #FFF;
  }

  .container-fluid:has(.madrone-breadcrumb) { 
    background-color: #FFF !important;
  }

  .region-footer h6 {
  	color: #FFF;
  }

  /* Override XL breakpoint default */
  @media screen and (min-width: 1200px) {
  	.col-xxl-8:not(.col-xl-12) {
  		width: 66.66666667%;
  	}
  	.col-xxl-4 {
  		width: 33.33333333%;
  	}
  }

  /*================================================================================================================================================================
  	SECTION: Text Styling
  	
  	PURPOSE: Configurations of text styling
  	==============================================================================================================================================================*/

  :root {
  	--Primary-Paddletail-Black: #000;
  	--Primary-Beaver-Orange: #D73F09;
  	--Primary-Bucktooth-White: #FFF;
  	--Secondary-Luminance: #FFB500;
  	--Secondary-Seafoam: #B8DDE1;
  	--Secondary-Star-Canvas: #003B5C;
  	--Secondary-Rogue-Wave: #0D5257;
  	--Useful-Seafoam-Shades-Seafoam-Active: #ACCBCF
  }

  /* Main/H1 */
  h1, .h1 {
  	color: var(--Primary-Beaver-Orange, #D73F09);
  	font-family: Stratum2Web;
  	font-size: 96px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 96%; /* 92.16px */
  	text-transform: none;
  }

  /* Main/H2 */
  h2, .h2 {
  	color: var(--Primary-Paddletail-Black, #000);
  	font-family: Stratum2Web;
  	font-size: 64px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 83.2px */
  	text-transform: none;
  }

  /* Main/H3 */
  h3, .h3 {
  	color: var(--Primary-Paddletail-Black, #000);
  	font-family: Stratum2Web;
  	font-size: 36px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 46.8px */
  	text-transform: none;
  }

  /* Main/H4 */
  h4, .h4 {
  	color: var(--Primary-Paddletail-Black, #000);
  	font-family: Stratum2Web;
  	font-size: 24px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 31.2px */
  	letter-spacing: 1.2px;
  	text-transform: uppercase;
  }

  /* Main/H5 */
  h5, .h5 {
  	color: var(--Primary-Paddletail-Black, #000);
  	font-family: "Open Sans";
  	font-size: 22px;
  	font-style: normal;
  	font-weight: 700;
  	line-height: 130%; /* 28.6px */
  	letter-spacing: 1.1px;
  	text-transform: uppercase;
  }

  /* Main/H6 */
  h6, .h6,
  .field--name-field-document-card-link a{
  	color: var(--Primary-Paddletail-Black, #000);
  	font-family: "Open Sans";
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: 130%; /* 26px */
  	letter-spacing: normal;
  	text-transform: none;
  }

  @media screen and (max-width: 991px) {
  	h1, .h1 {
  		font-size: 72px;
  	}
  	h2, .h2 {
  		font-size: 48px;
  		line-height: 120%;
  	}
  	h5, .h5 {
  		font-size: 18px;
  		letter-spacing: 0.9px;
  	}
  }

  @media screen and (max-width: 767px) {
  	h1, .h1 {
  		font-size: 56px;
  		line-height: 120%;
  	}
  	h2, .h2 {
  		font-size: 44px;
  	}
  }

  .large-body {
  	font-size: 22px;
  }

  .strong-body {
  	font-family: "Open Sans";
  	font-size: 18px;
  	font-weight: 700;
  }

  .uppercase {
  	text-transform: uppercase;
  }

  /* Main/Body */
  main {
  	color: var(--Primary-Paddletail-Black, #000);
  	font-family: "Open Sans";
  	font-size: 18px;
  	font-style: normal;
  	font-weight: 400;
  	line-height: 160%;
  }

  /* Main/Body Small */
  .body-small {
  	color: var(--Primary-Paddletail-Black, #000);
  	
  	/* Main/Body Small */
  	font-family: "Open Sans";
  	font-size: 14px;
  	font-style: normal;
  	font-weight: 400;
  	line-height: 130%;
  }

  .body-small em {
  	font-weight: 300;
  	font-style: italic;
  }

  /* Main/Body p but strong for accessibility purposes */
  .p-strong {
  	font-size: 18px;
  	font-style: normal;
  	font-family: "Open Sans";
  	letter-spacing: 0;
  	line-height: 160%;
  	font-weight: 700;
  	text-transform: none;
  }

  .coe-label {
  	color: var(--Secondary-Stratosphere, #006A8E);
  	font-family: "Open Sans";
  	font-size: 12px;
  	font-style: normal;
  	font-weight: 700;
  	line-height: 160%; /* 19.2px */
  	letter-spacing: 0.6px;
  	text-transform: uppercase;
  	margin-bottom: 5px;
  }

  .fine-print {
  	color: #000;
  	font-family: "Open Sans";
  	font-size: 12px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: 130%;
  	letter-spacing: 0.6px;
  	display: inline-block;
  }

  .field--name-field-sc-hero-photo-by,
  .field--name-field-sc-hero-caption {
  	color:#000;
  	font-family: "Open Sans";
  	font-size: 12px;
  	font-style: italic;
  	font-weight: 300;
  	line-height: 130%; /* 15.6px */
  	padding-top: 10px;
  }


  @media screen and (min-width: 768px) {
  	.field--name-field-sc-hero-caption {
  		text-align: right;
  	}
  }

  nav, nav a {
  	color: #000;
  }

  main .orange-text {
  	color: var(--Primary-Beaver-Orange, #D73F09);
  }

  main .white-text {
  	color: var(--Primary-Bucktooth-White, #FFF);
  }

  main .yellow-text {
  	color: var(--Secondary-Luminance, #FFB500);
  }

  main .dark-blue-text {
  	color: var(--Secondary-Star-Canvas, #003B5C);
  }

  main .black-text,
  .tab-wrapper-paragraph__tab-link
  {
  	color: #000;
  }

  .underline-header {
  	border-bottom: 6px solid black;
  }

  /*================================================================================================================================================================
  	SECTION: Link Styling
  	
  	PURPOSE: Configurations of link styling
  	==============================================================================================================================================================*/

  /***************************************
  	Arrow Links
  	*************************************/

  /* Arrow link styling */
  .orange-arrow-link a,
  .yellow-arrow-link a,
  .black-arrow-link a,
  .white-arrow-link a{
  	font-family: Stratum2Web;
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 500;
  	line-height: normal;
  	letter-spacing: 1px;
  	text-transform: uppercase;
  	color: #D73F09 !important;
  	text-decoration: none !important;
  	background-image: url(/modules/custom/osu_custom_blocks/dist/arrow-right-red.c4e9b645.svg);
    background-position: 100%;
    background-repeat: no-repeat;
    background-size: 20px;
    padding-right: 25px;
    margin-right: 10px;
    margin-top: 18px;
    transition: 0.2s ease;
    border-bottom: none;
  }

  /* Yellow arrow override */
  .yellow-arrow-link a {
  	color: #FFB500 !important;
  	background-image: url("/sites/engineering.oregonstate.edu/files/2025-02/arrow-right-yellow.svg") !important;
  }

  /* Black arrow override */
  .black-arrow-link a {
  	background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='27' height='20' viewBox='0 0 20 16' fill='none'><path d='M2 8H16' stroke='black' stroke-width='2.0' stroke-linecap='square' stroke-linejoin='round'/><path d='M12 14L18 8L12 2' stroke='black' stroke-width='2.0' stroke-linecap='square'/></svg>") !important;
  	color: #000 !important;
  }

  /* White arrow override */
  .white-arrow-link a {
  	background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='27' height='20' viewBox='0 0 20 16' fill='none'><path d='M2 8H16' stroke='white' stroke-width='2.0' stroke-linecap='square' stroke-linejoin='round'/><path d='M12 14L18 8L12 2' stroke='white' stroke-width='2.0' stroke-linecap='square'/></svg>") !important;
  	color: #FFF !important;
  }

  /* Container spacing for arrow link */
  .orange-arrow-link,
  .yellow-arrow-link,
  .black-arrow-link,
  .white-arrow-link
  {
  	margin-top: 18px;
  }

  /* Arrow link hover state */
  .orange-arrow-link a:hover,
  .yellow-arrow-link a:hover,
  .black-arrow-link a:hover,
  .white-arrow-link a:hover {
  	padding-right: 35px;
  	margin-right: 0px;
  	border-bottom: none;
  }

  /* Orange arrow active/focus state */
  .orange-arrow-link a:active,
  .orange-arrow-link a:focus {
  	background-color: transparent !important;
  	color: #BE3706 !important;
  	padding-right: 35px !important;
  	border-bottom: none !important;
  }

  /* Yellow arrow active/focus state */
  .yellow-arrow-link a:active,
  .yellow-arrow-link a:focus {
  	background-color: transparent !important;
  	color: #D3832B !important;
  	padding-right: 35px !important;
  	border-bottom: none !important;
  }

  /* Black arrow active/focus state */
  .black-arrow-link a:active,
  .black-arrow-link a:focus {
  	background-color: transparent !important;
  	color: #000 !important;
  	padding-right: 35px !important;
  	border-bottom: none !important;
  }

  /* White arrow active/focus state */
  .white-arrow-link a:active,
  .white-arrow-link a:focus {
  	background-color: transparent !important;
  	color: #000 !important;
  	padding-right: 35px !important;
  	border-bottom: none !important;
  }

  /***************************************
  	Inline Links
  	*************************************/

  /* Apply to all links by default */
  main a {
  	color: #D73F09;
  	font-family: "Open Sans";
  	font-size: 18px;
  	font-style: normal;
  	font-weight: 400;
  	line-height: 160%; /* 28.8px */
  	text-decoration: none;
  	border-bottom: 3px solid transparent;
  	transition: 0.2s ease;
  	background-image: none;
  }

  main .body-small a {
  	font-size: 14px;
  	font-style: normal;
  	font-weight: 400;
  	line-height: 130%;
  	border-bottom: 2px solid transparent;
  }

  main .body-small em a {
  	font-weight: 300;
  	font-style: italic;
  }

  main .body-small a:hover {
  	border-bottom: 2px solid #D73F09;
  }

  /* Inline Links Hover */
  main a:hover,
  main a:focus {
  	color: #D73F09;
  	border-bottom: 3px solid #D73F09;
  	/*padding-right: 0;*/
  	text-decoration: none !important;
  }

  main a:active {
  	background-color: transparent !important;
  	color: #BE3706 !important;
  	border-bottom: 3px solid #BE3706;
  }

  .yellow-inline a, a.yellow-inline {
  	color: #FFB500;
  }

  .yellow-inline a:hover, a.yellow-inline:hover, .white-link-sm:hover, .white-link-lg:hover, a.white-text:hover,
  .yellow-inline a:focus, a.yellow-inline:focus, .white-link-sm:focus, .white-link-lg:focus, a.white-text:focus {
  	color: #FFB500;
  	border-bottom: 3px solid #FFB500;
  	padding-right: 0;
  	text-decoration: none !important;
  }

  .yellow-inline a:active, a.yellow-inline:active, .white-link-sm:active, .white-link-lg:active, a.white-text:active {
  	background-color: transparent !important;
  	color: #D3832B !important;
  	border-bottom: 3px solid #D3832B;
  }

  .black-link-sm:hover, .black-link-sm:active, .black-link-sm:focus,
  .black-link-lg:hover, .black-link-lg:active, .black-link-lg:focus {
  	transition-property: color, border;
  	transition-duration: 0.2s, 0.3s;
  	transition-delay: 0s, 0.05s;
  }

  .white-link-sm:hover, .white-link-sm:active, .white-link-sm:focus,
  .white-link-lg:hover, .white-link-lg:active, .white-link-lg:focus {
  	transition-property: color, border;
  	transition-duration: 0.2s, 0.3s;
  	transition-delay: 0s, 0.05s;
  }

  .black-link-sm, .black-link-lg {
  	color: var(--Primary-Paddletail-Black, #000);
  	transition-property: color, border;
  	transition-duration: 0.3s, 0.2s;
  	transition-delay: 0.05s, 0s;
  }

  .white-link-sm, .white-link-lg {
  	color: var(--Primary-Bucktooth-White, #FFF);
  	transition-property: color, border;
  	transition-duration: 0.3s, 0.2s;
  	transition-delay: 0.05s, 0s;
  }

  .black-link-sm, .white-link-sm {
  	font-weight: 600;
  	line-height: normal;
  	letter-spacing: 0.9px;
  	text-transform: uppercase;
  	border-top: 3px solid transparent; /* Counteract border bottom for centering */
  }

  .black-link-lg, .white-link-lg {
  	font-family: Stratum2Web;
  	font-size: 32px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 41.6px */
  	letter-spacing: 0.64px;
  	text-transform: uppercase;
  	border-top: 3px solid transparent; /* Counteract border bottom for centering */
  }

  @media screen and (max-width: 1199px) {
  	.black-link-lg {
  		font-size: 24px;
  		letter-spacing: 0.64px;
  	}
  }

  @media screen and (max-width: 767px) {
  	.black-link-lg {
  		font-size: 20px;
  		letter-spacing: 0.5px;
  	}
  }

  /***************************************
  	Button Link Styling
  	*************************************/
  	
  .coe-button-moondust-bg {
  	--transparent-bg-color: #F4F8FA;
  }

  .coe-button-black-bg {
  	--transparent-bg-color: #000;
  }

  .coe-button-dark-grey-bg {
  	--transparent-bg-color: #212529;
  }

  	
  a.black-border, a.black-fill, a.orange-border, a.orange-fill, a.yellow-fill, a.yellow-border, a.white-border, a.white-fill, a.seafoam-border,
  .black-border a, .black-fill a, .orange-border a, .orange-fill a, .yellow-fill a, .yellow-border a, .white-border a, .white-fill a, .seafoam-border a,
  .paragraph--type--coe-article-conclusion .field--name-field-coe-conclusion-link a {
  	text-align: center;
  	font-family: "Open Sans";
  	font-size: 18px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: normal;
  	letter-spacing: 0.9px;
  	text-transform: uppercase;
  	padding: 17px 10px;
  	transition: 0.3s;
  	display: block;
  	margin-top: 20px;
  	display: flex;
  	justify-content: center;
  	align-items: center;
  }

  a.black-border:not([class$="-width"]),
  a.black-fill:not([class$="-width"]),
  a.orange-border:not([class$="-width"]),
  a.orange-fill:not([class$="-width"]),
  a.yellow-fill:not([class$="-width"]),
  a.yellow-border:not([class$="-width"]),
  a.white-border:not([class$="-width"]),
  a.white-fill:not([class$="-width"]),
  a.seafoam-border:not([class$="-width"]),
  .black-border a:not([class$="-width"]),
  .black-fill a:not([class$="-width"]),
  .orange-border a:not([class$="-width"]),
  .orange-fill a:not([class$="-width"]),
  .yellow-fill a:not([class$="-width"]),
  .yellow-border a:not([class$="-width"]),
  .white-border a:not([class$="-width"]),
  .white-fill a:not([class$="-width"]),
  .seafoam-border a:not([class$="-width"]),
  .paragraph--type--coe-article-conclusion .field--name-field-coe-conclusion-link a:not([class$="-width"]) {
    min-width: 320px;
  	width: max-content;
  }

  /*@media screen and (max-width: 1199px) {*/
  /*	a.black-border, a.black-fill, a.orange-border, a.orange-fill, a.yellow-fill, a.yellow-border, a.white-border, a.white-fill,*/
  /*.black-border a, .black-fill a, .orange-border a, .orange-fill a, .yellow-fill a, .yellow-border a, .white-border a, .white-fill a,*/
  /*.paragraph--type--coe-article-conclusion .field--name-field-coe-conclusion-link a {*/
  /*	width: 50%;*/
  /*}*/
  /*}*/

  @media screen and (max-width: 767px) {
  	a.black-border, a.black-fill, a.orange-border, a.orange-fill, a.yellow-fill, a.yellow-border, a.white-border, a.white-fill, a.seafoam-border,
  .black-border a, .black-fill a, .orange-border a, .orange-fill a, .yellow-fill a, .yellow-border a, .white-border a, .white-fill a, .seafoam-border a,
  .paragraph--type--coe-article-conclusion .field--name-field-coe-conclusion-link a,
  a.black-border:not([class$="-width"]),
  a.black-fill:not([class$="-width"]),
  a.orange-border:not([class$="-width"]),
  a.orange-fill:not([class$="-width"]),
  a.yellow-fill:not([class$="-width"]),
  a.yellow-border:not([class$="-width"]),
  a.white-border:not([class$="-width"]),
  a.white-fill:not([class$="-width"]),
  a.seafoam-border:not([class$="-width"]),
  .black-border a:not([class$="-width"]),
  .black-fill a:not([class$="-width"]),
  .orange-border a:not([class$="-width"]),
  .orange-fill a:not([class$="-width"]),
  .yellow-fill a:not([class$="-width"]),
  .yellow-border a:not([class$="-width"]),
  .white-border a:not([class$="-width"]),
  .white-fill a:not([class$="-width"]),
  .seafoam-border a:not([class$="-width"]),
  .paragraph--type--coe-article-conclusion .field--name-field-coe-conclusion-link a:not([class$="-width"]) {
  	width: 100%;
  	min-width: 0;
  }
  }

  a.black-border, a.black-fill,
  a.black-border:hover, a.black-fill:hover,
  .black-border a, .black-fill a,
  .black-border a:hover, .black-fill a:hover {
  	border: 2px solid #000;
  }

  a.orange-border, a.orange-fill,
  a.orange-border:hover, a.orange-fill:hover,
  .orange-border a, .orange-fill a,
  .orange-border a:hover, .orange-fill a:hover {
  	border: 2px solid #D73F09;
  }

  a.yellow-fill, a.yellow-fill:hover, a.yellow-border,
  .yellow-fill a, .yellow-fill a:hover, .yellow-border a,
  .paragraph--type--coe-article-conclusion .field--name-field-coe-conclusion-link a, .paragraph--type--coe-article-conclusion .field--name-field-coe-conclusion-link a:hover {
  	border: 2px solid #FFB500;
  }

  a.seafoam-border, .seafoam-border a {
  	color: var(--Secondary-Seafoam, #B8DDE1) !important;
  	border: 2px solid var(--Secondary-Seafoam, #B8DDE1);
  }

  a.yellow-border:active,
  .yellow-border a:active {
  	background-color: #D3832B !important;
    border: 2px solid #D3832B !important;
    color: #000 !important;
  }

  a.yellow-fill, a.yellow-border:hover, a.yellow-border:focus,
  .yellow-fill a, .yellow-border a:hover, .yellow-border a:focus,
  .paragraph--type--coe-article-conclusion .field--name-field-coe-conclusion-link a {
  	background-color: #FFB500;
  	color: #000;
  	border: 2px solid #FFB500;
  }

  a.white-border, a.white-fill:hover, a.white-fill:focus,
  .white-border a, .white-fill a:hover, .white-fill a:focus {
    background-color: var(--transparent-bg-color, transparent);
    color: #FFF !important;
  }

  a.white-border, a.white-fill, a.white-border:hover, a.white-fill:hover,
  .white-border a, .white-fill a, .white-border a:hover, .white-fill a:hover {
    border: 2px solid #FFF;
  }

  a.white-fill, a.white-border:hover, a.white-border:focus,
  .white-fill a, .white-border a:hover, .white-border a:focus {
    background-color: #FFF;
    color: #000 !important;
    border-bottom: 2px solid #FFF;
  }

  a.white-border:active, .white-border a:active {
  	background-color: #F8F9FA !important;
  	color: #000 !important;
  	border: 2px solid #F8F9FA;
  }

  a.white-fill:active, .white-fill a:active {
  	color: #F8F9FA !important;
  	border: 2px solid #F8F9FA;
  }


  a.black-border,
  a.black-fill:hover, a.black-fill:focus,
  .black-border a,
  .black-fill a:hover, .black-fill a:focus {
  	background-color: var(--transparent-bg-color, transparent);
  	color: #000;
  	border-bottom: 2px solid #000; /* cancel out main a styling */
  } 

  a.yellow-fill:hover, a.yellow-fill:focus,
  .yellow-fill a:hover, .yellow-fill a:focus,
  .paragraph--type--coe-article-conclusion .field--name-field-coe-conclusion-link a:hover, .paragraph--type--coe-article-conclusion .field--name-field-coe-conclusion-link a:focus {
  	background-color: var(--transparent-bg-color, transparent);
  	color: #FFB500;
  	border-bottom: 2px solid #FFB500; /* cancel out main a styling */
  }
  a.orange-border,
  a.orange-fill:hover, a.orange-fill:focus,
  .orange-border a,
  .orange-fill a:hover, .orange-fill a:focus {
  	background-color: var(--transparent-bg-color, transparent);
  	color: #D73F09;
  	border-bottom: 2px solid #D73F09; /* cancel out main a styling */
  }

  a.black-fill,
  a.black-border:hover, a.black-border:focus,
  .black-fill a,
  .black-border a:hover, .black-border a:focus {
  	background-color: #000;
  	color: #FFF;
  	border-bottom: 2px solid #000; /* cancel out main a styling */
  }

  a.orange-fill,
  a.orange-border:hover, a.orange-border:focus,
  .orange-fill a,
  .orange-border a:hover, .orange-border a:focus {
  	background-color: #D73F09;
  	color: #FFF;
  }

  a.seafoam-border:hover,
  .seafoam-border a:hover,
  a.seafoam-border:focus,
  .seafoam-border a:focus {
  	background-color: var(--Secondary-Seafoam, #B8DDE1);
  	color: var(--Secondary-Rogue-Wave, #0D5257) !important;
  	border-bottom: 2px solid var(--Secondary-Seafoam, #B8DDE1); /* cancel out main a styling */
  }

  a.black-border:active,
  .black-border a:active {
  	background-color: #212529 !important;
  	color: #FFF !important;
  	border: 2px solid #212529 !important;
  }

  a.black-fill:active,
  .black-fill a:active {
  	background-color: var(--transparent-bg-color, transparent) !important;
  	color: #212529 !important;
  	border: 2px solid #212529;
  }

  a.orange-border:active,
  .orange-border a:active {
  	background-color: #BE3706 !important;
  	color: #FFF !important;
  	border: 2px solid #BE3706;
  }

  a.orange-fill:active,
  .orange-fill a:active {
  	background-color: inherit !important;
  	color: #BE3706 !important;
  	border: 2px solid #BE3706;
  }

  a.yellow-border,
  .yellow-border a {
  	background-color: var(--transparent-bg-color, transparent);
  	color: #FFB500;
  }

  a.yellow-fill:active,
  .yellow-fill a:active {
  	background-color: var(--transparent-bg-color, transparent) !important;
  	color: #D3832B !important;
  	border: 2px solid #D3832B !important;
  }

  a.seafoam-border:active,
  .seafoam-border a:active {
  	border: 2px solid var(--Useful-Seafoam-Shades-Seafoam-Active, #ACCBCF);
    background-color: var(--Useful-Seafoam-Shades-Seafoam-Active, #ACCBCF) !important;
    color: var(--Secondary-Rogue-Wave, #0D5257) !important;
  }

  /******************
  Directional Buttons
  *******************/

  .directional-buttons {
    background-image: url(/modules/custom/osu_custom_blocks/dist/arrow-right-red.c4e9b645.svg);
    background-position: 95%;
    background-repeat: no-repeat;
    background-size: 40px;
    background-color: white;
    border: 3px solid #d73f09;
    border-radius: 5px;
    padding: 25px;
    padding-right: 65px;
    box-shadow: 2px 4px 4px rgba(0, 0, 0, 0.12);
    margin: 0;
    transition: background-image 0.4s ease-in, background-color 0.4s ease-in, border-color 0.4s ease-in;
    padding-left: 30px;
    padding-top: 30px;
    padding-bottom: 30px;
    position: relative;
    height: auto;
    display: flex;
    align-items: center;
  }

  .directional-buttons:hover {
    background-color: #d73f09;
    background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" width="41" height="33" viewBox="0 0 41 33" fill="none"><path d="M2 16.5H33.5" stroke="%23FFFFFF" stroke-width="4" stroke-linecap="square" stroke-linejoin="round"/><path d="M24.5 30L38 16.5L24.5 3" stroke="%23FFFFFF" stroke-width="4" stroke-linecap="square"/></svg>') !important;
    box-shadow: none;
  }

  /* Make the link text white on hover */
  .directional-buttons:hover a {
    color: white !important;
    text-decoration: none; /* optional, removes underline */
  }

  .directional-buttons a::before {
  	content: "";
  	position: absolute;
  	inset: 0;
  }

  .directional-buttons:active {
  	background-color: #BE3706;
  	border-color: #BE3706;
  }

  /* Reset link styles inside directional buttons */
  .directional-buttons a:link,
  .directional-buttons a:visited,
  .directional-buttons a:active,
  .directional-buttons a:focus {
    background-color: transparent !important;
    border-bottom: none !important;
    text-decoration: none !important;
  }

  @supports (hanging-punctuation: first) 
    and (font: -apple-system-body) 
    and (-webkit-appearance: none) {
    .directional-buttons {
      transition: background-color 0.4s ease-in;
    }
  }

  .directional-buttons a {
  	color: var(--Primary-Paddletail-Black, #000);
  	font-feature-settings: 'liga' off, 'clig' off;
  	
  	/* Main/H4 */
  	font-family: Stratum2web;
  	font-size: 24px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 31.2px */
  	letter-spacing: 1.2px;
  	text-transform: uppercase;
  }

  /*************************************************************
  Button Containers
  *************************************************************/

  .button-container {
  	display: flex;
  	flex-wrap: wrap;
  	column-gap: 20px;
  }

  .fourth-width,
  .third-width,
  .half-width,
  .full-width,
  .field--name-field-coe-conclusion-link a {
  	width: 100% !important;
  }

  @media screen and (min-width: 768px) {
  	.button-container .fourth-width,
  	.button-container .third-width,
  	.button-container .half-width {
  		width: calc(50% - 10px) !important;
  	}
  	.button-container .directional-buttons.half-width {
  		width: 100% !important;
  	}
  	.fourth-width,
  	.third-width,
  	.half-width {
  		width: 50% !important;
  	}
  }

  @media screen and (min-width: 992px) {
  	.button-container .directional-buttons.half-width {
  		width: calc(50% - 10px) !important;
  	}
  }


  @media screen and (min-width: 1200px) {
  	.button-container .third-width {
  		width: calc(33.3333% - 14px) !important;
  	}
  	.third-width {
  		width: 33% !important;
  	}
  	
  	.button-container .fourth-width {
      width: calc(25% - 15px) !important;
    }
    .fourth-width {
    	width: 25% !important;
    }
  }

  @media screen and (max-width: 1199px) and (min-width: 768px) {
  	.tablet-full-width {
  		width: 100% !important;
  	}
  }

  /*------------------------------------------------------------------------------
  	Sub-Section: Orange Bullet Point Styling
  	
  	Styling for orange bullet points
  	----------------------------------------------------------------------------*/

  /* Bullet point icon setup */
  main ul > li:not(.nav-item):not(.toc-h3):not(.toc-h2):not(.pager__item)::before {
  	content: '' !important;
  	display: inline-block;
  	width: 1.8ch;
  	height: 1.8ch;
  	position: absolute;
  	left: 0;
  	top: 0.5ch;
    background-size: contain;
    background-repeat: no-repeat;
  	background-position: top left;
  }

  /* Sets orange bullet point icon */
  main ul > li:not(.nav-item):not(.toc-h3):not(.toc-h2):not(.pager__item)::before {
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="13" height="20" viewBox="0 0 13 20" fill="none"><path d="M3 17L10 10L3 3" stroke="%23D73F09" stroke-width="4" stroke-linecap="square"/></svg>');
  }

  /* Sets yellow bullet point icon */
  main ul.bullets-yellow > li:not(.nav-item):not(.toc-h3):not(.toc-h2):not(.pager__item)::before {
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="13" height="20" viewBox="0 0 13 20" fill="none"><path d="M3 17L10 10L3 3" stroke="%23FFB500" stroke-width="4" stroke-linecap="square"/></svg>');
  }

  /* Bullet point spacing */
  main ul > li:not(.nav-item):not(.toc-h3):not(.toc-h2):not(.pager__item) {
    position: relative; /* Allows positioning of the pseudo-element */
    padding-left: 20px; /* Space for the bullet */
    padding-bottom: 18px;
  	list-style: none;
  }

  main ul > li:not(.nav-item):not(.toc-h3):not(.toc-h2):not(.pager__item)::marker {
  	content: "" !important;
  }

  main ul {
  	padding-left: 0;
  }


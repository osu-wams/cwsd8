id: coe_new_button_links_buttons_and_links
label: 'COE 2024 button/links  (buttons and links)'
code: |
  /* ==================================
  * This injector contains all the new buttons and links styling from the OSU library figma 
  (https://www.figma.com/design/aCTpzJsxOc9tWSQI3Bwsx8/OSU-Library?m=auto&t=l4FaQH7UA1RVYI9m-6).
  ===================================== */


  /*White text link with arrow (Not a button)*/
  .Arrow-link-white{
  	text-transform: uppercase;
  	color: #FFF !important;
  	background-image: url(/sites/engineering.oregonstate.edu/files/2024-08/Arrow-2.svg);
  	background-image-color: FFF !important;
  	background-position: 100%;
  	background-repeat: no-repeat;
  	background-size: 17px;
  	padding-right: 27px;
  	font-family: Stratum2Web;
  	text-decoration: none;
  	font-size: 24px;
  	font-style: normal;
  	font-weight: 700 !important;
  	transition: 0.1s ease;
  }

  .Arrow-link-white:hover{
  	padding-right: 40px;
  	transition: 0.1s ease;
  }


  /*Orange text link with arrow (Not a button)*/
  .Arrow-link-orange{
  	text-transform: uppercase;
  	color: #d73f09 !important;
  	background-image: url(/modules/custom/osu_custom_blocks/dist/arrow-right-red.c4e9b645.svg);
  	background-position: 100%;
  	background-repeat: no-repeat;
  	background-size: 17px;
  	padding-right: 27px;
  	font-family: Stratum2Web;
  	text-decoration: none;
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 500 !important;
  	transition: 0.1s ease;
  }

  .Arrow-link-orange:hover{
  	padding-right: 40px;
  	transition: 0.1s ease;
  }

  .Arrow-link-orange:active{
  	background-color: #fff !important;
  }

  /************************************************************************

  Link ahref | Text Orange | Hover Underline

  ************************************************************************/

  a.coe-link {
  	text-decoration: none;
  	color: #D73F09;
  	transition: 0.2s ease;
  	border-bottom: 3px solid transparent;
  }

  a.coe-link:hover {
  	text-decoration: none !important;
  	color: #BE3706;
    border-bottom: 3px solid #BE3706;
    padding-right: 0;
  }

  a.coe-link:active {
  	background-color: transparent !important;
  	color: #D73F09 !important;
  }

  /*Code for orange button*/
  .osu-btn-orange-2{
  	background: #D73F09;
    color: #FFF;
    border-color: white !important;
    width: 100%;
    font-weight: 600 !important;
    letter-spacing: 1.6px;
    height: 60px;
    border-radius: 0;
    padding-top: 12px;
    text-transform: uppercase;
  }

  .osu-btn-orange-2:hover{
  	font-weight: 600px !important;
  	background: #FFF;
  	border: 2px solid #D73F09 !important;
  	color: #D73F09;
  	letter-spacing: 1.6px;
  }

  /*Code for white button*/
  .osu-btn-white-2{
  	background: #FFF;
    color: #000;
    border: 2px solid #000;
    width: 320px;
    font-weight: 600 !important;
    letter-spacing: 1.6px;
    height: 60px;
    border-radius: 0;
    padding-top: 12px;
    text-transform: uppercase;
  }

  .osu-btn-white-2:hover{
  	background: #000;
  	color: #FFF;
  	border: 2px solid #000;
  }

  /* Color for yellow */

  .osu-btn-yellow-2{
  	background: #FFB500;
    color: #000;
    border-color: #FFB500 !important;
    width: 100%;
    font-weight: 600 !important;
    letter-spacing: 1.6px;
    height: 60px;
    border-radius: 0;
    padding-top: 12px;
    text-transform: uppercase;
  }

  .osu-btn-yellow-2:hover{
  	font-weight: 600px !important;
  	background: #000;
  	border: 2px solid #FFB500 !important;
  	color: #FFB500;
  	letter-spacing: 1.6px;
  }

  /* Orange Arrow Link | 2025 UPDATED */
  .field--name-field-people-link a,
  .orange-arrow-link {
  	font-family: Stratum2Web;
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 500;
  	line-height: normal;
  	letter-spacing: 1px;
  	text-transform: uppercase;
  	color: #D73F09;
  	display: inline-block;
  	text-decoration: none !important;
  	background-image: url(/modules/custom/osu_custom_blocks/dist/arrow-right-red.c4e9b645.svg);
    background-position: 100%;
    background-repeat: no-repeat;
    background-size: 20px;
    padding-right: 25px;
    transition: 0.2s ease;
    border-bottom: none;
  }

  .field--name-field-people-link a:hover,
  .orange-arrow-link:hover {
  	padding-right: 35px;
  	border-bottom: none;
  }

  .field--name-field-people-link a:active,
  .orange-arrow-link:active {
  	background-color: transparent !important;
  }

  /************************************************************************

  Orange Text/Border | Transparent Fill | button size is done with width 

  ************************************************************************/
  .osu-btn-orange-white {
  		/*TEXT STYLING INSIDE OF BUTTON*/
  		color: var(--Primary-Paddletail-Black, #D73F09);
      text-align: center;
      font-family: "Open Sans";
      font-size: 20px;
      font-style: normal;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 380px;
      
  		padding-top: 10px;
      padding-bottom: 10px;
      margin-top: 15px;

  		/*BUTTON STYLING*/
      border-radius: 0px;
      border: 2px solid var(--Primary-Paddletail-Black, #D73F09);
      background: transparent;
  }

  .osu-btn-orange-white:hover {
  	color: var(--bs-btn-hover-color);
    background-color: #D73F09;
    border-color: #D73F09;
  }

  .osu-btn-orange-white:active {
    background-color: #BE3706 !important;
    border-color: #Be3706 !important;
  }

  /************************************************************************

  Black Text/Border | White Fill | button size is done with width 

  ************************************************************************/
  .osu-btn-black-white {
  		/*TEXT STYLING INSIDE OF BUTTON*/
  		color: var(--Primary-Paddletail-Black, #000000);
      text-align: center;
      font-family: "Open Sans";
      font-size: 20px;
      font-style: normal;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 380px;
      
  		padding-top: 10px;
      padding-bottom: 10px;
      margin-top: 15px;

  		/*BUTTON STYLING*/
      border-radius: 0px;
      border: 2px solid var(--Primary-Paddletail-Black, #FFF);
      background: #ffffff;
  }

  .osu-btn-black-white:hover {
  	color: var(--bs-btn-hover-color);
    background-color: #000000;
    border-color: #FFF;
  }

  .osu-btn-black-white:active {
    background-color: #212529 !important;
    border-color: #212529 !important;
  }

  /************************************************************************

  Black Text/Border | White Fill | button size is done with width 

  ************************************************************************/
  .osu-btn-black-border{
  		/*TEXT STYLING INSIDE OF BUTTON*/
  		color: var(--Primary-Paddletail-Black, #000000);
      text-align: center;
      font-family: "Open Sans";
      font-size: 20px;
      font-style: normal;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 380px;
      
  		padding-top: 10px;
      padding-bottom: 10px;
      margin-top: 15px;

  		/*BUTTON STYLING*/
      border-radius: 0px;
      border: 2px solid var(--Primary-Paddletail-Black, #000000);
      background: #ffffff;
  }

  .osu-btn-black-border:hover {
  	color: var(--bs-btn-hover-color);
    background-color: #000000;
    border-color: #000000;
  }

  .osu-btn-black-border:active {
    background-color: #212529 !important;
    border-color: #212529 !important;
  }

  /************************************************************************

  White Text | Orange Fill/Border | Full-Width, Imitates sidebar buttons | Smaller Font Size

  ************************************************************************/
  .osu-btn-orange-white-sidebar {
      color: var(--Primary-Paddletail-Black, #fff);
      text-align: center;
      font-family: "Open Sans";
      font-size: 18px;
      font-style: normal;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 100%;
      padding-top: 10px;
      padding-bottom: 10px;
      margin-top: 15px;
      border-radius: 0px;
      border: 2px solid var(--Primary-Paddletail-Black, #D73F09);
      background: #D73F09;
  }

  .osu-btn-orange-white-sidebar:hover {
      color: #D73F09;
      background-color: #fff;
      border-color: #D73F09;
  }

  .osu-btn-orange-white-sidebar:active {
      background-color: transparent !important;
      color: #BE3706 !important;
  }

  /************************************************************************

  Black Text/Border | Transparent Fill | Full-Width, Imitates sidebar buttons | Smaller Font Size 

  ************************************************************************/

  .osu-btn-black-transparent-sidebar {
      color: var(--Primary-Paddletail-Black, #000);
      text-align: center;
      font-family: "Open Sans";
      font-size: 18px;
      font-style: normal;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 100%;
      padding-top: 10px;
      padding-bottom: 10px;
      margin-top: 15px;
      border-radius: 0px;
      border: 2px solid var(--Primary-Paddletail-Black, #000);
      background: transparent;
  }

  .osu-btn-black-transparent-sidebar:hover {
      color: #FFF;
  		background-color: #000;
      border-color: #000;
  }

  .osu-btn-black-transparent-sidebar:active {
      background-color: transparent !important;
      color: #BE3706 !important;
  }

  /************************************************************************

  Yellow Text/Border | Transparent Fill | button size is done with width 

  ************************************************************************/
  .osu-btn-yellow-transparent {
  		/*TEXT STYLING INSIDE OF BUTTON*/
  		color: var(--Primary-Paddletail-Black, #FFB500);
      text-align: center;
      font-family: "Open Sans";
      font-size: 20px;
      font-style: normal;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 380px;
      
  		padding-top: 10px;
      padding-bottom: 10px;
      margin-top: 15px;

  		/*BUTTON STYLING*/
      border-radius: 0px;
      border: 2px solid var(--Primary-Paddletail-Black, #FFB500);
      background: transparent;
  }

  .osu-btn-yellow-transparent:hover {
  	color: #000;
    background-color: #FFB500;
    border-color: #FFB500;
  }

  .osu-btn-yellow-transparent:active {
  	color: #000 !important;
    background-color: #D3832B !important;
    border-color: #D3832B !important;
  }


  /************************************************************************

  Button Styling for Mobile/Tablet Screen Sizes

  ************************************************************************/

  @media screen and (max-width: 767px) {
  	.osu-btn-orange-white,
  	.osu-btn-yellow-transparent {
  		width: 100%;
  	}
  	
  	/*Please Note that this mobile styling is different because at page engineering.oregonstate.edu/node/47726/ <---- (Blake replace this when migrated to production page)  it is located in the "All COE Events" Section */
  	.osu-btn-black-white,
  	.osu-btn-black-border {
  		width: 90%;
  	}
  }

  @media screen and (max-width: 767px) {
    .osu-btn-black-transparent-sidebar,
    .osu-btn-orange-white-sidebar {
    	max-width: 300px;
    }
  }

  @media screen and (max-width: 991px) {
    .osu-btn-black-transparent-sidebar,
    .osu-btn-orange-white-sidebar {
  		max-width: 300px;
    }
  }
media: all

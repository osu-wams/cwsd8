code: |-
  /*
  ==================================================================================================================================================================
  ==================================================================================================================================================================
  	--Award Content Type--
  	
  	Award content type styling. Created 4/8/2026.
  ==================================================================================================================================================================
  ==================================================================================================================================================================
  */

  /*-----------------------------------------------------------------
  	Degree List Styling
  	
  	Render Degrees as list items despite being <div>s
    ---------------------------------------------------------------*/

  	
  /* Orange bullet styling for field__item divs */
  main .field--name-field-engr-osa-degrees .field__item {
    display: block !important;
    position: relative; 
    padding-left: 16px;
    list-style-type: none !important;
  }
  /* Adds bullet icon */
  main .field--name-field-engr-osa-degrees .field__item::before {
    color:#423e3c;
    content:"\f054 ";
    padding-right: 8px;
    display:inline-block;
    font-family:"Font Awesome 6 Free","Font Awesome 5 Free";
    font-weight:900;
    letter-spacing:normal;
  }

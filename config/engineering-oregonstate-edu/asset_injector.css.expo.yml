  /*===================================
  	Summit Pattern
  =====================================*/
  @media screen and (max-width: 768px) {
  	.summit-mobile-pattern{
  		background-image: url(/sites/engineering.oregonstate.edu/files/2026-03/trails-highTide-mobile-10.svg) !important;
  		background-position: center;
  		background-repeat: repeat-x;
  		background-size: contain;
  	
  	}
  }

  /*===================================
  	Square Grid Pattern
  =====================================*/
  @media screen and (max-width: 768px) {
  	.square-grid-pattern{
  		background-image: url(/sites/engineering.oregonstate.edu/files/2026-03/square_grid_393x1920-mobile_0.svg) !important;
  		background-position: center;
  		background-repeat: repeat-x;
  		background-size: contain;
  	
  	}
  }

  /*===================================
  	Campaign Hero? (unknown)
  =====================================*/
  .campaign-hero-img-bg img{
  	bottom: 100px !important;
  }


  /*===================================
  	Celebrate Excellence
  =====================================*/
  .celebrate-excellence-hero {
    padding-bottom: 200px !important; 
    overflow: visible;
    background-color: black !important;
  }

  .celebrate-excellence-hero .osu-align-items-center {
    position: relative;
  }

  .celebrate-excellence-hero-pattern {
    position: absolute;
    right: -50px;
    bottom: 0;
    top: auto;
    transform: scale(0.5) translateY(160%);
  }

  @media (min-width: 768px) {
    .celebrate-excellence-hero {
    	padding-bottom: 48px !important;
    }

    .celebrate-excellence-hero-pattern {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-75%) scale(1);
    }
  }

  /*===================================
  	Crosses Hero Pattern
  =====================================*/
  .crosses-hero-pattern {
  	background-image: url('/sites/engineering.oregonstate.edu/files/2026-05/crosshairs-grid-secondary-pattern.svg');
  	background-position: top right;
  	background-repeat: no-repeat;
  	background-size: 45% auto;
  }

  /* Tablet [md-lg] */
  @media screen and (min-width: 768px) and (max-width: 1199px) {
  	.crosses-hero-pattern {
  		background-image: url('/sites/engineering.oregonstate.edu/files/2026-05/crosshairs-grid-mobile-hero-pattern.svg');
  		background-size: 50% auto;
  	}
  }

  /* Mobile */
  @media screen and (max-width: 767px) {
  	.crosses-hero-pattern {
  		background-image: none;
  	}
  }

  /*===================================
  	Centered Circles (background) Pattern
  =====================================*/
  .centered-circles-pattern {
  	background-image: url('/sites/engineering.oregonstate.edu/files/2026-02/circles-stratosphere.svg');
  	background-position: center center;
  	background-repeat: no-repeat;
  	background-size: 100% auto;
  }

  /*===================================
  	Community Video Pattern
  =====================================*/
  .community-video-pattern {
  	background-image: url('/sites/engineering.oregonstate.edu/files/2025-05/video_par_bg.svg');
  	background-position: center bottom;
  	background-repeat: no-repeat;
  	background-size: 100% auto;
  	padding-bottom: 30px;
  }

  /*===================================
  	Campaign hero section
  =====================================*/

  .hero-image-wrapper {
    position: relative;
  }

  .hero-image-wrapper::before {
    content: "";
    position: absolute;

    top: 5%;
    left: -1%;
    width: 100%;
    height: 50%;

    background-image: url('/sites/engineering.oregonstate.edu/files/2026-05/crosshairs-grid-hero-pattern.svg');
    background-repeat: repeat-x;
    background-size: 100% auto;
    background-position: top;
    transform: scale(1.4);
    overflow: hidden;

    z-index: 1;
  }

  /* keep image above background */
  .hero-image-wrapper img {
    position: relative;
    z-index: 2;
  }

  /* Tablet */
  @media screen and (min-width: 768px) and (max-width: 1199px) {
  	.hero-image-wrapper::before {
  		background-image: url('/sites/engineering.oregonstate.edu/files/2026-05/crosshairs-grid-tablet-hero-pattern.svg');
  		transform: scale(1.25);
  		top: 4%;
  		left: -8%;
  	}
  }

  /* Mobile */
  @media screen and (max-width: 767px){
  	.hero-image-wrapper::before {
    	top: -18%;
    	left: 0;

  	 background-image: url('/sites/engineering.oregonstate.edu/files/2026-05/crosshairs-grid-mobile-hero-pattern.svg');
  	 background-size: 100% auto;
  	 transform: scale(0.95);

  	}
  }

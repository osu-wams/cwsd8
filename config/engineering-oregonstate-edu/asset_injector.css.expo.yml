id: expo
label: 'Global Patterns'
code: |-
  /*===================================
  	Expo Pattern
  =====================================*/
  @media screen and (max-width: 991px) {
  	.expo-hero-pattern{
  		background-image: url(/sites/engineering.oregonstate.edu/files/2026-02/hero-tablet.svg) !important;
  		background-position: center;
  		background-repeat: repeat-x;
  		background-size: contain;
  	
  	}
  }

  @media screen and (max-width: 768px) {
  	.expo-hero-pattern{
  		background-image: url(/sites/engineering.oregonstate.edu/files/2026-02/hero-mobile-2.svg) !important;
  		background-position: center;
  		background-repeat: repeat-x;
  		background-size: contain;
  	
  	}
  }

  /*===================================
  	AMP Pattern
  =====================================*/
  @media screen and (max-width: 768px) {
  	.amp-mobile-pattern{
  		background-image: url(/sites/engineering.oregonstate.edu/files/2026-02/gridpaper-seafoam-50-mobile.svg) !important;
  		background-position: center;
  		background-repeat: repeat-x;
  		background-size: contain;
  	
  	}
  }


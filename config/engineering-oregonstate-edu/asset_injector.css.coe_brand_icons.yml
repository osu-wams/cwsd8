id: coe_brand_icons
label: 'COE Brand Icons'
code: |-
  /* ==========================================================================
     Global COE Brand Icons
     
     Created 3/17/2026
     ========================================================================== */

  /*==============================================
  	Three Triangles
  ================================================*/
  .icon-coe-triangles-yellow,
  .icon-coe-triangles-orange {
  	background-image: var(--coe-icon-bg-img);
  	background-size: contain;
  	background-repeat: no-repeat;
  	display: inline-block;
  	width: 60px;
  	height: 14px;
  }

  .icon-coe-triangles-yellow {
  	--coe-icon-bg-img: url("/sites/engineering.oregonstate.edu/files/2026-03/set-of-3-triangles-yellow.svg");
  }

  .icon-coe-triangles-orange {
  	--coe-icon-bg-img: url("/sites/engineering.oregonstate.edu/files/2024-09/set%20of%203%20icons.svg");
  }

  /*==============================================
  	Play
  ================================================*/
  .icon-coe-play-white,
  .icon-coe-play-black,
  .icon-coe-play-luminance {
  	background-image: var(--coe-icon-bg-img);
  	background-size: contain;
  	background-repeat: no-repeat;
  	display: inline-block;
  	width: 15px;
  	height: 24px;
  }

  .icon-coe-play-white {
  	--coe-icon-bg-img: url("/sites/engineering.oregonstate.edu/files/2026-05/play-white.svg");;
  }

  .icon-coe-play-black {
  	--coe-icon-bg-img: url("/sites/engineering.oregonstate.edu/files/2026-05/play-black.svg");;
  }

  .icon-coe-play-luminance {
  	--coe-icon-bg-img: url("/sites/engineering.oregonstate.edu/files/2026-05/play-luminance.svg");;
  }

  /*==============================================
  	Pause
  ================================================*/
  .icon-coe-pause-white,
  .icon-coe-pause-black,
  .icon-coe-pause-luminance {
  	background-image: var(--coe-icon-bg-img);
  	background-size: contain;
  	background-repeat: no-repeat;
  	display: inline-block;
  	width: 13px;
  	height: 18px;
  }

  .icon-coe-pause-white {
  	--coe-icon-bg-img: url("/sites/engineering.oregonstate.edu/files/2026-05/pause-white.svg");;
  }

  .icon-coe-pause-black {
  	--coe-icon-bg-img: url("/sites/engineering.oregonstate.edu/files/2026-05/pause-black.svg");;
  }

  .icon-coe-pause-luminance {
  	--coe-icon-bg-img: url("/sites/engineering.oregonstate.edu/files/2026-05/pause-luminance.svg");;
  }

  /*==============================================================================
  	Looping Animated Ticker
  	============================================================================*/	
  div:has(> .container > .layout .animated-ticker) { /* Selecting the full-width section div */
  	overflow-x: clip;
  }

  .animated-ticker {
  	/* Ticker settings */
  	--ticker-padding: 15px 0;
  	--ticker-animation-time: 60s;
  	--ticker-image-width: 300px;
  	--ticker-image-height: 120px;
  	--ticker-image-min-margin: 60px;
  	--ticker-image-count: 13;

  	width: 100%;
  	margin-left: calc(50% - 50vw);
  	margin-right: calc(50% - 50vw);
  }

  .animated-ticker-content {
  	display: flex;
  	align-items: center;
  	width: max-content;
  	height: auto;
  	padding: var(--ticker-padding);
  	animation: animated-ticker-scroll var(--ticker-animation-time) linear infinite;
  }

  .animated-ticker-content img {
  	object-fit: contain;
  	width: var(--ticker-image-width);
  	height: var(--ticker-image-height);
  	margin: 0 max(var(--ticker-image-min-margin), calc((100vw / var(--ticker-image-count) / 2) - (var(--ticker-image-width) / 2))); /* Ensures images are evenly spread out */
  }

  .animated-ticker-button {
  	/* Default */
  	--bs-btn-bg: rgb(255, 255, 255, 0);
  	--bs-btn-active-border-color: #000;
  	--bs-btn-color: #000;
  	/* Hover/Focus */
  	--bs-btn-hover-bg: #000;
  	--bs-btn-active-border-color: #000;
  	--bs-btn-hover-color: #fff;
  	/* Active */
  	--bs-btn-active-bg: #212529;
  	--bs-btn-active-border-color: #212529;
  	--bs-btn-active-color: #FFFFFF;

  	display: flex;
  	justify-content: center;
  	align-items: center;

  	position: absolute;
  	bottom: -40px;
  	right: 20px;

  	height: 40px;
  	width: 40px;

  	padding: 0;
  	border: 2px solid #000;
  	
  	transition: 0.3s ease;
  }

  @keyframes animated-ticker-scroll {
  	0% {
  		transform: translateX(0);
  	}
  	100% {
  		transform: translateX(-50%);
  	}
  }

  @media (prefers-reduced-motion: reduce) {
  	.animated-ticker-content {
  		animation-play-state: paused;
  	}
  }

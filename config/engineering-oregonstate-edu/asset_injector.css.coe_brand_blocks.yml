  /*================================================================================================================================================================
  	SECTION: RSVP Block Styling
  	
  	PURPOSE: Configurations of various RSVP block options
  	==============================================================================================================================================================*/

  .block--type-rsvp-menu h2 {
  	padding-top: 20px;
  	border-top: 6px solid #D73F09;
  	margin-bottom: 30px;
  }

  .block-field-blockblock-contentrsvp-menufield-rsvp-primary-link {
  	margin-top: 30px;
  }

  .field--name-field-rsvp-date {
  	font-weight: 700;
  }

  .field--name-field-rsvp-information{
  	padding-bottom: 10px;
  }

  .block--type-rsvp-menu a {
  	text-align: center;
  	font-family: "Open Sans";
  	font-size: 18px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: normal;
  	letter-spacing: 0.9px;
  	text-transform: uppercase;
  	padding: 17px 10px;
  	transition: 0.3s;
  	display: block;
  	margin-top: 20px !important;
  	display: flex;
  	justify-content: center;
  	align-items: center;
  	width: 100%;
  }

  .field--name-field-rsvp-primary-link a {
  	background-color: #D73F09;
  	color: #FFF;
  	border: 2px solid #D73F09;
  }

  .field--name-field-rsvp-primary-link a:hover, .field--name-field-rsvp-primary-link a:focus {
  	background-color: inherit;
  	color: #D73F09;
  	border-bottom: 2px solid #D73F09; /* cancel out main a styling */
  }

  .field--name-field-rsvp-primary-link a:active {
  	background-color: inherit !important;
  	color: #BE3706 !important;
  	border: 2px solid #BE3706;
  }

  .field--name-field-rsvp-primary-link span {
  	width: 100%;
  	background-color: #ECEDEE;
  	text-align: center;
  	padding: 18px;
  	display: block;
  	color: var(--Primary-Paddletail-Black, #000);
  	font-family: "Open Sans";
  	font-size: 18px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: normal;
  	letter-spacing: 0.9px;
  	text-transform: uppercase;
  }

  @media screen and (max-width: 991px) and (min-width: 768px) {
  	.field--name-field-rsvp-primary-link span {
  		width: 50%;
  	}
  }

  .field--name-field-rsvp-secondary-link a {
  	background-color: inherit;
  	color: #000;
  	border: 2px solid #000;
  }

  .field--name-field-rsvp-secondary-link a:hover, .field--name-field-rsvp-secondary-link a:focus {
  	background-color: #000;
  	color: #FFF;
  	border-bottom: 2px solid #000; /* cancel out main a styling */
  }

  .field--name-field-rsvp-secondary-link a:active {
  	background-color: #212529 !important;
  	color: #FFF !important;
  	border: 2px solid #212529 !important;
  	color: var(--Primary-Paddletail-Black, #000);
  	text-align: center;
  	font-family: "Open Sans";
  	font-size: 18px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: normal;
  	letter-spacing: 0.9px;
  	text-transform: uppercase;
  	display: block;
  }

  @media screen and (max-width: 1199px) and (min-width: 768px) {
  	.block--type-rsvp-menu a {
  		width: max-content;

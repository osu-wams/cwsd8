  /*================================================================================================================================================================
  	SECTION: Resource Grids
  	
  	Purpose: Grid for resource cards with title, body, and an arrow link
  ==============================================================================================================================================================*/

  /* Resource Grid */
  .field--name-field-resources-grid-sections {
  	display: flex;
  	column-gap: 20px;
  	flex-wrap: wrap;
  	align-items: stretch;
  }

  /* Card Container */
  .field--name-field-resources-grid-sections > .field__item {
  	margin-bottom: 1rem;
  	width: calc(50% - 10px);
  }

  @media screen and (max-width: 1199px) {
  	.field--name-field-resources-grid-sections > .field__item {
  		width: 100%;
  	}
  }

  /* Card */
  .field--name-field-resources-grid-sections .paragraph--type--coe-text-with-links {
  	background-color: white;
  	border: 3px solid #d73f09;
  	border-radius: 5px;
  	box-shadow: 2px 4px 4px rgba(0, 0, 0, 0.12);
  	width: 100%;
  	height: 100%;
  	padding: 25px;
  	display: flex;
  	flex-direction: column;
  	position: relative;
  	transition: background-color 0.4s ease-in-out, color 0.4s ease-in-out;
  }

  /* Card - hover and focus */
  .field--name-field-resources-grid-sections .paragraph--type--coe-text-with-links:hover,
  .field--name-field-resources-grid-sections .paragraph--type--coe-text-with-links:focus-within {
  	background-color: #d73f09;
  	color: white;
  	box-shadow: none;
  }

  /* Title */
  .field--name-field-resources-grid-sections .field--name-field-coe-text-with-link h4 {
  	font-family: Stratum2Web;
  	font-size: 24px;
  	font-weight: 900;
  	letter-spacing: 1px;
  	margin-bottom: 20px;
  	transition: color 0.4s ease-in-out;
  }

  /* Title - hover and focus */
  .field--name-field-resources-grid-sections .paragraph--type--coe-text-with-links:hover .field--name-field-coe-text-with-link h4,
  .field--name-field-resources-grid-sections .paragraph--type--coe-text-with-links:focus-within .field--name-field-coe-text-with-link h4 {
  	color: white;
  }

  /* Body spacing (gap between body and link) */
  .field--name-field-resources-grid-sections .field--name-field-coe-text-w-link-text {
  	margin-bottom: 30px;
  }

  /* Link spacing (push to bottom) */
  .field--name-field-resources-grid-sections .field--name-field-coe-text-w-link-link {
  	margin-top: auto;

id: coe_brand_blocks
label: 'COE Brand Blocks'
code: |-
  /*
  ==================================================================================================================================================================
  ==================================================================================================================================================================
  	--COE Blocks--
  	
  	Block component styling. Created 10/15/2025.
  ==================================================================================================================================================================
  ==================================================================================================================================================================
  */

  /*================================================================================================================================================================
  	SECTION: Quote Block Styling
  	
  	PURPOSE: Configurations of various quote block options
  	==============================================================================================================================================================*/

  /* Hide style selector list from display */
  .block--type-quote-block .field--name-field-coe-bl-quote-styling {
  	display: none;
  }

  /* Quote spacing */
  .block--type-quote-block {
  	margin-top: 50px;
    margin-bottom: 50px;
    padding: 70px;
  }

  /* Quotation typography */
  .block--type-quote-block .field--name-field-coe-bl-quote-quotation {
    font-style: italic;
    font-weight: 600;
    line-height: 150%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Quotation Author Name typography */
  .block--type-quote-block .field--name-field-coe-bl-attribution-name {
    font-size: 18px;
    font-style: normal;
    font-weight: 700;
    line-height: 160%;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    display: inline;
  }

  /******************
  The following blocks set the correct border and background color for the styling options
  ******************/
  .block--type-quote-block:has( .coe-bl-quote-star-canvas) {
  	border: 3px solid #003B5C;
  	background-color: #003B5C;
  }

  .block--type-quote-block:has( .coe-bl-quote-beaver-orange) {
  	border: 3px solid #D73F09;
  	background-color: #FFF;
  }

  .block--type-quote-block:has( .coe-bl-quote-high-tide) {
  	border: 3px solid #00859B;
  	background-color: #FFF;
  }

  /******************
  The following blocks set the correct font-size, spacing, and text color of the quotation text
  ******************/
  .block--type-quote-block:has( .coe-bl-quote-star-canvas) .field--name-field-coe-bl-quote-quotation {
    color: #FFF;
  }

  .block--type-quote-block:has( .coe-bl-quote-beaver-orange) .field--name-field-coe-bl-quote-quotation,
  .block--type-quote-block:has( .coe-bl-quote-high-tide) .field--name-field-coe-bl-quote-quotation {
    color: #000;
  }

  .block--type-quote-block .field--name-field-coe-bl-quote-quotation {
    font-size: 32px;
    margin-bottom: 30px;  
  }

  /******************
  The following blocks set varios quote icon colors, icon spacing, and quote author colors
  ******************/
  .block--type-quote-block:has( .coe-bl-quote-star-canvas) .field--name-field-coe-bl-quote-quotation::before {
    content: url("/sites/engineering.oregonstate.edu/files/2024-11/quote-icon.svg");
  }

  .block--type-quote-block:has( .coe-bl-quote-beaver-orange) .field--name-field-coe-bl-quote-quotation::before {
    content: url("/sites/engineering.oregonstate.edu/files/2025-02/quote_icon.svg");
  }

  .block--type-quote-block:has( .coe-bl-quote-high-tide) .field--name-field-coe-bl-quote-quotation::before {
    content: url("/sites/engineering.oregonstate.edu/files/2025-10/quote-icon.svg");
  }

  .block--type-quote-block .field--name-field-coe-bl-quote-quotation::before {
  	text-align: right;
  	margin-top: -95px;
  	margin-right: -35px;
  }

  .block--type-quote-block:has( .coe-bl-quote-star-canvas) .field--name-field-coe-bl-attribution-name {
    color: #FFB500;
  }

  .block--type-quote-block:has( .coe-bl-quote-beaver-orange) .field--name-field-coe-bl-attribution-name {
    color: #D73F09;
  }

  .block--type-quote-block:has( .coe-bl-quote-high-tide) .field--name-field-coe-bl-attribution-name {
    color: #00859B;
  }

  /* Star Canvas quote background needs white description text */
  .block--type-quote-block:has( .coe-bl-quote-star-canvas) .field--name-field-coe-bl-attribution-desc {
    color: #FFF;
  }

  /* Line up name and description fields */
  .block--type-quote-block .field--name-field-coe-bl-attribution-desc,
  .block--type-quote-block .field--name-field-coe-bl-attribution-desc p {
     display: inline;
  } 

  /* Add a comma between name and description */
  .block--type-quote-block .field--name-field-coe-bl-attribution-name::after {
      content: ', ';
  }

  @media screen and (max-width: 991px) {
  	.block--type-quote-block .field--name-field-coe-bl-quote-quotation {
      gap: 0;
      font-size: 24px;
    }
  }

  @media screen and (max-width: 767px) {
  	/* Mobile quote spacing */
    .block--type-quote-block {
        padding: 0px 30px 50px 30px;
    }
    /* Smaller quotation text */
    .block--type-quote-block .field--name-field-coe-bl-quote-quotation {
        gap: 0;
        font-size: 24px;
    }
    /* Smaller quote icon */
    .block--type-quote-block .field--name-field-coe-bl-quote-quotation::before {
        margin-top: -30px;
        margin-right: -50px;
        transform: scale(0.83);
    }
  }

  /*================================================================================================================================================================
  	SECTION: Quote Block with Borders Styling
  	
  	PURPOSE: Configurations of various quote block options
  	==============================================================================================================================================================*/

  .block--type-image-quote-block .field--name-field-coe-bl-quote-styling {
  	    display: none;
  	} 

  	/* Quote spacing */
  	.block--type-image-quote-block {
  	    margin-top: 50px;
  	    margin-bottom: 50px;
  	    padding: 70px;
  	    position: relative;   /* Quote icon positioning depends on this */
  	}
  	
  	.block--type-image-quote-block .block__content {
  		position: relative;
  	}
  	
  	/* Target the attribution div to ensure it doesn't span full width */
  	.block--type-image-quote-block .block__content .quote-attribution {
  		max-width: 580px;
  	}
  	
  	
  	/****************************************
  		Quote Corner Decorations
  	****************************************/
  	
  	/* Top left - vertical bar */ 
  	.block--type-image-quote-block::before {
  	    content: "";
  		  background: #B8DDE1;
  		  position: absolute;
  		  height: 125px;
  		  width: 40px;
  		  top: -32px;
    		left: -22px;
  		  transform: scale(75%);
  	} 
  	
  	/* Top left - horizontal bar */
  	.block--type-image-quote-block::after {
  	    content: "";
  		  background: #B8DDE1;
  		  position: absolute;
  		  height: 40px;
  		  width: 125px;
  		  top: -23px;
    		left: -33px;
  		  transform: scale(75%);
  	} 
  	
  		/* Bottom right - vertical bar */ 
  	.block--type-image-quote-block .block__content::before {
  	    content: "";
  		  background: #B8DDE1;
  		  position: absolute;
  		  height: 125px;
  		  width: 40px;
  			bottom: -104px;
  		  right: -93px;
  		  transform: scale(75%);
  	} 
  	
  	/* Bottom right - horizontal bar */
  	.block--type-image-quote-block .block__content::after {
  	    content: "";
  		  background: #B8DDE1;
  		  position: absolute;
  		  height: 40px;
  		  width: 125px;
  		  bottom: -93px;
    		right: -104px;
  		  transform: scale(75%);
  	} 
  	


  	/* Quotation typography */
  	.block--type-image-quote-block .field--name-field-coe-bl-quote-quotation {
  	    font-style: italic;
  	    font-weight: 600;
  	    line-height: 150%;
  	    display: flex;
  	    flex-direction: column;
  	    gap: 10px;
  	    position: relative;
  	} 

  	/* Quotation Author Name typography */
  	.block--type-image-quote-block .field--name-field-coe-bl-attribution-name {
  	    font-size: 18px;
  	    font-style: normal;
  	    font-weight: 700;
  	    line-height: 160%;
  	    letter-spacing: 0.9px;
  	    text-transform: uppercase;
  	    display: inline;
  	} 

  	/****************** 
  	 The following blocks set the correct border and background color for the styling options
  	 ******************/
  	.block--type-image-quote-block:has(.coe-bl-quote-star-canvas) {
  	    border: 3px solid #003b5c;
  	    background-color: #003b5c;
  	}
  	
  	.block--type-image-quote-block:has(.coe-bl-quote-beaver-orange) {
  	    border: 3px solid #d73f09;
  	    background-color: #fff;
  	}
  	
  	.block--type-image-quote-block:has(.coe-bl-quote-high-tide) {
  	    border: 3px solid #00859b;
  	    background-color: #fff;
  	} 
  	
  	/****************** 
  		The following blocks set the correct font-size, spacing, and text color of the quotation text 
  	******************/
  	
  	.block--type-image-quote-block:has(.coe-bl-quote-star-canvas)
  	    .field--name-field-coe-bl-quote-quotation {
  	    color: #fff;
  	}
  	
  	.block--type-image-quote-block:has(.coe-bl-quote-beaver-orange)
  	    .field--name-field-coe-bl-quote-quotation,
  	.block--type-image-quote-block:has(.coe-bl-quote-high-tide)
  	    .field--name-field-coe-bl-quote-quotation {
  	    color: #000;
  	}
  	
  	.block--type-image-quote-block .field--name-field-coe-bl-quote-quotation {
  	    font-size: 32px;
  	    margin-bottom: 30px;
  	} 
  	
  	/****************** 
  		The following blocks set varios quote icon colors, icon spacing, and quote author colors 
  	******************/
  	.block--type-image-quote-block:has(.coe-bl-quote-star-canvas)
  	    .field--name-field-coe-bl-quote-quotation::before {
  	    content: url("/sites/engineering.oregonstate.edu/files/2024-11/quote-icon.svg");
  	}
  	
  	.block--type-image-quote-block:has(.coe-bl-quote-beaver-orange)
  	    .field--name-field-coe-bl-quote-quotation::before {
  	    content: url("/sites/engineering.oregonstate.edu/files/2025-02/quote_icon.svg");
  	}
  	
  	.block--type-image-quote-block:has(.coe-bl-quote-high-tide)
  	    .field--name-field-coe-bl-quote-quotation::before {
  	    content: url("/sites/engineering.oregonstate.edu/files/2025-10/quote-icon.svg");
  	}
  	
  	.block--type-image-quote-block
  	    .field--name-field-coe-bl-quote-quotation::before {
  	    position: absolute;   /* This relies on parent div being position: relative to ensure quote icon can lay on top */
  		  top: -90px;
    		right: -275px;	
    		transform: scale(130%);
  	}
  	
  	.block--type-image-quote-block:has(.coe-bl-quote-star-canvas)
  	    .field--name-field-coe-bl-attribution-name {
  	    color: #ffb500;
  	}
  	
  	.block--type-image-quote-block:has(.coe-bl-quote-beaver-orange)
  	    .field--name-field-coe-bl-attribution-name {
  	    color: #d73f09;
  	}
  	
  	.block--type-image-quote-block:has(.coe-bl-quote-high-tide)
  	    .field--name-field-coe-bl-attribution-name {
  	    color: #00859b;
  	}
  	
  	/* Star Canvas quote background needs white description text */
  	.block--type-image-quote-block:has(.coe-bl-quote-star-canvas)
  	    .field--name-field-coe-bl-attribution-desc {
  	    color: #fff;
  	} 
  	
  	/* Line up name and description fields */
  	.block--type-image-quote-block .field--name-field-coe-bl-attribution-desc,
  	.block--type-image-quote-block .field--name-field-coe-bl-attribution-desc p {
  	    display: inline;
  	} 
  	
  	/* Add a comma between name and description */
  	.block--type-image-quote-block
  	    .field--name-field-coe-bl-attribution-name::after {
  	    content: ", ";
  	}
  	
  	/************************************ 
  		Image 
  	***********************************/
  	/* Shift the image down slightly so its not right up against quote marks */
  	.field--name-field-coe-bl-quote-image .field--name-field-media-image .field__item {
  		padding-top: 20px;
  	}

  	.block--type-image-quote-block .field--name-field-coe-bl-quote-image img {
  		width: 240px;
  		height: 240px;
  		border-radius: 50%;
  	}
  	
  	/* Ensure image is anchored to bottom of block */
  	.block--type-image-quote-block .block__content .field--name-field-coe-bl-quote-image {
  		display: flex;
  		align-items: flex-end;
  	}

  	.block--type-image-quote-block .block__content {
  		display: flex;
  		flex-wrap: wrap;
  		justify-content: space-between;
  	}
  	
  	
  	.block--type-image-quote-block .block__content .field--name-field-coe-bl-quote-image {
  		width: 240px;
  	}
  	
  	.block--type-image-quote-block .block__content .img-quote-body {
  		width: calc(100% - 260px);
  	}
  	
  	/************************************* 
  		Arrow Link 
  	************************************/
  	
  	.block--type-image-quote-block .field--name-field-coe-bl-arrow-link a {
  	    font-family: Stratum2Web;
  	    font-size: 20px;
  	    font-style: normal;
  	    font-weight: 500;
  	    line-height: normal;
  	    letter-spacing: 1px;
  	    text-transform: uppercase;
  	    color: #ffb500; /* Yellow default*/
  	    text-decoration: none !important;
  	    background-image: url("/sites/engineering.oregonstate.edu/files/2025-02/arrow-right-yellow.svg"); /* Yellow Default */
  	    background-position: 100%;
  	    background-repeat: no-repeat;
  	    background-size: 20px;
  	    padding-right: 25px;
  	    margin-right: 10px;
  	    transition: 0.2s ease;
  	    border-bottom: none;
  	} 
  	
  	.block--type-image-quote-block .field--name-field-coe-bl-arrow-link {
  		margin-top: 30px;
  	}
  	
  	/* Arrow link hover state */
  	.block--type-image-quote-block .field--name-field-coe-bl-arrow-link a:hover {
  	    padding-right: 35px;
  	    margin-right: 0px;
  	    border-bottom: none;
  	} 
  	
  	/* Yellow arrow active/focus state */
  	.block--type-image-quote-block .field--name-field-coe-bl-arrow-link a:active,
  	.block--type-image-quote-block .field--name-field-coe-bl-arrow-link a:focus {
  	    background-color: transparent !important;
  	    color: #d3832b !important;
  	    padding-right: 35px !important;
  	    border-bottom: none !important;
  	}


    /************************************************
    	Media Queries
    ************************************************/	
  	@media screen and (max-width: 991px) {
  	
  		.block--type-image-quote-block {
          padding: 70px 50px 50px 50px;
      } 
      
      /* Shrink font size */
      .block--type-image-quote-block .field--name-field-coe-bl-quote-quotation {
          font-size: 24px;
      }
      
      /* Update content to stack vertically */
      .block--type-image-quote-block .block__content {
      	display: flex;
      	flex-direction: column;
      	width: fit-content;
      	align-items: flex-start;
      }
      
      /* Ensure the text fields now take up the available width */
      .block--type-image-quote-block .block__content .img-quote-body {
  		width: 100%;
  	}
  	
  	.block--type-image-quote-block .block__content .field--name-field-coe-bl-quote-image {
  		width: 100%;
  		display: flex;
  		justify-content: flex-end;
  	} 
  	
  	/* Ensure positioning of quote icon */
  	.block--type-image-quote-block
      .field--name-field-coe-bl-quote-quotation::before {
      position: absolute;   
  	  top: -95px;
  		right: -10px;	
  		transform: scale(100%);
  	}
  	
  	/* Smaller corner decorations */
    /* Top left - vertical bar */ 
  	.block--type-image-quote-block::before {
  	    content: "";
  		  background: #B8DDE1;
  		  position: absolute;
  		  height: 125px;
  		  width: 40px;
  		  top: -40px;
      	left: -23px;
  		  transform: scale(60%);
  	} 
  	
  	/* Top left - horizontal bar */
  	.block--type-image-quote-block::after {
  	    content: "";
  		  background: #B8DDE1;
  		  position: absolute;
  		  height: 40px;
  		  width: 125px;
  			top: -23px;
  	    left: -40px;
  		  transform: scale(60%);
  	} 
  	
  		.block--type-image-quote-block .block__content::before {
  	    content: "";
  		  background: #B8DDE1;
  		  position: absolute;
  		  height: 125px;
  		  width: 40px;
  		  bottom: -90px;
      	right: -73px;
  	    transform: scale(60%);
  	} 
  	
  	/* Bottom right - horizontal bar */
  	.block--type-image-quote-block .block__content::after {
  	    content: "";
  		  background: #B8DDE1;
  		  position: absolute;
  		  height: 40px;
  		  width: 125px;
  		  bottom: -73px;
      	right: -90px;
  	    transform: scale(60%);
  	} 
  }
  	
  	@media screen and (max-width: 767px) {
  	/* Remove excess padding from wider viewport settings */
  	.field--name-field-coe-bl-quote-image .field--name-field-media-image .field__item {
  		padding-top: 0px;
  	}
  	
  	  .block--type-image-quote-block {
        padding: 70px 30px 50px 30px;
    }
  		
    /* Smaller quote icon and updated positioning*/
    .block--type-image-quote-block
        .field--name-field-coe-bl-quote-quotation::before {
        transform: scale(0.83);
        position: absolute;
        right: -25px;
        top: -100px;
    }

    /* Smaller corner decorations */
    /* Top left - vertical bar */ 
  	.block--type-image-quote-block::before {
  	    content: "";
  		  background: #B8DDE1;
  		  position: absolute;
  		  height: 125px;
  		  width: 40px;
  			top: -41px;
  	    left: -23px;
  		  transform: scale(50%);
  	} 
  	
  	/* Top left - horizontal bar */
  	.block--type-image-quote-block::after {
  	    content: "";
  		  background: #B8DDE1;
  		  position: absolute;
  		  height: 40px;
  		  width: 125px;
  			top: -23px;
  	    left: -44px;
  		  transform: scale(50%);
  	} 
  	
  		.block--type-image-quote-block .block__content::before {
  	    content: "";
  		  background: #B8DDE1;
  		  position: absolute;
  		  height: 125px;
  		  width: 40px;
  		  bottom: -91px;
      	right: -53px;
  	    transform: scale(50%);
  	} 
  	
  	/* Bottom right - horizontal bar */
  	.block--type-image-quote-block .block__content::after {
  	    content: "";
  		  background: #B8DDE1;
  		  position: absolute;
  		  height: 40px;
  		  width: 125px;
  			bottom: -73px;
  	    right: -74px;
  	    transform: scale(50%);
  	} 
  	
  		
  	.block--type-image-quote-block .block__content .field--name-field-coe-bl-quote-image {
  		width: 100%;
  		display: flex;
  		justify-content: center;
  		margin-top: 50px;
  	} 
  	

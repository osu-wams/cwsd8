id: event_cards
label: 'Event cards (on all events pages, horizontal events cards)'
code: |
  /*  ================================================
  Event cards. Applied on all pages with the event cards
   ================================================ */

  /* Gets card to be horizontal with image to the left */

  .card {
    flex-direction: row;
  }

  .card img{
  	min-width: 210px;
  	max-width: 210px;
  	height: 210px;
  	padding: 7px;
  	float: left;
  	object-fit: cover;
  	
  }

  .event-card-body{
  	padding: 30px;
  }

  @media screen and (max-width: 605px) {
    .card img{
    	display: none;
    
    }
  }

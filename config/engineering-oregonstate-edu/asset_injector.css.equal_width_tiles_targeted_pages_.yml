id: equal_width_tiles_targeted_pages_
label: 'Equal height tiles (targeted pages)'
code: |-
  /** Equal heights on some of the card rows **/


  .row .block-inline-blockengineering-card,
  .row .block-inline-blockengineering-card .block__content,
  .row .block-inline-blockengineering-card .block__content > div:first-child{
  	height: 97%;
  } 

  /** These are nested inside and we cannot control row height, so we're accounting for 2 lines instead to minimize impact**/ 

  .row .block-inline-blockengineering-card .field--name-field-osu-card-link {
  	height: 45px;
  }

  .h5 {
      font-size: 20px !important;
  }

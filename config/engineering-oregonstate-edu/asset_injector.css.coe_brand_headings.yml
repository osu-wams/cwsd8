id: coe_brand_headings
label: 'Default (old) Headings'
code: |-
  /*================================================================================================================================================================
  	PURPOSE: Similar to the optional heading classes from COE Brand Typography for use on older pages (matching the styling of the old pages)
  	==============================================================================================================================================================*/

  :root {
  	--Primary-Beaver-Orange: #D73F09;
  }

  /* Main/H1 */
  .old-h1 {
  	color: var(--Primary-Beaver-Orange, #D73F09);
  	font-family: Stratum2Web;
  	font-size: 48px;
  	font-style: normal;
  	font-weight: 500;
  	line-height: 120%;
  	text-transform: none;
  }

  /* Main/H2 */
  .old-h2 {
  	color: var(--bs-heading-color);
  	font-family: Stratum2Web;
  	font-size: 36px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: 120%;
  	text-transform: none;
  }

  /* Main/H3 */
  .old-h3 {
  	color: var(--Primary-Beaver-Orange, #D73F09);
  	font-family: "Open Sans";
  	font-size: 28px;
  	font-style: normal;
  	font-weight: 500;
  	line-height: 120%;
  	text-transform: none;
  }

  /* Main/H4 */
  .old-h4 {
  	color: var(--bs-heading-color);
  	font-family: "Open Sans";
  	font-size: 26px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: 120%;
  	text-transform: none;
  }

  /* Main/H5 */
  .old-h5 {
  	color: var(--Primary-Beaver-Orange, #D73F09);
  	font-family: "Open Sans";
  	font-size: 24px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: 120%;
  	text-transform: none;
  }

  /* Main/H6 */
  .old-h6 {
  	color: var(--bs-heading-color);
  	font-family: "Open Sans";
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: 120%;
  	text-transform: none;
  }

  @media screen and (max-width: 1199px) {
  	.old-h1 {
  		font-size: calc(1.425rem + 2.1vw);
  	}
  	.old-h2 {
  		font-size: calc(1.35rem + 1.2vw);
  	}
  	.old-h3 {
  		font-size: calc(1.3rem + 0.6vw);
  	}
  	.old-h4 {
  		font-size: calc(1.2875rem + 0.45vw);
  	}
  	.old-h5 {
  		font-size: calc(1.275rem + 0.3vw);
  	}
  }
media: all
preprocess: true

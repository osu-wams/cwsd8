id: lucy_event_cards_design
label: 'Event card styling (card, text, date)'
code: |-
  /*===================================
  Event Card V2 Styling
  ===================================*/


  /* Set border and shadow effect */
  .new-events-cards{
  	box-shadow: 2px 4px 8px 0px rgba(0, 0, 0, 0.08);
  	border-radius: 5px;
  	border-top-color: #D73F09 !important;
  	border-top: 10px !important;
  }

  /* Typography for date element of event card */
  .event-date{
  	color: var(--Primary-Paddletail-Black, #000);
  	font-family: "Open Sans" !important;
  	font-size: 14px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: normal;
  	letter-spacing: 0.7px;
  	text-transform: uppercase;
  }

  /* Typography for event title element*/
  .event-title{
  	color: #D73F09 !important;

  	/* Main/H6 */
  	font-family: "Open Sans";
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: 130%; /* 26px */
  }

  /* Typography for event location element */
  .event-location{
  	color: #212529 !important;
  	font-family: "Open Sans" !important;
  	font-size: 14px !important;
  	font-style: normal;
  	font-weight: 600 !important;
  	line-height: normal;
  	letter-spacing: 0.7px;
  	text-transform: uppercase;
  }

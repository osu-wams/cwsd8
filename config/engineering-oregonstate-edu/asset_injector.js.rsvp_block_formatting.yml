id: rsvp_block_formatting
label: 'RSVP Block Formatting'
code: |
  document.addEventListener('DOMContentLoaded', function(){
    const block = document.querySelector('.block--type-rsvp-block');
    if (!block) return;
    
    const anchor = block.querySelector('a');
    if (!anchor) return; 
    
    const href = anchor.getAttribute('href');
    
    anchor.className = 'btn osu-btn-primary rsvp-button';
    
    if (!href || href.trim() === '') {
      anchor.classList.add('rsvp-button--disabled');
      anchor.removeAttribute('href');     
    }
  });

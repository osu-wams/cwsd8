id: mobile_remove_background_image
label: 'Mobile remove background image'
code: |-
  // Wait for the document to be fully loaded
  document.addEventListener('DOMContentLoaded', function() {
  	if (window.matchMedia("(max-width: 605px)").matches) {
      // Find all elements with class .m-no-background
      var containers = document.querySelectorAll('.m-no-background');

      containers.forEach(function(c) {
      	c.style.removeProperty("background-image");
      });
  	}
  });

id: engineering_next
label: 'Engineering next page styling (headers, background color, font size media query)'
code: |
  /* ================================================
  Header and background styling specificially for the engineering next page.
  ================================================ */


  .blue-bg {
  	background: #003B5C !important;
  }


  /*H1 Styling*/

  h1{
  	color: #FFF !important;

  	/* H1 */
  	font-family: Stratum2web;
  	font-size: 96px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 96%; /* 92.16px */
  }


  @media only screen and (max-width: 600px) {
    h1 {
      font-size: 56px !important;

    }
  }


  @media only screen and (max-width: 600px) {
    h2 {
      font-size: 44px !important;

    }
  }


  /*H2 Styling*/
  h2{

  	font-family: Stratum2web;
  	font-size: 64px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 83.2px */
  }


  /*H3 Styling*/
  h3{
  	color: #D73F09;

  	/* H3 */
  	font-family: Stratum2web;
  	font-size: 36px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 46.8px */
  }

  /*H4 Styling*/
  h4{
  	color: #212529 !important;

  	/* H4 */
  	font-family: "Open Sans";
  	font-size: 22px;
  	font-style: normal;
  	font-weight: 700;
  	line-height: 130%; /* 28.6px */
  	letter-spacing: 1.1px;
  	text-transform: uppercase;
  }

  /*H5 styling*/
  h5{
  	color: #212529 !important;

  	/* H5 */
  	font-family: "Open Sans";
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: 130%; /* 26px */
  }

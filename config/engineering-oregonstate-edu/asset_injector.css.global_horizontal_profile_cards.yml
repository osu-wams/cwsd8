id: global_horizontal_profile_cards
label: 'GLOBAL horizontal profile cards (horizontal profile cards view styling )'
code: |+
  /*================================================
  Styling for horizontal profile cards 
  ================================================== */

  /* Clamp text to not overflow */

  .osu-line-clamp-2 {
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;  
  	display: -webkit-box;
    overflow: hidden;
  }

  /* Hide short bio unless larger screen */

  .profile-item--short-bio {
  	display: none;
  }

  @media screen and (min-width: 768px) {
  	.profile-item--short-bio {
  		display: -webkit-box;
  	}
  }

  /* Set profile img size */

  .profile-img--horizontal img {
  	max-width: 125px !important;
  }

  .node--view-mode-research-profiles h2 {
  	display: none !important;
  }

  /* Override img and card size for desktop */

  @media screen and (min-width: 1180px) {
  	.profile-img--horizontal img {
  		max-width: 200px !important;
    }
  	.horizontal-card-height{
  		height: 175px;
  		width: 620px;
  	}
  }

  @media screen and (max-width: 480px) {
  		.profile-img--horizontal img {
  		max-width: 200px !important;
  		height: 175px;
    }
  }

  /* Phone margin customization */
  .phone-margin{
  	margin-top: -15px;
  }

  @media screen and (max-width: 675px) {
  	.phone-margin {
  		margin-top: -15px;
  	}
  }

  /* Profile cards customizations*/
  .research-page-profile-cards{
  	float: left;
  	margin-right: 19px;
  	width: 312px;
  	min-height: 320px;
  }

  .research-horizontal-image-cards img{
  	width: 262px;
  	height: 229px;
  	
  }

  .views-bootstrap-engr-profile-block-7{
  	margin-bottom: 5px;
  }

  .more-link {
    margin: 7px;
    font-weight: bold;
  }

media: all

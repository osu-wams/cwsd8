id: collapsable_card_test
label: 'Collapsable Cards'
code: |-
  document.addEventListener('DOMContentLoaded', function () {
    const labels = document.querySelectorAll('.collapsible-card .card-label');
    labels.forEach(function(label) {
      label.addEventListener('click', function () {
        const card = this.closest('.collapsible-card');
        card.classList.toggle('collapsed');
        // const intro = card.querySelector('.card-intro');
        // const body = card.querySelector('.card-body');
        // if (card.classList.contains('collapsed')) {
        // 	intro.style.height = "calc(100% - 80px)";
        // } else {
        // 	intro.style.height = `calc(100% - ${body.scrollHeight + 80}px)`;
        // }
      });
    });
    if (window.screen.width >= 992) {
  		let largestCard = [];
  	  const cards = document.querySelectorAll('.collapsible-card');
  	  cards.forEach((card, ind) => {
  	  	const intro = card.querySelector('.card-intro');
  	  	if (ind % 2 === 0) {
  	  		largestCard.push(intro.scrollHeight);
  	  	} else {
  	  		largestCard[Math.floor(ind / 2)] = largestCard[Math.floor(ind / 2)] > intro.scrollHeight ? largestCard[Math.floor(ind / 2)] : intro.scrollHeight;
  	  	}
  	  })
  	  cards.forEach((card, ind) => {
  	  	const intro = card.querySelector('.card-intro');
  	  	intro.style.height = `${largestCard[Math.floor(ind / 2)]}px`;
  	  });
    }
  });


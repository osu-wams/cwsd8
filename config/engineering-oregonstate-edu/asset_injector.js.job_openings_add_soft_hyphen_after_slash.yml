id: job_openings_add_soft_hyphen_after_slash
label: 'Job Openings add space after slash'
code: |-
  Array.from(document.getElementsByClassName("job-posting-card")).forEach((card) => {
  	const header = card.querySelector('h4');
  	const searchStrLen = header.textContent.length;
    let startIndex = 0, index;
    const indices = [];
    while ((index = header.textContent.indexOf('/', startIndex)) > -1) {
      indices.push(index);
      startIndex = index + searchStrLen;
    }
    let text = header.textContent;
    console.log(indices);
    indices.forEach((i, ind) => {
    	text = [text.slice(0, i + ind), "\u{00AD}", text.slice(i + ind)].join('');
    });
    header.textContent = text;
  });

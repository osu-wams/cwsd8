  request_for_information:
    '#type': webform_section
    '#title': 'Request For Information'
    '#description': |-
      <div class="form_question form_p form_question_88e6205a-69c7-ed15-e8ff-5980071a841b form_layout_stacked" data-id="88e6205a-69c7-ed15-e8ff-5980071a841b" data-type="p" id="form_question_88e6205a-69c7-ed15-e8ff-5980071a841b" style="padding:0px; text-align:start; margin-bottom:16px"><span style="font-size:18px"><span style="position:relative"><span style="box-sizing:border-box"><span style="color:#252525"><span style="font-family:&quot;Open sans&quot;,sans-serif"><span style="font-style:normal"><span style="font-variant-ligatures:normal"><span style="font-weight:400"><span style="white-space:normal"><span style="background-color:#ffffff"><span style="text-decoration-thickness:initial"><span style="text-decoration-style:initial"><span style="text-decoration-color:initial"><span style="clear:left"></span></span></span></span></span></span></span></span></span></span></span></span></span></span>
      <div class="form_label"><span style="font-size:18px"><span style="position:relative"><span style="box-sizing:border-box"><span style="color:#252525"><span style="font-family:&quot;Open sans&quot;,sans-serif"><span style="font-style:normal"><span style="font-variant-ligatures:normal"><span style="font-weight:400"><span style="white-space:normal"><span style="background-color:#ffffff"><span style="text-decoration-thickness:initial"><span style="text-decoration-style:initial"><span style="text-decoration-color:initial"><span style="clear:left"><span style="display:block"><span style="font-weight:normal">The College of Engineering welcomes intellectually curious students from all backgrounds. Here you will gain practical and theoretical knowledge, and technical mastery, in whatever engineering field you choose to study. Thank you for your interest in Beaver Nation!<br />
      <br />
      We strongly recommend you do not use a school-based email as these routinely are blocked from external email contact.</span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></div>
      </div>

      <div class="form_question form_p form_question_93fa3365-2838-0b0d-a997-170e64e12b41 form_layout_stacked" data-id="93fa3365-2838-0b0d-a997-170e64e12b41" data-type="p" id="form_question_93fa3365-2838-0b0d-a997-170e64e12b41" style="padding:0px; text-align:start; margin-bottom:16px"><span style="font-size:18px"><span style="position:relative"><span style="box-sizing:border-box"><span style="color:#252525"><span style="font-family:&quot;Open sans&quot;,sans-serif"><span style="font-style:normal"><span style="font-variant-ligatures:normal"><span style="font-weight:400"><span style="white-space:normal"><span style="background-color:#ffffff"><span style="text-decoration-thickness:initial"><span style="text-decoration-style:initial"><span style="text-decoration-color:initial"><span style="clear:left"></span></span></span></span></span></span></span></span></span></span></span></span></span></span>

      <div class="form_label"><span style="font-size:18px"><span style="position:relative"><span style="box-sizing:border-box"><span style="color:#252525"><span style="font-family:&quot;Open sans&quot;,sans-serif"><span style="font-style:normal"><span style="font-variant-ligatures:normal"><span style="font-weight:400"><span style="white-space:normal"><span style="background-color:#ffffff"><span style="text-decoration-thickness:initial"><span style="text-decoration-style:initial"><span style="text-decoration-color:initial"><span style="clear:left"><span style="display:block"><span style="font-weight:normal"><em>*Indicates a required field.</em></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></div>
      </div>
    '#title_display': invisible
    '#title_tag': ''
  about_you:
    '#type': fieldset
    '#title': 'About You'
    '#open': true
    first_name:
      '#type': textfield
      '#title': 'First Name'
      '#required': true
    preferred_first_name:
      '#type': textfield
      '#title': 'Preferred First Name'
    last_name:
      '#type': textfield
      '#title': 'Last Name'
      '#required': true
    birthdate:
      '#type': datelist
      '#title': Birthdate
      '#required': true
      '#date_part_order':
        - month
        - day
        - year
      '#date_text_parts':
        - day
        - month
        - year
      '#date_abbreviate': false
  contact_information:
    '#type': fieldset
    '#title': 'Contact Information'
    email_address:
      '#type': email
      '#title': 'Email Address'
      '#required': true
    mailing_address:
      '#type': webform_address
      '#title': 'Mailing Address'
      '#title_display': ''
      '#required': true
      '#address_2__access': false
    cell_phone:
      '#type': tel
      '#title': 'Cell Phone'
      '#international': true
    mobile_notifications:
      '#type': checkbox
      '#title': 'Text Opt In'
      '#description': 'You can opt-in to mobile notifications here. Participants will receive text message alerts for application progress notifications, deadline notices as well as periodic promotional messages. Participants will continue to receive mobile alerts until they opt out or they are no longer eligible for the Admission Alerts program. Participants may receive SMS messages. Message and data rates may apply. Users will receive an average of 4 messages per month. For help, call (800) 291.4192, or email&nbsp;<a href="mailto:admissions@oregonstate.edu?subject=Text%20Messaging%20Help">admissions@oregonstate.edu</a>.'
      '#description_display': before
  academic_plans:
    '#type': fieldset
    '#title': 'Academic Plans'
    i_am_a:
      '#type': select
      '#title': 'I am a'
      '#options':
        Freshman: Freshman
        Transfer: Transfer
        Post-Bac: Post-Bac
        Non-degree: Non-degree
      '#required': true
    i_plan_to_start_at_osu:
      '#type': select
      '#title': 'I plan to start at OSU'
      '#options':
        'Fall 2022': 'Fall 2022'
        'Winter 2023': 'Winter 2023'
        'Spring 2023': 'Spring 2023'
        'Summer 2023': 'Summer 2023'
        'Fall 2023': 'Fall 2023'
        'Winter 2024': 'Winter 2024'
        'Spring 2024': 'Spring 2024'
        'Summer 2024': 'Summer 2024'
        'Fall 2024': 'Fall 2024'
        'Winter 2025': 'Winter 2025'
        'Spring 2025': 'Spring 2025'
      '#required': true
  academic_interests:
    '#type': fieldset
    '#title': 'Academic Interests'
    i_am_interested_in_learning_more_about_select_one_:
      '#type': radios
      '#title': 'I am interested in learning more about (select one)'
      '#multiple': false
      '#options':
        'OSU Main Campus (Corvallis)': 'OSU Main Campus (Corvallis)'
        'OSU-Cascades Campus (Bend)': 'OSU-Cascades Campus (Bend)'
        'Both Campuses (OSU Main and OSU-Cascades)': 'Both Campuses (OSU Main and OSU-Cascades)'
      '#required': true
    major_choice_1_osu_main_campus_:
      '#type': select
      '#title': 'Major Choice 1 (OSU Main Campus)'
      '#options':
        'Architectural Engineering': 'Architectural Engineering'
        Bioengineering: Bioengineering
        'Chemical Engineering': 'Chemical Engineering'
        'Civil Engineering': 'Civil Engineering'
        'Computer Science': 'Computer Science'
        'Construction Engineering Management': 'Construction Engineering Management'
        'Ecological Engineering': 'Ecological Engineering'
        'Electrical and Computer Engineering': 'Electrical and Computer Engineering'
        'Environmental Engineering': 'Enviromental Engineering'
        'General Engineering': 'General Engineering'
        'Industrial Engineering': 'Industrial Engineering'
        'Manufacturing Engineering': 'Manufactoring Engineering'
        'Mechanical Engineering': 'Mechanical Engineering'
        'Nuclear Engineering': 'Nuclear Engineering'
        'Radiation Health Physics': 'Radiation Health Physics'
      '#required': true
      '#states':
        visible:
          - ':input[name="i_am_interested_in_learning_more_about_select_one_"]':
              value: 'OSU Main Campus (Corvallis)'
          - xor
          - ':input[name="i_am_interested_in_learning_more_about_select_one_"]':
              value: 'Both Campuses (OSU Main and OSU-Cascades)'
    major_choice_1_osu_cascades_campus_:
      '#type': select
      '#title': 'Major Choice 1 (OSU-Cascades Campus)'
      '#options':
        'Computer Science': 'Computer Science'
        'Energy Systems Engineering': 'Energy Systsems Engineering'
        'Engineering Science': 'Engineering Science'
        'Outdoor Products': 'Outdoor Products'
      '#required': true
      '#states':
        visible:
          - ':input[name="i_am_interested_in_learning_more_about_select_one_"]':
              value: 'OSU-Cascades Campus (Bend)'
          - xor
          - ':input[name="i_am_interested_in_learning_more_about_select_one_"]':
              value: 'Both Campuses (OSU Main and OSU-Cascades)'
  captcha:
    '#type': captcha
    '#captcha_type': recaptcha/reCAPTCHA
    '#captcha_admin_mode': true

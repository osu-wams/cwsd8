code: |-
  /*================================
  Flex Grid Setup Classes
  ================================*/

  /* Flex grid header color */
  .flex-grid h3 {
  	color:white;
  }

  /* Setup flex grid display options */
  .flex-grid {
    display: flex;
    margin: 0px;
    border-radius: 25px;
    flex-wrap: wrap;
  }

  /* Typography for content in flex grid */
  .flex-grid .col {
    flex: 1;
    font-family: "Stratum2Web Bold";
    color: white;
    border-radius: 15px;
    margin: 2px;
  }

  /* Text color for flex grid */
  .flex-grid p {
    color: white;
  }

  /* Display for subdivision of flex grid */
  .flex-grid-thirds {
    display: flex;
    justify-content: space-between;
  }

  /* Width for content in subdivision of flex grid */
  .flex-grid-thirds .col {
    width: 50%;
  }

  /* Mobile display for content */
  @media (max-width: 400px) {
    .flex-grid,
    .flex-grid-thirds {
      display: block;
    }
  }

  /* Lock into border-box */
  * {
    box-sizing: border-box;
  }

  /* Default styling for content in flex grid */
  .col {
     background-color: #d73f09;
  	 padding: 20px;
  }

  /* Padding for content items */
  .paragraphs-items .field-item .field-item{
   padding-left: 2em;
   padding-right: 2em;
  }

  /*=====================================
  Photo Styling
  =====================================*/

  #photoright {
  padding: 20px;
  float:right;
  }

  #photoleft {
  padding: 20px;
  float:left;
  }

  #photocenter {
  padding: 20px;
  float: center;
  }

   /* TILE HOVER COLORS and Font */

id: coe_new_typography_headers_text_etc
label: 'COE 2024 typography (headers, text, etc)'
code: |-
  /*
  * This injector contains all the new typography styling from the OSU library figma (https://www.figma.com/design/aCTpzJsxOc9tWSQI3Bwsx8/OSU-Library?m=auto&t=l4FaQH7UA1RVYI9m-6).
  */


  /*
  H1
  */
  h1{
  	color: #FFF;

  	/* Main/H1 */
  	font-family: Stratum2web;
  	font-size: 96px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 96%; /* 92.16px */
  }



  /*
  H2
  */
  h2{
  	color: #FFF;

  	/* Main/H2 */
  	font-family: Stratum2web;
  	font-size: 64px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 83.2px */
  }

  /*
  H3
  */
  h3{
  	color: #000;
  	/* H3 */
  	font-family: Stratum2web;
  	font-size: 36px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 46.8px */
  }

  /*
  H4
  */
  h4{
  	color: #000;

  	
  	/* Main/H4 */
  	font-family: Stratum2web;
  	font-size: 24px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 31.2px */
  	letter-spacing: 1.2px;
  	text-transform: uppercase;
  }

  /*
  H5
  */
  h5{
  	color: #000;

  	/* Main/H5 */
  	font-family: "Open Sans";
  	font-size: 22px;
  	font-style: normal;
  	font-weight: 700;
  	line-height: 130%; /* 28.6px */
  	letter-spacing: 1.1px;
  	text-transform: uppercase;
  }

  /*
  H6
  */
  h6{
  	color: #000;
  	/* Main/H6 */
  	font-family: "Open Sans";
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: 130%; /* 26px */
  }


  @media only screen and (max-width: 767px){
  	h1{
  		font-size: 56px;
  	}
  	h2{
  		font-size: 44px;
  	}
  }


  @media only screen and (min-width: 767px) and (max-width: 1200px){
  	h1{
  		font-size: 72px;
  	}
  	h2{
  		font-size: 48px;
  	}
  }

  .orange-text {
  	color: #D73F09;
  }

  .white-text {
  	color: #FFF;
  }


  /*
  P tags
  */
  main p {
  	color: #000;
  }

  /*
  Border bottom width
  */
  .osu-border-width-bottom-5{
  	border-bottom-width: 7px !important;
  }

  @media only screen and (max-width: 1199px){
  	.RSVP-Grad{
  		width: 100%;
  		padding-right: 0px !important;
  	}
  }

  @media only screen and (min-width: 767px) and (max-width: 1200px){
  	.showcase-title{
  		padding-right: 25px;
  	}
  }
media: all

  	padding: 26px 30px;
  	background: rgba(255, 0, 0, 0.1);
  	margin-bottom: 50px;
  	border-radius: 5px;
  }


  /***************************
  Feedback Form Page
  ****************************/
  #edit-summary-of-idea {
    width: 100%;     
    min-height: 250px;
    font-size: 1rem;   
    padding: 10px;    
    resize: vertical;  
  }

  input:is([type="button"], [type="submit"], [type="reset"]), input[type="file"]::file-selector-button {
  	border-radius: 5px;
  	background: var(--useful-seafoam-20, #F1F8F9);

  /*================================================================================================================================================================
  	SECTION: Simple Tabs Buttons
  	
  	PURPOSE: Configurations of simple tabs buttons
  	==============================================================================================================================================================*/

  .views-view-bootstrap-tab div.nav-tabs {
  	all: unset;
  	display: flex;
  	justify-content: space-between !important;
  	flex-wrap: wrap;
  }

  .nav.nav-tabs button.nav-link {
  	width: calc(50% - 10px);
  	border-radius: 5px;
  	border: 3px solid #D73F09;
  	background: #FFF;
  	box-shadow: 2px 4px 4px 0px rgba(0, 0, 0, 0.12);
  	padding: 30px;
  	color: #000;
  	word-spacing: 500px;
  	font-family: Stratum2Web;
  	font-size: 24px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%;
  	letter-spacing: 1.2px;
  	text-transform: uppercase;
  	text-align: left;
  }


  .nav.nav-tabs button.nav-link:hover, .nav.nav-tabs button.nav-link:focus, .nav.nav-tabs button.nav-link.active {
  	background: #D73F09;
  	color: #FFF;
  }

  @media screen and (max-width: 991px) {
  	.nav.nav-tabs button.nav-link {
  		width: 100%;
  		margin-bottom: 20px !important;
  	}
  }


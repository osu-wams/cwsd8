  }
  input:is([type="button"], [type="submit"], [type="reset"]):active, input[type="file"]:active::file-selector-button,
  input:is([type="button"], [type="submit"], [type="reset"]):disabled {
  	background: #B8DDE1 !important;
  	border-color: #B8DDE1 !important;
  	color: #000 !important;
  	opacity: 1;
  }

  #edit-attach-a-file:has( .messages--error + input) input.form-control {
  	border: 2px solid #FF0000 !important;
  }

  .messages--error {
    margin-top: 10px;
    color: #FF0000;
  }

  .js-form-managed-file .file + span {
    display: none !important;
  }

  /* Override form required styling */
  .webform-submission-form .form-item .form-label.form-required::after,
  .webform-submission-form .form-item legend .form-required::after {
    content: "*";
    color: #000;
    position: relative;
    left: 0;
  }

  .js-form-managed-file .file {
  	margin-right: 20px;
  }

  .js-form-managed-file .file a:hover {
  	background-color: transparent !important;

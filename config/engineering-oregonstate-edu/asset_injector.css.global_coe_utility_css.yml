id: global_coe_utility_css
label: 'Global COE Utility CSS text shadow, responsive table, mobile video'
code: |+
  /* ================================================
  Mobile styling for iframes and blockquotes. Also controls responsive tables
  =================================================== */

  /** Accessible text shadow **/
  .coe-text-shadow {
  	text-shadow: 4px 3px 2px black;
  }

  /** Responsive table **/
  .coe-responsive-table-wrapper {
  	overflow-x: auto
  }

  @media (max-width: 540px) {
  	blockquote {
  		padding: 1rem;
  	}
  	
  	/** Make iframe (aka youtube/kaltura videos) work well in mobile **/
  	iframe {
  		min-height: 200px;
  	  height: auto;
  	  max-width: 100%;
    }
  }


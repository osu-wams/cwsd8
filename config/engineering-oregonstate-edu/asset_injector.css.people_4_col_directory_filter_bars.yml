id: people_4_col_directory_filter_bars
label: 'People responsive layout (form item)'
code: |
  /*=====================================================
  Responsive width setting for Filters in People pages
  =====================================================*/


  /* Responsive layout for institution personnel directory filters (large screens) */

  @media (min-width: 768px) {
    #views-exposed-form-engr-profile-directory-page .form-item, #views-exposed-form-engr-profile-block-10 .form-item, #views-exposed-form-engr-profile-block-9 .form-item, #views-exposed-form-engr-profile-block-11 .form-item, #views-exposed-form-engr-profile-block-12 .form-item{
      width: 30%;
    }
  }

  /* Responsive layout for institution personnel directory filters (small screens) */

  @media (max-width: 605px) {
    #views-exposed-form-engr-profile-directory-page .form-item.form-item-items-per-page, #views-exposed-form-engr-profile-block-11 .form-item.form-item-items-per-page{
    	width: 50% !important;
    }
  }

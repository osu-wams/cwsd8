id: remove_link_icons
label: 'Remove Link Icons'
code: |+
  // Wait for the document to be fully loaded
  document.addEventListener('DOMContentLoaded', function() {
      // Find all elements with class .link-purpose
      var Linkpurpose = document.querySelectorAll('.link-purpose');

      // Loop through each link-purpose element
      Linkpurpose.forEach(function(link) {
          // Get all child span elements
          var childSpans = link.querySelectorAll('span');

          // Remove each child span element
          childSpans.forEach(function(span) {
              span.remove();
          });
      });
  });


id: impact
label: 'Signature event cards (impact report page)'
code: |
  .signature-event-cards{
  	display: flex;
  	flex-direction: column;
  	justify-content: space-between; /* Ensures the link is pushed to the bottom */
  	border-radius: 5px;
  	border: 1px solid #ECEDEE;
  	background: #FFF;
  	box-shadow: 2px 4px 8px 0px rgba(0, 0, 0, 0.08);
  	padding: 30px;
  	border-top-color: #D73F09;
  	border-top-width: 10px;
  	height: 425px;
  }


  .signature-events-card-link{
  	margin-top: auto;	
  }

  .signature-events-card-link a{

  text-transform: uppercase;
  	color: #d73f09 !important;
  	background-image: url(/modules/custom/osu_custom_blocks/dist/arrow-right-red.c4e9b645.svg);
  	background-position: 100%;
  	background-repeat: no-repeat;
  	background-size: 17px;
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 500 !important;
  	padding-right: 27px;
  	font-family: Stratum2Web;
  	text-decoration: none;
  	/*position: relative;*/
  	transition: 0.1s ease;
  }

  .signature-events-card-link a:hover{
  	text-decoration: none !important;
  	padding-right: 40px;
  	transition: 0.1s ease;
  }

  @media only screen and (max-width: 990px) {
  	.signature-event-cards{
  		height: 600px;
  	}
  }



  @media only screen and (min-width: 990px) and (max-width: 1250px) {
  	.signature-event-cards{
  		height: 500px;
  	}
  }

  /*==============================================
  	Impact Report 2024 STORY CARD Typography
  ================================================*/

  .new-story-title{
  	color:  #000;
  	font-family: "Open Sans";
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 600 !important;
  	line-height: normal;
  	padding: 30px !important;
  }

  .new-story-title{
  	display: -webkit-box !important;
    -webkit-box-orient: vertical !important;
    -webkit-line-clamp: 3 !important;
    overflow: hidden !important;
  	
  }

  .story-body{
  	color: #000;
  	font-family: "Open Sans";
  	font-size: 18px;
  	font-style: normal;
  	font-weight: 400;
  	line-height: normal;
  	padding: 0 30px 30px 30px !important;
  	margin-bottom: 45px;

  }

  /* Read more link */
  .read-more-link a {
  	font-family: Stratum2Web;
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 500;
  	line-height: normal;
  	letter-spacing: 1px;
  	text-transform: uppercase;
  	color: #D73F09;
  	text-decoration: none !important;
  	background-image: url(/modules/custom/osu_custom_blocks/dist/arrow-right-red.c4e9b645.svg);
    background-position: 100%;
    background-repeat: no-repeat;
    background-size: 20px;
    padding-right: 25px;
    margin-right: 10px;
    margin-top: 18px;
    transition: 0.2s ease;
    border-bottom: none;
  }

  .read-more-link {
  	position: absolute;
  	left: 30px;
  	bottom: 40px;
  }

  /* Orange Arrow Links Hover State */
  .read-more-link a:hover {
  	padding-right: 35px;
  	margin-right: 0px;
  	border-bottom: none;
  }

  /* Orange Arrow Links Active State */
  .read-more-link a:focus,
  .read-more-link a:active {
  	background-color: transparent !important;
  	color: #BE3706 !important;
  	padding-right: 35px !important;
  	border-bottom: none !important;
  }

  .yellow-link{
  	color: #FFB500;
  	text-decoration: underline;
  	text-decoration-color: #FFB500 !important;
  	text-decoration-thickness: 1.5px !important;
  	background-color:  hsl(0, 0%, 0%, 0) !important;
  }

  .yellow-link:hover{
  	color: #FFB500 !important;
  	text-decoration: underline !important;
  	text-decoration-color:#FFB500 !important;
  	text-decoration-thickness: 3px !important;
  	background-color:  hsl(0, 0%, 0%, 0) !important;
  }
  .yellow-link:active{
  	color: #FFB500 !important;
  	text-decoration: underline !important;
  	text-decoration-color:#FFB500 !important;
  	text-decoration-thickness: 3px !important;
  	background-color:  hsl(0, 0%, 0%, 0) !important;
  }

  .orange-link{
  	color: #D73F09 !important;
  	text-decoration: underline;
  	text-decoration-color:#D73F09 !important;
  	text-decoration-thickness: 1.5px !important;
  	background-color:  hsl(0, 0%, 0%, 0) !important;
  }

  .orange-link:hover{
  	color: #D73F09 !important;
  	text-decoration: underline !important;
  	text-decoration-color:#D73F09 !important;
  	text-decoration-thickness: 3px !important;
  	background-color:  hsl(0, 0%, 0%, 0) !important;
  }

  .orange-link:active{
  	color: #D73F09 !important;
  	text-decoration: underline !important;
  	text-decoration-color:#D73F09 !important;
  	text-decoration-thickness: 3px !important;
  	background-color:  hsl(0, 0%, 0%, 0) !important;
  }

  .new-story-card-img img {
      width: 417px;
      border-radius: 5px 5px 0 0 !important;
      height: 250px;
      object-fit: cover;
  }

id: coe_brand_footer_2026
label: 'GLOBAL COE Brand Footer 2026'
code: |
  /*==============================
  	New COE Brand Footer
  	- Created April 28th, 2026
  =================================*/

  /*==============================
  	Typography
  ================================*/
  footer .coe-footer-2026 {
  	--Primary-Paddletail-Black: #000;
  	--Primary-Beaver-Orange: #D73F09;
  	--Primary-Bucktooth-White: #FFF;
  	--Secondary-Luminance: #FFB500;
  	--Secondary-Solar-Flare: #D3832B;
  	--Useful-Orange-Active: #BE3706;
  	--Useful-Grey-Shades-Dark-Grey: #212529;
  }

  footer .coe-footer-2026 p:not(.footer-bottom-links) {
  	font-size: 16px;
  	margin-bottom: 10px;
  }

  @media screen and (max-width: 767px) {
  	footer .coe-footer-2026 small span {
  		margin-bottom: 5px;
  	}
  }

  /* Modified H2 */
  footer .coe-footer-2026 .footer-title {
  	color: var(--Primary-Bucktooth-White, #FFF);
  	font-family: Stratum2Web;
  	font-size: 32px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%;
  	letter-spacing: 0.02em;
  	text-transform: uppercase;
  }

  /* Modified H5 */
  footer .coe-footer-2026 .footer-section-title {
  	color: var(--Primary-Bucktooth-White, #FFF);
  	font-family: "Open Sans";
  	font-size: 20px;
  	font-style: bold;
  	font-weight: 700;
  	line-height: 130%;
  	letter-spacing: 0.05em;
  	text-transform: uppercase;
  	margin-bottom: 20px;
  }

  /* Footer Inline Link */
  footer .coe-footer-2026 :not(.footer-social-media-icons) > a {
  	color: var(--Primary-Bucktooth-White, #FFF);
  	font-family: "Open Sans";
  	font-size: 16px;
  	font-style: normal;
  	font-weight: 400;
  	line-height: 160%;
  	text-decoration: none;
  	border-bottom: 3px solid transparent;
  	transition: color 0.5s ease, border-bottom 0.6s ease;
  	background-image: none;
  }

  /* Yellow Inline Link */
  footer .coe-footer-2026 .footer-yellow-inline a {
  	color: var(--Secondary-Luminance, #FFB500);
  	text-decoration: none;
  	font-weight: 700;
  }

  /* Inline Links Hover/Focus */
  footer .coe-footer-2026 :not(.footer-social-media-icons) > a:hover,
  footer .coe-footer-2026 a:focus {
  	color: var(--Secondary-Luminance, #FFB500);
  	border-bottom: 3px solid var(--Secondary-Luminance, #FFB500);
  	text-decoration: none;
  }

  /* Inline Links Active */
  footer .coe-footer-2026 :not(.footer-social-media-icons, #fake-id-trick) > a:active {
  	color: var(--Secondary-Solar-Flare, #D3832B);
  	border-bottom: 3px solid var(--Secondary-Solar-Flare, #D3832B);
  	background-color: transparent;
  }

  /*==============================
  	Top Section
  ================================*/
  .footer-header .field--name-body {
  	display: flex;
  	flex-direction: column;
  	align-items: center;
  }

  /* College Text */
  .footer-header .footer-title {
  	margin-bottom: 50px;
  }


  /* OSU Logo */
  footer .coe-footer-2026 .osu-logo {
  	max-width: 141px;
  	height: 148px;
  	margin-bottom: 50px;
  }

  @media screen and (min-width: 768px) {
  	footer .coe-footer-2026 .osu-logo {
  		margin-bottom: 30px;
  	}
  }


  /*========================================
     Links Section Responsiveness 
  ==========================================*/
     
  /* Small Breakpoint - 1 Column */
  .footer-info .container .col-12 {
  	display: grid;
  	grid-template-rows: repeat(4, auto);
  	gap: 50px 20px;
  }

  /* Medium Breakpoint - 2 Columns */
  @media screen and (min-width: 768px) and (max-width: 991px) {
    .footer-info .container .col-12 {
  		display: grid;
  		grid-template-columns: repeat(2, 1fr);
  		grid-template-rows: repeat(2, auto);
  		gap: 50px 20px;
  	}
  }

  /* Large Breakpoint and Above - 4 Columns */
  @media screen and (min-width: 992px) {
  	.footer-info .container .col-12 {
  		display: grid;
  		grid-template-columns: repeat(4, 1fr);
  		grid-template-rows: auto;
  		gap: 0 20px;
  	}
  }


  /*=======================================
     School Section
  =========================================*/

  /* School main section typography */
  footer .coe-footer-2026 .footer-school-section .footer-section-title {
  	font-size: 16px;
  	margin-bottom: 10px;
  }

  footer .coe-footer-2026 .footer-school-main p,
  footer .coe-footer-2026 .footer-school-main a {
  	font-size: 14px !important;
  	line-height: 130%;
  }

  footer .coe-footer-2026 .footer-school-section p:last-of-type  {
  	margin-bottom: 0;
  }

  /* Margins */
  footer .coe-footer-2026 .footer-school:has(.footer-school-section) {
  	margin-top: 50px;
  	padding: 30px 0;
  }

  @media screen and (max-width: 767px) {
  	footer .coe-footer-2026 .footer-school-main {
  		margin-bottom: 50px;
  	}

  	footer .coe-footer-2026 .footer-school-col-1  {
  		margin-bottom: 10px;
  	}
  }

  /* Default - Small Breakpoint - 1 Column */
  footer .coe-footer-2026 .footer-school-section {
  	display: grid;
  }

  /* Medium Breakpoint and Above - 4 Columns */
  @media screen and (min-width: 768px) {
  	footer .coe-footer-2026 .footer-school-section {
  		grid-template-columns: repeat(4, 1fr);
  		gap: 0 20px;
  	}
  	footer .coe-footer-2026 .footer-school-main {
  		grid-column: span 2;
  	}
  }
  /* Desktop Breakpoint - Main Section Margin */
  @media screen and (min-width: 992px) {
  	footer .coe-footer-2026 .footer-school-main {
  		margin-right: 20px;
  	}
  }

  /*==============================
  	Get in Touch Column
  ================================*/
  footer .footer-info .get-in-touch :not(.footer-social-media-icons) div {
  	margin-bottom: 16px;
  }

  footer .footer-info .get-in-touch .coe-address p {
  	margin-bottom: -5px;
  }

  footer .footer-info .get-in-touch .coe-email {
  	margin-bottom: 12px;
  }

  /*==============================
  	Social media icons
  ================================*/

  /* Container */
  footer .footer-social-media-icons {
  	display: flex;
  	gap: 10px;
  }

  /* Links */
  footer .footer-social-media-icons a,
  footer .footer-social-media-icons a:hover {
  	border-bottom: none;
  	text-decoration: none;
  }

  /* Links states */
  footer .footer-social-media-icons a:focus,
  footer .footer-social-media-icons a:active {
  	background: var(--Useful-Grey-Shades-Dark-Grey, #212529);
  	border: none !important;
  }


  /* Circular background on hover */
  footer .footer-social-media-icons .fa-2x:hover,
  footer .footer-social-media-icons .fa-2x:focus,
  footer .footer-social-media-icons .fa-2x:active {
  	background-color: white;
  	color: var(--Useful-Grey-Shades-Dark-Grey, #212529);
  }

  /* Overwrite the default orange color */
  footer .footer-social-media-icons .primary {
  	color: white;
  }

  /* Icon buttons */
  footer .footer-social-media-icons .fa-2x{
  	background-color: transparent;
    border-radius: 50%;
    width: 44px;  /* Set a fixed width */
    height: 44px; /* Set equal height */
    display: flex; /* Use flexbox for centering */
    align-items: center; /* Center vertically */
    justify-content: center; /* Center horizontally */
    transition: all 0.5s ease;
    margin-left: -10px;
    font-size: 24px;
  }

  /* Mobile tweaks */
  @media screen and (max-width: 767px) {
  	/* Allow icons to wrap */
  	footer .footer-social-media-icons {
  		flex-wrap: wrap;
  	}
  	
  	/* Larger icon size */
  	footer .footer-social-media-icons .fa-2x {
  		font-size: 32px;
  		margin-left: -7px;
  	}
  }


  /*==============================
  	Bottom Links
  ================================*/
  footer .coe-footer-2026 .footer-bottom-links {
  	margin-top: 50px;
  	margin-bottom: 50px;
  }

  /* Font size */
  footer .coe-footer-2026 .footer-bottom-links a {
  	font-size: 12px;
  }

  /* Mobile */
  @media screen and (max-width: 767px) {
  	footer .coe-footer-2026 .footer-bottom-links {
  		margin-top: 80px;
  	}
  	footer .coe-footer-2026 .footer-bottom-links span {
  		display: block;
  	}
  }

  /* Tablet/Desktop */
  @media screen and (min-width: 768px) {
  	/* Centered text */
  	footer .coe-footer-2026 .footer-bottom-links {
  		text-align: center;
  	}
  	
  	/* Prevent text wrapping */
  	footer .coe-footer-2026 .footer-bottom-links span {
  		white-space: nowrap;
  	}
  	footer .coe-footer-2026 .footer-bottom-links a {
  		white-space: nowrap;
  	}
  	
  	/* Pipe separator */
  	footer .coe-footer-2026 .footer-bottom-links span:not(:last-child)::after {
  		content: " | ";
  	}
  }

  /*======================================
  	Fix default (theme) issues
  ========================================*/
  footer:has(.coe-footer-2026) .madrone-copyright {
  	display: none;
  }

  footer .region-footer:has(.coe-footer-2026) {
  	padding-left: 0 !important;
  	padding-right: 0 !important;
  }
media: all
preprocess: true
conditions:
  condition_group:
    id: condition_group
    negate: false
    block_visibility_group: ''
contexts: {  }
conditions_require_all: true

id: accordions_collapsed_on_page_load
label: 'Accordions collapsed on page load'
code: |-
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.accordion-collapse').forEach(function(el) {
      // Add "show" class to expand them
      el.classList.add('show');

      // Removing the "collapsed" class from the button
      const button = el.closest('.accordion-item').querySelector('.accordion-button');
      if (button) {
        button.classList.remove('collapsed');
        button.setAttribute('aria-expanded', 'true');
      }
    });
  });

id: academics_page
label: 'Academics Page'
code: |-
  /* ==================================================================================================================================================================
  ==================================================================================================================================================================
  	--ACADEMICS PAGE--
  	
  	Academics Page specific styling 
  ==================================================================================================================================================================
  ================================================================================================================================================================== */

  /*==============================================================================
  	Info/Grad Directional Cards with subheading
  	============================================================================*/
  	
  .info-resources {
  	flex-wrap: wrap;
  }

  /* Have header and directional buttons split into 2 cols */

  .info-resources > h3,
  .info-resources > div {
  	width: calc(50% - 10px);
  }

  @media screen and (max-width: 767px) {
  	.info-resources > h3,
  	.info-resources > div {
  		width: 100%;
  	}
  }

  .info-resources p, .grad-resources p {
    width: 100%;
  }

  .info-resources a, .grad-resources a{
  	word-spacing: normal;
  }

  /* Subheading typography */

  .grad-resources a span{
  	display: block; 
    font-family: "Open Sans", sans-serif;
    font-size: 18px;
    font-style: normal;
    font-weight: 400;
    line-height: 150%; 
    letter-spacing: normal;
  	text-transform: none;
  	max-width: 95%;
  }

  /*==============================================================================
  	Box Shadow
  	============================================================================*/
  	
  .choose-bottom-right-blue img {
  	box-shadow: 15px 15px 0 #B8DDE1;
  	margin-bottom: 25px;
  }

  .choose-bottom-left-hop-bine img {
  	box-shadow: -15px 15px 0 #AA9D2E;
  	margin-bottom: 25px;
  }

  /*==============================================================================
  	Number/Rankings block different tablet layout than discipline page
  	============================================================================*/
  	
  /* Uses flex-wrap for 2 by 2 layout in tablet */

  .numbers-rankings {
  	margin-top: 60px;
  	display: flex;
  	justify-content: space-between;
  	flex-wrap: wrap;
  }

  /* subheading underneath ranking item */

  .numbers-rankings-subheading {
  	font-size: 12px;
  	font-style: italic;
  	font-weight: 300;
  	line-height: 130%; /* 15.6px */
  }	

  /* subheading underneath section title */

  .numbers-heading p{
  	max-width: 50%;
    margin-left: auto;
    margin-right: auto;
  }

  @media only screen and (max-width: 991px) {
  	.numbers-rankings {
  		margin-top: 50px;
      justify-content: center;
      gap: 20px;
  	}
  	.numbers-rankings > * {
  	  margin-bottom: 30px;
      width: 37.5%; 
  	}
  	.numbers-heading p{
  		max-width: 75%;
  	}
  }

  @media only screen and (max-width: 767px) {
      .numbers-rankings > * {
        width: 100%; 
        margin-bottom: 0px;
      }
      .numbers-rankings {
  	    gap: 50px;
  		}
  		.numbers-heading p{
  			max-width: 100%;
  		}
  }

  /*==============================================================================
  	Sidebar Menus
  	============================================================================*/
  	
  .next-steps-button {
  	margin-bottom: 80px;
  }

  p:has(.next-steps-button.apply-button) {
  	margin-bottom: 100px;
  }

  .field:has(.helpful-links-body) {
  	padding-bottom: 100px;
  }

  .helpfulLinks-hidden-content {
  	border-bottom: 6px solid #d73f09;
  }

  .helpful-links-body {
  	margin-bottom: 30px;
  }

  /*==============================================================================
  	Academic Degrees List
  	============================================================================*/	
  	
  #views-bootstrap-academics-degrees-simple-display-block-1 a, 
  #views-bootstrap-academics-degrees-simple-display-block-2 a {
  	min-height: 105px;
  	padding-top: 25px;
  	padding-right: 50px;
  	width: 100%;
  	display: flex;
  	justify-content: space-between;
  	color: #000;
  	font-family: "Open Sans";
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 600;
  	line-height: 130%; /* 26px */
  	text-decoration: none;
  	border-bottom: none;
  }

  #views-bootstrap-academics-degrees-simple-display-block-1 a:hover,
  #views-bootstrap-academics-degrees-simple-display-block-2 a:hover {
  	border-bottom: none;
  }

  #views-bootstrap-academics-degrees-simple-display-block-1 a:active,
  #views-bootstrap-academics-degrees-simple-display-block-2 a:active {
   color: #000 !important;
  }

  #views-bootstrap-academics-degrees-simple-display-block-1 .views-field-title,
  #views-bootstrap-academics-degrees-simple-display-block-2 .views-field-title {
  	border-top: 1px solid #B8DDE1;
  }

  #views-bootstrap-academics-degrees-simple-display-block-1 .views-field-title:active,
  #views-bootstrap-academics-degrees-simple-display-block-2 .views-field-title:active {
  	border-top: 1px solid #00859B;
  }

  #views-bootstrap-academics-degrees-simple-display-block-1 span,
  #views-bootstrap-academics-degrees-simple-display-block-2 span {
  	width: 100%;
  	display: block;
  	background-image: url("data:image/svg+xml;charset=utf-8;base64,");
  	background-position: 100% 32%;
    background-repeat: no-repeat;
    border-top: 2px solid transparent;
  	transition: background-image 0.3s ease, border-top 0.3s ease;
    cursor: pointer;
  }

  #views-bootstrap-academics-degrees-simple-display-block-1 span:hover,
  #views-bootstrap-academics-degrees-simple-display-block-2 span:hover {
  	background-image: url("data:image/svg+xml;charset=utf-8;base64,");
  	border-top: 2px solid #B8DDE1;
  }

  #views-bootstrap-academics-degrees-simple-display-block-1 span:active,
  #views-bootstrap-academics-degrees-simple-display-block-2 span:active {
   background-image: url("data:image/svg+xml;charset=utf-8;base64,");
   border-top: 2px solid #00859B;
  }

  /*==============================================================================
  	Custom Bootstrap Column
  	============================================================================*/
  	
  .custom-col .layout > div { 
  	display: flex; 
  	flex-wrap: wrap; 
    align-items: center;
  }

  @media only screen and (max-width: 991px) {
  	.custom-col .layout > div { 
  	  align-items: start;
  	}
  }

  @media only screen and (max-width: 767px) {
  	/* Styling to swap order of image/text */
  	.custom-col .layout > div .community-image {
      order: 2; 
  	}

  	.custom-col .layout > div .community-text {
      order: 1; 
  	}
  	
  	.community-image img {
  		width: calc(100% - 15px); 
  		float: right;
  	}
  	
  	.success-image img {
  		width: calc(100% - 15px); 
  	}
  }

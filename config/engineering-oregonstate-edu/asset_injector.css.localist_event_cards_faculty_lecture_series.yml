id: localist_event_cards_faculty_lecture_series
label: 'Faculty lecture series event card width (card, width)'
code: |-
  /* Set width of event card */

  .event-card{
  	width: 22em;
  }


  /*.block:has(#localist-widget-23329890):not(:has(.event)) {*/
  /*	display: none;*/
  /*}*/

  /*.block:has(#localist-widget-233298901):not(:has(.event)) {*/
  /*	display: none;*/
  /*}*/


  /*********************************/
  /* Faculty Lecture Series Page*/
  /********************************/

  /*To be removed:*/
  .placeholder-temp{
  	padding:500px;
  }

  .get-in-touch-top-border {
      border-top: 6px solid;
      border-top-width: 6px;
      border-color: #D73F09;
  }

  @media screen and (max-width: 991px){
  	.fls-logo-sizing {
    	max-width: 30%;
  	}
  }

  @media screen and (max-width: 767px){
  	.fls-logo-sizing {
    	max-width: 50%;
  	}
  }

  /* Change text to black (#000) */
  main {
      color: #000;
      font-family: "Open Sans";
      font-size: 18px;
      font-style: normal;
      font-weight: 400;
      /* line-height: 160%; */
  }

  /*Header Section*/
  /*Header*/
  h1.fls-header {
  		color: var(--Primary-Beaver-Orange, #D73F09);
  		font-feature-settings: 'liga' off, 'clig' off;

  		font-size: 96px;
  		font-style: normal;
  		font-weight: 900;
  		line-height: 96%;
  		
  		padding-bottom: 20px;
  }
  /*Header Para (no need for this)*/
  /*.field--type-text-with-summary p{*/
  /*		font-family: "Open Sans";*/
  /*		font-size: 18px;*/
  /*		font-style: normal;*/
  /*		font-weight: 400;*/
  		/*line-height: 160%;  28.8px */
  /*}*/

   
   /* Past Lecture Section*/
   .background-color-seafoam {
    background-image: url("https://engineering.oregonstate.edu/sites/engineering.oregonstate.edu/files/2024-12/bg.svg");
    background-color: rgb(241 248 249)!important;
   }
   /**/
   
   
   
  /*Footer and Sidebar*/
  .get-notified h2{
  	color: var(--Primary-Paddletail-Black, #000);
  	font-feature-settings: 'liga' off, 'clig' off;
  	font-family: Stratum2Web;
  	font-size: 64px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 83.2px */
  }

  @media screen and (max-width: 991px){
  	.get-notified h2{
  		font-size: 48px;
  	}
  }

  /*Smaller font-size for header 2 in mobile*/
  @media screen and (max-width: 767px){
  	.get-notified h2{
  		font-size: 44px;
  	}
  }

  /*********************/
  /*SignUp Button*/
  .get-notified a{
  	font-family: "Stratum2Web";
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 500;
  	line-height: normal;
  	letter-spacing: 1px;
  	text-transform: uppercase;
  	color: #D73F09;
  	display: inline-block;
  	text-decoration: none !important;
  	background-image: url(/modules/custom/osu_custom_blocks/dist/arrow-right-red.c4e9b645.svg);
  	background-position: 100%;
  	background-repeat: no-repeat;
  	background-size: 20px;
  	padding-right: 25px;
  	margin-top: 8px;
  	transition: 0.2s ease;
  }


  .get-in-touch a{
  	text-decoration: none;
  	color: #D73F09;
  	transition: 0.2s ease;
  	border-bottom: 3px solid transparent;
  }

  .get-in-touch a:hover {
  	text-decoration: none !important;
  	color: #BE3706;
    border-bottom: 3px solid #BE3706;
    padding-right: 0;
  }

  .get-in-touch a:active {
  	background-color: transparent !important;
  	color: #D73F09 !important;
  }

  .get-notified a:active {
  	background-color: transparent !important;
  	color: #d73f09 !important;
  }

  .get-notified a:hover {
  	padding-right: 35px; /* Move arrow right */
  	transition: 0.2s ease;
  }
  /*********************/

  .sidebar-getintouch{
  	padding-top : 45px;
  }
  .filler{
  	padding:40px;
  } 

  .get-notified{
  	width: 80%;
  	padding-bottom:100px;
  }

  .get-in-touch h2{
  	padding-top:20px;
  	color: var(--Primary-Beaver-Orange, #D73F09);
  	font-feature-settings: 'liga' off, 'clig' off;
  	font-family: "Open Sans";
  	font-size: 22px;
  	font-style: normal;
  	font-weight: 700;
  	line-height: 130%; /* 28.6px */
  	letter-spacing: 1.1px;
  	text-transform: uppercase;
  }

  .event-card{
  	width: 100%;
  }

  .localist-widget-hl .event-list li {
  	margin-left: 0px !important;
  }

  /* Tree Background shift to the left so it doesn't overlap with sidebar*/
  .tree-background-pattern {
    background-position-x: -14rem !important;
  }

  @media screen and (max-width: 991px) {
  	
  	.localist-widget-hl .event-list li {
  		flex: 1 0 calc(35% - 20px) !important;
  	}
  	
  }

  @media screen and (max-width: 767px){
  	.get-notified{
  		width: 100%;
  	}
  	
  	.localist-widget-hl .event-list li {
  		flex: 1 0 calc(55% - 20px) !important;
  	}
  	
  	.tree-background-pattern {
  		background-position: right top !important;
  	}
  	
  }

  @media screen and (max-width: 710px) 	{
  	.get-in-touch h2 {
  		font-size: 20px!important;
  	}
    a.explore-event-libraries {
        display: block; /* Ensure it's treated as a block for centering */
        margin: 0 auto; /* Center horizontally */
        width: 100%; /* Shrinks to fit content */
  	}	
  	.filler-mobile{
  	padding:20px;
  } 

  .get-in-touch{
  	   padding-bottom: 100px		
  		}

  }

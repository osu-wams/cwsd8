id: alumni_partners_overrides
label: 'Alumni partners overrides (horizontal profile cards)'
code: |+
  /* Styling horizontal transparent profile cards for Alumni Partners */

  #views-bootstrap-engr-profile-block-7 .osu-bg-page-alt-1 {
  	background-color: transparent !important;
  	color: #fff !important;
  }

  /* More link styling */

  #views-bootstrap-engr-profile-block-7 .osu-bg-page-alt-1 a,
  #views-bootstrap-engr-profile-block-7 + .more-link a {
  	color: #ccc;
  }
  #views-bootstrap-engr-profile-block-7 .osu-shadow {
  	box-shadow: 0 2px 3px rgb(255 255 255 / 25%) !important;
  }


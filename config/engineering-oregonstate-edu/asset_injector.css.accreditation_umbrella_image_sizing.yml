id: accreditation_umbrella_image_sizing
label: 'Accreditation Umbrella Image Sizing'
code: |-
  /* Desktop sizing */
  .osu-bg-moondust.bg-image {
  	background-image: url('/sites/engineering.oregonstate.edu/files/2026-04/solarsystem_desktop-cropped.svg') !important;
  	background-position: right bottom !important;
  	background-repeat: no-repeat !important;
  	background-size: auto !important;
  	background-color: #EAF5F6 !important;
  }

  /* Tablet sizing */
  @media (min-width: 600px) and (max-width: 1024px) {
    .osu-bg-moondust.bg-image {
      background-image: url('/sites/engineering.oregonstate.edu/files/2026-04/solarsystem_desktop-cropped.svg') !important;
      background-position: right bottom !important;
      background-repeat: no-repeat !important;
      background-size: auto !important;
      padding-bottom: 500px !important;
    }
  }

  /* Mobile sizing */
  @media (max-width: 599px) {
  	.osu-bg-moondust.bg-image {
  		background-image: url('/sites/engineering.oregonstate.edu/files/2026-04/solarsystem_mobile.svg') !important;
  		background-position: right bottom !important;
  		background-repeat: no-repeat !important;
  		background-size: auto !important;
  		padding-bottom: 400px !important;
  	}
  }
media: all
preprocess: true

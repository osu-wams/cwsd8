id: coe_brand_utility_injector
label: 'COE Brand Utility Injector'
code: |-
  @media screen and (min-width: 768px) {
  	.coe-min-h-300 {
  		min-height: 300px;
  	}
  }

  /************************************************************************

  	SECTION: Image Box Shadow Color
  	
  	PURPOSE: Applies a box shadow color to images
  	
  	INSTRUCTIONS:
  		1. Insert class name (ex. img-bottom-left-hop-bine) into block 
  		2. Configure > Manage Attributes > Block content attributes
  ************************************************************************/

  /** Right Bottom **/
  .img-bottom-right-yellow .field__item img {
  	box-shadow: 15px 15px 0 #FFB500;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  }
  .img-bottom-right-orange .field__item img {
  	box-shadow: 15px 15px 0 #d73f09;
  	margin-bottom: 25px;
  }
  .img-bottom-right-seafoam .field__item img {
  	box-shadow: 15px 15px 0 #B8DDE1;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  }
  .img-bottom-right-hop-bine .field__item img {
  	box-shadow: 15px 15px 0 #AA9D2E;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  }
  .img-bottom-right-blue .field__item img,
  .img-bottom-right-hightide .field__item img{
  	box-shadow: 15px 15px 0 #00859B;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  }
  .img-bottom-right-pine-stand .field__item img {
  	box-shadow: 15px 15px 0 #4A773C;
  	margin-bottom: 25px;
  }
  .img-bottom-right-solar-flare .field__item img {
  	box-shadow: 15px 15px 0 #D3832B;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  }
  .img-bottom-right-rogue-wave .field__item img {
  	box-shadow: 15px 15px 0 #0D5257;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  }



  /** Left Bottom **/
  .img-bottom-left-yellow .field__item img {
  	box-shadow: -15px 15px 0 #FFB500;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }
  .img-bottom-left-orange .field__item img {
  	box-shadow: -15px 15px 0 #d73f09;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }
  .img-bottom-left-seafoam .field__item img {
  	box-shadow: -15px 15px 0 #B8DDE1;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }
  .img-bottom-left-hop-bine .field__item img {
    box-shadow: -15px 15px 0 #AA9D2E;
    margin-bottom: 25px;
    width: calc(100% - 15px);
    margin-left: 15px;
  }
  .img-bottom-left-blue .field__item img {
  	box-shadow: -15px 15px 0 #00859B;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }

  .img-bottom-left-solar-flare .field__item img {
  	box-shadow: -15px 15px 0 #D3832B;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }

  .img-bottom-left-stratosphere .field__item img {
  	box-shadow: -15px 15px 0 #006A8E;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }

  .img-bottom-left-rogue-wave .field__item img {
  	box-shadow: -15px 15px 0 #0D5257;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }
  .img-bottom-left-high-tide .field__item img {
  	box-shadow: -15px 15px 0 #00859B;
  	margin-bottom: 25px;
  	width: calc(100% - 15px);
  	margin-left: 15px;
  }


  /** Right Top **/
  .img-top-right-green .field__item img {
  	box-shadow: 15px -15px 0 #4A773C;
  	margin-top: 25px;
  }
  .img-top-right-hop-bine .field__item img {
  	box-shadow: 15px -15px 0 #AA9D2E;
  	margin-top: 25px;
  }

  /** Left Top **/
  .img-top-left-yellow .field__item img {
  	box-shadow: -15px -15px 0 #FFB500;
  	margin-top: 25px;
  }
  .img-top-left-orange .field__item img {
  	box-shadow: -15px -15px 0 #d73f09;
  	margin-top: 25px;
  }

  /************************************************************************

  	SECTION: Image Height
  	
  	PURPOSE: Applies a height restriction to images
  	
  	INSTRUCTIONS:
  		1. Insert class name (ex. img-bottom-left-hop-bine) into block 
  		2. Configure > Manage Attributes > Block content attributes
  ************************************************************************/

  .img-height-214 img {
  	height: 214px;
  	object-fit: cover;
  }

  .full-width-image img {
  	width: 100%;
  }
  /************************************************************************

  	SECTION: Hide block
  	
  	PURPOSE: Applies a hidden class to a block or section (doesn't hide in layout builder)
  	
  	INSTRUCTIONS:
  		1. Insert class name (ex. temp-hide) into block 
  		2. Configure > Manage Attributes > Block content attributes
  ************************************************************************/

  .temp-hide {
  	display: none;
  }

  @media screen and (min-width: 1200px) {
  	.col-xl-5-important {
  	  width: 41.66666667% !important;
  	}
  }

  @media screen and (min-width: 1400px) {
  	.col-xxl-5-important {
  	  width: 41.66666667% !important;
  	}
  }

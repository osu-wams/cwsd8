id: alumni_magazine_typography_bg_images
label: 'Alumni Magazine (typography, bg images)'
code: |-
  /* Main body background color */
  .node__content,
  main:has( .group) {
  	background-color: #FFF !important;
  }

  /* Breadcrumb background color */
  .container-fluid:has(.madrone-breadcrumb) { 
    background-color: #FFF !important;
  }

  /*================================================================================================================================================================
  	Typography
    ================================================================================================================================================================*/
    
  /* Main/H1 */
  main h1 {
  	font-family: Stratum2Web;
  	font-size: 96px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 96%;
  	
  	color: #D73F09; /* Orange color */
  }
  	
  /* Main/H2 */
  main h2 {
  	color: #000;
  	font-family: Stratum2Web;
  	font-size: 64px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; 
  }

  main h4{
  color: #000;
  	font-family: Stratum2Web;
  	font-size: 30px;
  	font-style: normal;
  	font-weight: 700;
  	line-height: 130%; 
  }
  /* Main/Body */
  main p{
  	color: #000;
  	font-family: "Open Sans";
  	font-size: 18px;
  	font-style: normal;
  	font-weight: 400;
  	line-height: 160%; 
  }
  	 
  /* Main/Body Large */
  .large-body {
  	font-size: 22px;
  	line-height: normal;
  }

  /* Seafoam font color */
  .seafoam-text{
  	color: #B8DDE1 !important;
  }

  /* White font color */
  .white-text {
  	color: #FFF !important;
  }

  /* Orange font color */
  .orange-text {
  	color: #FFB500 !important;
  }


  @media screen and (min-width: 991px){
  .description-text {
  	width: 67%;
  }
  }

  /*================================================================================================================================================================
  	Tablet/Mobile Typography
    ================================================================================================================================================================*/
  	
  @media screen and (max-width: 991px) {
  	main h1 {
  		font-size: 72px;
  		font-style: normal;
  		font-weight: 900;
  		line-height: 96%; 
  	}
  	
  	main h2 {
  		font-size: 44px;
  		font-style: normal;
  		font-weight: 900;
  		line-height: 120%;
  	}

  }

  @media screen and (max-width: 767px) {
  	main h1 {
  		font-size: 56px;
  		font-style: normal;
  		font-weight: 900;
  		line-height: 120%; 
  	}
  	
  	main h2 {
  		font-size: 44px;
  		font-style: normal;
  		font-weight: 900;
  		line-height: 120%;
  	}
  }

  /*================================================================================================================================================================
  	Buttons
    ================================================================================================================================================================*/
    
    
  /*Orange text link with arrow (Not a button)*/
  .Arrow-link-orange{
  	text-transform: uppercase;
  	color: #d73f09 !important;
  	background-image: url(/modules/custom/osu_custom_blocks/dist/arrow-right-red.c4e9b645.svg);
  	background-position: 100%;
  	background-repeat: no-repeat;
  	background-size: 17px;
  	padding-right: 27px;
  	font-family: Stratum2Web;
  	text-decoration: none;
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 500 !important;
  	transition: 0.1s ease;
  }



  .Arrow-link-orange:hover{
  	padding-right: 40px;
  	transition: 0.1s ease;
  }

  .Arrow-link-orange:active{
  	background-color: #fff !important;
  }

  /* Orange arrow link */
  .orange-arrow-link {
    font-family: Stratum2Web;
    font-size: 20px;
    font-style: normal;
    font-weight: 500;
    line-height: normal;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #D73F09; /* Orange color */
    
    text-decoration: none !important;
    background-image: url(/modules/custom/osu_custom_blocks/dist/arrow-right-red.c4e9b645.svg);
    background-position: 100%;
    background-repeat: no-repeat;
    background-size: 20px;
    padding-right: 25px;
    margin-right: 10px;
    margin-top: 18px;
    transition: 0.2s ease;
    border-bottom: none;
  }

  .orange-arrow-link:hover {
  	padding-right: 35px;
  	margin-right: 0px;
  	border-bottom: none;
  }

  .orange-arrow-link:active {
  	background-color: transparent !important;
  	color: #BE3706 !important;
  }

  /* Border style button - seafoam border/teal fill */
  .border-button {
    color: #B8DDE1;
    background-color: #0D5257;
    border: 2px solid #B8DDE1;
    
    max-width: 320px;
    display: block;
    margin-top: 30px;
    padding: 16px 0px;
    
    font-size: 20px;
    text-align: center;
    line-height: normal;
  	letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
    text-decoration: none;
    
    transition: 0.3s ease-in-out;
  }

  .border-button:hover, .border-button:focus{
  	background: #B8DDE1 !important;
  	border: 2px solid #B8DDE1 !important;
  	color: #0D5257;
  }

  .border-button:active {
  	background: #ACCBCF !important;
  	border: 2px solid #ACCBCF !important;
  	color: #0D5257 !important;
  }

  /* Border style button - orange border/blue fill */
  .orange-border-button {
  	color: #FFB500;
    border: 2px solid #FFB500;
    background-color: #003B5C;
  }


  .orange-border-button:hover, .orange-border-button:focus {
  	color: #003B5C !important;
    border: 2px solid #FFB500 !important;
    background-color: #FFB500 !important;
  }

  .orange-border-button:active {
  	background: #D3832B !important;
  	border: 2px solid #D3832B !important;
  	color: #FFB500 !important;
  }

  /*================================================================================================================================================================
  	Alumni Publications Page styling
    ================================================================================================================================================================*/
    
  /* Floats magazine flipping book to right */
  .float-right {
  	float: right;
  }

  /* Alumni Sign Up background */
  .alum-sign-up {
    background-color: #003B5C;
    background-image: url(/sites/engineering.oregonstate.edu/files/2025-03/signup-pattern.svg);
    background-size: 80%;
    background-position: left 543px top 88px;
    background-repeat: no-repeat;
    min-height: 500px;
  }

  @media screen and (max-width: 991px) {
  	.alum-sign-up {
  		background-size: 150%;
  	  background-position: left 79px top 162px;
  	}
  }

  @media screen and (max-width: 767px) {
  	.alum-sign-up {
  		height: 650px;
  		background-size: 300%;
      background-position: left -208px top 249px;
  	}
  	
  	.float-right {
      float: none;
  	}
  }


  .img-bottom-right-hop-bine img {
  	box-shadow: 15px 15px 0 #AA9D2E;
  	margin-bottom: 25px;
  }

  .img-bottom-right-beaver-orange img {
  	box-shadow: 15px 15px 0 #D73F09;
  	margin-bottom: 25px;
  }

  /* Shorten height of publications stories card */
  /*@media only screen and (max-width: 991px) { */
  /*	#views-bootstrap-engr-stories-block-12 .story-card {*/
  /*    height: 630px !important;*/
  /*  }*/
  	
  /*}*/

  /*================================================================================================================================================================
  	Mobile/Tablet Background changes
    ================================================================================================================================================================*/
  @media screen and (max-width: 767px) {
  	.alumni-pub-mag {
  		background-image: url(/sites/engineering.oregonstate.edu/files/2025-03/alumni-mag-bg-mobile.svg) !important;
  		background-position: top !important;
  	}
  }

  @media screen and (min-width: 768px) and (max-width: 991px) {
    
  	.alumni-card-title {
  		  font-size: 18px !important;
  		 
  		}

  	 /* .col-md-4 {*/
  	 /*   flex: 0 0 50%;*/
  	 /*   max-width: 50%;*/
  	 /* }*/
  	
  	 
  		/*.alumni-card{*/
  		/*	max-width:50%!important;*/
  		/*}*/
  		
  		.alumni-pub-mag {
  			background-image: url(/sites/engineering.oregonstate.edu/files/2025-03/alumni-mag-bg-tablet.svg) !important;
  		}
  }

  /*================================================================================================================================================================
  	Alumni Archive Page Styling
    ================================================================================================================================================================*/

  .alumni-card,
  .block-inline-blockalumni-mag-cards{
  	width: 97% !important;
  	height: auto !important;
  	flex-shrink: 0;
  	border-radius: 5px;
    overflow: hidden;
    box-shadow: 2px 4px 8px 0 rgba(0, 0, 0, 0.08);
    border: 1px solid var(--Useful-Light-Grey, #ECEDEE);
    text-align: center;
    margin-bottom: 30px;
  }

  .alumni-card:hover,
  .block-inline-blockalumni-mag-cards:hover{
  	background: #F9FCFD !important;
  	transition: .3s;
  	box-shadow: 0px 1px 3px 0px rgba(0, 0, 0, 0.08) !important;
  }

  .alumni-card-img-top img, 
  .field--name-field-card-image img {
    width: 100% !important;
    height: auto !important;
    object-fit: cover;
    display: block;
  }

  .alumni-card-title,
  .field--name-field-card-title{
    margin: 30px;
    font-size: 20px !important;
    font-weight: 600;
    color: #000;
    font-family: "Open Sans";
    text-decoration: none !important;
    text-align: left;
  }

  .alumni-card-title a{
  	color:black;
  	text-decoration: none !important;
  }

  .card-grid{
  	display: flex;
    flex-wrap: wrap;
  }

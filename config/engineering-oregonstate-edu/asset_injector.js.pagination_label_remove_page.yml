id: pagination_label_remove_page
label: 'Pagination Label (Remove "Page")'
code: |-
  const pageNumber = document.querySelector(".Event-video-library-filters .pager__item.disabled .page-link");

  pageNumber && (pageNumber.textContent = pageNumber.textContent.replace("Page ", ""));


  const storiespageNumber = document.querySelector(".related-stories .pager__item.disabled .page-link");

  storiespageNumber && (storiespageNumber.textContent = storiespageNumber.textContent.replace("Page ", ""));

  // Drupal uses ajax to dynamically load content in pages. So, instead of loading JS on every page, it just 
  // loads JSQ on initial loading. Which is why I am hooking into Drupal's AJAX System to update text everytime
  // when Drupal is reloading the Sub pages.
  // AI Seminars Page only.
  (function ($, Drupal) {
      // Function to replace pagination text
      function replacePaginationText(context) {
          const pageSpans = (context || document).querySelectorAll('.pager__items span.page-link');
          pageSpans.forEach(span => {
              if (span.textContent.includes('Page ')) {
                  span.textContent = span.textContent.replace('Page ', '');
              }
          });
      }
      // Run immediately on script load (before Drupal behaviors)
      replacePaginationText();
      // Also register as Drupal behavior for AJAX updates
      Drupal.behaviors.customPagination = {
          attach: function (context, settings) {
              replacePaginationText(context);
          }
      };
  })(jQuery, Drupal);

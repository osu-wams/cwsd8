id: image_with_text_cards
label: 'Image with text cards'
code: |-
  /*
  * This injector controls the styling for image and link cards. Used on the OSA page.
  */

  .image-text-cards{
  	width: 100%;
  	height: 100%;
  	flex-shrink: 0;
  	border-radius: 5px;
  	border: 1px solid #F8F9FA;
  	background: #FFF;
  	box-shadow: 2px 4px 8px 0px rgba(0, 0, 0, 0.08);
  }

  .image-text-cards img{
  	width: 100%;
  	height: 100%;
  }

  .image-text-cards h6{
  	padding: 30px;
  	text-decoration: none;
  }

  /*Tablet styling */

  @media only screen and (min-width:415px) and (max-width: 991px) {
  	.image-text-cards{
  		width: 75%;
  		height: 75%;
  		margin-left: 12.5%;
  	}
  	.image-text-cards img{
  		width: 100%;
  	}
  }

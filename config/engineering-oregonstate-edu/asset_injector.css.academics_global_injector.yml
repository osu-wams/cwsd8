    	margin-top: 16px;
  		display: block;
  		justify-content: center;
  	  align-items: center;
  	}
  	
  	/* Number block number margin update */
  	.field--name-field-coe-numbers-number {
  		margin-top: 64px;
  	}
  }

  /*================================================================================================================================================================
  	SECTION: Two Column Feature Option (Faculty Feature, Alumni Feature, Student Feature)
  	
  	PURPOSE: Styling for two column layout of feature section that could be two column or quote layout
  	==============================================================================================================================================================*/

  /* Size content image */
  .coe-quote-or-image-layout .paragraph--type--coe-image-with-text img {
  	width: 100%;
  	height: 420px;
  	object-fit: cover;
  }

  /* Set flex layout for paragraph */
  .coe-quote-or-image-layout .paragraph--type--coe-image-with-text {
  	display: flex;
  	flex-direction: row-reverse;
  	justify-content: space-between;
  	align-items: center;
  }

  .block-field-blocknodeundergraduate-programfield-up-alumni-feature .paragraph--type--coe-image-with-text {
  	flex-direction: row;
  }

  /* Half width for image and text */
  .coe-quote-or-image-layout .paragraph--type--coe-image-with-text > div {
  	width: calc(50% - 10px);
  }

  /* Spacing above body text */
  .coe-quote-or-image-layout .paragraph--type--coe-image-with-text p {
  	margin-top: 16px;
  }

  /* Spacing above link */
  .coe-quote-or-image-layout .paragraph--type--coe-image-with-text .field--name-field-coe-2-col-img-txt-link {
  	margin-top: 32px;
  }

  /***************************************
  	Mobile Layout
  	*************************************/
  @media screen and (max-width: 767px) {
  	/* Column layout on mobile */
  	.coe-quote-or-image-layout .paragraph--type--coe-image-with-text {
  		flex-direction: column-reverse;
  		gap: 50px;
  	}
  	
  	/* Full width text and image on mobile */
  	.coe-quote-or-image-layout .paragraph--type--coe-image-with-text > div {
  		width: 100%;
  	}
  }

  /*================================================================================================================================================================
  	SECTION: Feature Quote Block
  	
  	PURPOSE: Styling for quote option on feature sections
  	==============================================================================================================================================================*/
  	
  .field__item:not(.field--name-field-dp-quote-option) > .paragraph--type--coe-quote-with-image {
  	display: flex;
  	flex-direction: row-reverse;
  }

  .field__item:not(.field--name-field-dp-quote-option) > .paragraph--type--coe-quote-with-image > div {
  	width: 50%;
  }


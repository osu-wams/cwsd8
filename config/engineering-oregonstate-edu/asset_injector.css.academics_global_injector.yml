  	padding: 10px !important;
  	margin-bottom: 10px;
  	margin-right: 10px;
  }


  /*------------------------------------------------------------------------------
  	Sub-Section: Social Media Icons
  	
  	Styling for social media icons
  	----------------------------------------------------------------------------*/

  /** Social Media icons **/
  main .social-media-icons a:active,
  main .social-media-icons a:focus {
  	background: white !important;
  	border: none !important;
  }

  /* Spread social media icons across container */
  .social-media-icons {
  	display: flex;
  	gap: 0px;
  	justify-content: space-between;
  }

  /* Set icon button appearence */
  .social-media-icons .fa-2x{
  	background-color: transparent;
      border-radius: 50%;
      width: 44px;  /* Set a fixed width */
      height: 44px; /* Set equal height */
      display: flex; /* Use flexbox for centering */
      align-items: center; /* Center vertically */
      justify-content: center; /* Center horizontally */
      transition: all 0.5s ease;
      margin-left: -10px;
  }

  /* Circular orange background on hover */
  .social-media-icons .fa-2x:hover,
  .social-media-icons .fa-2x:focus {
      background-color: #d73f09;
  	color: white;
  }

  /* Maintain hover style through active state */
  .social-media-icons .fa-2x:active {
  	background-color: #d73f09;
  	color: white;
  }

  /* Larger icon size on desktop */
  @media screen and (min-width: 1200px) {
  	.social-media-icons .fa-2x {
  		font-size: 24px;
  	}
  }

  /* Align social media icons to the left on tablet (reverts to full width on mobile) */
  @media screen and (max-width: 1199px) and (min-width: 768px) {
  	.social-media-icons {
  		margin-top: 40px;
  		gap: 40px;
  		justify-content: flex-start;
  	}
  }

  /* Fix icon left spacing on tablet/mobile */
  @media screen and (max-width: 1199px) {
  	.social-media-icons .fa-2x {
          margin-left: 0px;
  	}
  }

  /*================================================================================================================================================================
  	SECTION: Numbers Block Styling
  	
  	PURPOSE: Styling for numbers block, statistics display
  	==============================================================================================================================================================*/

  /* Hide when not populated */
  .block-field-blocknodedegree-programsfield-dp-numbers-block:not(:has(.paragraph--type--coe-numbers-block)) {
      display: none;
  }

  /* Center content */
  .field--name-field-dp-numbers-headline h3,
  .block-field-blocknodedegree-programsfield-dp-numbers-body,
  .field--name-field-coe-numbers-number,
  .field--name-field-coe-divider {

  .field--name-field-dp-quote-option .paragraph--type--coe-quote-with-image .field--name-field-coe-quote-attribution-name div, 
  .field--name-field-dp-quote-option .paragraph--type--coe-quote-with-image .field--name-field-coe-quote-attribution-desc p, 
  .field--name-field-dp-quote-option .paragraph--type--coe-quote-with-image .field--name-field-coe-quote-attribution-desc,

  	border: 2px solid #000 !important;
  	color: #fff;
  	padding-right: 16px;
  }

  /*------------------------------------------------------------------------------
  	Sub-Section: Degree Types and Locations
  	
  	Styling for the degree types view and locations view
  	----------------------------------------------------------------------------*/
  	
  /* Display chips in a flex-box */
  .views-view-grid:has(.views-field-field-coe-degree-type-undergrad, 
  .views-field-field-coe-degree-type-graduate) .field-content{
  	display: flex;
  	flex-wrap: wrap;
  }

  /* Light blue background for chip elements */
  .Degree-types {
  	border-radius: 3px !important;
  	background-color: rgba(184, 221, 225, 0.3);
  	padding: 10px !important;
  	margin-bottom: 10px;
  	margin-right: 10px;
  	width: auto;
  }

  .degree-types-text{
  	padding-left: 0px !important;
  }

  .degree-types-location p{
  	border-radius: 3px !important;

  	  margin-right: -50px;
  	  transform: scale(0.83);
  	}
  }

  /*================================================================================================================================================================
  	SECTION: Video with Text Layout
  	
  	PURPOSE: Styling for video with descriptive text
  	==============================================================================================================================================================*/

  /* Spacing between text and video */
  .paragraph--type--coe-video-with-text h4 {
  	margin-top: 30px;
  }

  .dp-video-background{
  	height: 0px;
  }

  /* Utilizing an old CSS2 trick to responsively size the frame (padding-bottom percent is calculated based on width) */
  .paragraph--type--coe-video-with-text .field--name-field-media-oembed-video .field__item {
    position: relative;
    width: 100%;
    height: 0;
    padding-bottom: 56.25%; /* The height of the item will now be 56.25% of the width. */
  }

  /* Adjust the iframe so it's rendered in the outer-width and outer-height of it's parent */
  .paragraph--type--coe-video-with-text iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    left: 0;
    top: 0;
  }

  /* Indent all text to the left, not on tablet */
  @media screen and (min-width: 768px) {
  	.paragraph--type--coe-video-with-text fieldset {
  		margin-left: 200px;
  	}
  }

  /* Spacing above body text */
  .paragraph--type--coe-video-with-text .field--name-field-coe-video-text-body {
  	margin-top: 10px;
  }

  /***************************************
  	Background Image Layout
  	*************************************/
  	
  /* Position background image behind video */
  .dp-video-background img {
  	object-position: 0% 0%;
  	margin-bottom: -70%;
  	min-width: 110%;
  	width: 110%;
  	margin-left: -6%;
  }

  /* Large Tablet Sizing */
  @media screen and (max-width: 1199px) {
  	.dp-video-background img {
  		object-fit: contain;
  		min-width: 100vw;
  		width: 100vw;
  		margin-left: calc(-1* calc(calc(100vw - 100%) / 2));
  	}
  }

  /* Tablet Sizing */
  @media (min-width: 992px) {
  	.dp-video-background img {
  		height: 270px;
  	}
  }

  /* Hide background on mobile */
  @media (max-width: 767px) {
  	.dp-video-background img {
  		display: none;
  	}
  }

  /* Hide background when there is no video */
  div:has(> .container > .layout > .col-12 > .dp-video-background):not(:has(.field--name-field-dp-video, .field--name-field-up-video, .field--name-field-gp-video-feature)) .dp-video-background,
  div:has(> .container > .layout > .col-12 > .dp-video-background):not(:has(.field--name-field-dp-video, .field--name-field-up-video, .field--name-field-gp-video-feature)) .dp-video-background img {
  	display: none !important;
  }

  .node--type-degree-programs .col-12:has(> .dp-video-background):not(:has(.field--name-field-dp-video)) .dp-video-background,
  .node--type-degree-programs .col-12:has(> .dp-video-background):not(:has(.field--name-field-dp-video)) .dp-video-background img,
  .node--type-undergraduate-program .col-12:has(> .dp-video-background):not(:has(.field--name-field-up-video)) .dp-video-background,
  .node--type-undergraduate-program .col-12:has(> .dp-video-background):not(:has(.field--name-field-up-video)) .dp-video-background img,
  .node--type-graduate-program .col-12:has(> .dp-video-background):not(:has(.field--name-field-gp-video)) .dp-video-background,
  .node--type-graduate-program .col-12:has(> .dp-video-background):not(:has(.field--name-field-gp-video)) .dp-video-background img {
  	display: none !important;
  }

  /*================================================================================================================================================================
  	SECTION: Facilities Block
  	
  	PURPOSE: Styling for the block about facilities descriptions
  	==============================================================================================================================================================*/

  /* Flex layout */
  .coe-facilities-layout .paragraph {
  	display: flex;
  	justify-content: space-between;
  	align-items: center;
  }

  /* Half width for image */
  .coe-facilities-layout .paragraph > .field--name-field-coe-2-col-img-txt-image {
  	width: 50%;
  }

  /* Half width minus spacing for text */
  .coe-facilities-layout .paragraph > div {
  	width: calc(50% - 96px);
  }

  /* Size image */
  .coe-facilities-layout .paragraph img {
  	width: 100%;
  	height: 450px;
  	object-fit: cover;
  }


  /* Reduced spacing for text on smaller desktop */
  @media only screen and (max-width: 1399px){
  	.coe-facilities-layout .paragraph > div {
  		width: calc(50% - 64px);
  	}
  }
  /* Reduced spacing for text on tablets */
  @media only screen and (max-width: 1199px){
  	.coe-facilities-layout .paragraph > div {
  		width: calc(50% - 32px);
  	}
  }

  /* Mobile Styling */
  @media only screen and (max-width: 767px){
  	/* Column layout on mobile */
  	.coe-facilities-layout .paragraph {
  		flex-direction: column;
  		gap: 30px;
  	}
  	
  	/* Full width content on mobile */
  	.coe-facilities-layout .paragraph > .field--name-field-coe-2-col-img-txt-image,
  	.coe-facilities-layout .paragraph > div {
  		width: 100%;
  	}
  }

  /*================================================================================================================================================================
  	SECTION: Program Initiatives Section
  	
  	PURPOSE: Styling for the program initiatives section
  	==============================================================================================================================================================*/
  .initiatives-block:not(:has(.field--name-field-dp-initiatives-headline)),
  .undergrad-initiatives:not(:has(.field--name-field-up-initiatives-headline)),
  .graduate-initiatives:not(:has(.field--name-field-gp-initiatives-headline)) {
      display: none;
  }

  .field--name-field-up-initiatives .d--name-field-coe-2-col-img-txt-headline h3{
  	font-size: 24px !important;
  }

  .initiatives-block,
  .undergrad-initiatives,
  .graduate-initiatives {
  	padding: 80px 0px;
  	background: var(--Secondary-Star-Canvas, #003B5C);
  	position: relative;
  }

  .initiatives-block > div,
  .undergrad-initiatives > div,
  .graduate-initiatives > div {
  	position: relative;
  }

  .field--name-field-dp-initiatives,
  .field--name-field-up-initiatives,
  .field--name-field-gp-initiatives {
  	display: flex;
  	flex-wrap: wrap;
  	justify-content: space-between;
  }

  .field--name-field-dp-initiatives > .field__item,
  .field--name-field-up-initiatives > .field__item,
  .field--name-field-gp-initiatives > .field__item {
    width: calc(50% - 10px);
  }

  .field--name-field-dp-initiatives-headline h2 {
  	margin-bottom: 62px;
  }

  .field--name-field-up-initiatives-headline h3,
  .field--name-field-gp-initiatives-headline h3 {

  }

  /* Body text width */
  .field--name-field-dp-numbers-body {
  	text-align: center;
  	margin-top: 16px;
  	display: inline-block;
  	width: 66%;
  }

  /* Academic Number block container styling */
  .field--name-field-dp-numbers-block {
  	margin-top: 64px;
  	display: flex;
  	justify-content: space-around;
    align-items: center;
  }


  /* Number block width adjustment to have fixed width regardless of content and screen size*/
  .paragraph--type--coe-numbers-block ._none .container .row .col-12 {
  	width: 228px;
  }

  /* Number descriptive label width and spacing */
  .field--name-field-coe-label {
  	max-width: 80%;
    margin: 0 auto;
    padding-top: 16px;
    text-align: center;
  }

  /* Dimension updates for Mobile screen */
  @media only screen and (max-width: 767px) {
  	

  	height: 375px;
  	width: 100%;
  	object-fit: cover;
  }

  .field__item:not(.field--name-field-dp-quote-option) > .paragraph--type--coe-quote-with-image fieldset {
  	width: calc(50% + 80px);
  	margin-left: -80px;
  	position: relative;
  	z-index: 1;
  	border: 3px solid #D73F09;
  	background: #FFF;
  	padding: 50px;
  	display: block;
  	margin-top: 40px;

  	text-transform: uppercase;
  	display: inline;
  }

  .field__item:not(.field--name-field-dp-quote-option) > .paragraph--type--coe-quote-with-image fieldset .field--name-field-coe-quote-attribution-name:after {
  	content: ', ';
  }

  .field__item:not(.field--name-field-dp-quote-option) > .paragraph--type--coe-quote-with-image fieldset .field--name-field-coe-quote-attribution-desc {
  	font-size: 18px;

  		flex-direction: column-reverse;
  	}
  	
  	.field__item:not(.field--name-field-dp-quote-option) > .paragraph--type--coe-quote-with-image > div {
  		width: 100%;
  	}
  	
  	.field__item:not(.field--name-field-dp-quote-option) > .paragraph--type--coe-quote-with-image fieldset {
  		width: calc(100% - 20px);
  		margin: -48px 10px 0px;
  	}
  	
  	.field__item:not(.field--name-field-dp-quote-option) > .paragraph--type--coe-quote-with-image fieldset .field--name-field-coe-quote-quotation:before {
  	    margin-right: -40px;
  	}
  }

  /*================================================================================================================================================================

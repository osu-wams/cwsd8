      background-repeat: no-repeat;
      background-size: 40px;
      background-color: white;
      border: 3px solid #d73f09;
      border-radius: 5px;
      padding: 25px;
      padding-right: 65px;
      box-shadow: 2px 4px 4px rgba(0, 0, 0, 0.12);
      max-width: 550px;
      margin-bottom: 1rem;
      transition: background-image 0.4s ease-in, background-color 0.4s ease-in;
      width: calc(50% - 10px);
      position: relative;
  }

  /* Hover effects for container around link */
  .field--name-field-dp-main-desc-buttons div:hover, 
  /** MXC specificity below **/
  .info-resources p:hover , 
  .grad-resources p:hover {
    background-color: #d73f09;
    background-size: 40px;
    background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" width="41" height="33" viewBox="0 0 41 33" fill="none"><path d="M2 16.5H33.5" stroke="%23FFFFFF" stroke-width="4" stroke-linecap="square" stroke-linejoin="round"/><path d="M24.5 30L38 16.5L24.5 3" stroke="%23FFFFFF" stroke-width="4" stroke-linecap="square"/></svg>') !important;
    box-shadow: none;
  }

  /* Active effects for container around link */
  .field--name-field-dp-main-desc-buttons div:active, 
  /** MXC specificity below **/
  .info-resources p:active , 
  .grad-resources p:active,
  .field--name-field-dp-main-desc-buttons div:has(> a:active), 
  /** MXC specificity below **/
  .info-resources p:has(> a:active), 
  .grad-resources p:has(> a:active) {
    background-color: #BE3706;
    background-size: 40px;
    background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" width="41" height="33" viewBox="0 0 41 33" fill="none"><path d="M2 16.5H33.5" stroke="%23FFFFFF" stroke-width="4" stroke-linecap="square" stroke-linejoin="round"/><path d="M24.5 30L38 16.5L24.5 3" stroke="%23FFFFFF" stroke-width="4" stroke-linecap="square"/></svg>') !important;
    box-shadow: none;
  }


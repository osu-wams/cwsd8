code: |
  /*
  ==================================================================================================================================================================
  ==================================================================================================================================================================
  	--ACADEMICS PAGES--
  	
  	Global Academics Content Types Styling> * > 
  ==================================================================================================================================================================
  ==================================================================================================================================================================
  */

  /*================================================================================================================================================================
  	SECTION: General Styling
  	
  	PURPOSE: Configurations of styles used across all aspects of every academics page
  	==============================================================================================================================================================*/
  	
  /*------------------------------------------------------------------------------
  	Sub-Section: Page Background Color (White)
  	
  	Used to override original site background color theme
  	----------------------------------------------------------------------------*/

  /* Main body background color */
  .layout-content {
  	background-color: #FFF !important;
  }

  /* Breadcrumb background color */
  .container-fluid:has(.madrone-breadcrumb) { 
    background-color: #FFF !important;
  }

  @media screen and (min-width: 1200px) {
  	.col-xxl-8 {
  		width: 66.66666667%;
  	}
  	.col-xxl-4 {
  		width: 33.33333333%;
  	}
  	
  }

  /*------------------------------------------------------------------------------
  	Sub-Section: Typography
  	
  	Used to style the di44pxfferent header levels and body text in the pages
  	----------------------------------------------------------------------------*/

  /***************************************
  	Base Styles
  	*************************************/

  /* Title */
  .block-field-blocknodedegree-programstitle h1 {
  	font-size: 128px;
  	line-height: 100%; /* 128px */
  }

  /* Main/H1 */
  main h1, main .h1 {
  	color: #000;
  	font-family: Stratum2Web;
  	font-size: 96px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 96%; /* 92.16px */
  	position: relative;
  	z-index: 2;
  }
  	
  /* Main/H2 */
  main h2, main .h2,
  .field--name-field-dp-campus-feature h3 {
  	color: #000;
  	font-family: Stratum2Web;
  	font-size: 64px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 83.2px */
  	text-transform: none;
  }

  /* Main/H3 */
  main h3, main .h3,
  .field--name-field-gp-hero-subheader,
  .field--name-field-up-hero-sub-heading,
  .career-prospects-title /* Career Prospects Undergraduate Section Header */ ,
  .ug-student-experience-headline h2,
  .video-text h4,
  .related-students .field--name-field-up-student-groups-headline,
  .field--name-field-dp-newsletter .field--name-field-coe-text-with-link h4,
  .field--name-field-dp-newsletter .field--name-field-coe-text-with-link h2,
  .field--name-field-gp-labs-and-research h4 {
  	color: #000;
  	font-family: Stratum2Web;
  	font-size: 36px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 46.8px */
  	text-transform: none;
  	letter-spacing: normal;
  }

  /* Font spacing correction for Graduate Program Details */
  .field--name-field-gp-program-details h4 {
  	margin-top: 50px;
  }

  /* Main/H4 */
  main h4, main .h4,
  .field--name-field-discipline-research-areas, /* Discipline Research Area Labels */
  .programfield-up-salary-expectation h4, /* Salary Expectation Numbers */ 
  .field--name-field-up-initiatives .field--name-field-coe-2-col-img-txt-headline h4, 
  .field--name-field-gp-initiatives .field--name-field-coe-2-col-img-txt-headline h4, /* Undergrad/Grad Program Initiatives Sub-headers */
  .field--name-field-gp-faculty-research-area h3 /* Faculty Research Areas Card Headers */,
  .field--name-field-dp-research-areas .h4 /* Faculty Research Areas Card Headers Update */{
  	font-family: Stratum2Web;
  	font-size: 24px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%;
  	letter-spacing: 1.2px;
  	text-transform: uppercase;
  	color: #000;
  }

  .field--name-field-dp-newsletter .field--name-field-coe-text-with-link h4, .field--name-field-dp-newsletter .field--name-field-coe-text-with-link h2{
  	text-transform: none !important;
  }

  /* Main/H5 */
  main h5, main .h5,
  .program-sidebar-header, 
  .engagement-sidebar-header, 
  .getInTouch-sidebar-header, /* Sidebar Headers */
  .field--name-field-up-campus-messaging .field--name-field-cb-title h2, 
  .field--name-field-gp-campus-messaging .field--name-field-cb-title h2, /* Campus Messaging Headers */
  .field--name-field-up-competitions-and-awards .field--name-field-coe-2-col-img-txt-headline::before /* Competitions and Awards Headline/Label */, 
  .sidebar-menu h2,
  .field--name-field-gp-special-event .paragraph--type--coe-image-with-text .field--name-field-coe-2-col-img-txt-headline::before {
  	color: #000;
  	font-family: "Open Sans";
  	font-size: 22px;
  	font-style: normal;
  	font-weight: 700;
  	line-height: 130%; /* 28.6px */
  	letter-spacing: 1.1px;
  	text-transform: uppercase;
  	z-index: 3 !important;
  }

  /* Main/H6 */
  main h6, main .h6,
  .views-label-field-degree-type-undergraduate-1, 
  [id^="views-bootstrap-degree-types-and-locations"] h3.views-label, /* degree type and location headers */
  [id^="views-bootstrap-degree-types-and-locations"] h2.views-label,
  .views-label-field-degree-type-graduate, 
  .views-label-field-degree-type-undergraduate, 
  .field--name-field-discipline-locations .field__label,
  .views-label-field-dp-location, /* Degree Types and Locations Headers/Labels */
  .field--name-field-dp-announcement, 
  .field--name-field-up-announcement, 
  .field--name-field-gp-announcement, 
  .block-field-blocknodedegree-programsfield-dp-announcement .field--name-field-dp-announcement a, 
  .block-field-blocknodeundergraduate-programfield-up-announcement .field--name-field-up-announcement a, 
  .block-field-blocknodegraduate-programfield-gp-announcement .field--name-field-gp-announcement a, /* Announcement Block/Section Text */
  .dp-title-field-h6, 
  .field--name-field-gp-admissions-process .field__label,/* Class to make chosen block titles styled as h6 */
  .field--name-field-dp-academic-contact > .field__label, 
  .field--name-field-dp-industry-contact > .field__label, /* Academic/Industry Contact Information Labels */
  .block-field-blocknodedegree-programsfield-dp-faculty-list-body > h2 /* Faculty List Header/Label */ {
  	color: #000;
  	font-family: "Open Sans";
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 600 !important;
  	line-height: 130%; /* 26px */
  	letter-spacing: normal;
  	text-transform: none;
  }

  /* Additional space correction for admission-process naturally not being H6 */
  .field--name-field-gp-admissions-process .field__label,
  .dp-title-field-h6 {
  	margin-bottom: 12px;
  }

  /* Main/Body Large */
  .paragraph--type--salary-expectations .field--type-string, .body-text {
  	color: #000;
  	font-family: "Open Sans";
  	font-size: 22px;
  	font-style: normal;
  	font-weight: 400;
  	line-height: normal;
  }

  /* Main/Body */
  main {
  	color: #000;
  	font-family: "Open Sans";
  	font-size: 18px;
  	font-style: normal;
  	font-weight: 400;
  	line-height: 160%; /* 28.8px */
  }

  nav, nav a {
  	color: #000;
  }

  /* Main/Body Small */
  .Degree-types-text,
  .paragraph--type--coe-salary-expectations h5,
  .field--name-field-discipline-locations .field__item{
  	color: #000 !important;
  	font-family: "Open Sans";
  	font-size: 14px;
  	font-style: normal;
  	font-weight: 300;
  	line-height: 130%; /* 18.2px */
  }

  /***************************************
  	Tablet/Mobile Styles
  	*************************************/
  @media screen and (max-width: 991px) {
  	/* Tablet/H1 */
  	main h1, main .h1,
  	.block-field-blocknodedegree-programstitle h1 {
  		font-size: 72px;
  		line-height: 96%;
  	}
  	
  	/* Tablet/H2 */
  	main h2, main .h2,
  	.field--name-field-dp-campus-feature h3 {
  		font-size: 48px;
  		line-height: 120%; /* 52.8px */
  	}
  	
  	/* Tablet/H5 */
  	main h5, main .h5,
  	.program-sidebar-header, 
      .engagement-sidebar-header, 
      .getInTouch-sidebar-header, 
      .block-field-blocknodegraduate-programfield-gp-admissions-process > h2, 
      .block-field-blocknodegraduate-programfield-gp-helpful-links-body > h2, 
      .block-field-blocknodegraduate-programfield-gp-helpful-links-body > h2, 
      .block:has(.social-media-icons) > h2, 
      .block-field-blocknodegraduate-programfield-gp-related-programs-body > h2, /* Sidebar Headers */
  	.field--name-field-up-campus-messaging .field--name-field-cb-title h2, 
      .field--name-field-gp-campus-messaging .field--name-field-cb-title h2, /* Campus Messaging Headers */
  	.field--name-field-up-competitions-and-awards .field--name-field-coe-2-col-img-txt-headline::before, /* Competitions and Awards Headline/Label */
  	.field--name-field-gp-special-event .paragraph--type--coe-image-with-text .field--name-field-coe-2-col-img-txt-headline::before {
  		font-size: 18px;
  		z-index: 3 !important;
  	}	
  }

  @media screen and (max-width: 767px) {
  	/* Mobile/H1 */
  	main h1, main .h1,
  	.block-field-blocknodedegree-programstitle h1 {
  		font-size: 56px;
  		line-height: 120%; /* 67.2px */
  	}
  	/* Mobile/H2 */
  	main h2, main .h2,
  	.field--name-field-dp-campus-feature h3 {
  		font-size: 44px;
  	}
  	
  	/* Mobile/H5 */
  	main h5, main .h5,
  	.program-sidebar-header, 
      .engagement-sidebar-header, 
      .getInTouch-sidebar-header, 
      .block-field-blocknodegraduate-programfield-gp-admissions-process > h2, 
      .block-field-blocknodegraduate-programfield-gp-helpful-links-body > h2, 
      .block-field-blocknodegraduate-programfield-gp-helpful-links-body > h2, 
      .block:has(.social-media-icons) > h2, 
      .block-field-blocknodegraduate-programfield-gp-related-programs-body > h2, /* Sidebar Headers */
  	.field--name-field-up-campus-messaging .field--name-field-cb-title h2, 
      .field--name-field-gp-campus-messaging .field--name-field-cb-title h2, /* Campus Messaging Headers */
  	.field--name-field-up-competitions-and-awards .field--name-field-coe-2-col-img-txt-headline::before, /* Competitions and Awards Headline/Label */
  	.field--name-field-gp-special-event .paragraph--type--coe-image-with-text .field--name-field-coe-2-col-img-txt-headline::before {
  		font-size: 18px;
  		letter-spacing: 0.9px;
  		z-index: 3 !important;
  	}
  }

  /***************************************
  	Alternate Text Color
  	*************************************/
  	
  /* Yellow Text */
  .field--name-field-dp-campus-feature h3, /* Discipline Campus Feature Header */
  .initiatives-block h2, 
  .field--name-field-up-initiatives-headline h3, 
  .field--name-field-gp-initiatives-headline h3, /* Discipline/Undergrad Programs Initiatives Section Header */
  .discipline-newsletter-section h4, /* Discipline Newsletter Header */ 
  .oregon-lifestyle h5, /* Oregon Lifestyle Label */ 
  .field--name-field-up-competitions-and-awards .field--name-field-coe-2-col-img-txt-headline::before,
  .field--name-field-dp-newsletter .field--name-field-coe-text-with-link h4, .field--name-field-dp-newsletter .field--name-field-coe-text-with-link h2{
  	color: #FFB500;
  }

  /* Orange Text */
  main .orange-text,
  .field--name-field-dp-main-desc-headline h2, /* Discipline Main Description Header */
  .field--name-field-dp-numbers-headline h3, 
  .field--name-field-gp-hero-subheader, /* Graduate Sub-heading */
  .field--name-field-up-hero-sub-heading,/* Undergrad Sub-header */
  .student-groups-section h3, /* Student Groups Headline */
  .field--name-field-special-event-header h5,
  .accreditation-title h1,
  .field--name-field-commission-headline h3,
  .field--name-field-program-outcomes-header h4,
  .field--name-field-student-outcomes-header h4,
  .block-views-blockengr-stories-block-11 h2,
  .field--name-field-gp-special-event .paragraph--type--coe-image-with-text .field--name-field-coe-2-col-img-txt-headline::before {
  	color: #D73F09;
  }

  /* White Text */
  .field--name-field-dp-campus-feature, /* Discipline Campus Feature Body */
  .initiatives-block h3 /* Discipline Programs Initiatives Card Header */,
  .initiatives-block, /* Discipline Programs Initiatives Card Body */
  .discipline-newsletter-section, /* Discipline Newsletter Body */ 
  .field--name-field-up-initiatives .field--name-field-coe-2-col-img-txt-headline h4,
  .field--name-field-up-initiatives .field--name-field-coe-2-col-img-txt-body, /* Undergraduate Program Initiatives Sub-header/Body  */
  .field--name-field-gp-initiatives .field--name-field-coe-2-col-img-txt-headline h4,
  .field--name-field-gp-initiatives .field--name-field-coe-2-col-img-txt-body,
  .oregon-lifestyle h3, 
  .oregon-lifestyle p,
  .field--name-field-up-competitions-and-awards .field--name-field-coe-2-col-img-txt-headline h3,
  .field--name-field-up-competitions-and-awards
  {
  	color: #FFF;
  }

  .tab-wrapper-paragraph__tab-link {
  	color: #000;
  }

  /*------------------------------------------------------------------------------
  	Sub-Section: Link Styles
  	
  	Used to apply various link styling to the pages
  	----------------------------------------------------------------------------*/

  /***************************************
  	Orange Arrow Links
  	*************************************/

  /* All field--type-link by default (not inline links) */
  *:not(.field--name-field-gp-labs-and-research) > * > .field--type-link:not(
  	.field--name-field-coe-dp-contact-email, /* Do not apply to contact paragraph type */
  	.field--name-field-dp-main-desc-buttons, /* Do not apply to discipline main description buttons */
  	.field--name-field-coe-focus-area-link-title, /* Do not apply to undergrad/grad focus area cards */
  	.field--name-field-coe-focus-area-link-html,
  	.field--name-field-up-related-programs-links, 
    .field--name-field-gp-related-programs-links, /* Do not apply to related programs sidebar links */
  	.field--name-field-campus-visit-button, 
    .field--name-field-request-information-button, 
    .field--name-field-up-request-info-button,
  	.field--name-field-up-campus-visit-button,
  	.field--name-field-up-apply-button, /* Do not apply to next steps sidebar buttons */
  	.field--name-field-gp-request-info-button, 
    .field--name-field-gp-campus-visit-button, 
    .field--name-field-gp-apply-button,
    .field--name-field-gp-labs-and-research .field--name-field-multiple-links
  ) a,
  .oregon-lifestyle a, /*Oregon Lifestyle hardcoded link */
  .grad-program-details-link, a.orange-arrow-link, a.yellow-arrow-link, .read-more-link a, .orange-arrow-link > a {
  	font-family: Stratum2Web;
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 500;
  	line-height: normal;
  	letter-spacing: 1px;
  	text-transform: uppercase;
  	color: #D73F09;
  	text-decoration: none !important;
  	background-image: url(/modules/custom/osu_custom_blocks/dist/arrow-right-red.c4e9b645.svg);
    background-position: 100%;
    background-repeat: no-repeat;
    background-size: 20px;
    padding-right: 25px;
    margin-right: 10px;
    margin-top: 18px;
    transition: 0.2s ease;
    border-bottom: none;
  }

  /* All field--type-link by default (not inline links) */
  *:not(.field--name-field-gp-labs-and-research) > * > .field--type-link:not(
  	.field--name-field-coe-dp-contact-email, /* Do not apply to contact paragraph type */
  	.field--name-field-dp-main-desc-buttons, /* Do not apply to discipline main description buttons */
  	.field--name-field-coe-focus-area-link-title, /* Do not apply to undergrad/grad focus area cards */
  	.field--name-field-coe-focus-area-link-html,
  	.field--name-field-up-related-programs-links, 
    .field--name-field-gp-related-programs-links, /* Do not apply to related programs sidebar links */
  	.field--name-field-campus-visit-button, 
    .field--name-field-request-information-button, 
    .field--name-field-up-request-info-button,
  	.field--name-field-up-campus-visit-button,
  	.field--name-field-up-apply-button, /* Do not apply to next steps sidebar buttons */
  	.field--name-field-gp-request-info-button, 
    .field--name-field-gp-campus-visit-button, 
    .field--name-field-gp-apply-button,
    .field--name-field-multiple-links,
    :has(> .field__item)
  ),
  .field--type-link > .field__item,
  .oregon-lifestyle p:has(> a), /*Oregon Lifestyle hardcoded link */
  div:has(> .grad-program-details-link, > a.orange-arrow-link, > a.yellow-arrow-link), .read-more-link, .orange-arrow-link:has(> a) {
  	margin-top: 18px;
  }

  /* Orange Arrow Links Hover State */
  *:not(.field--name-field-gp-labs-and-research) > * > .field--type-link:not(
  	.field--name-field-coe-dp-contact-email, /* Do not apply to contact paragraph type */
  	.field--name-field-dp-main-desc-buttons, /* Do not apply to discipline main description buttons */
  	.field--name-field-coe-focus-area-link-title, /* Do not apply to undergrad/grad focus area cards */
  	.field--name-field-coe-focus-area-link-html,
  	.field--name-field-up-related-programs-links, 
    .field--name-field-gp-related-programs-links, /* Do not apply to related programs sidebar links */
  	.field--name-field-campus-visit-button, 
    .field--name-field-request-information-button, 
    .field--name-field-up-request-info-button,
  	.field--name-field-up-campus-visit-button,
  	.field--name-field-up-apply-button, /* Do not apply to next steps sidebar buttons */
  	.field--name-field-gp-request-info-button, 
    .field--name-field-gp-campus-visit-button, 
    .field--name-field-gp-apply-button,
    .field--name-field-multiple-links
  ) a:hover,
  .oregon-lifestyle a:hover,
  .grad-program-details-link:hover, 
  a.orange-arrow-link:hover, a.yellow-arrow-link:hover, .read-more-link a:hover, .orange-arrow-link > a:hover {
  	padding-right: 35px;
  	margin-right: 0px;
  	border-bottom: none;
  }

  /* Orange Arrow Links Active State */
  *:not(.field--name-field-gp-labs-and-research) > * > .field--type-link:not(
  	.field--name-field-coe-dp-contact-email, /* Do not apply to contact paragraph type */
  	.field--name-field-dp-main-desc-buttons, /* Do not apply to discipline main description buttons */
  	.field--name-field-coe-focus-area-link-title,
  	.field--name-field-coe-focus-area-link-html,
  	.field--name-field-up-related-programs-links, 
    .field--name-field-gp-related-programs-links, /* Do not apply to related programs sidebar links */
  	.field--name-field-campus-visit-button, 
    .field--name-field-request-information-button, 
    .field--name-field-up-request-info-button,
  	.field--name-field-up-campus-visit-button,
  	.field--name-field-up-apply-button, /* Do not apply to next steps sidebar buttons */
  	.field--name-field-gp-request-info-button, 
    .field--name-field-gp-campus-visit-button, 
    .field--name-field-gp-apply-button, 
    .field--name-field-competionandawards-find-ou,
    .field--name-field-multiple-links
  ) a:active,
  .oregon-lifestyle a:active,
  .grad-program-details-link:active, 
  /** MXC was this meant as :hover or :active like the rest? **/
  a.orange-arrow-link:active, a.yellow-arrow-link:active,
  .read-more-link a:active,
  .oregon-lifestyle a:focus,
  .grad-program-details-link:focus, 
  /** MXC :focus style added **/
  a.orange-arrow-link:focus, a.yellow-arrow-link:focus, .orange-arrow-link > a:focus, .orange-arrow-link > a:active {
  	background-color: transparent !important;
  	color: #BE3706 !important;
  	padding-right: 35px !important;
  	border-bottom: none !important;
  }

  /***************************************
  	Yellow Arrow Links
  	*************************************/

  .field--name-field-dp-initiatives .field--name-field-coe-2-col-img-txt-link a, 
  .field--name-field-up-initiatives .field--name-field-coe-2-col-img-txt-link a, 
  .field--name-field-gp-initiatives .field--name-field-coe-2-col-img-txt-link a,
  .field--name-field-up-competitions-and-awards a,
  .discipline-newsletter-section a, 
  .oregon-lifestyle a,
  .field--name-field-dp-campus-feature .paragraph .field--name-field-coe-text-w-link-link a,
  a.yellow-arrow-link {
  	color: #FFB500 !important;
  	background-image: url("/sites/engineering.oregonstate.edu/files/2025-02/arrow-right-yellow.svg") !important;
  }

  .field--name-field-dp-initiatives .field--name-field-coe-2-col-img-txt-link a:active,
  .field--name-field-up-initiatives .field--name-field-coe-2-col-img-txt-link a:active, 
  .field--name-field-gp-initiatives .field--name-field-coe-2-col-img-txt-link a:active, 
  .field--name-field-up-competitions-and-awards a:active, 
  .oregon-lifestyle a:active, 
  .discipline-newsletter-section a:active, 
  .field--name-field-dp-campus-feature .paragraph .field--name-field-coe-text-w-link-link a:active,
  a.yellow-arrow-link:active {
  	color: #FFB500 !important;
  }



  /***************************************
  	Inline Links
  	*************************************/

  /* Apply to all links by default */
  main a {
  	color: #D73F09;
  	font-family: "Open Sans";
  	font-size: 18px;
  	font-style: normal;
  	font-weight: 400;
  	line-height: 160%; /* 28.8px */
  	text-decoration: none;
  	border-bottom: 3px solid transparent;
  	transition: 0.2s ease;
  	background-image: none;
  }

  /* Inline Links Hover */
  main a:hover,
  main a:focus {
  	color: #BE3706;
  	border-bottom: 3px solid #BE3706;
  	padding-right: 0;
  	text-decoration: none !important; /* Remove important tag after redesign, is just used to override specificity for now */
  }

  main a:active {
  	background-color: transparent !important;
  	color: #BE3706 !important;
  }

  .social-media-icons a,
  .social-media-icons a:hover {
  	border-bottom: none;
  }


  /*------------------------------------------------------------------------------
  	Sub-Section: Orange Bullet Point Styling
  	
  	Styling for orange bullet points
  	----------------------------------------------------------------------------*/

  /* Adds bullet point icon */
  .field--name-field-up-related-programs-links .field__item::before,

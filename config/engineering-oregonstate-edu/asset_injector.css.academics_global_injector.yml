  	*************************************/

  /* Allows buttons to appear inline */
  .field--name-field-dp-main-desc-buttons, 
  /** MXC specificity below **/
  .info-resources {
  	display: flex;
  	justify-content: space-between;
  }

  /* Styling for card appearance of containers around the links */
  .field--name-field-dp-main-desc-buttons > div, 
  /** MXC specificity below **/
  .info-resources p, 
  .grad-resources p {

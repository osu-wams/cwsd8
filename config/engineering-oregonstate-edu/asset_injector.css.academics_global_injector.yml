  		padding: 40px;
  	}
  }

  .field__item:not(.field--name-field-dp-quote-option) > .paragraph--type--coe-quote-with-image fieldset .field--name-field-coe-quote-quotation {
  	color: #000;
  	font-size: 24px;
  	font-style: italic;
  	font-weight: 600;
  	line-height: 130%; /* 31.2px */
  	margin-bottom: 20px;
  	display: flex;
  	flex-direction: column;
  }

  .field__item:not(.field--name-field-dp-quote-option) > .paragraph--type--coe-quote-with-image fieldset .field--name-field-coe-quote-quotation:before {
  	text-align: right;
  	content: url("/sites/engineering.oregonstate.edu/files/2025-02/quote_icon.svg");
      margin-top: -90px;
      margin-right: -70px;
      transform: scale(0.8);
  }

  .field__item:not(.field--name-field-dp-quote-option) > .paragraph--type--coe-quote-with-image fieldset .field--name-field-coe-quote-attribution-name {
  	color: #D73F09;
  	font-size: 18px;

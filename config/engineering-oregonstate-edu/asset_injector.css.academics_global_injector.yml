  .field--name-field-gp-student-feature .paragraph--type--coe-quote-with-image .field--name-field-coe-quote-attribution-desc div,
  .field--name-field-gp-student-feature .paragraph--type--coe-quote-with-image .field--name-field-coe-quote-attribution-desc p,

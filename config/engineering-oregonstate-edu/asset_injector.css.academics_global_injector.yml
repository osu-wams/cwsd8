  .field--name-field-up-student-feature .paragraph--type--coe-quote-with-image .field--name-field-coe-quote-attribution-desc div,
  .field--name-field-up-student-feature .paragraph--type--coe-quote-with-image .field--name-field-coe-quote-attribution-desc p,
  .field--name-field-up-student-feature .paragraph--type--coe-quote-with-image .field--name-field-coe-quote-attribution-desc,
  .field--name-field-up-faculty-feature .paragraph--type--coe-quote-with-image .field--name-field-coe-quote-attribution-desc div,
  .field--name-field-up-faculty-feature .paragraph--type--coe-quote-with-image .field--name-field-coe-quote-attribution-desc p,

  .form-checkbox{
  	border-radius: 5px;
  	border: 2px solid var(--Primary-Paddletail-Black, #000);
  	background: var(--Primary-Bucktooth-White, #FFF);
  	width: 32px;
  	height: 32px;
  	flex-shrink: 0;
  }

  .form-check-input:focus{
  	border: 2px solid #000;
  	outline: none;
  	box-shadow: none; 
  }

  .form-check-input[type="checkbox"]:checked {
  	border-color: #000;
  }

  .form-check-input[type="checkbox"]:checked:before {
  	content: "";
    display: block;
    width: 28px;
    height: 28px;
    background: black;
    border: 2px solid white;
    border-radius: 0.25em;
    box-sizing: border-box;
  }

  .form-label {
  	margin-bottom: 0.5rem;
  	margin-top: .5rem;

  }

  .form-control {
  	border-radius: 5px;
  	border: 2px solid #000;
  	background: #FFF;
  	height: 76px;
  	transition: .3s;
  }

  .form-control:active, .form-control:hover{
  	border-radius: 5px !important;
  	background: #EAF5F6 !important;
  	border-color: #000 !important;
  	
  }

  .form-control:focus {
  	border-radius: 3px;
  	background: #EAF5F6 !important;
  	outline-style: solid !important;
  	outline-color: #00859B !important;
  	border-color: #000 !important;
  }

  .form-checkbox{
  	margin-right: 10px;
  }

  .webform-button--submit {

id: view_degree
label: 'Degrees view (form, margin)'
code: |
  /*=============================================
  Form on Degrees View Page
  =============================================*/


  /* Default styles for all screens */
  .bef-exposed-form .form--inline > .form-item {
      float: left;
      width: 100%; /* 100% width for mobile screens */
  }

  /* Media query for screens larger than 768px */
  @media (min-width: 769px) {
      .bef-exposed-form .form--inline > .form-item {
          width: 48%; /* 48% width for larger screens */
      }
  }

  /* Reduces the top and bottom margins from the view filters*/
  .views-exposed-form .form--inline > div.form-actions {
    /* margin-block-start: 2.5rem; */
    margin-block-start: 0rem;
  }

  /* Remove top margin */
  .mt-3 {
    margin-top: 0rem !important;
  }

  /* Remove bottom margin */
  .my-3, a.button {
    margin-bottom: 0rem !important;
  }

id: materials_science_highlight_faculty_button
label: 'Materials science faculty button color (button)'
code: |-
  /** NOTE: This is essentially the inverse of our typical button styling and changes like this should now be consulted with designer */

  /* Override button styling to have an orange background and white text */

  #mat-sci-faculty {
  	background-color: #d73f09;
  	color: WHITE;
  }

  /* Hover effect to set background transparent and have text be black */

  #mat-sci-faculty:hover {
  	background-color: transparent;
  	color: black;
  	border: 1px solid black;
  }

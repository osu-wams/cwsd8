id: rfi_form_transition
label: 'RFI Form Transition'
code: |
  (function () {
    document.addEventListener('DOMContentLoaded', function () {
      const tabs = document.querySelectorAll('[data-bs-toggle="tab"]');

      tabs.forEach(function (tab) {
        tab.addEventListener('shown.bs.tab', function (event) {
          console.log('Tab clicked:', tab.getAttribute('data-bs-target'));

          document.querySelectorAll('.tab-pane').forEach(function (pane) {
            pane.classList.remove('tab-animate');
          });

          const targetSelector = tab.getAttribute('data-bs-target');
          const targetPane = document.querySelector(targetSelector);

          if (targetPane) {
            console.log('Animating:', targetSelector);
        
            setTimeout(() => {
              targetPane.classList.add('tab-animate');
            }, 10);
          }
        });
      });
    });
  })();

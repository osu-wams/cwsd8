id: homepage_explore_our_programs
label: 'Homepage (Explore our programs)'
code: |-
  /*Explore our programs section for Homepage*/

  /* Explore our programs header styling */
  .explore-our-programs-container h2 {
  	color: #FFB500;
    font-family: Stratum2web;
    font-size: 64px;
    font-style: normal;
    font-weight: 900;
    line-height: 130%;
    
    margin-right: 96px;
  }

  /* Explore our programs body styling */
  .explore-our-programs-container p {
  	color: #FFF;
  	font-family: "Open Sans";
  	font-size: 18px;
  	font-style: normal;
  	font-weight: 400;
  	line-height: 160%;
  	
    margin-right: 96px;
  }

  /* Explore our programs Find out more link styling*/
  .explore-our-programs-container a{
  	font-family: "Stratum2Web";
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 500;
  	line-height: normal;
  	letter-spacing: 1px;
  	text-transform: uppercase;
  	margin-top: 32px;
    margin-right: 96px;
  	color: #FFB500;
  	
  	/* Animation */
  	display: inline-block;
  	text-decoration: none !important;
  	background-image: url(https://engineering.dev.oregonstate.edu/sites/engineering.oregonstate.edu/files/2024-07/arrow-right-orange.svg);
    background-position: 100%;
    background-repeat: no-repeat;
    background-size: 20px;
    padding-right: 25px;
    transition: 0.1s ease;
  }

  /* Find out more link arrow animation */
  .explore-our-programs-container a:hover{
    padding-right: 45px;
    transition: 0.1s ease;
  }

  /* Explore our programs hero image styling*/
  .explore-our-programs-container img {
  		width: 565px;
  		height: 550px;
  		object-fit: cover;
      box-shadow: 15px 15px 0 #FFB500;
  }

  /* Explore our programs container padding*/
  .explore-our-programs-container {
  	padding: 150px 128px 150px 128px !important;
  }


  /* Dimension updates for Mobile screen */
  @media only screen and (max-width: 767px) {
  	
  	/* Program header style update*/
  	.explore-our-programs-container h2 {
  	  font-size: 44px;
  	  line-height: 120%;
  	  margin-right: 0;
  	  margin-left: 0;
  	}
  	
  	/* Program body style update*/
  	.explore-our-programs-container p {
  		margin-right: 0;
  	  margin-left: 0;
  	}
  		
  	/* Program link style update*/
  	.explore-our-programs-container a {
  		margin-right: 0;
  	  margin-left: 0;
  	}
  	
  	/* Program hero image style update*/
  	.explore-our-programs-container img {
  		margin-top: 48px;
  		width: 339.011px;
  		height: 342.655px;
      box-shadow: 8px 8px 0 #FFB500;
  	}
  	
  	/* Program container style update*/
  	.explore-our-programs-container {
  		padding: 72px 24px 72px 24px !important;
  	}
  }

  /*Dimension updates for Tablet screen */
  @media (max-width: 1119px) and (min-width: 768px){
  	
  	/* Program header style update*/
  	.explore-our-programs-container h2 {
  	  font-size: 48px;
  	  line-height: 120%;
  	  margin-right: 16px;
  	}
  	
  	/* Program body style update*/
  	.explore-our-programs-container p {
  		margin-right: 16px;
  	}
  	
  	/* Program link style update*/
  	.explore-our-programs-container a {
  		margin-right: 16px;
  	}

  	/* Program hero image style update*/
  	.explore-our-programs-container img {
  		width: 370px;
  		height: 360.177px;
      box-shadow: 8px 8px 0 #FFB500;
  	}
  	
  	/* Program container style update*/
  	.explore-our-programs-container {
  		padding: 72px 24px 72px 24px !important;
  	}
  }

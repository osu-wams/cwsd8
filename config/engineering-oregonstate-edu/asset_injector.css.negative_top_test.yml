id: negative_top_test
label: 'Negative space top (img, hr, div)'
code: |
  /*================================================================
  Adds negative space to move elements on top of another element 
  ================================================================*/


  /* Move up image block on page */

  .negative-top-picture{
  	position: relative;
  	top: -60px;
  }

  /* Move up image block less */

  .negative-top-picture-lower{
  	position: relative;
  	top: -50px;
  }

  /* Sets <hr> color and style */

  .hr-tag-styling{
  	border: 1px solid orange;
  }

  /* Moves up container */

  .negative-top-box{
  	position: relative;
  	top: -130px;
  }
media: all
preprocess: true
conditions:
  condition_group:
    id: condition_group
    negate: false
    block_visibility_group: ''
contexts: {  }
conditions_require_all: true

id: loc
label: 'Localist Card Clock Icons'
code: |
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.osu-event-specs').forEach(function (dl) {
      const timeElement = dl.querySelector('dd.osu-event-date time');
      const dtTime = dl.querySelector('dt.osu-event-date');
      const ddTime = dl.querySelector('dd.osu-event-date');

      if (!timeElement || !timeElement.textContent.trim()) {
        if (dtTime) dtTime.style.display = 'none';
        if (ddTime) ddTime.style.display = 'none';

      }
    });
  });

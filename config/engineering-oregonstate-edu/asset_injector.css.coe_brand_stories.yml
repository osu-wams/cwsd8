  /************************************************************
  Styling for Story Quote Block

  DEPRECATED: Future story quote blocks should use the paragraph type instead of hardcoding HTML
  ************************************************************/

  .quote-container-navy {
      padding: 72px 70px;
      margin-top: 30px;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
      background-color: #003B5C;
      color: white;
  }

  .quote-container-yellow {
      padding: 72px 70px;
      margin-top: 30px;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
      background-color: #FFB500;
      color: #000;
  }

  @media screen and (max-width: 767px) {
  	.quote-container .quote-container-navy .quote-container-yellow {
  		padding: 50px 30px;
  	}
  }
  /* Quote Typography */
  .quote {
      font-family: "Open Sans";
      font-size: 36px;
      font-style: italic;
      font-weight: 600;
      line-height: 130%;
  }

  /* Quote Attribution */
  .quote-credit {
  	margin-top: 40px;
  }

  .quote-credit > div {
  	display: inline;
  }

  .quote-author {
  	font-weight: 700;
  	letter-spacing: 0.9px;
  	text-transform: uppercase;
  }

  .quote-container-navy .quote-author {
  	color: #FFB500;
  }

  /* Quote Icon Positioning */
  svg.quote-icon {
      position: absolute;
      top: -22px;
      right: 30px;
  }

  @media screen and (max-width: 991px) {
  	.quote {
  		font-size: 24px;
  	}
  }

  @media screen and (max-width: 767px) {
  	svg.quote-icon {
  		transform: scale(0.6);
  		top: -28px;
  		right: 0px;
  	}
  }

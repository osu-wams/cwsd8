  	flex-grow: 1;
  }

  .related-story-card .orange-arrow-link {
  	padding-right: 30px;
  	padding-left: 30px;
  	margin-top: auto;
  }

  .related-story-card .orange-arrow-link a::before {
  	content: "";
  	position: absolute;
  	inset: 0;
  }

  .related-story-card > div:has( .orange-arrow-link a:hover) {
    background-color: #F9FCFD !important;
    transition: .3s !important;
    box-shadow: 0px 1px 3px 0px rgba(0, 0, 0, 0.08) !important;
  }


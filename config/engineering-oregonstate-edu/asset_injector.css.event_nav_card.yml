  .p-v3 {
  	color: #212529;

  	/* Body Small */
  	font-family: "Open Sans";
  	font-size: 14px;
  	font-style: normal;
  	font-weight: 300;
  	line-height: 130%; /* 18.2px */
  }

  .osu-border-width-top-5{
  	border-width: 10px !important;
  }


  /*H1 Styling*/

  h1{
  	color: #D73F09;

  	/* H1 */
  	font-family: Stratum2web;
  	font-size: 96px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 96%; /* 92.16px */
  }


  @media only screen and (max-width: 600px) {
    h1 {
      font-size: 56px !important;

    }
  }


  @media only screen and (max-width: 600px) {
    h2 {
      font-size: 44px !important;

    }
  }


  /*H2 Styling*/
  h2{

  	font-family: Stratum2web;
  	font-size: 64px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 83.2px */
  	color: #000;
  }


  /*H3 Styling*/
  h3{
  	color: #212529;

  	/* H3 */
  	font-family: Stratum2web;
  	font-size: 36px;
  	font-style: normal;
  	font-weight: 900;
  	line-height: 130%; /* 46.8px */
  }

  /*H4 Styling*/
  h4{
  	color: #212529 !important;

  	/* H4 */
  	font-family: "Open Sans";
  	font-size: 22px;
  	font-style: normal;
  	font-weight: 700;
  	line-height: 130%; /* 28.6px */
  	letter-spacing: 1.1px;
  	text-transform: uppercase;
  }

  /*H5 styling*/
  h5{
  	color: #212529 !important;

  	/* H5 */
  	font-family: "Open Sans";
  	font-size: 20px;
  	font-style: normal;
  	font-weight: 700;
  	line-height: 130%; /* 26px */
  	text-transform: uppercase;
  }

  /************************************************************************

  All COE Events Section | Body | Text Center Aligned and Width 50%

  ************************************************************************/
  p.coe-events-body-width{
  	  text-align: center;
      width: 38%;
      margin: auto;
  }

  @media screen and (max-width: 991px) {
  	p.coe-events-body-width {
  		text-align: center;
      width: 70%;
      margin: auto;
  	}

  }

  /************************************************************************

  Header Image for Tablet/Mobile | Prevents header text from wrapping weirdly

  ************************************************************************/
  @media screen and (min-width: 1299px){

  	.center-alignment-desktop .layout{
  		align-items: center;
  	}
  	
  }

  /************************************************************************

  Event "View Past Lectures" Section | Reverse Column for Mobile 

  ************************************************************************/
  @media screen and (max-width: 767px) {
  	.events-past-lectures .layout {
  		flex-direction: column-reverse;
  	}
  	.events-past-lectures .layout img {
  		margin-top: 25px;
  	}
  	p.coe-event-header-body {
  		width: 100%;
  	}
  }

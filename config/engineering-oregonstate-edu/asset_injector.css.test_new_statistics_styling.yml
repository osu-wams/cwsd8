id: test_new_statistics_styling
label: 'Test statistic styling (background, icon, title) [Need Removal]'
code: |
  /** Test styles **/

  /** Global test styles **/
  /** hide all icons for demo
  .fa-7x {
  	display: none !important;
  }
  **/
  ._none {
  	margin-top: 20px;
  	padding-top: 20px;
  	margin-bottom: 10px;
  }
  .coe-statistics .views-field-nothing {
  	border-radius: 0 !important;
  		box-shadow: none !important;

  }

  .coe-statistics .views-field-nothing h4 {
  		font-family: "Open Sans", sans-serif !important;
  		font-size: 1.25rem;
  		font-weight: 400;
  }

  .coe-statistics .display-1 {
  	text-shadow: none;
  }

  .coe-statistics .display-1 {
  	font-weight: 300;
  	padding: 0;
  }

  .coe-statistics .display-1 > p {
  	margin: 0;
  }
  /** Dark Background Stats **/

  .osu-bg-page-alt-2 .coe-statistics .display-1,
  .osu-bg-page-alt-2 .coe-statistics .views-field-nothing h4 {
  	color: #fff;
  }

  .osu-bg-page-alt-2 .coe-statistics span.primary {
    color: #ccc !important;
  }

  /** Neutral Background Stats with Drop offset **/
  .stat-test .coe-statistics .views-field-nothing,
  .stat-test  .coe-statistics.col-12:nth-child(even) .views-field-nothing {
  	box-shadow: none;
  	background: #8E9089;
  	color: #fff;
  	position: relative;
    border-radius: 0;
  }

  .stat-test .coe-statistics .display-1 {
  	text-shadow: none;
  }

  .stat-test .coe-statistics .views-field-nothing .primary {
  	color: #000;
  }

  .stat-test .coe-statistics .views-field-nothing::before {
  	  content: "";
      z-index: -1;
      background-color: #c6dae7;
      width: 100%;
      height: 100%;
      display: block;
      position: absolute;
      top: 10px;
      left: -10px;
  }

  .stat-test  .coe-statistics.col-12:nth-child(even) .views-field-nothing::before {
  	background: #C4D6A4;
  }

  /** Moondust (modified) **/
  .test-strat.osu-bg-moondust {
  	background: #00859B !important;
  }
   
  .test-strat.stratosphere.alt.osu-bg-moondust .fa-7x,
  .test-strat.pine-stand .fa-7x,
  .test-strat.star-canvas.osu-bg-moondust .fa-7x,
  .test-strat.alt .fa-7x {
  	font-size: 4em;
  }
  .test-strat.stratosphere.alt.osu-bg-moondust .coe-statistics.col-12:nth-child(even) .display-1,
  .test-strat.stratosphere.alt.osu-bg-moondust .coe-statistics.col-12:nth-child(even) span.primary,
  .test-strat.stratosphere.alt.osu-bg-moondust .coe-statistics.col-12:nth-child(even) .views-field-nothing h4,
  .test-strat.star-canvas.osu-bg-moondust .coe-statistics.col-12:nth-child(even) .display-1,
  .test-strat.star-canvas.osu-bg-moondust .coe-statistics.col-12:nth-child(even) span.primary,
  .test-strat.star-canvas.osu-bg-moondust .coe-statistics.col-12:nth-child(even) .views-field-nothing h4,
  .test-strat.stratosphere.alt.osu-bg-moondust .coe-statistics.col-12:nth-child(even) .display-1,
  .test-strat.stratosphere.alt.osu-bg-moondust .coe-statistics.col-12:nth-child(even) span.primary,
  .test-strat.stratosphere.alt.osu-bg-moondust .coe-statistics.col-12:nth-child(even) .views-field-nothing h4{
  	color:  #00859B !important;;
   }
   
   /** Alternate Style **/
   
   /** crater alt **/
   .stat-test.alt.crater  .coe-statistics.col-12 {
   	color: #8E9089;
   }
   .test-strat.alt.crater .coe-statistics .views-field-nothing {
  	background: transparent;
  	box-shadow: none;
  	border: 1px solid #8E9089;
  	color: #8E9089;
  }

  .stat-test.alt.crater .coe-statistics .views-field-nothing,
  .stat-test.alt.crater  .coe-statistics.col-12:nth-child(even) .views-field-nothing {
  	border: none;
  }
    
     .test-strat.alt.crater .coe-statistics.col-12:nth-child(even) .display-1,
  .test-strat.alt.crater .coe-statistics.col-12:nth-child(even) span.primary,
  .test-strat.alt.crater .coe-statistics.col-12:nth-child(even) .views-field-nothing h4 {
  	color: #fff;
  	}
  	
  .test-strat.crater .coe-statistics.col-12:nth-child(even) .views-field-nothing {
  		background: #8E9089 !important;
  	}

   .test-strat.star-canvas.osu-bg-moondust .coe-statistics.col-12:nth-child(even) .views-field-nothing {
   	 	 background: #fff;

   }

   .test-strat.stratosphere.alt.osu-bg-moondust  .coe-statistics.col-12:nth-child(even) .views-field-nothing,
   .test-strat.star-canvas.osu-bg-moondust .coe-statistics.col-12:nth-child(even) .views-field-nothing, 
   	.test-strat.pine-stand .coe-statistics.col-12:nth-child(even) .views-field-nothing,
   	.test-strat.alt .coe-statistics.col-12:nth-child(even) .views-field-nothing {
   	 clip-path: polygon(calc(100% - 55px) 0,100% 65px,100% 100%,0 100%,0 0);
   }
   
    .test-strat.stratosphere.alt.osu-bg-moondust  .coe-statistics.col-12 .views-field-nothing p,
      .test-strat.stratosphere.pine-stand  .coe-statistics.col-12 .views-field-nothing p,
    .test-strat.star-canvas.osu-bg-moondust  .coe-statistics.col-12 .views-field-nothing p,
    .test-strat.alt .coe-statistics.col-12 .views-field-nothing p {
    	margin-bottom: 0;
    }
   
   /** end alternate **/

  .test-strat.star-canvas.osu-bg-moondust {
  	background: #003B5C !important;
  }

  .test-strat.pine-stand.osu-bg-moondust {
  	background: #4A773C !important;
  }

  .test-strat.osu-bg-moondust .coe-statistics .views-field-nothing {
  	background: transparent;
  	box-shadow: none;
  	border: 1px solid #fff;
  }

  /** Title **/
  .test-strat.osu-bg-moondust  .coe-statistics .display-1 {
  	color: #fff;
  	text-shadow: none;
  	font-weight: 300;
  	padding: 0;
  }
  .test-strat.osu-bg-moondust  .coe-statistics .display-1 > p {
  	margin-bottom: 0;
  }

  /** Icon color **/
  .test-strat.osu-bg-moondust  .coe-statistics span.primary {
  	color: #fff;
  }

  /** description **/
  .test-strat.osu-bg-moondust .coe-statistics .views-field-nothing h4 {
  	color: #fff;
  		font-family: "Open Sans", sans-serif !important;
  		font-size: 1.25rem;
  }

  .test-strat.osu-bg-moondust  .coe-statistics.col-12:nth-child(even) .views-field-nothing {
   	background: transparent;
   }
   

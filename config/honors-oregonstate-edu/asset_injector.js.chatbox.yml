id: chatbox
label: Chatbot
code: |-
  const chatContainer = document.querySelector(".chat-container");
  const chatButton = document.querySelector(".chat-button");
  const chatDialog = document.querySelector("#block-madrone-chatbotembedtest");

  function toggleChat() {
      if (chatContainer.open) {
          chatContainer.close();
          chatButton.setAttribute("aria-expanded", "false");
          chatButton.focus(); // Return focus to the button when the dialog closes
      } else {
          chatContainer.show();
          chatButton.setAttribute("aria-expanded", "true");
          chatContainer.focus();
      }
  }

  function closeChat() {
      if (chatContainer.open) {
          chatContainer.close();
          chatButton.setAttribute("aria-expanded", "false");
          // Return focus to the chat button when the dialog closes
          chatButton.focus();
      }
  }

  chatButton.addEventListener('click', toggleChat);

  // Dismiss with Esc key
  document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
          event.stopPropagation();
          event.preventDefault();
          closeChat();
      }
  });

  // Dismiss by clicking outside the dialog
  document.addEventListener('click', (event) => {
      if (chatContainer.open && !chatDialog.contains(event.target) && !chatButton.contains(event.target)) {
          closeChat();
      }
  });

id: news_feed
label: 'News Feed'
code: |-
  .osu-news-wrapper {
      font-family: Arial, Helvetica, sans-serif;
      width: 100%;
      margin: 0 auto;
      padding: 20px 50px 0 0;
      box-sizing: border-box;
  }

  .osu-news-wrapper > * {
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
  }

  .news-layout {
      display: grid;
      grid-template-columns: 50% 25% 25%;
      gap: 30px;
      align-items: stretch;
      min-height: 600px;
  }

  .featured-column,
  .stack-column {
      display: flex;
      flex-direction: column;
      gap: 30px;
          text-decoration: none;
  }

  .featured-column > *,
  .stack-column > * {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
  }

  .news-card,
  .featured-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      flex: 1;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
  }

  .news-card:hover,
  .featured-card:hover {
     /* transform: translateY(-4px);*/
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }
  .news-card:hover .news-title:hover a {
    text-decoration:underline;
  }

  .image-container {
      position: relative;
      width: 100%;
      background: #f5f5f5;
      overflow: hidden;
  }

  .featured-card .image-container {
      flex: 1 1 auto;               /* grows to fill remaining space */
              height: 660px;
          object-fit: cover;
  }

  .news-card .image-container {
      aspect-ratio: 1400 / 898;
      flex-grow: 0;
  }

  .news-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
  }

  .no-image {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-style: italic;
      background: linear-gradient(#f8f8f8, #eee);
  }

  .card-content {
      padding: 16px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
  }

  .featured-card .card-content {
      padding: 20px;
      flex-shrink: 0;
      justify-content: flex-start;
      gap: 8px; /* optional: controls spacing between date and title */
  }

          .card-content {
              padding: 16px;
              flex-grow: 1;
              display: flex;
              flex-direction: column;
              justify-content: flex-start;
          }

          .featured-card .card-content {
              padding: 20px;
          }


  .card-date {
  	    font-style: italic;
  }

  /* Card link: clickable, no underline */
  .news-card,
  .featured-card {
      text-decoration: none;
      color: inherit;
  }

  /* Title text styling */
  .news-title,
  .featured-title {
      margin: 0 0 15px;
      line-height: 1.25;
      font-weight: normal;
      color: #dc4405;
      text-decoration: none;
  }
  /* Only underline the title text — nothing else */
  .featured-card:hover .featured-title,
  .news-card:hover .news-title {
      text-decoration: underline;
  }


          .error-message {
              color: #c8102e;
              text-align: center;
              font-size: 1.2rem;
              margin: 40px 0;
          }

          @media (max-width: 900px) {
      .news-layout {
          grid-template-columns: minmax(0, 420px);   /* max card width 420px */
          justify-content: center;                   /* centers the single column */
          padding: 0 25px;
          gap: 32px;                                 /* more vertical breathing room */
      }

      .osu-news-wrapper {
          padding: 20px 0;
      }

      .featured-column,
      .stack-column {
          width: 100%;
          max-width: 420px;
      }
  }
media: all

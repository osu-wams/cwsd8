  	object-fit: cover;
  	display: block;
  	filter: saturate(0.7);
  	transition: transform 0.5s, filter 0.3s;
  }

  .regional-news-all img::after{
  	content: '';
      position: absolute;
      inset: 0;
      background: #d73f09;
      opacity: 0;
      mix-blend-mode: multiply;
      transition: opacity 0.3s;
  }


  /* ── Pin tooltip ─────────────────────────────────────────────────────── */
  .pin-tooltip {
      position: absolute;
      transform: translate(-50%, calc(-100% - 10px));
      background: #1a1a1a;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.3;
      padding: 6px 10px;
      border-radius: 5px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 999;
      max-width: 220px;
      white-space: normal;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* Small downward-pointing arrow */
  .pin-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #1a1a1a;
  }

  .pin-tooltip.visible {

  /* Clickable point groups — circles and their labels */
  .point-link {
    cursor: pointer;
  }

  .point-link circle,
  .point-link text {
    transition: r 0.15s ease, fill 0.15s ease;
  }

  .point-link:hover circle {
    fill: var(--orange) !important;
  }

  /* Sidebar */
  .sidebar {
    flex: 0 0 300px;
    position: sticky;
    top: 40px;
  }

  .info-card {
    background: #fff;
    border-radius: 2px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.09);
    overflow: hidden;
    width: 120%;
    height: 400px;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  @media (min-width: 992px) and (max-width: 1399px){
  	.info-card {
  	  width: 130% !important;
  	}
  }

  .card-header { 
  	padding: 22px 24px 18px; border-bottom: 1px solid #eee; 
  }
  .card-header .region-label {
    font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
    font-weight: 500; color: #999; margin-bottom: 6px;
  }

  .card-header h2 {
    font-size: 1.6rem; color: var(--navy); line-height: 1.15;
  }

  .card-color-bar { 
  	height: 4px; width: 100%; 
  }

  .card-body { 

  .map-section .container-fluid{
  	max-width: 1600px;
  	position:relative;
  }

  .map-section .container-fluid::after{
    content: '';
    border-bottom: 1px solid #d73f09;
    width: 50%;
    position: absolute;
    height: 450px;
    top: 20px;
    bottom: 0;
    margin: auto;
    right: 12px;
    z-index: -1;
  }

  .map-section .row::after{
  	content: '';
  	width: 100%;
  	position: absolute;
  	background: white;
  	height: 450px;
  	z-index: -1;
  	left: 0px;
  	margin: auto;
  }

  .map-section .row::before{
  	content: '';
  	width: 50%;
  	position: absolute;
  	height: 450px;
  	z-index: -1;
  	left: 0px;
  	margin: auto;
  	border-top: 1px solid #d73f09;
  	top: -20px;
  	bottom:0;
  }

  .map-wrap {
    flex: 1 1 600px;
    min-width: 0;
    position: relative;
    z-index: 8;
  }

  @media (max-width: 1700px){
  .map-section .container-fluid{
  		max-width: unset;
  		padding-left: 4rem;
  		padding-right: 4rem;
  	}
  	
  	.map-section .container-fluid::after{
  	  right: 4rem;
  	}
  }

  @media (max-width: 1400px){
  	.map-section .row::after{
  	    height: 370px;
  	    top: 0;
  	    bottom: 0;
  	}
  	
  	.map-section .row::before{
      height: 370px;
  	}
  	
  	.map-section .container-fluid::after{
  	  height:370px;
  	}
  }

  @media (max-width: 991px){
  	.map-section .row::after{
  		height: 100%!important;
  	}
  	
  	.map-section .row::before{
      height: 100%;
  	}
  	
  	.map-section .container-fluid::after{
  	  height:100%;
  	}
  	
  	.map-section .row{
  		padding-inline:2rem !important;
  	}
  	

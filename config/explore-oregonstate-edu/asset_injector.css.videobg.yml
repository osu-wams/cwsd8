label: VideoBG
code: |-
  .video-background {
    position: relative;
    width: 100%;
    /*height: 100vh;*/  /* Adjust height as needed */
    overflow: hidden;
    padding-top:25%;
  }

  .video-background video {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;  /* Places video behind content */
  }
  .video-background-2 {
    position: relative;
    width: 100%;
    height: 650vh;  /* Adjust height as needed */

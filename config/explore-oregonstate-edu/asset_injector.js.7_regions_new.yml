  // ── Per-instance initializer (scoped to one tab pane) ────────────────────
  function initMapInstance(container) {
      const infoCard      = container.querySelector('#infoCard');
      const cardLabel     = container.querySelector('#cardLabel');
      const cardTitle     = container.querySelector('#cardTitle');
      const cardBody      = container.querySelector('#cardBody');
      const cardColorBar  = container.querySelector('#cardColorBar');
      const searchInput   = container.querySelector('#searchInput');
      const searchResults = container.querySelector('#searchResults');
      const closeBtn      = container.querySelector('.modal-close-btn');
      const overlay       = container.querySelector('.region-modal-overlay');

      if (!infoCard || container.dataset.mapInit === 'true') return;
      container.dataset.mapInit = 'true';

      let activeRegionId = null;

      // ── Modal helpers ────────────────────────────────────────────────────
      function isMobile() {
          return window.innerWidth <= 991;
      }

      function openModal() {
          if (!isMobile()) return;
          infoCard.classList.add('modal-visible');
          if (overlay) overlay.style.display = 'block';
          document.body.style.overflow = 'hidden';
      }

      function closeModal() {
          infoCard.classList.remove('modal-visible');
          if (overlay) overlay.style.display = 'none';
          document.body.style.overflow = '';
      }

      closeBtn?.addEventListener('click', closeModal);
      overlay?.addEventListener('click', closeModal);
      document.addEventListener('keydown', e => {
          if (e.key === 'Escape') closeModal();
      });

      // ── Select region ────────────────────────────────────────────────────
      function selectRegion(id) {
          if (activeRegionId === id) {
              container.querySelector('#' + CSS.escape(id))?.classList.remove('active');
              activeRegionId = null;
              closeModal();
              return;
          }
          if (activeRegionId) {
              container.querySelector('#' + CSS.escape(activeRegionId))?.classList.remove('active');
          }
          activeRegionId = id;
          container.querySelector('#' + CSS.escape(id))?.classList.add('active');

          const region = regionData[id];
          cardLabel.textContent = 'Oregon Region';
          cardTitle.textContent = region.name;
          cardColorBar.style.background = region.color;
          cardBody.innerHTML = `
              <ul class="location-list">
                  ${region.locations.map(loc =>
                      loc.href
                          ? `<li><a href="${loc.href}" target="_blank">${loc.name}</a></li>`
                          : `<li><span class="no-link">${loc.name}</span></li>`
                  ).join('')}
              </ul>
          `;
          infoCard.classList.remove('hidden');
          openModal();
      }

      // ── Wire region group clicks ─────────────────────────────────────────
      Object.keys(regionData).forEach(id => {
          const el = container.querySelector('#' + CSS.escape(id));
          if (el) el.addEventListener('click', () => selectRegion(id));
      });

      // ── Wire point / location clicks + hover ─────────────────────────────
      Object.entries(pointData).forEach(([id, data]) => {
          const el = container.querySelector('#' + CSS.escape(id));
          if (!el) return;
          el.classList.add('point-link');
          el.addEventListener('click', (e) => {
              e.stopPropagation();
              if (data.href) window.open(data.href, '_blank');
          });
          el.addEventListener('mouseenter', () => {
              cardLabel.textContent = data.label;
              cardTitle.textContent = data.name;
              cardColorBar.style.background = '#d73f09';
              cardBody.innerHTML = `<div class="info-row">
                  <span class="label">Click to visit</span>
                  <span class="value">${data.href}</span>
              </div>`;
              infoCard.classList.remove('hidden');
              openModal();
          });
      });

      // ── Search ───────────────────────────────────────────────────────────
      // Build search index from regions + ZIP codes
      const searchIndex = [
          // Region entries
          ...Object.entries(regionData).map(([id, r]) => ({
              id, type: 'region', label: r.name, regionId: id
          })),
          // ZIP code entries (deduplicated — each zip maps to one region)
          ...Object.entries(zipToRegion).map(([zip, regionId]) => ({
              id: zip,
              type: 'zip',
              label: zip,
              regionId
          }))
      ];

      function showSearchResults(query) {
          if (!query) { searchResults.classList.remove('visible'); return; }
          const q = query.toLowerCase();
          const matches = searchIndex.filter(item => item.label.toLowerCase().includes(q));
          if (!matches.length) { searchResults.classList.remove('visible'); return; }
          searchResults.innerHTML = matches.slice(0, 10).map(m => `
              <div class="search-result-item" data-region-id="${m.regionId}" data-type="${m.type}">
                  <div>${m.label}</div>
                  <div class="item-type">${m.type === 'region' ? 'Region' : 'ZIP Code · ' + regionData[m.regionId].name}</div>
              </div>
          `).join('');
          searchResults.classList.add('visible');
      }

      searchInput?.addEventListener('input', () => showSearchResults(searchInput.value.trim()));

      searchResults?.addEventListener('click', e => {
          const item = e.target.closest('.search-result-item');
          if (!item) return;
          searchInput.value = '';
          searchResults.classList.remove('visible');
          selectRegion(item.dataset.regionId);
      });

      document.addEventListener('click', e => {
          if (!searchInput?.contains(e.target) && !searchResults?.contains(e.target)) {
              searchResults?.classList.remove('visible');
          }
      });
  }

  // ── Bootstrap 5: init when a tab becomes visible ─────────────────────────
  document.addEventListener('shown.bs.tab', function (e) {
      const targetPane = document.querySelector(e.target.getAttribute('data-bs-target'));
      if (targetPane) initMapInstance(targetPane);
  });

  // ── Init on page load ────────────────────────────────────────────────────
  // The SVG and sidebar live in separate columns, so document.body is the
  // correct container — it contains both and querySelector works across them.
  function initAll() {
      const panes = document.querySelectorAll('.tab-pane.active, .tab-pane.show');
      if (panes.length) {
          panes.forEach(pane => initMapInstance(pane));
      } else {
          initMapInstance(document.body);
      }
  }

  if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAll);
  } else {
      initAll();
  }

  // ── Region modal (shared, injected once into document.body) ──────────────
  (function ensureRegionModal() {
      if (document.getElementById('regionPopupModal')) return;

      const el = document.createElement('div');
      el.id = 'regionPopupModal';
      el.className = 'region-popup-overlay';
      el.innerHTML = `
          <div class="region-popup-dialog" role="dialog" aria-modal="true">
              <div class="region-popup-colorbar" id="regionPopupColorBar"></div>
              <button class="region-popup-close" aria-label="Close">&times;</button>
              <p class="region-popup-label">Oregon Region</p>
              <h2 class="region-popup-title" id="regionPopupTitle"></h2>
              <ul class="region-popup-list" id="regionPopupList"></ul>
          </div>
      `;
      document.body.appendChild(el);

      function closeRegionModal() {
          el.classList.remove('region-popup-visible');
          document.body.style.overflow = '';
          // deactivate any highlighted region
          document.querySelectorAll('[data-map-active]').forEach(svg => {
              const rid = svg.dataset.mapActive;
              svg.querySelector('#' + CSS.escape(rid))?.classList.remove('active');
              delete svg.dataset.mapActive;
          });
      }

      el.addEventListener('click', e => { if (e.target === el) closeRegionModal(); });
      el.querySelector('.region-popup-close').addEventListener('click', closeRegionModal);
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRegionModal(); });

      // Expose so initMapInstance can call it
      window._openRegionPopup = function(id, svgContainer) {
          const region = regionData[id];
          if (!region) return;

          // Track which SVG element is active so we can deactivate on close
          svgContainer.dataset.mapActive = id;

          document.getElementById('regionPopupColorBar').style.background = region.color;
          document.getElementById('regionPopupTitle').textContent = region.name;
          document.getElementById('regionPopupList').innerHTML = region.locations.map(loc =>
              loc.href
                  ? `<li><a href="${loc.href}" target="_blank">${loc.name}</a></li>`
                  : `<li><span class="no-link">${loc.name}</span></li>`
          ).join('');

          el.classList.add('region-popup-visible');
          document.body.style.overflow = 'hidden';
      };

      window._closeRegionModal = closeRegionModal;
  })();

  // ── Per-instance initializer (scoped to one tab pane) ────────────────────
  function initMapInstance(container) {
      const searchInput   = container.querySelector('#searchInput');
      const searchResults = container.querySelector('#searchResults');

      if (container.dataset.mapInit === 'true') return;
      container.dataset.mapInit = 'true';

      let activeRegionId = null;

      // ── Select region ────────────────────────────────────────────────────
      function selectRegion(id) {
          // Toggle off if same region clicked again
          if (activeRegionId === id) {
              container.querySelector('#' + CSS.escape(id))?.classList.remove('active');
              activeRegionId = null;
              window._closeRegionModal?.();
              return;
          }
          // Deactivate previous
          if (activeRegionId) {
              container.querySelector('#' + CSS.escape(activeRegionId))?.classList.remove('active');
          }
          activeRegionId = id;
          container.querySelector('#' + CSS.escape(id))?.classList.add('active');
          window._openRegionPopup?.(id, container);
      }

      // ── Wire region group clicks + hover tooltips ────────────────────────
      Object.keys(regionData).forEach(id => {
          const el = container.querySelector('#' + CSS.escape(id));
          if (!el) return;
          el.addEventListener('click', () => selectRegion(id));
          el.addEventListener('mouseenter', () => showPinTooltip(el, regionData[id].name));
          el.addEventListener('mouseleave', hidePinTooltip);
      });

      // ── Pin tooltip ──────────────────────────────────────────────────────
      // Create a single reusable tooltip element
      let pinTooltip = container.querySelector('.pin-tooltip');
      if (!pinTooltip) {
          pinTooltip = document.createElement('div');
          pinTooltip.className = 'pin-tooltip';
          // Append inside the SVG's parent so positioning is relative to the map wrapper
          const svgWrapper = container.querySelector('.map-svg-wrapper') || container;
          svgWrapper.style.position = 'relative';
          svgWrapper.appendChild(pinTooltip);
      }

      function showPinTooltip(el, name) {
          const svgWrapper = pinTooltip.parentElement;
          const wrapperRect = svgWrapper.getBoundingClientRect();
          const pinRect     = el.getBoundingClientRect();

          // Centre of the pin, relative to the wrapper
          const left = pinRect.left + pinRect.width  / 2 - wrapperRect.left;
          const top  = pinRect.top                       - wrapperRect.top;

          pinTooltip.textContent = name;
          pinTooltip.style.left  = left + 'px';
          pinTooltip.style.top   = top  + 'px';
          pinTooltip.classList.add('visible');
      }

      function hidePinTooltip() {
          pinTooltip.classList.remove('visible');
      }

      // ── Wire point / location clicks + hover ─────────────────────────────
      Object.entries(pointData).forEach(([id, data]) => {
          const el = container.querySelector('#' + CSS.escape(id));
          if (!el) return;
          el.classList.add('point-link');
          el.addEventListener('click', e => {
              e.stopPropagation();
              if (data.href) window.open(data.href, '_blank');
          });
          el.addEventListener('mouseenter', () => showPinTooltip(el, data.name));
          el.addEventListener('mouseleave', hidePinTooltip);
      });

      // ── Search (ZIP codes + region names) ────────────────────────────────
      const searchIndex = [
          ...Object.entries(regionData).map(([id, r]) => ({
              type: 'region', label: r.name, regionId: id
          })),
          ...Object.entries(zipToRegion).map(([zip, regionId]) => ({
              type: 'zip', label: zip, regionId
          }))
      ];

      function showSearchResults(query) {
          if (!query) { searchResults.classList.remove('visible'); return; }
          const q = query.toLowerCase();
          const matches = searchIndex.filter(item => item.label.toLowerCase().includes(q));
          if (!matches.length) { searchResults.classList.remove('visible'); return; }
          searchResults.innerHTML = matches.slice(0, 10).map(m => `
              <div class="search-result-item" data-region-id="${m.regionId}">
                  <div>${m.label}</div>
                  <div class="item-type">${m.type === 'region' ? 'Region' : 'ZIP Code · ' + regionData[m.regionId].name}</div>
              </div>
          `).join('');
          searchResults.classList.add('visible');
      }

      searchInput?.addEventListener('input', () => showSearchResults(searchInput.value.trim()));

      searchResults?.addEventListener('click', e => {
          const item = e.target.closest('.search-result-item');
          if (!item) return;
          searchInput.value = '';
          searchResults.classList.remove('visible');
          selectRegion(item.dataset.regionId);
      });

      document.addEventListener('click', e => {
          if (!searchInput?.contains(e.target) && !searchResults?.contains(e.target)) {
              searchResults?.classList.remove('visible');
          }
      });
  }

  // ── Bootstrap 5: init when a tab becomes visible ─────────────────────────
  document.addEventListener('shown.bs.tab', function (e) {
      const targetPane = document.querySelector(e.target.getAttribute('data-bs-target'));
      if (targetPane) initMapInstance(targetPane);
  });

  // ── Init any already-visible tab panes on page load ──────────────────────
  document.querySelectorAll('.tab-pane.active, .tab-pane.show').forEach(pane => {
      initMapInstance(pane);
  });

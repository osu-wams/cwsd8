id: fix_for_horizontal_tabs
label: 'Fix for horizontal tabs'
code: |-
  .horizontal-tabs {
      .horizontal-tab-button::marker {
          content: none !important;
      }

      .horizontal-tab-button a:focus-visible {
          outline: 2px solid #d73f09 !important;
          outline-offset: -2px;
      }

      .details-wrapper {
          padding-block-end: 2rem;
      }

      details {
          padding: 1rem;
          border: 1px solid #212529;
      }

      summary::marker {
          font-size: 2rem;
          line-height: 1;
      }

      span[class^="fa"] {
          display: none;
      }
  }

  .field-group-tabs-wrapper {
      background-color: #fff;
  }

  @media (min-width: 768px) {
      .horizontal-tabs {
          span[class^="fa"] {
              display: inline-block;
          }
      }

  }

  .slanted-div {
    position: relative;
    width: 100%;
    height: auto;
    isolation: isolate; /* creates new stacking context */
  }

  .slanted-div::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #212529;
    clip-path: polygon(
      0 0,           /* top left */
      100% 0,        /* top right */
      80% 100%,      /* bottom right (20% inward) */
      0 100%         /* bottom left */
    );
    z-index: -1;     /* puts background behind content */
  }

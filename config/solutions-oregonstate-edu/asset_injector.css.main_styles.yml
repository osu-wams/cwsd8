  /*icons on homepage for mobile view*/
  .icon-container {
          display: flex;
          flex-wrap: wrap;
          justify-content: center; /* Center items horizontally */
          max-width: 600px; /* Adjust as needed */
          margin: 0 auto;
          gap: 20px; /* Space between items */
      }
      .icon-box {
          flex: 0 0 45%; /* Two items per row */
          display: flex;
          flex-direction: column;
          align-items: center; /* Center icon and text horizontally */
          justify-content: center; /* Center content vertically within box */
          margin: 10px;
          max-width: 250px; /* Limit width to prevent overflow */
      }
      .icon-box img.mobile-icons-image {
          width: 50px; /* Adjust icon size */
          height: 50px;
          margin-bottom: 5px; /* Space between icon and text */
      }
      .icon-box p {
          margin: 0; /* Remove default paragraph margins */
          padding: 0; /* Remove any padding */
          overflow-wrap: break-word; /* Ensure long words wrap */
          word-break: break-word; /* Break long words if needed */
          text-align: center; /* Center text */
          max-width: 100%; /* Ensure text stays within box */
      }
      .icon-box a.mobile-icons-text {
          text-decoration: none; /* Reinforce no underline */
          color: inherit; /* Consistent text color */
          text-align: center; /* Center text */
          font-size: 14px; /* Adjust text size as needed */
          display: block; /* Ensure link takes full width for text wrapping */
      }
  .orange-centered-line {
    position: relative; /* Needed for absolute positioning of the ::after */
    display: block; /* Ensures the element stacks below previous content */
  }
  .orange-centered-line::after {
    content: ''; /* Required for pseudo-element */
    display: block;
    width: 50px;
    height: 4px;
    background-color: #d73509;
    position: absolute;
    left: 50%;
    transform: translateX(-50%); /* Centers horizontally */
    top: 100%; /* Places line below the element */
    margin-top: 25px; /* Optional spacing between element and line */
  }
  .bar-orange-above-headings{
    position: relative;
    margin-top: 2.5rem;
  }
   .bar-orange-above-headings::before {
    content: '';
    width: 50px;
    height: 4px;
    position: absolute;
    background-color: #d73f09;
    top: -1rem;
  }
  .gray-centered-line {
    position: relative; /* Needed for absolute positioning of the ::after */
    display: block; /* Ensures the element stacks below previous content */
  }
  .gray-centered-line::after {
    content: ''; /* Required for pseudo-element */
    display: block;
    width: 50px;
    height: 4px;
    background-color: #423E3C;
    position: absolute;
    left: 50%;
    transform: translateX(-50%); /* Centers horizontally */
    top: 100%; /* Places line below the element */
    margin-top: 25px; /* Optional spacing between element and line */
  }
  .bar-gray-above-headings{
    position: relative;
    margin-top: 2.5rem;
  }
   .bar-gray-above-headings::before {
    content: '';
    width: 50px;
    height: 4px;
    position: absolute;
    background-color: #423E3C;
    top: -1rem;
  }

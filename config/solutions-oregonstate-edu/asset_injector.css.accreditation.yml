  /* ---------- FLIP ---------- */
  .directory-card {
      position: relative;
      overflow: hidden;
      width: 285px; 
      height: 401px;
      margin: 20px;
  }
  .directory-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: all 0.7s ease;
      position: absolute;
      top: 0;
      left: 0;
  }

  .directory-inner-card {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
  }

  /* Change this line - use field-content instead of directory-card */
  .field-content:hover .directory-inner-card {
      transform: rotateY(180deg);
  }

  .profile-image, .hover-image {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
  }

  .profile-image {
      background-color: #bbb;
      color: black;
  }

  .hover-image {
      background-color: #2980b9;
      color: white;
      transform: rotateY(180deg);
  }

  /* Add button styling */
  .field-content .btn {
      opacity: 0;
      transition: opacity 0.3s ease;
  }
  .field-content:hover .btn {
      opacity: 1;
  }
  .field-content {
    position: relative;
  }
  .field-content .btn {
    position: relative;
    bottom: 25px;
    left: 38px;
    width: 250px;
    z-index: 20;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    margin: 0;
  }
  .directory-card:hover + .btn,
  .field-content:hover .btn {
    opacity: 1;
    pointer-events: auto;
  }
  .field-content .btn a {
      color: #fff!important;
      text-decoration: none!important;
      }
  h3, h3 a {

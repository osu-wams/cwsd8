  budget_authority:
    '#type': textfield
    '#title': 'Budget Authority'
    '#description': '<p><em>The budget authority is the person with the authority to approve charges to the departments index code. This field is not required unless placing an order.</em></p>'
    '#states':
      visible:
        ':input[name="interested_in[3]"]':
          checked: true
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  index_and_activity_code:
    '#type': textfield
    '#title': 'Index and Activity Code'
    '#description': '<p><em>Enter the Index Code for monthly billing and the activity code if necessary</em></p>'
    '#states':
      visible:
        ':input[name="interested_in[3]"]':
          checked: true
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  what_type_of_copier:
    '#type': checkboxes
    '#title': 'What Type of Copier?'
    '#description': '<p><em>Select both options if interested in Black and White and Color copiers</em></p>'
    '#description_display': after
    '#options':
      'Black and White': 'Black and White'
      Color: Color
    '#required': true
    '#states':
      visible:
        ':input[name="interested_in[3]"]':
          checked: true
  processed_text:
    '#type': processed_text
    '#states':
      visible:
        - ':input[name="what_type_of_copier[Black and White]"]':
            checked: true
        - or
        - ':input[name="what_type_of_copier[Color]"]':
            checked: true
    '#text': |
      <p>When making a selection of the model or models that you are interested in, please indicate the quantity desired. When a quantity of one or more is selected, five location fields will become available. Please put the location of where you would like to have the printer installed.</p>

      <p>After inputting the location, some models will present&nbsp;an option to choose to have four paper feed drawers, each with 550 sheets. The other option is to have two drawers with 550 sheets each combined with a single drawer that can hold up to 2000 sheets.&nbsp;</p>
    '#format': full_html
  black_and_white_header:
    '#type': processed_text
    '#states':
      visible:
        ':input[name="what_type_of_copier[Black and White]"]':
          checked: true
    '#text': |

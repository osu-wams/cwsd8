id: new_office_copier_request_form
title: 'New Office Copier Request Form'
description: ''
categories: {  }
elements: |-
  department:
    '#type': textfield
    '#title': Department
    '#placeholder': 'Department Name'
    '#required': true
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  name:
    '#type': textfield
    '#title': Name
    '#placeholder': 'Copier Contact Name'
    '#required': true
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  phone:
    '#type': textfield
    '#title': Phone
    '#placeholder': 'Contact Phone Number'
    '#required': true
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  email:
    '#type': textfield
    '#title': Email
    '#placeholder': 'Contact Email Address'
    '#required': true
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  interested_in:
    '#type': checkboxes
    '#title': 'Interested In'
    '#description': '<p><em>Please select the option or options that you are interested in.&nbsp;</em></p>'
    '#title_display': before
    '#description_display': before
    '#help_display': title_after
    '#options':
      1: 'Request a Meeting'
      2: 'Copier Usage Summary Report. This is a summary of your copier use for the past 12 months, with a recommendation of a replacement. '
      3: 'New/Replacement Copier Order Form'
    '#options_description_display': help
    '#required': true
  request_in_person_meeting:
    '#type': textfield
    '#title': 'Request in person meeting'
    '#description': '<p><em>Indicate your location or meet at Research Way and desired day/time.</em></p>'
    '#states':
      visible:
        ':input[name="interested_in[1]"]':
          checked: true
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  request_phone_call_or_teams_contact:
    '#type': textfield
    '#title': 'Request Phone Call or Teams contact'
    '#description': '<p><em>Indicate phone or Teams, and day/time that works best.</em></p>'
    '#states':
      visible:
        ':input[name="interested_in[1]"]':
          checked: true
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  model:
    '#type': textfield
    '#title': Model
    '#states':
      visible:

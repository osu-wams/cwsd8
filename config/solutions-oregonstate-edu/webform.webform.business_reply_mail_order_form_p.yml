title: 'Business Reply Mail Order Form'
description: ''
categories: {  }
elements: |-
  name:
    '#type': textfield
    '#title': Name
    '#required': true
  phone_number:
    '#type': textfield
    '#title': 'Phone Number'
    '#required': true
  email:
    '#type': textfield
    '#title': Email
    '#required': true
  project_name:
    '#type': textfield
    '#title': 'Project Name'
  department:
    '#type': textfield
    '#title': Department
  billing_index_activity_code:
    '#type': textfield
    '#title': 'Billing Index / Activity Code'
    '#required': true
  project_size:
    '#type': webform_select_other
    '#title': 'Project Size '
    '#options':
      1: '3.5 x 5 Card'
      2: '3.5 x 5.5 Card'
      3: '3.5 x 5.75 Card'
      4: '3.5 x 6 Card'
      5: '3.75 x 5 Card'
      6: '3.75 x 5.25 Card'
      7: '3.75 x 5.5 Card'
      8: '3.75 x 5.75 Card'
      9: '3.75 x 6 Card'
      10: '4 x 5.5 Card'
      11: '4 x 5.75 Card'
      12: '4 x 6 Card'
      13: '4.25 x 5.75 Card'
      14: '4.25 x 6 Card'
      15: '(#6 0.25) 3.5 x 6 Letter'
      16: '(#6 0.5) 3.5625 x 6.25 Letter'
      17: '(#6 0.75) 3.625 x 6.5 Letter'
      18: '(#7) 3.75 x 6.75 Letter'
      19: '(#7) 3.875 x 7.5 Letter'
      20: '(#7) 3.75 x 6.75 Letter'
      21: '(#8) 3.625 x 8.625 Letter'
      22: '(#9) 3.875 x 8.875 Letter'
      23: '(#10) 4.125 x 9.5 Letter'
      24: '(#10 0.5) 4.5 x 9.5 Letter'
      25: '(#11) 4.5 x 10.375 Letter'
      26: '(#12) 4.75 x 11 Letter'
      27: '(#14) 5 x 11.5 Letter'
      28: '6 x 9 Letter'
    '#other__option_label': Custom
    '#other__title': 'Custom - Enter Dimensions '
    '#other__placeholder': 'Enter Dimensions'
    '#required': true
  artwork_only:
    '#type': checkbox
    '#title': 'Artwork Only'
  artwork_printing:
    '#type': checkbox
    '#title': 'Artwork & Printing'
  billing_index_for_printing:
    '#type': textfield
    '#title': 'Billing Index for Printing'
    '#states':
      visible:
        ':input[name="artwork_printing"]':
          checked: true
  quantity:
    '#type': textfield
    '#title': Quantity
    '#required': true
    '#states':
      visible:
        ':input[name="artwork_printing"]':
          checked: true
  delivery:
    '#type': radios
    '#title': Delivery
    '#options':
      'Pick Up at 4700 Research Way': 'Pick Up at 4700 Research Way'
      'Pick Up at MU 109': 'Pick Up at MU 109'
      'Ship via Fedex/UPS (Additional charges will apply)': 'Ship via Fedex/UPS (Additional charges will apply)'
      'Hold at Printing & Mailing for Future Project': 'Hold at Printing & Mailing for Future Project'
      'Local Delivery': 'Local Delivery'
      'Campus Mail': 'Campus Mail'
  type_of_business_reply_mail:
    '#type': select
    '#title': 'Type of Business Reply Mail'
    '#options':
      1: 'BRM Basic 1'
      2: 'BRM Basic 2'
      3: 'BRM Logo 1'
      4: 'BRM Logo 2'
    '#required': true
  brm_basic_1:
    '#type': processed_text
    '#states':
      visible:
        ':input[name="type_of_business_reply_mail"]':
          value: '1'
    '#text': |
      <drupal-media data-entity-type="media" data-entity-uuid="f9a332c9-3fd6-4ceb-9a3d-a41d73853cdb"></drupal-media>
    '#format': full_html
  brm_basic_2:
    '#type': processed_text
    '#states':
      visible:
        ':input[name="type_of_business_reply_mail"]':
          value: '2'
    '#text': |
      <drupal-media data-entity-type="media" data-entity-uuid="6eb3812f-0034-409f-8961-6157fb2c4746"></drupal-media>
    '#format': full_html
  brm_logo_1:
    '#type': processed_text
    '#states':
      visible:
        ':input[name="type_of_business_reply_mail"]':
          value: '3'
    '#text': |
      <drupal-media data-entity-type="media" data-entity-uuid="855aad98-2135-450d-b6fe-c0b9b2a2913c"></drupal-media>
    '#format': full_html
  brm_logo_2:
    '#type': processed_text
    '#states':
      visible:
        ':input[name="type_of_business_reply_mail"]':
          value: '4'
    '#text': |
      <drupal-media data-entity-type="media" data-entity-uuid="58a70b0d-cb74-425e-8848-2840f47d43dd"></drupal-media>
    '#format': full_html
  billing_index_for_return_postage:
    '#type': textfield
    '#title': 'Billing Index for Return Postage'
    '#required': true
    '#states':
      visible:
        - ':input[name="type_of_business_reply_mail"]':
            value: '1'
        - xor
        - ':input[name="type_of_business_reply_mail"]':
            value: '2'
        - xor
        - ':input[name="type_of_business_reply_mail"]':
            value: '3'
        - xor
        - ':input[name="type_of_business_reply_mail"]':
            value: '4'
  department_name:
    '#type': textfield
    '#title': 'Department Name'
    '#required': true
    '#states':
      visible:
        - ':input[name="type_of_business_reply_mail"]':
            value: '1'
        - xor
        - ':input[name="type_of_business_reply_mail"]':
            value: '2'
        - xor
        - ':input[name="type_of_business_reply_mail"]':
            value: '3'
        - xor
        - ':input[name="type_of_business_reply_mail"]':
            value: '4'
  rm_campus_bldg:
    '#type': textfield
    '#title': 'Rm# Campus Bldg'
    '#states':
      visible:
        - ':input[name="type_of_business_reply_mail"]':
            value: '1'
        - xor
        - ':input[name="type_of_business_reply_mail"]':
            value: '2'
        - xor
        - ':input[name="type_of_business_reply_mail"]':
            value: '3'
  person_s_name:
    '#type': textfield
    '#title': "Person's Name"
    '#states':
      visible:
        ':input[name="type_of_business_reply_mail"]':
          value: '2'
    '#required': true
  dept_campus_mailing_address:
    '#type': textarea
    '#title': 'Dept. Campus Mailing Address'
    '#required': true
    '#states':
      visible:
        ':input[name="type_of_business_reply_mail"]':
          value: '4'
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#attributes':
      style: 'margin-top: 30px;'

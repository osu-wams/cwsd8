id: coursepack_order_form
title: 'Coursepack Order Form'
description: ''
categories: {  }
elements: |-
  name:
    '#type': textfield
    '#title': Name
    '#required': true
  email:
    '#type': textfield
    '#title': Email
    '#required': true
  department:
    '#type': textfield
    '#title': Department
    '#required': true
  campus_address:
    '#type': textfield
    '#title': 'Campus Address'
    '#required': true
  phone:
    '#type': textfield
    '#title': Phone
    '#required': true
  class_information:
    '#type': webform_section
    '#title': 'Class Information'
    course_number:
      '#type': textfield
      '#title': 'Course Number'
      '#required': true
    section_number:
      '#type': textfield
      '#title': 'Section Number'
      '#required': true
    quantity:
      '#type': textfield
      '#title': Quantity
      '#required': true
    class_title:
      '#type': textfield
      '#title': 'Class Title'
      '#required': true
    terms_offered:
      '#type': checkboxes
      '#title': 'Terms Offered'
      '#options':
        1: Fall
        2: Winter
        3: Spring
        4: Summer
      '#options_display': side_by_side
      '#required': true
    year:
      '#type': textfield
      '#title': Year
      '#required': true
    this_course_packet_is:
      '#type': select
      '#title': 'This course packet is '
      '#title_display': inline
      '#options':
        1: Required
        2: Optional
      '#empty_option': '- select -'
      '#required': true
  printing_details:
    '#type': webform_section
    '#title': 'Printing Details'
    printing_details1:
      '#type': checkboxes
      '#title': 'Printing Details'
      '#title_display': invisible
      '#options':
        'Color Printing': 'Color Printing'
        'Black & White Printing': 'Black & White Printing'
        'Copy on both sides of the paper': 'Copy on both sides of the paper'
        'Copy on one side of the paper': 'Copy on one side of the paper'
        'Put page numbers on': 'Put page numbers on'
        'Front cover': 'Front cover'
        'Back cover': 'Back cover'
      '#required': true
    cover_color:
      '#type': select
      '#title': 'Cover Color'
      '#options':
        White: White
        Ivory: Ivory
        'Orbit Orange': 'Orbit Orange'
        'Galaxy Gold': 'Galaxy Gold'
        'Solar Yellow': 'Solar Yellow'
        Canary: Canary
        Green: Green
        'Terra Green': 'Terra Green'
        'Lunar Blue': 'Lunar Blue'
        Blue: Blue
        Orchid: Orchid
        Gray: Gray
      '#empty_option': 'Choose for me'
      '#empty_value': 'Choose for me'
      '#states':
        visible:
          - ':input[name="printing_details1[Front cover]"]':
              checked: true
          - or
          - ':input[name="printing_details1[Back cover]"]':
              checked: true
    do_you_want_any_desk_copies:
      '#type': checkboxes
      '#title': 'Do you want any desk copies?'
      '#description': '<p>(For instructors &amp; TAs) Desk copies will be billed to your department.Please provide a valid OSU billing index.</p>'
      '#description_display': after
      '#options':
        'Yes': 'Yes'
        'No': 'No'
      '#options_display': side_by_side
      '#required': true
    how_many_desk_copies:
      '#type': textfield
      '#title': 'How many desk copies?'
      '#states':
        visible:
          ':input[name="do_you_want_any_desk_copies[Yes]"]':
            checked: true
    binding:
      '#type': checkboxes
      '#title': Binding
      '#options':
        'Three hole drill': 'Three hole drill'
        'Shrink wrap': 'Shrink wrap'
        'Staple upper left': 'Staple upper left'
        'Staple two on the side': 'Staple two on the side'
        'Comb bind': 'Comb bind'
        'Coil bind': 'Coil bind'
        'Thermal tape': 'Thermal tape'
      '#required': true
    osu_index_for_desk_copies:
      '#type': textfield
      '#title': 'OSU Index for Desk Copies'
    copyright_declaration_please_initial_to_certify_that_all_informa:
      '#type': textfield
      '#title': 'Copyright declaration. Please initial to certify that all information in this coursepack is in copyright compliance'
      '#required': true
    additional_instructions:
      '#type': textarea
      '#title': 'Additional Instructions'
    file_upload_1:
      '#type': managed_file
      '#title': 'File Upload 1'
      '#title_display': before
      '#description_display': before
      '#max_filesize': '100'
      '#file_extensions': pdf
    file_upload_2:
      '#type': managed_file
      '#title': 'File Upload 2'
      '#title_display': before
      '#description_display': before
      '#file_help': none
      '#max_filesize': '100'
      '#file_extensions': pdf

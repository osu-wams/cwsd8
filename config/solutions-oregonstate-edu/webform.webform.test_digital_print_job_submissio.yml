orm-flexbox {\r\n  margin-bottom: 0.75rem;\r\n}\r\n\r\n.js-form-wrapper {\r\n  margin-bottom: 0.75rem;\r\n}\r\n\r\n.fieldset-legend{\r\nfont-size: 16px;\r\n}\r\nlegend{\r\nmargin-bottom: 0 !important;\r\nfont-size: 16px !important;\r\nfont-weight: bold !important;\r\n}\r\n\r\n.form-select{\r\n    padding-top: 0 !important;\r\n    padding-bottom: 0 !important;\r\n    font-size: 16px;\r\n    }\r\n.form-file\r\n{\r\n    height: 32px;\r\n    padding-top: 0;\r\n}\r\n\r\n.form-item-name-first .form-label,\r\n.form-item-name-last .form-label,\r\n.js-form-type-email .form-label,\r\n.js-form-type-tel .form-label,\r\n.js-form-type-textfield .form-label,\r\n.js-form-type-select .form-label,\r\n.form-item-special-instructions .form-label,\r\n.form-item-delivery-address .form-label,\r\n.js-form-type-managed-file .form-label,\r\n.form-item-date-required .form-label{\r\nfont-weight: bold !important;\r\n}\r\n\r\n.form-item-help-us-sharpen-direction-inform, .form-item-help-us-sharpen-direction-promote, .form-item-help-us-sharpen-direction-sell, .form-item-help-us-sharpen-direction-engage,\r\n.form-item-help-us-sharpen-direction-educate{\r\n  margin-bottom: 0.5rem;\r\n}"

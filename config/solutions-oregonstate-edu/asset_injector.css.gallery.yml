id: gallery
label: Gallery
code: |-
  .my-drupal-gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 0;
    }
    .my-drupal-gallery img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: all 0.3s;
    }
    .my-drupal-gallery img:hover { transform: scale(1.03); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
    @media (max-width: 768px) { .my-drupal-gallery { grid-template-columns: 1fr; } }

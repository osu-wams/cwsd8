id: stay_informed
title: 'Stay Informed'
description: ''
categories: {  }
elements: |-
  processed_text:
    '#type': processed_text
    '#text': |
      <p>Stay informed about upcoming events, call to artists, and much more. Simply choose to join one or both email communication lists offered by The LaSells Stewart Center.&nbsp;Sign-up specifications below.&nbsp;</p>

      <ul>
      	<li><em><strong>*Weekly Happening</strong><strong>s:&nbsp;</strong>Weekly email communication with information about upcoming performances, public events, art exhibits and receptions.</em></li>
      	<li><strong><em>*In the Gallery</em></strong><em><strong>:</strong>&nbsp;Periodic emails announcing call to artists, art exhibit openings and closures, receptions, and cultural events held in Giustina Gallery at The LaSells Stewart Center.</em></li>
      </ul>
    '#format': full_html
  name:
    '#type': webform_name
    '#title': Name
    '#required': true
    '#title__access': false
    '#first__required': true
    '#middle__access': false
    '#last__required': true
    '#suffix__access': false
    '#degree__access': false
  email:
    '#type': email
    '#title': Email
    '#required': true
  add_me_to:
    '#type': checkboxes
    '#title': 'Add Me To'
    '#options':
      'Weekly Happening': 'Weekly Happening'
      'In the Gallery': 'In the Gallery'
    '#required': true
  how_did_you_hear_about_these_communications:
    '#type': checkboxes
    '#title': 'How did you hear about these communications?'
    '#options':
      'Attended an Event': 'Attended an Event'
      'Browsing the Website': 'Browsing the Website'
      'Heard about it from a Friend': 'Heard about it from a Friend'
      'Saw Ad in Willamette Living': 'Saw Ad in Willamette Living'
      'Scanned QR Code': 'Scanned QR Code'
      Other: Other
    '#required': true

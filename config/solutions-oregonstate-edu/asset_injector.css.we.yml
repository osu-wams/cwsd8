code: |-
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');
  .video-container {
        position: relative;
        max-width: 390px;
        width: 100%; /* Adjust as needed */
        height: 479px; /* Adjust as needed */
        display: inline-block; /* Allows multiple containers side by side */
      }

      .thumbnail, .hover-video {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        object-fit: cover;
      }

      .hover-video {
        display: none;
      }

      .video-container:hover .hover-video {
        display: block;
      }

      .video-container:hover .thumbnail {
        display: none;
      }
      body {
              min-height: 200vh; /* Ensures page is scrollable */
          }
   .fade-heading {
              padding: 20px;
              text-align: center;
          }

          .fade-heading h2 {
              color: white;
              margin: 0; /* Remove default h1 margin */
          }

          .fade-heading .fade-text {
              opacity: 0; /* Span text initially hidden */
              transition: opacity 1s ease-in-out; /* Smooth fade-in for span */
              display: inline-block; /* Ensure proper rendering */
          }

          .fade-heading .fade-text.visible {
              opacity: 1; /* Span text fades in */
          }
  h2, .h2 {

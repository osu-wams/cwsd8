id: reservation_request
title: 'Reservation Request'
description: ''
categories: {  }
elements: |-
  processed_text:
    '#type': processed_text
    '#text': |
      <p>To get started, simply complete the form below.&nbsp;One of our event planners will reach out to further discuss your needs and prepare a proposal.</p>
    '#format': full_html
  name:
    '#type': webform_name
    '#title': Name
    '#required': true
    '#title__access': false
    '#first__required': true
    '#middle__access': false
    '#last__required': true
    '#suffix__access': false
    '#degree__access': false
  affiliation_and_or_department:
    '#type': textfield
    '#title': 'Affiliation and/or Department'
    '#required': true
  email_address:
    '#type': email
    '#title': 'Email Address'
    '#required': true
  phone_number:
    '#type': tel
    '#title': 'Phone Number'
    '#required': true
  name_of_event_if_known:
    '#type': textfield
    '#title': 'Name of Event (if known)'
    '#required': true
  event_type:
    '#type': radios
    '#title': 'Event Type'
    '#options':
      'Concert or Performance': 'Concert or Performance'
      Conference: Conference
      Expo: Expo
      Lecture: Lecture
      Meeting: Meeting
      'Reception or Special Event': 'Reception or Special Event'
    '#required': true
  start_date_of_event:
    '#type': date
    '#title': 'Start Date of Event (First Choice)'
    '#required': true
  start_date_of_event_second_choice:
    '#type': date
    '#title': 'Start Date of Event (Second Choice)'
    '#required': true
  start_time_of_event:
    '#type': webform_time
    '#title': 'Start Time of Event'
    '#required': true
    '#time_format': 'g:i A'
  end_time_of_event:
    '#type': webform_time
    '#title': 'End Time of Event'
    '#required': true
    '#time_format': 'g:i A'
  which_event_space_are_you_interested_in:
    '#type': checkboxes
    '#title': 'Which Event Space Are You Interested In?'
    '#options':
      'Austin Auditorium (capacity 1200)': 'Austin Auditorium (capacity 1200)'
      'Construction & Engineering Hall (capacity 200)': 'Construction & Engineering Hall (capacity 200)'
      'Agricultural Rooms, Three Options (capacity 84 each)': 'Agricultural Rooms, Three Options (capacity 84 each)'
      'Wells Fargo Bank Room (capacity 50)': 'Wells Fargo Bank Room (capacity 50)'
      'Weyerhaeuser Boardroom (capacity 14)': 'Weyerhaeuser Boardroom (capacity 14)'
      'Giustina Gallery': 'Giustina Gallery'
      Courtyard: Courtyard
      'Entire Center (excludes courtyard)': 'Entire Center (excludes courtyard)'
    '#required': true
  expected_attendance:
    '#type': textfield
    '#title': 'Expected Attendance'
    '#required': true
  room_setup:
    '#type': checkboxes
    '#title': 'Room Setup'
    '#options':
      Classroom: Classroom
      Rounds: Rounds
      Reception: Reception
      Theater: Theater
      'Hollow Square': 'Hollow Square'
      U-Shape: U-Shape
      Boardroom: Boardroom
    '#required': true
  will_you_need_av:
    '#type': radios
    '#title': 'Will you need AV?'
    '#options':
      'Yes': 'Yes'
      'No': 'No'
      'Not Sure': 'Not Sure'
    '#required': true
  will_you_zoom:
    '#type': radios
    '#title': 'Will you Zoom?'
    '#options':
      'Yes': 'Yes'
      'No': 'No'
      'Not Sure': 'Not Sure'
    '#required': true
  will_you_have_catering:
    '#type': radios
    '#title': 'Will you have Catering?'
    '#options':
      'Yes': 'Yes'
      'No': 'No'
      'Not Sure': 'Not Sure'
    '#required': true
  payment_method:
    '#type': radios
    '#title': 'Payment Method'
    '#options':
      Index: Index
      'Credit Card': 'Credit Card'
      Check: Check
    '#required': true
  if_paying_by_index_enter_number_here:
    '#type': textfield
    '#title': 'If Paying by Index, Enter Number Here'
  additional_information:
    '#type': textarea
    '#title': 'Additional Information'

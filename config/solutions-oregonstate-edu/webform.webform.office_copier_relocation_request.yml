id: office_copier_relocation_request
title: 'Office Copier Relocation Request '
description: ''
categories: {  }
elements: |-
  department:
    '#type': textfield
    '#title': Department
    '#placeholder': 'Department Name'
    '#required': true
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  name:
    '#type': textfield
    '#title': Name
    '#placeholder': ' Copier Contact Name'
    '#required': true
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  phone:
    '#type': textfield
    '#title': Phone
    '#placeholder': ' Contact Phone Number'
    '#required': true
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  email:
    '#type': textfield
    '#title': Email
    '#placeholder': ' Contact Email Address'
    '#required': true
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  equipment_id:
    '#type': textfield
    '#title': 'Equipment ID'
    '#placeholder': ' 8-digit EID on Ricoh Sticker'
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  model:
    '#type': textfield
    '#title': Model
    '#placeholder': ' Ricoh Model Number'
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  pick_up_location:
    '#type': textfield
    '#title': 'Pick Up Location'
    '#placeholder': ' Building and Room. Address if off campus.'
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  pick_up_site_contact_name_phone_number:
    '#type': textfield
    '#title': 'Pick Up Site Contact Name & Phone Number'
    '#placeholder': ' First Last Name, 541-737-XXXX'
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  delivery_location:
    '#type': textfield
    '#title': 'Delivery Location'
    '#placeholder': ' Building and Room. Address if off campus.'
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  delivery_site_contact_name_phone_number:
    '#type': textfield
    '#title': 'Delivery Site Contact Name & Phone Number'
    '#placeholder': ' First LastName, 541-737-XXXX'
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  processed_text:
    '#type': processed_text
    '#text': |
      <p>Please enter a relocation date range. Ideally we would like at least two weeks notice.</p>
    '#format': full_html
  date_no_earlier_than:
    '#type': date
    '#title': 'Date: No earlier than....'
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  date_no_later_than:
    '#type': date
    '#title': 'Date: No later than....'
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  comments:
    '#type': textarea
    '#title': 'Comments '
    '#placeholder': 'This area is for you to ask questions and/or make a comment.'
    '#label_attributes':
      style: 'font-size: calc(1.275rem + 0.3vw);'
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__attributes':
      style: 'margin-top:10px !important;'

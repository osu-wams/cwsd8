uuid: a6e2238d-f46e-433a-992f-3f7d55752831
langcode: en
status: false
dependencies:
  module:
    - block_visibility_groups
id: main_styles
label: 'Main styles'
code: |-
  .orange-header {
  	font-family: "Stratum2Web", serif; 
  	color: #d73f09;
  }
  .gray-header {
  	font-family: "Stratum2Web", serif; 
  	color: #292929;
  }
  .large-numbers .medium-numbers .small-numbers {
      font-family: "Stratum2Web", serif; 
      line-height: 1;
      }
  @media (min-width: 2200px) {
      .large-numbers { font-size: 280px;
      font-family: "Stratum2Web", serif; 
      line-height: 1;
      margin:0;
      }
      .medium-numbers {
      font-size: 210px;
      font-family: "Stratum2Web", serif; 
      }
      .small-numbers {
      font-size: 95px;
      font-family: "Stratum2Web", serif; 
      }
  }
  @media (min-width: 1400px) {
      .large-font { font-size: 3.5rem;
      }
      .medium-font {
      	font-size:2.5rem;
      }
      .large-numbers {
      font-size: 270px;
      font-family: "Stratum2Web", serif; 
      line-height: 1;
      margin:0;
      }
      .medium-numbers {
      font-size: 210px;
      font-family: "Stratum2Web", serif; 
      }
      .small-numbers {
      font-size: 95px;
      font-family: "Stratum2Web", serif; 
      margin:90px 0 15px 0;
      }
  }
  @media (max-width: 1400px) {
      .large-font {
          font-size: 3rem;
      }
      .large-numbers { font-size:calc(2.0rem + 10vw);
      font-family: "Stratum2Web", serif; 
      line-height: 1;
      margin:70px 0 15px 0;
      }
      .medium-numbers { 
      	font-size:calc(1.7rem + 7vw);
      font-family: "Stratum2Web", serif; 
      }
      .small-numbers { 
      	font-size:60px;
      font-family: "Stratum2Web", serif; 
      margin:110px 0 15px 0;
      }
  }
  @media (min-width: 1001px) {
      .mobile {
      	display:none;
      }
      .large-numbers-box {
      	margin:80px 80px 40px 80px;
      }
  }
  @media (max-width: 1000px) {
      .desktop {
      	display:none;
      }
      .large-font {
          font-size: 2.5rem;
      }
      .large-numbers { font-size:120px;
      font-family: "Stratum2Web", serif; 
      line-height: 1;
      margin:100px 0 15px 0;
      }
      .large-numbers-box .medium-numbers {
      	margin:20px 20px 40px 20px;
      }
      .medium-numbers { font-size:70px;
      font-family: "Stratum2Web", serif; 
      }
      .small-numbers { 
      	font-size:70px;
      font-family: "Stratum2Web", serif; 
      margin:110px 0 15px 0;
      }
  }
  .separator-margin {
  	margin-bottom: -30px;
  }
  #scrollToTopBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(30, 33, 36, 0.5);
    color: #ffffff;
    border: none;
    border-radius:5px;
    padding: 10px 16px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    cursor: pointer;
  }
  .iframe-16x9 {
      width: 100%;
      aspect-ratio: 16 / 9;
      height: unset;
  }
media: all
preprocess: true
conditions:
  condition_group:
    id: condition_group
    negate: false
    block_visibility_group: ''
contexts: {  }
conditions_require_all: true

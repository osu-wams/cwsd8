id: footer_overrides
label: 'footer overrides'
code: |-
  .region.region-footer.osu-bg-page-alt-2 {
      padding-left: 0 !important;
      padding-right: 0 !important;
  }

  @media screen and (max-width:991px){
  	.fw-bg-footer .landack-logo {
        max-width: 480px;
        height: auto;
        margin-left: auto;
        margin-right: auto;
        padding-right: 2rem;
  	}
  }

  footer .madrone-copyright.align-self-sm-center {
      padding: .25rem 1.5rem;
  }

  @media (min-width: 1500px) {
     footer .container-xxl, footer .container-xl, footer .container-lg, footer .container-md, footer .container-sm, footer .container, footer .node-layout-builder-form {
          max-width: 1500px;
      }
  }

  @media (min-width: 1700px) {
     footer .container-xxl, footer .container-xl, footer .container-lg, footer .container-md, footer .container-sm, footer .container, footer .node-layout-builder-form {
          max-width: 1700px;
      }
  }

  @media (min-width: 1900px) {
     footer .container-xxl, footer .container-xl, footer .container-lg, footer .container-md, footer .container-sm, footer .container, footer .node-layout-builder-form {
          max-width: 1900px;
      }
  }

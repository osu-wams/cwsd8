      /* Sticky Note Container - this is displayed on the homepage for the Accelerator to make announcement notes */
       /* Sticky Note Container - Hidden by Default */
      .sticky-note-container {
          display: none;
      }

      /* Check if ANY parent element has 'show-note' */
      .show-note .sticky-note-container {
          display: flex !important; /* Force it to override Drupal styles */
          justify-content: flex-end; /* Aligns the sticky note to the right */
          padding-right: 50px; /* Moves it left */
      }

      .sticky-note {
          display: inline-block;
          width: 100%;
          max-width: 280px;
          height: auto;
          min-height: 130px;
          padding: 10px 30px 25px; /* Adjusted padding to balance spacingtop, sides, bottom */
          background: #fff58a; /* Slightly muted yellow */
          font-family: "Segoe Print", "Arial Rounded MT Bold", sans-serif;
          font-size: 1.3em;
          font-weight: bold;
          color: #000;
          text-align: center;
          box-shadow: 8px 8px 25px rgba(0, 0, 0, 0.7); /* Darker shadow for better 3D effect */
          transform: rotate(-5deg);
          border-radius: 0;
          transition: transform 0.2s ease-in-out, background 0.2s ease-in-out;
          line-height: 1.4; /* Restored proper spacing for main text */
          margin-top: -50px;
          position: relative;
      }

      /* Brighten yellow on hover */
      .sticky-note:hover {
          background: #ffea40; /* Brighter yellow on hover */
          transform: rotate(-3deg) scale(1.05);
      }

      /* Date styling at the top right */
      .sticky-note-date {
          position: absolute;
          top: 8px; /* Slightly lowers it from the very top */
          right: 10px;
          font-family: "Comic Sans MS", "Bradley Hand", cursive;
          font-size: .85em; /* Slightly larger for readability */
          font-weight: normal;
          color: #444;
          line-height: 1; /* Ensures no extra spacing inside */
          padding-bottom: 0px; /* Reduced spacing below the date */
          margin-bottom: -10px; /* Further reduces spacing below the date */
      }

         /* Center sticky note for smaller screens */
      @media (max-width: 1024px) {
          .show-note .sticky-note-container {
              justify-content: center !important; /* Centers the sticky note */
              padding-right: 0;
          }
          .sticky-note {
              margin-top: auto; align-self: flex-end;
          }
      }
      
      /* Beginning of Curl effect */
  .sticky-note::before {
      content: "";
      position: absolute;
      bottom: 0;
      right: 0;
      width: 0;
      height: 0;
      background: linear-gradient(315deg, rgba(255, 235, 59, 0.5) 40%, #aaa 50%, #ccc 56%, white 85%);
      box-shadow: -2px -2px 3px rgba(0, 0, 0, 0.4);
      transition: width 0.3s ease-in-out, height 0.3s ease-in-out;
  }

  /* Lower-right cutout to prevent background overlap */
  .sticky-note::after {
      content: "";
      position: absolute;
      bottom: 0;
      right: 0;
      width: 35px;
      height: 35px;
      background: transparent;
      clip-path: polygon(100% 100%, 100% 0, 0 100%);
      transition: all 0.3s ease-in-out;
  }

  /* On hover, trigger curl effect */
  .sticky-note:hover::before, 
  .sticky-note:focus::before, 
  .sticky-note:active::before {
      width: 35px;
      height: 35px;
  }
  /* End of curl effect */

      /* Adjust for tablets */
      @media (max-width: 768px) {
          .sticky-note {
              font-size: 1.1em;
              width: 80%;
              max-width: 250px;
              min-height: 120px;
              padding: 18px 25px 18px;
          }
      }

      /* Adjust for smaller phones */
      @media (max-width: 480px) {
          .sticky-note {
              font-size: 0.9em;
              width: 75%;
              max-width: 220px;
              min-height: 110px;
              padding: 15px;
          }
      }

      /* Adjust for very small screens */
      @media (max-width: 400px) {
          .sticky-note {
              font-size: 0.8em;
              width: 70%;
              max-width: 200px;
              min-height: 100px;
              padding: 10px;
          }
      }











id: judicial_council_writ_of_inquiry
title: 'Judicial Council - Writ of Inquiry'
description: '<p>Interested in writing a piece of legislation? Any student can write a Bill or Resolution! Use this page to connect with a legislator to help you write legislation, or to sponsor your legislation so it can be brought to Congress. When you fill out this form, the President of the Senate and the Speaker of the House will be notified and then reach out to Congress to find a Representative and/or Senator to work with you.</p>'
categories: {  }
elements: |-
  full_name:
    '#type': textfield
    '#title': 'Full Name'
    '#placeholder': 'Benny Beaver'
    '#required': true
    '#required_error': 'Please Enter Full Name'
  onid_email:
    '#type': email
    '#title': 'ONID Email'
    '#placeholder': beaverb@oregonstate.edu
    '#required': true
    '#required_error': 'Please Enter ONID Email'
  phone_number:
    '#type': tel
    '#title': 'Phone Number'
    '#placeholder': 555-555-5555
  constitution_statutes_or_other:
    '#type': select
    '#title': 'Constitution, Statutes, or Other'
    '#options':
      Constitution: Constituion
      Statutes: Statutes
      'Elections Rules': 'Elections Rules'
      'Student Fee By Laws': 'Student Fee By Laws'
      'Senate Standing Rules': 'Senate Standing Rules'
      Other: Other
    '#required': true
    '#required_error': 'Please Select Constitution, Statutes, or Other'
  constitutional_or_statutory_provision_in_question:
    '#type': textfield
    '#title': 'Constitutional or Statutory provision in Question'
    '#placeholder': 'Ex: Consitution, Article VI, Sec'
    '#required': true
    '#required_error': 'Please Enter Constitutional or Statutory provision in question'
  provision_quote_in_question:
    '#type': textarea
    '#title': 'Provision Quote in Question'
    '#required': true
    '#required_error': 'Please Enter Provision Quote in Question'
  summary_of_the_inquiry_for_consideration:
    '#type': textarea
    '#title': 'Summary of the inquiry for consideration'
    '#required': true
    '#required_error': 'Please Enter Summary of the inquiry for consideration'
  supporting_document:
    '#type': managed_file
    '#title': 'Supporting Document'
    '#max_filesize': '10'
    '#file_extensions': 'gif jpg png pdf'
  supporting_document2:
    '#type': managed_file
    '#title': 'Supporting Document'
    '#max_filesize': '10'
    '#file_extensions': 'gif jpg png pdf'
  sealing:
    '#type': select
    '#title': Sealing
    '#description': 'You may request the Judicial Council to keep the written materials and supporting documentation submitted herein sealed, or kept in confidence (within applicable legal and OSU institutional limitations). The Judicial Council will take this request into account, but the decision to keep sealed any submitted Writ of Inquiry is at the discretion of the Judicial Council.&nbsp;'
    '#options':
      Sealed: Sealed
      Unsealed: Unsealed
    '#required': true
    '#required_error': 'Please Select Sealing'
  signature_of_inquirer:
    '#type': textfield
    '#title': 'Signature of Inquirer'
    '#description': |-
      <br />
      I understand the information I submit will be reviewed by all members of the ASOSU Judicial Council, as well as the advisory team. Documents submitted become the property of the ASOSU Judicial Council. I affirm the information I have submitted is truthful and accurate, and confirm my willingness to appear before the Judicial Council for additional review, questioning, or inquiry.<br />
      &nbsp;
    '#required': true
    '#required_error': 'Please Enter Signature of Inquirer'

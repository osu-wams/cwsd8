title: 'ASOSU Student Feedback Form'
description: '<p>a form to collect feedback from students.&nbsp;</p>'
categories: {  }
elements: |-
  what_is_your_comment_about_this_list_is_not_exhaustive:
    '#type': webform_checkboxes_other
    '#title': 'What is your comment about? (This list is not exhaustive.)'
    '#options':
      - Academics
      - 'Campus & Student Safety'
      - 'Diversity, Equity, & Inclusion'
      - Employment
      - Housing
      - 'International Student Issues'
      - 'Student Experiences & Engagement'
      - 'Student Health & Wellbeing'
      - Sustainability
      - 'Tuition, Fees, & Financial Aid'
    '#required': true
  please_describe_your_issue_or_suggestion:
    '#type': textarea
    '#title': 'Please describe your issue or suggestion.'
    '#required': true
  are_you_interested_in_pursuing_further_action_or_advocacy_with_a:
    '#type': radios
    '#title': 'Are you interested in collaborating with ASOSU to address this issue/suggestion?'
    '#options':
      - 'Yes'
      - 'No'
    '#required': true
  please_provide_your_name:
    '#type': textfield
    '#title': 'Please provide your name.'
  please_provide_your_osu_email:
    '#type': email
    '#title': 'Please provide your OSU email.'

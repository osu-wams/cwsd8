id: card
label: Cards
code: |-
  document.addEventListener('DOMContentLoaded', function() {
    const h3s = document.querySelectorAll('.block-views-blockstate-inclusive-excellence-cards-block-1 h3');

    h3s[0].insertAdjacentHTML('afterend', `<p>The Oregon State University chapters of the <a href="https://agsci.oregonstate.edu/sacnas">Society for Advancement of Chicanos/Hispanics and Native Americans in Science</a> (SACNAS) and <a href="https://agsci.oregonstate.edu/manrrs">Minorities in Agriculture, Natural Resources and Related Sciences</a> (MANRRS) strengthen the next generation of scientists and leaders by creating opportunities for mentorship, professional development, research, and community-building.</p><p>Both OSU chapters were named national Chapter of the Year in 2025, with the OSU SACNAS chapter receiving the honor out of more than 150 chapters nationwide.</p>`);
    h3s[1].insertAdjacentHTML('afterend', `<p><a href="https://educationalventures.oregonstate.edu/workforce/semiconductor/vets-up/">The VETS-UP: Veterans Semiconductor Upskilling Program</a> is helping address Oregon's growing semiconductor workforce needs by providing veterans and military-connected students with paid, hands-on training in semiconductor manufacturing, electronics, and robotics in partnership with <a href="https://www.analog.com/en/index.html">Analog Devices</a>.</p>`);
    h3s[2].insertAdjacentHTML('afterend', `<p>Since 2018, the <a href="https://explorer.bee.oregonstate.edu/Topic/CoastalResilience/OCF_About.aspx">Oregon Coastal Futures Project</a> has brought together researchers, students, agencies, and coastal communities in community-engaged, transdisciplinary research to help Oregon coastal communities prepare for hazards. The project reflects OSU's land-grant mission and the value of reciprocal university-community collaboration.</p>`);
    h3s[3].insertAdjacentHTML('afterend', `<p><a href="https://osucascades.edu/the-bridge">The Bridge</a> at Oregon State University-Cascades is a student center with a mission to foster belonging and leadership development through inclusive programming, affinity groups, and community partnerships. Since opening in Fall 2024, The Bridge and its associated affinity groups have grown to more than 130 student members.</p>`);
    h3s[4].insertAdjacentHTML('afterend', `<p><a href="https://extension.oregonstate.edu/mfp">The Gather, Preserve, Store, Share (GPSS)</a> program is an Extension Service initiative developed in partnership with Tribal communities to support Indigenous food sovereignty, food safety, and the continuation of traditional foodways across Oregon communities.</p>`);
    h3s[5].insertAdjacentHTML('afterend', `<p>For nearly four decades, the <a href="https://smile.oregonstate.edu/">Science & Math Investigative Learning Experiences (SMILE) Program</a> has been a powerful example of Oregon State University's land-grant mission in action, building long-term, reciprocal partnerships with rural schools, teachers, families, and communities across Oregon to expand access to STEM education and college pathways.</p>
  <p>In 2025, SMILE was honored by President Biden with the nation's highest award for science and mathematics teachers and mentors.</p>`);
    h3s[6].insertAdjacentHTML('afterend', `<p><a href="https://engineering.oregonstate.edu/people/naomi-fitter">Naomi Fitter</a>, associate professor in the College of Engineering, researches and develops socially assistive robotics and human-centered design technologies that support a better quality of life for older adults and children with disabilities through meaningful human-robot interaction.</p>
  <p><a href="https://health.oregonstate.edu/directory/sam-logan">Sam Logan</a>, associate professor in the College of Health, researches mobility, adapted physical activity, and assistive technology to support participation in daily life and improve quality of life for children with disabilities.</p>`);
    h3s[7].insertAdjacentHTML('afterend', `<p>The <a href="https://extension.oregonstate.edu/climate-stress-grief-building-resilience-farmers-ranchers">Climate Stress and Grief: Building Resilience in Farmers and Ranchers</a> Program at Oregon State University Extension Service researches and works directly with communities to create space for farmers and ranchers to understand that climate grief is not weakness, it is a human response to profound environmental change.</p>`);
    h3s[8].insertAdjacentHTML('afterend', `<p>At the heart of <a href="https://ecampus.oregonstate.edu/online/?utm_source=google&utm_medium=cpc&utm_campaign=269697366&utm_keyword=osu%20ecampus&utm_network=g&gad_source=1&gad_campaignid=269697366&gbraid=0AAAAAD_i41AVAq5PyYIN4JKOm83yXkLt8&gclid=CjwKCAjwt7XQBhBkEiwAtStpp_fD18P6jOoHwb5HnvPdkt344q2Qp6cLQIE8xKlLIUceYYaNOAT_9hoCLj4QAvD_BwE">Oregon State University Ecampus</a> is quality online teaching. Ecampus has been recognized through <a href="https://www.qualitymatters.org/">Quality Matters</a> standards for its excellence in evidence-based, high-quality student-centered learning environments, that reflect the lived experiences of online students balancing work, caregiving, military service, and other responsibilities.</p>`);
    h3s[9].insertAdjacentHTML('afterend', `<p><a href="https://undergradresearch.oregonstate.edu/ursa-engage">URSA Engage</a> is a high-impact undergraduate research program that connects first- and second-year students with faculty mentors across the university to engage in hands-on research and scholarship activities.</p>
  <p>URSA Engage prepares students to become scholars, civic leaders, and professionals who address real-world challenges.</p>`);
  });

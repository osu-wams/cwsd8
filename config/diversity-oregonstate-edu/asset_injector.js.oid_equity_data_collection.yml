id: oid_equity_data_collection
label: 'OID Equity Data Collection'
code: |
  (function ($, Drupal) {
      Drupal.behaviors.oidEquityDataModule = {
          attach: function (context, settings) {
              var viewCards = $('.view-card');
              var formItems = $('.form-type-bef-link a');
              var filterItems = $('.bef-select-as-links .form-item a');

              // Directly create wrappers around view card with respective links
              viewCards.each(function () {
                  var link = $(this).find('.view-card-link-to-dashboard').children('a').attr('href');
                  $(this).wrap("<a class='card-wrapper' href=" + link + "></a>");
              });

              // Handle click on form item links
              formItems.click(function () {
                  // remove active class from all and add only to the clicked one
                  formItems.removeClass('active');
                  $(this).addClass('active');
              });

              // If icons not loaded, prepend to filter buttons
              if (filterItems.find('i').length !== 2) {
                  filterIcons(filterItems);
              }
          }
      };

      // Helper function to prepend icons to filter buttons
      function filterIcons(filterItems) {
          filterItems.eq(0).prepend("<i class='fas fa-3x fa-book-open'></i>");
          filterItems.eq(1).prepend("<i class='fas fa-3x fa-people-group'></i>");
          filterItems.eq(2).prepend("<i class='fas fa-3x fa-graduation-cap'></i>");
      }
  }(jQuery, Drupal));

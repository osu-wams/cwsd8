id: csa_crime_reporting
title: 'CSA Crime Reporting'
description: ''
categories: {  }
elements: |-
  reporting_person:
    '#type': fieldset
    '#title': 'Reporting Person'
    flexbox:
      '#type': webform_flexbox
      your_name:
        '#type': textfield
        '#title': 'Full Name'
        '#required': true
      your_title_department:
        '#type': textfield
        '#title': Title/Department
      your_email:
        '#type': email
        '#title': Email
        '#required': true
      your_phone_number:
        '#type': tel
        '#title': 'Phone Number'
  date_incident_reported:
    '#type': date
    '#title': 'Date Incident Reported'
    '#description': '<p>When was this crime reported to you?</p>'
    '#attributes':
      style: 'width: 12rem;'
    '#required': true
  details_of_the_crime:
    '#type': fieldset
    '#title': 'Details of the Crime'
    flexbox_01:
      '#type': webform_flexbox
      type_of_crime:
        '#type': select
        '#title': 'Type of Crime'
        '#multiple': true
        '#description': '<p><a href="https://clery.oregonstate.edu/clery-act-definitions" target="_blank">Clery Crimes and Reportable Areas</a></p>'
        '#help': '<p>Hold Ctrl to select multiple types</p>'
        '#options':
          Classification_mrdr: Murder
          Classification_non-neg: 'Non-negligent Manslaughter'
          Classification_neg: 'Negligent Manslaughter'
          Classification_rape: Rape
          Classification_fond: Fondling
          Classification_stat: 'Statutory Rape'
          Classification_incest: Incest
          Classification_rob: Robbery
          Classification_agg: 'Aggravated Assault'
          Classification_burglary: Burglary
          Classification_mvt: 'Motor Vehicle Theft'
          Classification_arson: Arson
          Classification_liq: 'Liquor Arrest'
          Classification_drg: 'Drug Arrest'
          Classification_wpn: 'Weapon Arrest'
          Classification_dav: 'Dating Violence'
          Classification_dov: 'Domestic Violence'
          Classification_stlk: Stalking
          Classification_hzg: Hazing
          Classification_thft: 'Theft (Hate Crime Only)'
          Classification_asslt: 'Simple Assault (Hate Crime Only)'
          Classification_intm: 'Intimidation (Hate Crime Only)'
          Classification_vndl: 'Vandalism (Hate Crime Only)'
          unsure: Unsure
      location_of_the_incident:
        '#type': select
        '#title': 'Location of the Incident'
        '#options':
          Classification_oc: 'On-campus (Memorial Union, Tykeson Hall, HMSC Visitor Center, etc.)'
          Classification_sh: 'On-campus Student Housing (Weatherford Hall, Residence Hall, Li Apartments, etc.)'
          Classification_nc: 'Noncampus (Greek Houses, Extension Offices, Research Vessels, etc.)'
          Classification_pp: 'Public Property (SW Monroe Ave., SW Chandler Ave., SE Marine Science Dr., etc.)'
          Classification_oth: 'Other (Describe the location: building name, address, etc.)'
          Classification_unk: Unknown
        '#required': true
      location_details_building_name_address_etc:
        '#type': textfield
        '#title': 'Location Details (building name, address, etc.)'
  description_of_the_incident:
    '#type': textarea
    '#title': 'Description of the Incident'
    '#description': '<p>Please provide as much information about the incident as possible.</p>'
    '#required': true
  bias_fieldset:
    '#type': fieldset
    '#title': Bias
    '#description': "<p>A Hate Crime occurs when a criminal offense is committed against a person or property and the crime is motivated, in whole or in part, by the offender's bias. In addition to the other criminal offenses listed in this form, larceny/theft, simple assault, intimidation, and vandalism (damage/destruction of property) are reportable when motivated by bias against a protected class. For example, an Aggravated Assault motivated by the offender's bias is reportable both as an Aggravated Assault and Aggravated Assault-Hate Crime. However, a theft is only reportable when it was motivated by the offender's bias. If a hate (bias) related crime was reported to you, please complete the following information about the type of bias involved in the crime.</p>"
    type_of_bias:
      '#type': select
      '#title': 'Type of Bias'
      '#options':
        bias_race: Race
        bias_religion: Religion
        bias_ethnicity: 'Ethnicity/National Origin'
        bias_gender: Gender
        bias_sexual_orientation: 'Sexual Orientation'
        bias_disability: Disability
        bias_gender_id: 'Gender Identity'
  captcha:
    '#type': captcha

id: decision_tree
title: 'Decision Tree'
description: '<p>Guide to help determine when PDFs need to be remediated for accessibility</p>'
categories: {  }
elements: |-
  markup:
    '#type': webform_markup
    '#markup': |-
      <p>This decision tree dynamically changes based on your answers. <a href="/digital-accessibility/pdf-decision-tree-full">View the full tree</a> if you prefer.<br />
      &nbsp;</p>
  required_course_materials:
    '#type': radios
    '#title': 'Is the PDF part of your required course materials?'
    '#options': yes_no
  course_materials_no:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="required_course_materials"]':
          value: 'No'
    '#markup': '<p>Remove the PDF from your course until you’ve finished making your required course materials accessible. See the <a href="/digital-accessibility/resource-page/digital-accessibility-instructor-guide">Digital Accessibility Instructor Guide: Prioritization Strategies</a>.</p>'
  do_you_have_the_original_source_file_e_g_a_microsoft_word_docume:
    '#type': radios
    '#title': 'Do you have the original source file e.g., a Microsoft Word document?'
    '#options': yes_no
    '#states':
      visible:
        ':input[name="required_course_materials"]':
          value: 'Yes'
  original_source_yes:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="do_you_have_the_original_source_file_e_g_a_microsoft_word_docume"]':
          value: 'Yes'
    '#markup': '<p>Replace the PDF with the original file. It is easier to <a href="/digital-accessibility">make these formats accessible</a>.</p>'
  could_the_document_be_a_canvas_page:
    '#type': radios
    '#title': 'Could the document be a Canvas page?'
    '#options': yes_no
    '#states':
      visible:
        ':input[name="do_you_have_the_original_source_file_e_g_a_microsoft_word_docume"]':
          value: 'No'
  canvas_page_yes:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="could_the_document_be_a_canvas_page"]':
          value: 'Yes'
    '#markup': |-
      <p>Recreate the content directly in Canvas.</p>

      <p>Canvas has built-in <a href="https://learn.oregonstate.edu/using-canvas/accessibility">tools and resources</a> to identify and address accessibility issues.</p>
  is_the_content_available_from_the_osu_libraries:
    '#type': radios
    '#title': 'Is the content available from the OSU Libraries?'
    '#options': yes_no
    '#states':
      visible:
        ':input[name="could_the_document_be_a_canvas_page"]':
          value: 'No'
  available_libraries_yes:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="is_the_content_available_from_the_osu_libraries"]':
          value: 'Yes'
    '#markup': |-
      <p>Link to the content using a <a href="https://guides.library.oregonstate.edu/c.php?g=1361999&amp;p=10513082#s-lg-box-35484415">persistent link</a>. A persistent link or permalink connects to the article or resource in the library databases or journal subscription.</p>

      <p>If you need assistance finding resources in the OSU Libraries databases or creating a persistent link, please contact <a href="mailto:valley.library@oregonstate.edu">valley.library@oregonstate.edu</a> or use the Live Chat on the <a href="https://library.oregonstate.edu/">library home page</a>.</p>
  is_the_document_a_form:
    '#type': radios
    '#title': 'Is the document a form?'
    '#options': yes_no
    '#states':
      visible:
        ':input[name="is_the_content_available_from_the_osu_libraries"]':
          value: 'No'
  form_yes:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="is_the_document_a_form"]':
          value: 'Yes'
    '#markup': '<p>Recreate the form using Microsoft Forms or <a href="https://technology.oregonstate.edu/services/qualtrics">Qualtrics</a>.</p>'
  is_the_document_a_scanned_copy_of_an_article_of_book_chapter:
    '#type': radios
    '#title': 'Is the document a scanned copy of an article of book chapter?'
    '#options': yes_no
    '#states':
      visible:
        ':input[name="is_the_document_a_form"]':
          value: 'No'
  scanned_yes:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="is_the_document_a_scanned_copy_of_an_article_of_book_chapter"]':
          value: 'Yes'
    '#markup': |-
      <p>Check with the OSU Libraries for alternative formats. Scanned copies of texts are likely not accessible and might constitute a <a href="https://guides.library.oregonstate.edu/copyright/classroom">copyright violation</a> and should be avoided.</p>

      <p>If you have questions about scanned content, please contact <a href="mailto:valley.library@oregonstate.edu">valley.library@oregonstate.edu</a> or use the Live Chat on the <a href="https://library.oregonstate.edu/">library home page</a>.</p>

      <p>See the <a href="https://guides.library.oregonstate.edu/c.php?g=1361999">Accessibility Tips for Library Resources</a> for additional suggestions.</p>
  more_help:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="is_the_document_a_scanned_copy_of_an_article_of_book_chapter"]':
          value: 'No'
    '#markup': |-
      <p>Where can I get help if none of these options work for me?</p>

      <ul>
      	<li>Connect with the <a href="https://teams.microsoft.com/l/team/19%3AM4EwaE0gcE7Eo1hoo9GIPfEJhALp6XRKsrpfSDKyy081%40thread.tacv2/conversations?groupId=c8c8adce-4e4d-41bc-87f2-15f3294a202a&amp;tenantId=ce6d05e1-3c5e-4d62-87a8-4c4a2713c113">OSU Digital Accessibility Community on Teams</a> for advice.</li>
      </ul>
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit_hide': true

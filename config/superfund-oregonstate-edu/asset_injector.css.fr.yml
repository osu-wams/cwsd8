      align-items: center;
      justify-content: center;
  }

  .hero-overlay{
      position: absolute;
      /*height: 20%;*/
      width: 100%;
      /*top: 40%; moved to superfund-style.css to allow for different widths*/
      left: 0;
      background: rgba(0,0,0,0.65);
      color: white;
      /* Moved to .hero-overlay for drupal 10
      display: flex;
      align-items: center;
      justify-content: center;*/
      flex-direction: column;
      padding-top: 3em;
      padding-bottom: 5em;
  }
  .hero-overlay-text{
      width:60%;
      margin-left:4em;
      margin-right:auto;
  }
  /* .hero-overlay p and .hero-overlay h3 were moved to superfund-style.css to allow for different widths */


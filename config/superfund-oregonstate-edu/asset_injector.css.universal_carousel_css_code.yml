id: universal_carousel_css_code
label: 'Universal Carousel CSS Code'
code: |-
  /*body {
    font-family: Arial;
    margin: 0;
  }*/

  * {
    box-sizing: border-box;
  }

  /*might need to turn this one back on*/

  /*img {
    vertical-align: middle;
  }*/

  .mySlides img{
  width:100%;
  }

  .mySlides object, .mySlides iframe{
  width:42em;
  height:60em;
  width:100%;
  }

  .slide-container{/*column*/
      & img{
      width:96%;
      }
      & .desc {
          line-height: 1.1;
          word-wrap: break-word;
          font-size: .7em;
  		width:96%
      }
  }

  /* Position the image container (needed to position the left and right arrows) */
  .media-container {
    position: relative;
    max-width:800px;
    width:100%;
  }

  .media-container iframe{
  	/*max-width:818px;
  	max-height:460px;*/
  	max-width:800px;
  	max-height:449.8px;
  	width:90vw;
  	height:50.625vw;
  }

  /* Hide the images by default */
  /*.mySlides {
    display: none;
  }*/

  /* Add a pointer when hovering over the thumbnail images */
  .cursor {
    cursor: pointer;
  }

  /* Next & previous buttons */
  .prev,
  .next {
    cursor: pointer;
    position: absolute;
    top: 72%;
    width: auto;
    padding: 16px;
    margin-top: -50px;
    font-weight: bold;
    font-size: 15px; /*20px */
    border-radius: 0 3px 3px 0;
    user-select: none;
    -webkit-user-select: none;
    background: gray;
    color:#fff !important;
    text-decoration:none;
  }

  /* Position the "next button" to the right */
  .next {
    right: 0;
    border-radius: 3px 0 0 3px;
  }

  /* Next & previous buttons */
  .prev2,
  .next2 {
    cursor: pointer;
    /*position: absolute;*/
    top: 40%;
    width: auto;
    padding: 16px;
    margin-top: -50px;
    color: black;
    font-weight: bold;
    font-size: 20px;
    border-radius: 0 3px 3px 0;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Position the "next button" to the right */
  .next2 {
    right: 0;
    border-radius: 3px 0 0 3px;
  }

  .thumbnail-list-container,#thumbnail-list-container {
    			width: 100%;
          overflow:hidden;
    			max-width: 854px;
    			min-width: 440px;
    			background: #fff;
    			margin: 0 auto;
    		}
        
        		.thumbnail-list {
  			/*width: 1600px;*/
  			position: relative;
  			top:0;
  			left: 0;
  		}

  .caption-container a{
    color:white;
  }
  /* On hover, add a black background color with a little bit see-through */
  .prev:hover,
  .next:hover {
    background-color: rgba(0, 0, 0, 0.8);
  }

  /* Number text (1/3 etc) */
  .numbertext {
    color: #f2f2f2;
    font-size: 12px;
    padding: 8px 12px;
    position: absolute;
    top: 0;
  }

  /* Container for image text */
  .caption-container {
    text-align: center;
    background-color: #222;
    padding: 2px 16px;
    color: white;
  }

  .row:after {
    content: "";
    display: table;
    clear: both;
  }



  /* Add a transparency effect for thumnbail images */
  .demo {
    opacity: 0.6;
  }

  .active,
  .demo:hover {
    opacity: 1;
  }

  /* Six columns side by side */
  .slide-container {
    float: left;
    width:140px;
    
  }

  .demo {
      height: 120px;
  }

  /*.row.image-row {
      margin-left: 0px;
      width:2000px;
  }*/
  		.arrows {
  			position:relative;
  			width: 100%;
  		}

  		.arrow-left {
  			color: #fff;
  			position: absolute;
  			background: #6E6E6E;
  			padding: 1em;
  			left: -3em;
  			top: -8.5em;
  			z-index: 99;
  			cursor: pointer;
  			opacity: 70%;
  		}

  		.arrow-right {
  			color: #fff;
  			position: absolute;
  			background: #6E6E6E;
  			padding: 1em;
  			right: -3em;
  			top: -8.5em;
  			z-index:100;
  			cursor: pointer;
  			opacity: 70%;
  		}
  		
  .custom-image-album .desc {
      font-size: 14px;
      line-height: 1.1;
  	font-style: italic;
  	font-family: 'Open Sans Light';
  	padding-left: 0.15em;
      padding-right: 0.15em;
  	padding-top: 0.3em;
  }

  .thumbnail-list-container, #thumbnail-list-container{
  padding-top:.25em;
  }

  .titleText{
      margin-bottom: 0.2em;
  	/*font-weight:bold;
  	font-style:italic;*/
  }
  .slideCaption {
  	padding-bottom: .8em;
  	padding-left: 20px;
  }

  .custom-image-album h3 {
      margin-bottom: 1.2em;
  }
  .fullImageContainer{
      padding-top:20px;
  }
  .thumb-container{
      height:auto;/*140px;*/
  }

  .columnMediaTitle.desc{
  	padding-top:10px;
  }

  .fullImageContainer #img_object{
  	width:100%;
  }

  .media_link_copy{
  	cursor: pointer;
  }
media: all

id: international_admissions_request
title: 'International Admissions Request for Information'
description: ''
categories: {  }
elements: |-
  intro:
    '#type': processed_text
    '#text': |
      <p>Please fill out this form to receive more information about the following:</p>

      <ul>
      	<li><a href="https://admissions.oregonstate.edu/international/programs/undergraduate-programs">Undergraduate Programs</a>

      	<ul>
      		<li>First Year Freshman</li>
      		<li>Transfer</li>
      		<li>Post-Baccalaureate</li>
      	</ul>
      	</li>
      	<li><a href="https://admissions.oregonstate.edu/international/programs/graduate-programs">Graduate Programs</a>
      	<ul>
      		<li>Graduate Degree with international student support</li>
      		<li>Graduate Pathway</li>
      	</ul>
      	</li>
      	<li><a href="https://ecampus.oregonstate.edu/admissions/international.htm">Oregon State Ecampus Online Degree Programs</a>
      	<ul>
      		<li>Undergraduate Degree Study Online</li>
      		<li>Graduate Degree Study Online</li>
      		<li>Post-Baccalaurate Online</li>
      	</ul>
      	</li>
      	<li><a href="https://admissions.oregonstate.edu/international/programs/english-study-abroad-programs">English and Study Abroad Programs</a>
      	<ul>
      		<li>Academic English</li>
      		<li>Short Term Study Abroad Programs</li>
      	</ul>
      	</li>
      </ul>

      <p>Please complete all required (*) fields. We'll respond to your inquiry as soon as possible.</p>

      <p>By filling out this form, you authorize that we can send you more information about Oregon State University. For info about our GDPR privacy policy, please visit this link:&nbsp;<a href="https://www.intoglobal.com/privacy-policy">https://intoglobal.com/legal-and-privacy</a></p>

      <p><a href="https://gradschool.oregonstate.edu/contact" target="_blank" title="Graduate School Information">For all other Graduate program&nbsp;inquries click here</a></p>
    '#format': full_html
  date_of_birth:
    '#type': datelist
    '#title': 'Date of Birth (mm-dd-yyyy)'
    '#title_display': before
    '#required': true
    '#date_date_min': '-100 years'
    '#date_date_max': '-15 years'
    '#date_part_order':
      - month
      - day
      - year
    '#date_date_format': mm-dd-yyyy
  first_name:
    '#type': textfield
    '#title': 'First Name'
    '#required': true
  last_name:
    '#type': textfield
    '#title': 'Last Name'
    '#required': true
  email:
    '#type': email
    '#title': Email
    '#required': true
  whatsapp_number:
    '#type': textfield
    '#title': 'WhatsApp Number (with country code)'
  agency_name_urn:
    '#type': textfield
    '#title': 'Agency Name/URN'
  country_of_citizenship:
    '#type': textfield
    '#title': 'Country of Citizenship (US citizens: see above)'
    '#required': true
  current_city_of_residence:
    '#type': textfield
    '#title': 'Current City of Residence'
    '#required': true
  field_of_interest:
    '#type': textfield
    '#title': 'Field of Interest'
    '#required': true
  academic_level_of_interest:
    '#type': select
    '#title': 'Academic Level of Interest'
    '#options':
      '01': Undergraduate
      '02': 'Graduate Pathway'
      '03': 'International Year One'
      '04': Post-baccalaureate
      '05': 'English Study Only'
      '06': Ecampus
      '07': 'Short Term Study Abroad Programs (SAWE and VISP)'
    '#required': true
  english_test_score_ex_toefl_65_ielts_5_0_etc:
    '#type': textfield
    '#title': 'English Test Score (ex: TOEFL 65, IELTS 5.0, etc.)'
  grade_point_average_gpa:
    '#type': textfield
    '#title': 'Grade Point Average (GPA)'
  standardized_exams_ex_gre_316_gmat_500_etc:
    '#type': textfield
    '#title': 'Standardized Exams (ex: GRE 316, GMAT 500, etc.)'
  are_you_an_ib_scholar:
    '#type': select
    '#title': 'Are you an IB Scholar?'
    '#options':
      '01': 'Yes'
      '02': 'No'
  desired_start_date:
    '#type': select
    '#title': 'Desired Start Date'
    '#options':
      '04': Fall
      '05': Winter
      '06': Spring
      '07': Summer
  questions_or_notes:
    '#type': textarea
    '#title': 'Questions or notes?'
  gdpr_authorization:
    '#type': select
    '#title': 'GDPR authorization'
    '#description': |-
      <p>For more information please visit the link: <a href="https://www.intoglobal.com/privacy-policy">https://intoglobal.com/legal-and-privacy</a><br />
      We cannot contact you unless you select yes. If you select no we will not be able to contact you.</p>
    '#options':
      'Yes': 'Yes'
      'No': 'No'
    '#required': true

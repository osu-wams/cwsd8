id: contact_us_form
label: contact-us-form
code: |
  .contact-us-title {
    padding: 25px;
    box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
    transition: 0.3s;
    text-align: center;
  }

  /* Fixing incorrect class selector */
  .contact-us-title h2 {
    color: #d73f09 !important;
    font-weight: 900 !important;
  }

  .contact-us-title:hover {
    box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2);
  }

  /* Contact form styling */
  .contact-us-form {
    background-color: white;
    padding: 120px;
    box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
    transition: 0.3s;
  }

  .contact-us-form:hover {
    box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2);
  }

  /* Submit button alignment */
  .webform-button--submit {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Padding utility class */
  .padding-50 {
    padding: 50px;
  }

  /* =================== Responsive Design =================== */

  /* Large screens (max width 1200px) */
  @media (max-width: 1200px) {
    .contact-us-form {
      padding: 100px;
    }
  }

  /* Tablets (max width 992px) */
  @media (max-width: 992px) {
    .contact-us-title {
      padding: 20px;
    }

    .contact-us-form {
      padding: 80px;
    }

    .padding-50 {
      padding: 30px;
    }
  }

  /* Mobile devices (max width 768px) */
  @media (max-width: 768px) {
    .contact-us-title {
      padding: 15px;
    }

    .contact-us-form {
      padding: 60px;
      text-align: center;
    }

    .contact-us-title h2 {
      font-size: 24px;
    }

    .padding-50 {
      padding: 20px;
    }
  }

  /* Small mobile devices (max width 576px) */
  @media (max-width: 576px) {
  	
  	.Contact-card{
  		margin-bottom:2rem;}
  		
  	 .email-text {
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
      font-size: 0.9rem; /* optional smaller font */
      display: inline-block;
      max-width: 100%;
    }
  		
    .contact-us-title {
      padding: 10px;
    }

    .contact-us-form {
      padding: 40px;
    }

    .contact-us-title h2 {
      font-size: 20px;
    }

    .padding-50 {
      padding: 10px;
    }

    .webform-button--submit {
      width: 100%;
    }
  }
media: all

id: our_team
label: Our_team
code: |-
  document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll(".team-member").forEach((member) => {
        member.addEventListener("click", function () {
          const bio = this.querySelector(".bio") ? this.querySelector(".bio").textContent : "No bio available.";
          showPopup(bio);
        });
      });

      function showPopup(bio) {
        document.getElementById("popup-text").innerHTML = bio;
        document.getElementById("popup").style.display = "block";
        document.getElementById("popup-overlay").style.display = "block";
      }

      function closePopup() {
        document.getElementById("popup").style.display = "none";
        document.getElementById("popup-overlay").style.display = "none";
      }

      window.showSection = function (sectionId) {
        document.querySelectorAll(".team-category").forEach((section) => {
          section.style.display = "none";
        });
        document.getElementById(sectionId).style.display = "block";

        document.querySelectorAll(".team-tab").forEach((tab) => {
          tab.classList.remove("active");
        });

        document.querySelector(`[onclick="showSection('${sectionId}')"]`).classList.add("active");
      };

      window.closePopup = closePopup; // Expose function globally
    });

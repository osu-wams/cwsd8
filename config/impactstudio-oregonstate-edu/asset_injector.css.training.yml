code: |
  * {
    box-sizing: border-box;
  }

  /* Shared iframe style */
  .responsive-iframe {
    width: 100%;
    height: 315px;
    max-width: 560px;
    border: none;
  }

  /* Common heading style for each block */
  .video-block-1 h3,
  .video-block-2 h3,
  .video-block-3 h3,
  .video-block-4 h3 {
    text-align: center;
    margin-bottom: 1rem;
    font-weight: bold;
  }

  /* Individual block wrappers */
  .video-block-1,
  .video-block-2,
  .video-block-3,
  .video-block-4 {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 2rem auto;
    padding: 1rem;
  }

  /* Responsive behavior */
  @media screen and (max-width: 1040px) {
    .video-block-1,
    .video-block-2,
    .video-block-3,
    .video-block-4 {
      width: 100%;
      padding: 1rem;
    }
  }

id: portfolio_main
label: 'Portfolio Main'
code: |
  .adjacent-image {
    padding-top: 4rem;
  }

  .core-image {
    padding-top: 3rem;
  }

  .portfolio-cycle img {
    width: 100%;
    height: auto;
    object-fit: cover; /* Ensures proper scaling */
    display: block;
    margin: 0 auto;
  }

  /* =================== Responsive Design =================== */

  /* Large screens (max width 1200px) */
  @media (max-width: 1200px) {
    .adjacent-image {
      padding-top: 7rem;
    }
    .core-image {
      padding-top: 5rem;
    }
  }

  /* Tablets (max width 992px) */
  @media (max-width: 992px) {
    .adjacent-image {
      padding-top: 5rem;
    }
    .core-image {
      padding-top: 4rem;
    }
    .portfolio-cycle img {
      width: 90%;
    }
  }

  /* Mobile devices (max width 768px) */
  @media (max-width: 768px) {
    .adjacent-image {
      padding-top: 3rem;
    }
    .core-image {
      padding-top: 2.5rem;
    }
    .portfolio-cycle img {
      width: 100%;
      max-height: 250px; /* Ensures visibility on mobile */
    }
    .portfolio-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  }

  /* Small mobile devices (max width 576px) */
  @media (max-width: 576px) {
    .adjacent-image {
      padding-top: 2rem;
    }
    .core-image {
      padding-top: 1.5rem;
    }
    .portfolio-cycle img {
      width: 100%;
      max-height: 200px;
    }
  }

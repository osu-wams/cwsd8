description: "<p><strong>NOTE:</strong> this field is used to link from the Master Gallery to the other individual galleries e.g. Global Map Gallery, Africa Gallery, Asia Gallery, etc.\r\nThere is no use in putting anything into this field for individual gallery \"Gallery Image\" items.</p>\r\n\r\n<p>In addition, the link form is a relative link and should be one of these 8 paths:</p>\r\n<ol>\r\n<li>database-and-research/galleries/global-map-gallery</li>\r\n<li>database-and-research/galleries/africa-gallery</li>\r\n<li>database-and-research/galleries/asia-gallery</li>\r\n<li>database-and-research/galleries/europe-gallery</li>\r\n<li>database-and-research/galleries/north-america-gallery</li>\r\n<li>database-and-research/galleries/south-america-gallery</li>\r\n<li>database-and-research/galleries/historic-basins-at-risk</li>\r\n<li>database-and-research/galleries/oregon-map-gallery</li>\r\n</ol>"

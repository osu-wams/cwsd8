          plugin_id: text
          empty: false
          content:
            value: "<p>The Global Map Gallery is a collection of maps and images at the global scale. Instructions on how to download the full size image can be found by clicking on an image in the gallery and scrolling to the bottom of the image viewer. </p>\r\n<p>We are currently developing and populating the gallery, check back soon for the full number of available maps and images. </p>\r\n<p><strong>Note about Data Use</strong><br />\r\nWide use of electronic and hardcopy versions of data, GIS coverages, and findings produced by the Transboundary Freshwater Dispute Database (TFDD) project is encouraged. The data, coverages, and findings are not copyrighted, although due credit is appreciated. Please attach this credit when citing TFDD products:</p>\r\n<p>“Product of the Transboundary Freshwater Dispute Database, College of Earth, Ocean, and Atmospheric Sciences, Oregon State University. Additional information about the TFDD can be found at: <a href=\"/\">http://transboundarywaters.oregonstate.edu</a>.”\r\n</p>\r\n<p>\r\nIf the product is to be used on the web, a hot link to the above address would be appreciated. If you have questions regarding use of data or maps, please <a href=\"https://oregonstate.qualtrics.com/jfe/form/SV_0PNB4KnBxH0yTl4\">contact us</a>.</p>\r\n\r\n<p><hr />Return to the main <a href=\"/database-and-research/galleries\"><strong>Map and Image Galleries</strong></a> page.<hr /></p>\r\n"

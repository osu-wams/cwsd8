langcode: en
status: true
dependencies:
  module:
    - block_visibility_groups
    - system
id: custom_header
label: 'Custom Header'
code: |-
  #madrone-header-container {
  	display:none!important;
  }

  #madrone-primary-menu-container {
   	display:flex;
  	background-color: #212429 !important;
  	padding:10px;
  }

  #block-oregonstatelogo {
  	width:200px;
  }

  #block-oregonstatelogo img {
  	margin-left:40px;
  }

  #block-utilitynav {
  	width:100%;
  }

  #block-utilitynav ul li a{
  	color:#fff!important;
  	border-bottom:2px solid #212429;
  }

  #block-utilitynav ul li a:hover {
    background:none!important;
    border-bottom:2px solid #d73f09;
  }

  #block-utilitynav a.nav-link.active.is-active {
  	background:none!important;
  	color;#fff;
  }

  ul.menu.menu--utility-nav.nav.nav-pills.menu--level-1 {
  	justify-content:right;
  }

  .nav-pills .nav-link.active {
  background:#232323;
  }

  #block-searchicon {
  	width:45px;
  	text-align:center;
  }
  #praxsearch span:hover {
  	color:#d73f09;
  }

  #madrone-full-top-container {
    position:relative;	
    margin-left: -12px;
    margin-right: -12px;
    min-height:190px;
  }

  a:active:not(#osu-logo-wide, #osu-logo-crest) {
  	background: none !important;
  }

  #block-praxlogo {
  	  position: absolute;
      top:50px;
      left: 50px;
      z-index: 5;
  }

  #praxlogo-mobile {
  	display:none;
  }

  .Dark .views-field-field-hero-image::before {
      content: "";
      background: url(/sites/prax.oregonstate.edu/files/2023-06/PRAx_black_1-line_0.png);
      background-position: center;
      background-size: contain;
      background-repeat: no-repeat;
      position: absolute;
      top: 50px;
      left: 50px;
      width: 375px;
      height: 125px;
      z-index: 1;
  }

  .Light .views-field-field-hero-image::before {
      content: "";
      background: url(/sites/prax.oregonstate.edu/files/2023-06/PRAx_white_1-line.png);
      background-position: center;
      background-size: contain;
      background-repeat: no-repeat;
      position: absolute;
      top: 50px;
      left: 50px;
      width: 375px;
      height: 125px;
      z-index: 1;
  }

  #block-praxlogo a{
  	display:block;
  }

  #block-madrone-main-menu {
      Width: auto;
      height: 40px;
      position: absolute;
      top: 50px;
      right: 0;
      z-index: 5;
  }

  #superfish-main {
      display: flex;
     background:#232323;
     padding:0 20px;
  }

  #superfish-main .sfHover a {
  	background:#fff;
  	color:#232323;
  }
  	
  ul.sf-menu li {
  	float:none!important;
  }

  #superfish-main li a{
    padding:11px 20px!important;
    color:#fff;
    text-decoration:none;
  }

  #superfish-main li a:hover{
  		background:#d73f09;
  	  color:#fff;
  }

  ul.sf-menu .sf-sub-indicator {
  display:none;
  }

  .menuparent ul {
  	background:#fff!important;
  	box-shadow:none!important;
  	top:46px!important;
  }

  a.sf-depth-2 {
  	color:#232323!important;
  }

  a.sf-depth-2:hover {
  background:#d73f09 !important;
  color:#fff!important;
  }


  #madrone-breadcrumb-container {
  	background:#f7f5f5;
  	padding:0;
  }

  .breadcrumb {
  padding: 5px 0 5px 30px;
  margin:0!important;
  }

  .breadcrumb-item a {
  	text-decoration:none;
  	color:#d73f09;
  }

  .breadcrumb-item a:hover {
  	text-decoration:underline;
  }


  #block-frontpagesitealertsandannouncements {
  	padding: 7px;
    color: #fff;
    background-color: #d73f09;
  }

  @media screen and (max-width: 1000px) {

  .Dark .views-field-field-hero-image::before {
  	width:200px;
  	height:66.87px;
      left: 20px;
  }

  .Light .views-field-field-hero-image::before {
  	width:200px;
  	height:66.87px;
      left: 20px;
  }
  	
  	#superfish-main {
  		padding:0;
  	}
  	
  	#superfish-main li a {
  		padding:10px;
  	}
  	
  	#madrone-full-top-container {
      min-height: 130px;
  }
  	
  #block-praxlogo {
      top: 20px;
      left: 20px;
  }

  #block-praxlogo img {
  	max-width:220px;
  }
  	
  	
  	
  }





  @media screen and (max-width: 767px) {
  	
  	#madrone-primary-menu-container {
  		display:block;
  	}
  	
  	#block-oregonstatelogo img {
  		margin:0;
  	}
  	
  	ul.menu.menu--utility-nav.nav.nav-pills.menu--level-1 {
      justify-content: center;
      margin-top: 10px;
  }

  #block-searchicon {
      width: 45px;
      text-align: center;
      position: absolute;
      top: 10px;
      right: 10px;
  }

  #praxlogo-mobile {
  	display:block;
  	padding:20px;
  }

  #praxlogo-mobile img {
  	max-width:300px;
  }


  .Dark .views-field-field-hero-image::before {
  	display:none;
  }

  .Light .views-field-field-hero-image::before {
  	display:none;
  }

  #block-madrone-main-menu {
      top: 0px;
  }

  .sf-accordion-toggle {
  	text-align:center;
  }

  .sf-accordion-toggle a {
      color: #fff;
      background: #003B5C!important;
      padding: 10px;
      display: block;
  }

  #superfish-main-accordion {
  	background:#bfbfbf;
  }
  	
  }


  @media screen and (max-width: 400px) {
  	
  	#praxlogo-mobile img {
  	max-width:200px;
  }

  }
media: all
preprocess: true
conditions:
  condition_group:
    id: condition_group
    negate: false
    block_visibility_group: ''
  current_theme:
    id: current_theme
    negate: false
    theme: madrone
contexts: {  }
conditions_require_all: true

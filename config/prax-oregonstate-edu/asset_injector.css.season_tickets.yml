      height: 250px;
      display: flex;
      justify-content: center;
      align-items: center;
  }

  .default-image, .hover-image {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: opacity 0.3s ease-in-out;

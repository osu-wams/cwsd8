id: features_view_front_page_rotator
label: 'Features View - Front Page Rotator'
code: |-
  jQuery(document).ready(function () {
      jQuery('.item').first().addClass('active');
      setInterval(function () {
          let active = jQuery('.item.active');
          active.removeClass('active');
          if (active.next('.item').length === 0) {
              active.parent('div').find('.item:first').addClass('active');
          } else {
              active.next('.item').addClass('active');
          }
      }, 7000);
  });

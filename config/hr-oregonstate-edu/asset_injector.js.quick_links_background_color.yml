id: quick_links_background_color
label: 'Quick Links Background Color'
code: |-
  const osuQuickLink = document.querySelectorAll('.block--type-quick-links');

  osuQuickLink.forEach(quickLink => {
      const quickLinkColor = quickLink.querySelector('.field--name-field-ql-color')
      const quickLinkParagraph = quickLink.querySelectorAll('.field--name-field-ql-paragraph .field__item .paragraph--type--quick-link');
      quickLinkParagraph.forEach(qlParagraphItem => {
          qlParagraphItem.classList.add(quickLinkColor.innerText);
      })
  });

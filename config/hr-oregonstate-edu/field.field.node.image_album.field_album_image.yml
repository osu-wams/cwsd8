label: Image
description: "<p>Upload your album images here.  Your images must be larger than 180 pixels x 180 pixels, with a file size smaller than 8 MB.</p>\r\n\r\n<p>You can upload as many pictures as you want.  To add another image, just click the <strong><em>Add another item</em></strong> button.</p>\r\n\r\n<p>When your photo is uploaded, you'll be presented with three different fields that have some default token content entered.  You can change this.  In fact, we strongly suggest that you provide some better in-depth description in the <strong><em>ALT tag</em></strong> field than what can be automatically entered by the system.  This particular field is used by screen readers to help explain what's happening in the picture to the visually impaired.</p>"

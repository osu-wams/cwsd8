id: quick_links_background_color
label: 'Quick Links Background Color'
code: |-
  .field--name-field-ql-paragraph {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;

    & .field__item:first-child {
      grid-column: 1 / -1;
    }
    .field__item .paragraph--type--quick-link {
      border-radius: 2rem;
      color: var(--quick-link-color, --bs-body-color);
      padding: .5rem;
      position: relative;
      transition: 400ms background-color ease, 400ms color ease;
      &.osu-bg-osuorange {
        --quick-link-color: #fff;
      }
      &.osu-bg-page-alt-2 {
        --quick-link-color: #fff;
      }
      &.osu-bg-crater {
        --quick-link-color: #fff;
      }
      & a {
        color: var(--quick-link-color, --bs-body-color);
        text-decoration: none;
        &::before {
          content: "";
          inset: 0;
          position: absolute;
        }
      }
      &:hover {
        background-color: #212529 !important;
        color: #fff;
        & a {
          color: #fff;
        }
      }
    }
  }
  @media screen and (min-width: 768px) {
    .field--name-field-ql-paragraph {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
    }
  }
media: all
preprocess: true

id: image_expand
label: 'Image Expand'
code: |2-
   const thumbnailContainers = document.querySelectorAll('.thumbnail-container'); // Select all containers
      const modal = document.getElementById("myModal");
      const modalImg = document.getElementById("expandedImg");
      const closeBtn = document.querySelector(".close");
      const modalContent = document.querySelector(".modal-content");

      thumbnailContainers.forEach(thumbnailContainer => { // Loop through each container
        thumbnailContainer.addEventListener('click', function() {
          modal.style.display = "block";
          modal.offsetWidth;
          modal.classList.add("show");
          modalContent.offsetWidth;
          modalContent.classList.add("show");
          modalImg.src = this.querySelector('.thumbnail').src.replace("thumbnail", "large_image");
          modalImg.alt = this.querySelector('.thumbnail').alt;
        });
      });

      closeBtn.onclick = function() {
        modal.classList.remove("show");
        modalContent.classList.remove("show");
        setTimeout(() => {
          modal.style.display = "none";
        }, 300);
      }

      window.onclick = function(event) {
        if (event.target == modal) {
          modal.classList.remove("show");
          modalContent.classList.remove("show");
          setTimeout(() => {
            modal.style.display = "none";
          }, 300);
        }
      }

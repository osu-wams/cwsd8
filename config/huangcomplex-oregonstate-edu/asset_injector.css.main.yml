label: Main
code: |-
  #scrollToTopBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(30, 33, 36, 0.5);
    color: #ffffff;
    border: none;
    border-radius:5px;
    padding: 10px 16px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    cursor: pointer;
  }
  .img-fluid {
      max-width: 100%;
      height: auto;
  }
  .img-fluid-top-border-radius {
      max-width: 100%;
      height: auto;
      border-top-right-radius: 12px;
      border-top-left-radius: 12px;
  }
  .top-border-radius {
  	  border-top-right-radius: 12px;
      border-top-left-radius: 12px;
  }
  .thumbnail-container {
      position: relative;
      width: 100%;
      height: auto;
      overflow: hidden;
      cursor: pointer;
      display: inline-block; /* Arrange thumbnails horizontally */
    }

    .thumbnail {
      width: 100%;
      height: 100%;
      transition: opacity 0.3s ease; /* Smooth transition for the main image */
    }

    .thumbnail:hover {
      opacity: 0; /* Fade out the main image on hover */
    }

    .hover-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0; /* Initially hidden */
      transition: opacity 0.3s ease; /* Smooth fade-in */
    }

    .thumbnail-container:hover .hover-image {
      opacity: 1; /* Show the hover image on hover */
    }

      .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: rgba(0, 0, 0, 0.9);
      opacity: 0; /* Initially hidden */
      transition: opacity 0.3s ease; /* Smooth fade-in */
    }

    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 1200px;
      background-color: #fefefe;
      padding: 20px;
      border: 1px solid #888;
      opacity: 0; /* Initially hidden */
      transition: opacity 0.3s ease, transform 0.3s ease; /* Smooth fade-in and scaling */
    }

    .modal.show { /* Class added by JavaScript for showing the modal */
      opacity: 1;
    }

    .modal-content.show { /* Class added by JavaScript to show the content */
      opacity: 1;
      transform: translate(-50%, -50%) scale(1); /* Scale to normal size */
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
    }

    .close:hover,
    .close:focus {
      color: black;
      text-decoration: none;
      cursor: pointer;
    }

    .expandedImg {
      max-width: 100%; /* Important: Keep this for proper scaling */
      height: auto;
      display: block;
      margin: 0 auto;
    }
media: all

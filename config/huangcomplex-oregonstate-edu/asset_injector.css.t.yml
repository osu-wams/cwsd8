  /* Tab container with background transition */
  .tab-container {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed; /* Makes background fixed */
      transition: background-image 0.5s ease-in-out;
      position: relative;
  }

  /* Tab-specific backgrounds */
  .tab-container.bg-tab1 {
      background-image: url('https://osucascades.edu/sites/osucascades.edu/files/2026-01/people-looking-forward-near-technology.jpg');
  }

  .tab-container.bg-tab2 {
      background-image: url('https://osucascades.edu/sites/osucascades.edu/files/2026-02/man-working-in-lab.jpg');
  }

  /* Dark overlay for better text readability */
  .tab-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6); /* Darker overlay - adjust between 0.5-0.8 as needed */
      z-index: 0;
      pointer-events: none;
  }

  /* Ensure content stays above the overlay */
  .tab-container > * {
      position: relative;
      z-index: 1;
  }

  /* Wrapper for tabs with max-width */
  .tabs-wrapper {
      max-width: 1295px;
      margin: 0 auto;
      position: relative;
      z-index: 1;    
      padding: 100px 0;
  }

  /* Existing tab styles */
  .tabs {
      display: flex;
      border-bottom: 2px solid #d73f09;
      margin-bottom: 20px;
      margin-left: 68px;
      position: relative;
      margin-right:20px;
  }

  .tabs::before {
      content: '';
      position: absolute;
      bottom: -2px;
      left: -48px;
      width: 48px;
      height: 2px;
      background: #d73f09;
  }

  .tab {
      padding: 7px 20px;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 16px;
      color: #fff;
      transition: all 0.3s;
  }

  .tab:hover {
      color: #fff;
      box-shadow: inset 0 2px 0 0 #d73f09, inset 2px 0 0 0 #d73f09, inset -2px 0 0 0 #d73f09;
  }

  .tab.active {
      color: white;
      background: #d73f09;
      border-bottom: 3px solid #d73f09;
      margin-bottom: -2px;
  }

  .tab-content {
      display: none;
      padding: 20px;
      animation: fadeIn 0.3s;
      margin-left: 48px;
  }

  .tab-content.active {
      display: block;
  }

  /* Fade in animation */
  @keyframes fadeIn {
      from {
          opacity: 0;
      }
      to {
          opacity: 1;
      }
  }

  .orange-yellow-line {
  	  position: relative;
    border: 1px solid #d73f09;
  }
  .orange-yellow-line span {
    position: absolute;
    background: yellow;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
    opacity: 0;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    box-shadow: 0 0 4px 2px rgba(255, 235, 0, 0.8),
                0 0 10px 4px rgba(255, 235, 0, 0.4);
  }

  /* Top */
  .orange-yellow-line span:nth-child(1) {
   top: -1px; left: -1px;
    height: 1px; width: 0;
    animation: growRight 0.6s 0s forwards;
  }

  .box {
    position: relative;
    border: 2px solid #d73f09;
    padding:40px;
  }

  .box span {
    position: absolute;
    background: yellow;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
    opacity: 0;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    box-shadow: 0 0 4px 2px rgba(255, 235, 0, 0.8),
                0 0 10px 4px rgba(255, 235, 0, 0.4);
  }

  /* Top */
  .box span:nth-child(1) {
   top: -2px; left: -2px;
    height: 2px; width: 0;
    animation: growRight 0.6s 0s forwards;
  }
  /* Right */
  .box span:nth-child(2) {
  top: -2px; right: -2px;
    width: 2px; height: 0;
  /*  top: -2px; right: -2px;
    width: 4px; height: 4px;*/
    animation: growDown 0.6s 0.3s forwards;
  }
  /* Bottom */
  .box span:nth-child(3) {
    bottom: -2px; right: -2px;
    height: 2px; width: 0;
    animation: growLeft 0.6s 0.6s forwards;
  }
  /* Left */
  .box span:nth-child(4) {
    bottom: -2px; left: -2px;
    width: 2px; height: 0;
    animation: growUp 0.6s 0.9s forwards;
  }

  @keyframes growRight {
    0%   { width: 0;    opacity: 1; }
    85%  { width: 100%; opacity: 1; }
    100% { width: 100%; opacity: 0; }
  }
  @keyframes growDown {
    0%   { height: 0;    opacity: 1; }
    85%  { height: 100%; opacity: 1; }
    100% { height: 100%; opacity: 0; }
  }
  @keyframes growLeft {
    0%   { width: 0;    opacity: 1; }
    85%  { width: 100%; opacity: 1; }
    100% { width: 100%; opacity: 0; }
  }
  @keyframes growUp {
    0%   { height: 0;    opacity: 1; }
    85%  { height: 100%; opacity: 1; }
    100% { height: 100%; opacity: 0; }
  }


id: hero_text_shadows
label: 'Hero Text Shadows'
code: |-
  /* TOP LINE */
  #leadtext {
      font-family: 'Stratum2Web',sans-serif;
      color: #ffffff;
      background-color: transparent;
      font-size: 2.5rem;
      line-height: 0.9;
      text-transform: uppercase;
      text-shadow: 1px 1px 20px #000000;
      margin: auto;
      margin: 0 0 0px;
  }
  /* BOTTOM LINE */
  #toptext {
      font-family: 'Stratum2Web',sans-serif;
      color: #ffffff;
      background-color: transparent;
      font-size: 5.0rem;
      line-height: 0.9;
      text-transform: uppercase;
      text-shadow: 1px 1px 35px #000000;
      margin: auto 1.5rem;
      margin: 0 0 0px;
  }

   

  /* SHiFT FOR MOBILE */
  @media screen and (max-width: 800px) {
  #leadtext {
      font-size: 1.5rem;
  }
  #toptext {
      font-size: 3.0rem;
  }

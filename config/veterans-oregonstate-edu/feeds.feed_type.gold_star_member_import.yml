label: 'Gold Star Member Import'
id: gold_star_member_import
description: 'Importing data from Drupal 7 Export'
help: ''
import_period: -1
fetcher: upload
fetcher_configuration:
  allowed_extensions: 'txt csv tsv xml opml'
  directory: 'private://feeds'
parser: csv
parser_configuration:
  delimiter: ','
  no_headers: false
  line_limit: 100
processor: 'entity:node'
processor_configuration:
  values:
    type: gold_star_project_member
  langcode: en
  insert_new: 1
  update_existing: 2
  update_non_existent: _keep
  skip_hash_check: false
  authorize: true
  revision: true
  expire: -1
  owner_feed_author: false
  owner_id: 6

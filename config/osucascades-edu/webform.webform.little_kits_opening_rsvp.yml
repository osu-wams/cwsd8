id: little_kits_opening_rsvp
title: 'Little Kits Opening Celebration'
description: ''
categories: {  }
elements: |-
  flexbox:
    '#type': webform_flexbox
    description:
      '#type': processed_text
      '#wrapper_attributes':
        style: 'padding: 5%;'
      '#text': |
        <p class="text-align-center">Join OSU-Cascades Chancellor and Dean Sherm Bloomer and the dedicated community, city, county, state and federal partners who helped make the new on-campus Little Kits Early Care &amp; Education Center a reality.</p>

        <p class="text-align-center">Light refreshments.</p>

        <p class="text-align-center">&nbsp;</p>

        <p class="text-align-center"><strong>Please respond no later than Oct. 10. Watch for parking details.</strong></p>

        <p class="text-align-center">&nbsp;</p>

        <p class="text-align-center">Tuesday, October 14<br />
        4-5:30 p.m.</p>

        <p class="text-align-center">Little Kits Early Care and Education Center<br />
        1732 SW Chandler Ave., Bend</p>
      '#format': full_html
    right_column:
      '#type': fieldset
      '#title': 'Right Column'
      '#title_display': invisible
      '#attributes':
        class:
          - right-col
      flexbox_rsvp:
        '#type': webform_flexbox
        rsvp:
          '#type': select
          '#title': RSVP
          '#title_display': invisible
          '#options':
            'Yes, I plan to attend.': 'Yes, I plan to attend.'
            "No, I'm unable to attend.": "No, I'm unable to attend."
          '#empty_option': 'RSVP (select from drop down)'
          '#required': true
      name:
        '#type': webform_name
        '#title': Name
        '#attributes':
          style: 'font-weight: bold;'
        '#title__access': false
        '#first__title': 'First Name'
        '#first__placeholder': 'First Name'
        '#first__required': true
        '#middle__access': false
        '#last__title': 'Last Name'
        '#last__placeholder': 'Last Name'
        '#last__required': true
        '#suffix__access': false
        '#degree__access': false
        '#flexbox': '1'
      flexbox_email:
        '#type': webform_flexbox
        email:
          '#type': email
          '#title': Email
          '#placeholder': example@example.com
          '#required': true
          '#label_attributes':
            style: 'font-weight:bold;'
      flexbox_org:
        '#type': webform_flexbox
        '#attributes':
          style: 'max-width: 100%; width: 100%;'
        organization_company:
          '#type': textfield
          '#title': Organization/Company
          '#label_attributes':
            style: 'font-weight: bold;'
        title:
          '#type': textfield
          '#title': Title
          '#label_attributes':
            style: 'font-weight: bold;'
      actions:
        '#type': webform_actions
        '#title': 'Submit button(s)'
        '#submit__attributes':
          style: 'display: flex; margin: auto;'
  captcha:
    '#type': captcha

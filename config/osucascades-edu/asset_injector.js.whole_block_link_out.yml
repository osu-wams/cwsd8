id: whole_block_link_out
label: 'Whole block link out'
code: |-
  (function ($, Drupal) {
    Drupal.behaviors.clickableBlock = {
      attach: function (context, settings) {
        $('.clickable-block', context).once('clickable-block').on('click', function(e) {
          if (!$(e.target).is('a')) {
            window.location = $(this).data('url');
          }
        }).css('cursor', 'pointer');
      }
    };
  })(jQuery, Drupal);

id: carousel_economic_impact
label: 'Carousel economic impact'
code: |-
  /* Small screens (max-width: 770px) */
  @media screen and (max-width: 770px) {
      .carousel-container {
          height: 1100px;
      }
  }

  @media screen and (min-width: 771px) {
      .carousel-container {
          height: 545px;
      }
  }

  /* Medium screens (min-width: 1000px) */
  @media screen and (min-width: 1000px) {
      .carousel-container {
          height: 450px;
      }
  }

  /* Large screens (min-width: 1200px) */
  @media screen and (min-width: 1200px) {
      .carousel-container {
          height: 450px;
      }
  }

  /* Extra-large screens (min-width: 1201px) */
  @media screen and (min-width: 1201px) {
      .carousel-container {
          height: 405px;
      }
  }

  .carousel-container {
      position: relative;
      width: 100%;
      overflow: hidden;
  }

  .carousel-slide-container {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease-in-out;
  }

  .carousel-slide {
      padding: 0 30px;
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out;
  }

  .carousel-slide.active {
      visibility: visible;
      opacity: 1;
  }

  .carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      display: flex;
      justify-content: space-between;
  }

  .carousel-nav button {
      background: none;
      border: none;
      color: #999999;
      font-size: 24px;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.3s ease-in-out;
  }

  .carousel-nav button:hover {
      opacity: 1;
  }

  .carousel-dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
  }

  .carousel-dot {
      cursor: pointer;
      height: 10px;
      width: 10px;
      margin: 0 5px;
      background-color: #bbb;
      border-radius: 50%;
      display: inline-block;
      transition: background-color 0.3s ease;
  }

  .carousel-dot.active {
      background-color: #777;
  }

  .slide {
      width: 100%;
      max-width: 400px;
  }

  .margin-bottom-neg {
      margin-bottom: -24px;
  }

  blockquote {
      font-size: 1.2em;
      line-height: 1.5;
      color: #333;
  }
media: all

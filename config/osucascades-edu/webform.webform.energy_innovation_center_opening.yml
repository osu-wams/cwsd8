id: energy_innovation_center_opening
title: 'Energy Innovation Center Opening'
description: ''
categories: {  }
elements: |-
  processed_text:
    '#type': processed_text
    '#text': |
      <drupal-media data-entity-type="media" data-entity-uuid="55f924ca-a377-4385-91bb-3f0e52746adf"></drupal-media>
    '#format': full_html
  flexbox:
    '#type': webform_flexbox
    description:
      '#type': processed_text
      '#wrapper_attributes':
        style: 'padding: 5%;'
      '#text': |
        <p>Join OSU and OSU-Cascades leaders and energy researchers and collaborators to launch the Energy Innovation Center, where Energy innovations will become real-world solutions.</p>

        <p>The EiC is the first example of the high-impact, research-driven collaboration that the future Innovation District at OSU-Cascades is designed to foster.</p>

        <p><strong>Please respond no later than May 21.</strong></p>

        <p>&nbsp;</p>

        <p>Tuesday, May 26<br />
        3-5 p.m.</p>

        <p>Energy Innovation Center<br />
        DISTRICT 2<br />
        NorthWest Crossing<br />
        2723 NW Potts Ct.<br />
        Bend, Oregon 97703</p>

        <p>&nbsp;</p>

        <p><em>Note the off-campus location; the EiC is slated to be the first venture to move to the Innovation District at OSU-Cascades.</em></p>
      '#format': full_html
    right_column:
      '#type': fieldset
      '#title': 'Right Column'
      '#title_display': invisible
      flexbox_02:
        '#type': webform_flexbox
        rsv:
          '#type': select
          '#title': RSVP
          '#title_display': invisible
          '#options':
            'Yes, I plan to attend.': 'Yes, I plan to attend.'
            "No, I'm unable to attend.": "No, I'm unable to attend."
          '#required': true
      name:
        '#type': webform_name
        '#title': Name
        '#required': true
        '#title__access': false
        '#first__required': true
        '#middle__access': false
        '#last__required': true
        '#suffix__access': false
        '#degree__access': false
      flexbox_03:
        '#type': webform_flexbox
        email:
          '#type': email
          '#title': Email
          '#required': true
      flexbox_01:
        '#type': webform_flexbox
        organization_company:
          '#type': textfield
          '#title': Organization/Company
        title:
          '#type': textfield
          '#title': Title
      keep_me_informed:
        '#type': checkboxes
        '#title': 'Keep me informed'
        '#title_display': invisible
        '#options':
          'Keep me informed about the EiC': 'Keep me informed about the EiC'
          'Keep me informed about the future Innovation District': 'Keep me informed about the future Innovation District'
      captcha:
        '#type': captcha
        '#captcha_type': recaptcha/reCAPTCHA
      actions:
        '#type': webform_actions
        '#title': 'Submit button(s)'
        '#submit__label': Submit
        '#submit__attributes':
          style: 'display: flex; margin: auto;'

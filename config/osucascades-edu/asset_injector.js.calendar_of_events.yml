id: calendar_of_events
label: 'Calendar of Events'
code: |-
  function convertCOEDates() {
    // Target all coe-date containers
    const coeDateElements = document.querySelectorAll('.coe-date');
    
    coeDateElements.forEach(dateContainer => {
      const dayElement = dateContainer.querySelector('.coe-day time');
      const monthElement = dateContainer.querySelector('.coe-month time');
      
      if (dayElement && monthElement) {
        // Get datetime from either element (they should be the same)
        const datetime = dayElement.getAttribute('datetime') || monthElement.getAttribute('datetime');
        
        if (datetime) {
          const date = new Date(datetime);
          
          // Extract day
          const day = date.getDate();
          dayElement.textContent = day;
          
          // Extract abbreviated month
          const monthName = date.toLocaleDateString('en-US', { month: 'short' });
          monthElement.textContent = monthName;
        }
      }
    });
  }

  document.addEventListener('DOMContentLoaded', convertCOEDates);

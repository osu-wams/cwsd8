id: number_counter
label: 'number counter'
code: |
  (function ($, Drupal) {
    var a = 0;
    $(window).scroll(function() {
      if ($('.counter').length) {
        var oTop = $('.counter').offset().top - window.innerHeight;
        if (a === 0 && $(window).scrollTop() > oTop) {
          $('.counter-value').each(function() {
            var $this = $(this);

            // Set data-count dynamically from the element's text
            var countTo = parseFloat($this.text());
            $this.attr('data-count', countTo);

            var countStr = $this.attr('data-count');
            var duration = $this.attr('data-duration') || 2000; // Default duration
            var decimalPlaces = (countStr.includes('.') && countStr.split('.')[1]) 
              ? countStr.split('.')[1].length 
              : 0;

            $({ countNum: 0 }).animate({
              countNum: countTo
            }, {
              duration: parseInt(duration),
              easing: 'swing',
              step: function() {
                $this.text(this.countNum.toLocaleString('en-US', { 
                  minimumFractionDigits: decimalPlaces, 
                  maximumFractionDigits: decimalPlaces 
                }));
              },
              complete: function() {
                $this.text(this.countNum.toLocaleString('en-US', { 
                  minimumFractionDigits: decimalPlaces, 
                  maximumFractionDigits: decimalPlaces 
                }));
              }
            });
          });
          a = 1;
        }
      }
    });
  })(jQuery, Drupal);

id: dog_popup_styles
label: 'Dog Popup Styles'
code: |
  .popup {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
    animation: fadeIn 1s ease-in-out;
  }

  .dog-image {
    width: 350px;
    height: auto;
  }

  .text-bubble {
    position: absolute;
    top: -40px;
    right: 10px;
    background: #fff;
    border-radius: 10px;
    padding: 8px 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    font-family: sans-serif;
    font-size: 14px;
    color: #333;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

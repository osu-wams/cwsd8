            value: "<style>\r\n\r\n/* round corners and make all in row the same height*/  \r\n.osu-bg-page-alt-1, .image-style-_00x800-directory-square  {\r\n    border-top-right-radius: var(--bs-border-radius) !important;\r\n    border-top-left-radius: var(--bs-border-radius) !important;\r\n    display: flex;\r\n    flex-direction: column;\r\n  }\r\ndiv.g-5 {display: flex;}\r\ndiv.g-5 > div {display:flex; align-self: stretch;}\r\ndiv.g-5 > div > span {display: flex;}\r\n\r\n\r\n\r\n.views-bootstrap-academic-programs-and-degrees-block-1, .views-bootstrap-academic-programs-and-degrees-block-2 {\r\n\t\tmargin-left:20px;\r\n\t}\t\r\n\r\n.js-form-type-select > label:nth-child(1) {font-size: 1.5rem;}\r\n\r\n#edit-tid--wrapper, #edit-tid-1--wrapper, .js-form-item-tid {\r\n  display: block;\t\r\n  padding: 20px!important;\r\n  border: 1px solid;\r\n  border-radius: 5px;\r\n  margin-right: 10px;\r\n  border-color: #58595b;\r\n}\r\n\r\n.views-exposed-form-academic-programs-and-degrees-block-1 .views-widget-filter-tid, .views-exposed-form-academic-programs-and-degrees-block-2 .views-widget-filter-tid  {\r\n\tfont-size: 18px;\r\n\tfont-weight: bold;\r\n}\r\n\r\n.bef-checkboxes {\r\n\tdisplay:flex;\r\n\tpadding-right:10px;\r\n\tfont-size: 16px;\r\n\tfont-weight: normal;\r\n}\r\n\r\n.form-item {\r\n\tfont-size: 16px;\r\n\tfont-weight: normal;\r\n\tmargin-bottom: 0;\t\r\n}\r\n\r\n.form-label {\r\n  margin-bottom: 0rem!important;\r\n}\r\n\t\r\n.form-type-bef-checkbox {\r\n\tpadding-right:20px;\r\n}\r\n\r\n\r\n\r\n\r\n.views-bootstrap-academic-programs-and-degrees-block-1-undergraduate, .views-bootstrap-academic-programs-and-degrees-block-2-undergraduate {\r\n    min-height: 1200px;\r\n}\r\n\r\n    .view-header {\r\n        margin-right: 75px;\r\n    }\r\n\r\n\r\n\r\n.view-header p {\r\n    font-weight: bold;\r\n}\r\n\r\n#introtext {\r\n\t\r\n\tfont-size: 16px;\r\n\tfont-wight: 500;\r\n\tmargin-bottom: 20px;\r\n}\r\n\r\n\t\r\n#views-exposed-form-academic-programs-and-degrees-block-1, #views-exposed-form-academic-programs-and-degrees-block-2{\r\n\tflex: 0 0 100%;\r\n\tmargin-bottom:1em;\r\n}\r\n\t\r\n.views-field-field-program-location {\r\n    font-size: .65em;\r\n    text-transform: uppercase;\r\n    font-weight: 600;\r\n    letter-spacing: .02em;\r\n    color: #555;\r\n    border-top: 1px solid rgba(0,0,0,.125);\r\n    padding: 10px 10px 10px 24px;\r\n\tmargin-top: auto;\r\n    /*Location*/\r\n}\r\n\t\r\n.clicked {\r\n    background-color: #444 !important;\r\n}\r\n\r\n.views-field-field-program-description {\r\n    margin: 25px 10px 0 25px;\r\n}\r\n\r\n.views-field-field-program-link {\r\n  margin: 25px 20px 0px 25px;\r\n}\r\n\r\n.views-field-field-bend-link {\r\n  margin: 25px 20px 0px 25px;\r\n}\r\n\r\n\r\n.views-bootstrap-academic-programs-and-degrees-block-1 .contextual-region, .views-bootstrap-academic-programs-and-degrees-block-2 .contextual-region {\r\n    display: flex;\r\n    flex-wrap: wrap;\r\n}\r\n\r\ninput {\r\nborder-radius:0!important;\r\n}\r\n\r\n.p-3 {\r\n    margin-bottom: 40px;\r\n    box-shadow: 0 1px 1px 0 rgba(0, 0, 0, .13), 0 2px 2px 0 rgba(0, 0, 0, .14);\r\n    display: flex;\r\n    flex-direction: column;\r\n\t    flex-basis: 100%;\r\n\t\tpadding: 0px!important;\r\n}\r\n\r\n.views-field-field-program-type2 {\r\n  margin-bottom: 25px;\r\n  margin-top: 25px;\r\n}\r\n.views-field-field-program-type2 .field-content {\r\n  margin: 5px 0 25px 25px;\r\n}\r\n\r\n.views-field-field-program-type2 .field-content {\r\n    margin: 5px 0 25px 25px;\r\n}\r\n\r\n.views-field-field-program-type2 span {\r\n    border-radius: 5px;\r\n    color: #fff;\r\n    padding: 3px;\r\n}\r\n\r\n\r\n/*PROGRAM TYPE ICONS*/\r\n.type121 {\r\n    background-color: #d73f09;\r\n\torder: 1; \r\n    /*Undergrad Minor*/\r\n}\r\n\r\n.type126 {\r\n    background-color: #d73f09;\r\n\torder: 2; \r\n    /*Undergrad Major*/\r\n}\r\n\r\n.type161 {\r\n    display:none;\r\n\torder: 3; \r\n    /*Bachelors*/\r\n}\r\n\r\n.type166 {\r\n    background-color: #006a8e;\r\n\torder: 4; \r\n    /*Graduate Minor*/\r\n}\r\n\r\n.type171 {\r\n    display:none;\r\n\torder: 5; \r\n    /*Graduate Major*/\r\n}\r\n\r\n.type136 {\r\n    background-color: #006a8e;\r\n\torder: 6; \r\n    /*Masters*/\r\n}\r\n\r\n.type141 {\r\n    background-color: #006a8e;\r\n\torder: 7;\r\n    /*PhD*/\r\n}\r\n\r\n.type186 {\r\n    background-color: #FFB500;\r\n\torder: 8; \r\n     color: #000 !important;\r\n\t/*Undergrad Certificate*/\r\n\r\n}\r\n\r\n.type176 {\r\n    background-color: #FFB500;\r\n\torder: 9; \r\n     color: #000 !important;\r\n\t/*Grad Certificate*/\r\n\r\n}\r\n.type181 {\r\n    background-color: #d3832b;\r\n\torder: 10; \r\n    color: #fff !important;\r\n\t/*pre-professional-program*/\r\n\r\n}\r\n\t.type231, .type236 {\r\n    background-color: #a35217;\r\n\torder: 11; \r\n    color: #fff !important;\r\n\t/*microcredential*/\r\n\r\n}\r\n\r\n/*HIDE CATEGORY ICONS*/\r\n.type116, /*Undergraduate Category*/\r\n.type226,/*microcredential Category*/\r\n.type131, /*Graduate Category*/\r\n.type146 /*Certificate Category*/{\r\n    display: none;\r\n\t\r\n}\r\n\r\n.views-exposed-form .form-submit {\r\n    background: #d73f09 !important;\r\n    border-radius: 0;\r\n    box-shadow: none;\r\n    font-size: 18px;\r\n}\r\n\r\n.views-field-field-program-type2 span{\r\n\tmargin: 0px 5px 5px 0px;\r\n\tpadding: 5px 10px;\t\r\n}\t\r\n\t\r\n.views-field-field-program-type2 .field-content{\r\n\tdisplay: flex;\r\n\tflex-wrap: wrap;\r\n}\t\r\n\r\n.views-field-title {\r\n    background-color: #003b5c;\t\r\n\tpadding: 1em;\r\n\tcolor: white;\r\n\r\n}\r\n\r\n.p-3 h2 {\r\n    font-family: 'Stratum2Web',sans-serif;\r\n    font-size: 1.5rem;\r\n    line-height: 1.6rem;\r\n    font-weight: 500;\r\n\tmargin: 10px;\r\n    color: #fff;\r\n}\r\n\r\n.js-form-item-tid-116 {\r\n\tbackground-color: #d73f09;\r\n\tpadding: 5px 10px;\r\n\tborder-color: #d73f09;\r\n\tborder-width: 1px !important;\r\n\tborder-radius: 5px;\r\n\tcolor: #fff;\r\n\tmargin-right: 10px;\r\n\t/*Undergraduate*/\r\n}\r\n\r\n.js-form-item-tid-131 {\r\n\tbackground-color: #006a8e;\r\n\tpadding: 5px 10px;\r\n\tborder-color: #006a8e;\r\n\tborder-width: 1px !important;\r\n\tborder-radius: 5px;\r\n\tcolor: #fff;\r\n\tmargin-right: 10px;\r\n\t/*Graduate*/\r\n}\r\n\r\n.js-form-item-tid-146 {\r\n\tbackground-color: #FFB500;\r\n\tpadding: 5px 10px;\r\n\tborder-color: #FFB500;\r\n\tborder-width: 1px !important;\r\n\tborder-radius: 5px;\r\n\tcolor: #555;\r\n\tmargin-right: 10px;\r\n\t/*Certificate*/\r\n\t\r\n}\r\n\r\n\r\n.js-form-item-tid-181 {\r\n\tbackground-color: #d3832b;\r\n\tpadding: 5px 10px;\r\n\tborder-color: #d3832b;\r\n\tborder-width: 1px !important;\r\n\tborder-radius: 5px;\r\n\tcolor: #fff;\r\n\tmargin-right: 10px;\r\n\t/*Preprofessional*/\r\n\t\r\n}\r\n\t\r\n\t.js-form-item-tid-226 {\r\n\tbackground-color: #a35217;\r\n\tpadding: 5px 10px;\r\n\tborder-color: #73380d;\r\n\tborder-width: 1px !important;\r\n\tborder-radius: 5px;\r\n\tcolor: #fff;\r\n\tmargin-right: 10px;\r\n\t/*Microcredentail*/\r\n\t\r\n}\r\n\t.type231, .type236 {\r\n    background-color: #a35217;\r\n\torder: 11; \r\n    color: #fff !important;\r\n\t/*microcredential*/\r\n\r\n}\r\n\r\n.js-form-item-tid-1-196, .js-form-item-tid-1-191, .js-form-item-tid-1-201, .js-form-item-tid-1-211 {\r\n\tbackground-color: #dedede;\r\n\tpadding: 5px 10px;\r\n\tborder-width: 1px !important; \r\n\tborder-color: #555;\r\n\tborder-radius: 5px;\r\n\tcolor: #555;\r\n\tmargin-right: 10px;\r\n\t/*Locations*/\r\n\t\r\n}\r\n\t\r\n@media (min-width: 768px) {\r\n    .views-bootstrap-academic-programs-and-degrees-block-1 .item, .views-bootstrap-academic-programs-and-degrees-block-2 .item {\r\n        flex: 0 1 46%;\r\n        margin-right: 25px;\r\n    }\r\n\r\n@media (min-width: 1300px) {\r\n    .views-bootstrap-academic-programs-and-degrees-block-1 .item, .views-bootstrap-academic-programs-and-degrees-block-2 .item {\r\n        flex: 0 1 23%;\r\n        margin-right: 20px;\r\n    }\r\n}\r\n</style>"

x 10px;\r\n\tborder-color: #006a8e;\r\n\tborder-width: 1px !important;\r\n\tborder-radius: 5px;\r\n\tcolor: #fff;\r\n\tmargin-right: 10px;\r\n\t/*Graduate*/\r\n}\r\n\r\n.js-form-item-tid-146 {\r\n\tbackground-color: #FFB500;\r\n\tpadding: 5px 10px;\r\n\tborder-color: #FFB500;\r\n\tborder-width: 1px !important;\r\n\tborder-radius: 5px;\r\n\tcolor: #555;\r\n\tmargin-right: 10px;\r\n\t/*Certificate*/\r\n\t\r\n}\r\n\r\n\r\n.js-form-item-tid-181 {\r\n\tbackground-color: #d3832b;\r\n\tpadding: 5px 10px;\r\n\tborder-color: #d3832b;\r\n\tborder-width: 1px !important;\r\n\tborder-radius: 5px;\r\n\tcolor: #fff;\r\n\tmargin-right: 10px;\r\n\t/*Preprofessional*/\r\n\t\r\n}\r\n\t\r\n\t.js-form-item-tid-226 {\r\n\tbackground-color: #a35217;\r\n\tpadding: 5px 10px;\r\n\tborder-color: #73380d;\r\n\tborder-width: 1px !important;\r\n\tborder-radius: 5px;\r\n\tcolor: #fff;\r\n\tmargin-right: 10px;\r\n\t/*Microcredentail*/\r\n\t\r\n}\r\n\t.type231, .type236 {\r\n    background-color: #a35217;\r\n\torder: 11; \r\n    color: #fff !important;\r\n\t/*microcredential*/\r\n\r\n}\r\n\r\n.js-form-item-tid-1-196, .js-form-item-tid-1-191, .js-form-item-tid-1-201, .js-form-item-tid-1-211 {\r\n\tbackground-color: #dedede;\r\n\tpadding: 5px 10px;\r\n\tborder-width: 1px !important; \r\n\tborder-color: #555;\r\n\tborder-radius: 5px;\r\n\tcolor: #555;\r\n\tmargin-right: 10px;\r\n\t/*Locations*/\r\n\t\r\n}\r\n\t\r\n@media (min-width: 768px) {\r\n    .views-bootstrap-academic-programs-and-degrees-block-1 .item, .views-bootstrap-academic-programs-and-degrees-block-2 .item {\r\n        flex: 0 1 46%;\r\n        margin-right: 25px;\r\n    }\r\n\r\n@media (min-width: 1300px) {\r\n    .views-bootstrap-academic-programs-and-degrees-block-1 .item, .views-bootstrap-academic-programs-and-degrees-block-2 .item {\r\n        flex: 0 1 23%;\r\n        margin-right: 20px;\r\n    }\r\n}\r\n</style>"

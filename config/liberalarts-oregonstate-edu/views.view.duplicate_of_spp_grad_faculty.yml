size: 18px;\r\n    color: #d73f09;\r\n    }\r\n    \r\n    .dir-email {\r\n    padding: 0px 0px 1rem 0px;\r\n    }\r\n    \r\n    .link-purpose-icon {\r\n    display:none;\r\n    }\r\n    \r\n    .conc-contact {\r\n  padding: 15px 0px 15px 0px;\r\n  text-align: center;\r\n  line-height: 1;\r\n  font-size: 17px;\r\n  color: #d73f09;\r\n  border-top: 1px dotted #d73f09;\r\n}\r\n\r\n    @media (min-width: 1000px) {\r\n    .dir-email {\r\n    font-size: 16px;\r\n    }\t \r\n    }\r\n    \r\n    \r\n    @media (min-width: 1700px) {\r\n    .dir-email {\r\n    font-size: 15px;\r\n    }\t  \r\n    }\r\n    \r\n    </style>"

            value: "<style>\r\n/*link image display override*/\r\n.osu-img-full img {\r\n  width: auto!important;\r\n}\r\n\r\n /* round corners and make all in row the same height*/  \r\n.osu-bg-page-alt-1, .image-style-_00x800-directory-square  {\r\n    border-top-right-radius: var(--bs-border-radius) !important;\r\n    border-top-left-radius: var(--bs-border-radius) !important;\r\n    display: flex;\r\n    flex-direction: column;\r\n  }\r\ndiv.g-5 {display: flex;}\r\ndiv.g-5 > div {display:flex; align-self: stretch;}\r\ndiv.g-5 > div > span {display: flex;}\r\n\r\n.dir-name {\r\nbackground-color: #D73F09;\r\npadding: 15px 0px 11px 1rem;\r\n}\r\n\r\n.dir-name a{\r\nfont-family: 'Stratum2Web',sans-serif;\r\nfont-size: 1.5rem;\r\nline-height: 1.6rem;\r\nfont-weight: 500;\r\ncolor: #fff;\r\ntext-decoration: none;\r\n}\r\n\r\n.school {\r\n    padding: 0px 0px 15px 0px;\r\n    font-family: 'Stratum2Web',sans-serif;\r\n    font-weight: 500;\r\n    line-height: 1;\r\n    font-size: 20px;\r\n    color: #D73F09;\r\n    }\r\n\r\n.position {\r\npadding: 0px 0px 15px 0px;\r\nline-height: 1;\r\nfont-size: 16px;\r\ncolor: #D73F09;\r\n}\r\n\r\n.dir-email {\r\npadding: 0px 0px 1rem 0px;\r\n}\r\n\r\n.link-purpose-icon {\r\ndisplay:none;\r\n}\r\n\r\n@media (min-width: 1000px) {\r\n.dir-email {\r\nfont-size: 16px;\r\n}\t \r\n}\r\n\r\n\r\n@media (min-width: 1700px) {\r\n.dir-email {\r\nfont-size: 15px;\r\n}\t  \r\n}\r\n\r\n</style>"

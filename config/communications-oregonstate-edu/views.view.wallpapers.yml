          content:
            value: |-
              <style>

              #edit-tid, #edit-tid-1 {
                  height: 48px;
                  width: 100%;
                  box-sizing: border-box;
                  margin: 0;
              }

              label{{ for="edit-tid" }}, label{{ for="edit-tid-1" }}{
                  color: #7B746F;
              }

              .view-content{
                  display: flex;
                  flex-wrap: wrap;
              }

              .child {
                  float: left;
                  background-color: #1F1D1C;
                  width:98%;
                  margin:2%;
              }

              .child a {
                  color: #fff!important;
                  font-size:16px;
                  padding: 5px;
              }

              .child a:focus {
                  outline: thin dotted #fff;
              }

              .child p {
                  text-align: center;
                  margin: 10px 0;
              }

              .child img {
                  width:100%;
              }

              .file-size,
              .file-icon {
                  display: none !important;
              }

              @media(min-width:768px){
                  .view-content {
                  position: relative;
                  }

                  .child {
                      width: 47%;
                      margin: 2% 2% 2% 0;
                  }
              }

              @media(min-width:900px){
                  .child {
                      width:21%;
                      margin:2% 2% 2% 0;
                  }
              }


              </style>
            format: basic_html

          empty: false
          ui_name: ''
          content:
            value: |-
              <style>

              /*HEADER STYLES*/
              .view-header p {
                  font-weight: bold;
              }

              #filter {
                  display: flex;
                  flex-wrap: wrap;
                  margin-bottom: 20px;
              }

              #filter .btn {
                  margin-top: 10px;
                  margin-right: 10px;
              }

              #filter .btn a{
              color:#fff;
              text-decoration:none;
              }


              #filter .btn-default:hover,
              #filter .btn-default:active,
              #filter .btn-default:focus {
                  background: #423E3C !important;
              }

              .view-header #filter .clicked {
                  background: #d73f09 !important;
              }

              #views-exposed-form-25-year-club-block-7 label {
                  cursor: auto;
                  margin-bottom: 15px;
                  font-size: 18px;
              }

              #views-exposed-form-25-year-club-block-7 #edit-combine {
                  border-radius: 0;
              }

              .views-exposed-form .form-submit,
              .views-exposed-form #edit-submit-25-year-club {
                  background: #d73f09;
                  border-radius: 0;
                  box-shadow: none;
                  font-size: 18px;
              }

              /*CONTENT STYLES*/
              .view-25-year-club {
                  min-height: 1200px;
              }


              .view-25-year-club .view-content {
                  display: grid;
                  grid-template-columns: 1fr;
                  grid-gap: 20px;
              }

              .view-25-year-club h3 {
                  grid-column: 1/-1;
              }

              .child {
                  padding: 25px;
                  box-shadow: 0 1px 1px 0 rgba(0, 0, 0, .13), 0 2px 2px 0 rgba(0, 0, 0, .14);
                  background: #F7F5F5;
              }

              .child img {
                  margin-right: 25px;
                  margin-bottom: 5px;
              }

              .view-25-year-club .views-field-title {
                  color: #d73f09;
                  font-size: 22px;
                  font-weight: 900;
                  text-decoration: none;
              }

              .views-label {
                  font-weight: 900;
              }

              .views-field-title {
                  margin-bottom: 12px;
              }

              .view-25-year-club .views-field-title a:hover {
                  text-decoration: underline !important;
              }

              .views-field-field-length-of-service, .views-field-field-member-title, .views-field-field-college-department {
                  margin-bottom: 5px;
              }

              .views-field.views-field-field-bio p {
                  display: inline;
              }

              @media (min-width:768px) {
                  .view-25-year-club .view-content {
                      grid-template-columns: repeat(2, 1fr);
                  }

                  .view-25-year-club .view-header {
                      margin-top: 50px;
                  }
              }

              @media (min-width:1225px) {
                  .view-25-year-club .view-content, {
                      gap: 40px;
                      margin-top: 30px;
                  }

                  .child {
                      padding: 40px;
                  }

                  .child img {
                      float: left;
                  }
              }

              </style>
            format: basic_html
          tokenize: 0

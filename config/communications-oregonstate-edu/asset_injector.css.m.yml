code: |-
  .max-section{
  	max-width:1300px;
  	margin:0 auto;
  }
  .orange-header {
  	font-family: "Stratum2Web", serif; 
  	color: #d73f09;
  }
  .gray-header {
  	font-family: "Stratum2Web", serif; 
  	color: #292929;
  }
  @media (min-width: 1001px) {
      .mobile {
      	display:none;
      }
  }
  @media (max-width: 1000px) {
      .desktop {
      	display:none;
      }
  .separator-margin {
  	margin-bottom: -30px;
  }}
  #scrollToTopBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(30, 33, 36, 0.5);
    color: #ffffff;
    border: none;
    border-radius:5px;
    padding: 10px 16px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    cursor: pointer;
  }
  .text-shadow {
  	text-shadow: 2px 2px 4px rgba(0,0,0, 0.5);
  }
  .orange-centered-line {
    position: relative; /* Needed for absolute positioning of the ::after */
    display: block; /* Ensures the element stacks below previous content */
  }
  .orange-centered-line::after {
    content: ''; /* Required for pseudo-element */
    display: block;
    width: 50px;
    height: 4px;
    background-color: #d73509;
    position: absolute;
    left: 50%;
    transform: translateX(-50%); /* Centers horizontally */
    top: 100%; /* Places line below the element */
    margin-top: 25px; /* Optional spacing between element and line */
  }
  .bar-orange-above-headings{
    position: relative;
    margin-top: 1rem;
  }
   .bar-orange-above-headings::before {
    content: '';
    width: 50px;
    height: 4px;
    position: absolute;
    background-color: #d73f09;
    top: -1rem;
  }
  .gray-centered-line {
    position: relative; /* Needed for absolute positioning of the ::after */
    display: block; /* Ensures the element stacks below previous content */
  }
  .gray-centered-line::after {
    content: ''; /* Required for pseudo-element */
        display: block;
      width: 50px;
      height: 4px;
      background-color: #423E3C;
      transform: translateX(-50%);
      top: 100%;
      position: relative;
      margin: 20px auto;
  }
  .bar-gray-above-headings{
    position: relative;
    margin-top: 2.5rem;
  }
   .bar-gray-above-headings::before {
    content: '';
    width: 50px;
    height: 4px;
    position: absolute;
    background-color: #423E3C;
    top: -1rem;
  }
  .top-above-heading {
  	font-family: "Stratum2Web", serif; 
  	color: #292929;

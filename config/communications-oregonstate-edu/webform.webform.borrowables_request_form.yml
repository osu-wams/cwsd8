id: borrowables_request_form
title: 'Borrowables Request Form'
description: ''
categories: {  }
elements: |-
  markup:
    '#type': webform_markup
    '#markup': |-
      <p>Thank you for your interest in our Borrowables program.&nbsp;Completion of this form does not guarantee the items will be in inventory on the date you request.&nbsp;The Conference &amp; Event Services office will contact you within 10 business days&nbsp;with a contract to reserve the items.&nbsp;</p>

      <p>For full information, read an&nbsp;<a href="/events/items-borrow" target="_blank">overview of the borrowables program</a>, including office hours, location, fees, and policies.&nbsp;There is no charge to borrow items, however fees are associated with late returns, returns outside of office hours, cleaning, repairs, replacement of damaged/lost items and for batteries. There is a $5 cell battery fee for increments of up to 25 items that use cell batteries and a $5 AA/AAA battery fee for increments of 15 items that use AA/AAA batteries.&nbsp;<br />
      &nbsp;</p>

      <p><b>All pick-ups and returns are by appointment only at the availability of staff. Appointments&nbsp;will be scheduled between 8 a.m. and 5 p.m. Monday through Friday only.&nbsp;</b></p>
  your_information_header:
    '#type': webform_markup
    '#markup': |-
      <p>&nbsp;</p>

      <h2>Your Information</h2>

      <hr />
  name:
    '#type': textfield
    '#title': Name
    '#required': true
  department:
    '#type': textfield
    '#title': Department
    '#required': true
  phone_number:
    '#type': tel
    '#title': 'Phone Number'
    '#required': true
  email:
    '#type': email
    '#title': Email
    '#required': true
  index:
    '#type': textfield
    '#title': 'Index #'
    '#required': true
  fees:
    '#type': radios
    '#title': Fees
    '#description': '<p class="red-text"><em>Although the borrowables program is free, the equipment borrowed from Oregon State University and Conference &amp; Event Services is subject to charge if it is lost, damaged, returned late, uses batteries, needs cleaning, needs repairs or if there are pickups/returns outside of normal business hours. Fees associated to any damaged, lost or delayed returned equipment will be charged to the renter and billed directly to the index unless other arrangements are made. Repair costs will be determined by Conference &amp; Event Services Staff and shipping costs will be added to all replacement costs. A $25 late fee is assessed if replacement value is under $250 and a $50 late fee if replacement value is $250.01 or higher.</em></p>'
    '#description_display': after
    '#options':
      'Yes, I read the fees statement and agree to pay any fees associated with this order.': 'Yes, I read the fees statement and agree to pay any fees associated with this order.'
      'No, I have not read or do not agree with the fees statement and choose not to submit this request.': 'No, I have not read or do not agree with the fees statement and choose not to submit this request.'
    '#required': true
  event_information_header:
    '#type': webform_markup
    '#markup': |-
      <p>&nbsp;</p>

      <h2>Event Information</h2>

      <hr />
  event_name:
    '#type': textfield
    '#title': 'Event Name'
    '#required': true
  event_date:
    '#type': date
    '#title': 'Event Date'
    '#description': '<p class="red-text"><em>Please enter the date of your event. If your event spreads across multiple dates please enter the first day.</em></p>'
    '#description_display': before
    '#required': true
    '#date_date_min': '-1 years'
    '#date_date_max': '+2 years'
  pick_up_date:
    '#type': date
    '#title': 'Pick-up Date'
    '#required': true
    '#date_date_min': '-1 Years'
    '#date_date_max': '+2 Years'
  drop_off_date:
    '#type': date
    '#title': 'Drop-off Date '
    '#required': true
    '#date_date_min': '-1 Years'
    '#date_date_max': '+2 Years'
  markup_01:
    '#type': webform_markup
    '#markup': |-
      <p>&nbsp;</p>

      <h2>Request Items</h2>

      <hr />
  request_items:
    '#type': textarea
    '#title': 'Request Items'
    '#description': |-
      <p>Please include item number, description and quantities on separate lines.&nbsp;</p>

      <p><strong>Example:</strong></p>

      <p>S021 Double sided poster boards, Qty. 4<br />
      E003 Black folding metal easel - 5.5' tall, Qty: 6</p>

      <p><a href="/university-events/borrowable-items" target="_blank">View all available items and their identifying numbers</a></p>
    '#title_display': invisible
    '#description_display': before
    '#required': true
  captcha:
    '#type': captcha
    '#captcha_type': recaptcha/reCAPTCHA

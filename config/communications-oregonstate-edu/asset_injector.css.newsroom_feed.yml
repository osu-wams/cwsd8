id: newsroom_feed
label: 'Newsroom feed'
code: |-
  .image-container {
              position: relative;
              max-width: 800px;
              width: 100%;
              text-align: center;
              margin: 0 auto;
              line-height: 0; /* Remove extra space below image */
              max-height:500px;
          }
          .news-image {
              width: 100%;
              height: 100%; /* Fill the height of the container */
              object-fit: cover; /* Scale image to cover container, maintaining aspect ratio */
              display: block;
              border-radius: 8px;
              max-height:500px;
          }
          .image-title {
              position: absolute;
              bottom: 20px;
              left: 0;
              right: 0;
              background-color: rgba(0, 0, 0, 0.7);
              color: white;
              padding: 10px;
              font-family: Arial, sans-serif;
              font-size: 17px;
              font-weight: bold;
              text-align: center;
              border-radius: 0 0 8px 8px;
              white-space: normal; /* Allow text to wrap naturally */
              line-height: 1.4; /* Improve readability with proper line spacing */
          }
          .image-title a {
              color: white;
              text-decoration: none;
          }
          .image-title a:hover {
              text-decoration: underline;
          }
          .error-message {
              color: red;
              font-family: Arial, sans-serif;
              font-size: 17px;
              text-align: center;
              line-height: 1.4;
          }

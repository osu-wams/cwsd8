      }
  		.mobile-header {
          padding-bottom: 50px !important;
          font-size: 55px;
      }
      .mobile-padding-bottom {
      	padding-bottom: 30px;
      }
  }
  @media (min-width: 1199px) {
      .mobile {
      	display:none;
      }
  }
  .views-exposed-form {
  	display:none!important;
  }
  .mt-n5 {
  	margin-top:-50px!important;
  }
  .text-truncate {

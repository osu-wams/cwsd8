id: carousel
label: Carousel
code: |-
  /* Small screens (max-width: 770px) */
  @media screen and (max-width: 770px) {
      .carousel-container {
    height: 675px; /* Adjust height as needed */
  	}
  }

  @media screen and (min-width: 771px) {
        .carousel-container {
    height: 610px; /* Adjust height as needed */
    max-width:600px;
  	}
  }
  /* Medium screens (max-width: 1000px) */
  @media screen and (min-width: 1000px) {
        .carousel-container {
    height: 610px; /* Adjust height as needed */
  	}
  }

  /* Large screens (max-width: 1200px) */
  @media screen and (min-width: 1200px) {
        .carousel-container {
    height: 450px; /* Adjust height as needed */
  	}
  }

  /* Extra-large screens (min-width: 1201px) */
  @media screen and (min-width: 1201px) {
        .carousel-container {
    height: 350px; /* Adjust height as needed */
    max-width: 1800px;
  }
  }
  .carousel-container {
    position: relative;
    width: 100%;
    overflow: hidden;
  }

  /*.carousel-slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    margin: 25px 35px 25px 25px;
    background-size: cover;
    background-position: center;
    transform: translateY(-100%);
    transition: transform 0.5s ease-in-out;
  }*/
  .carousel-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: translateX(-100%);
  }

  .carousel-slide:first-child {
      position: relative;
  }

  .carousel-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 100%;
    display: flex;
    justify-content: space-between;
  }

  .carousel-nav button {
    background: none;
    border: none;
    color: #999999;
    font-size: 24px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.3s ease-in-out;
  }

  .carousel-nav button:hover {
    opacity: 1;
  }

  .carousel-dots {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }

  .carousel-dot {
    cursor: pointer;
    height: 10px;
    width: 10px;
    margin: 0 5px;
    background-color: #bbb;
    border-radius: 50%;
    display: inline-block;
    transition: background-color 0.3s ease;
  }

  .carousel-dot.active {
    background-color: #777;
  }
media: all

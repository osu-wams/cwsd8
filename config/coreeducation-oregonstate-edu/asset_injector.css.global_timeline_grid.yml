id: global_timeline_grid
label: 'Global - Timeline Grid'
code: |-
  .coreed-timeline__item {
  	border-top: 2px solid var(--bs-primary);
  }

  @media screen and (min-width: 992px) {
  		.coreed-timeline__item {
  		border-top: 2px solid var(--bs-primary);
  		border-left: 2px solid var(--bs-primary);
  	}
  	
  	.coreed-timeline__item:nth-child(-n+2) {
  		border-top: none;
  	}
  	
  	.coreed-timeline__item:nth-child(odd) {
  		border-left: none;
  	}
  	
  	.coreed-timeline__item:first-child {
  		border-left: none;
  	}
  }

          content:
            value: "<h2>To view approved program changes and courses in Core Education:</h2>\r\n\r\n<p class=\"display-2\"><a class=\"btn btn-lg osu-btn-primary\" href=\"https://catalog.oregonstate.edu/\" target=\"_blank\">AY 2025-26 Catalog</a></p>\r\n\r\n\r\n\r\n<h2>How to interpret the tables:</h2>\r\n\r\n\t\t\r\n\t\t<p class=\"fs-6\"><strong>Statement of Intent</strong>&nbsp;- Submitted - course has been submitted through the Statement of Intent and faculty can take the CADI or Ecampus DOC/ROC&nbsp;</p>\r\n\r\n\t\t<p class=\"fs-6\"><strong>Date Submitted in CIM</strong>&nbsp;- Course has successfully been (re)designed and submitted in CIM for review</p>\r\n\t\t\r\n\t\t<p class=\"fs-6\"><strong>Date Approved in CIM&nbsp;</strong>- Course has successfully been through the CIM review process and approved for the Core Education</p>\r\n\t\t</li>\r\n\t</ul>\r\n\t</li>\r\n</ul>\r\n\r\n<p class=\"fs-6\">For internal OSU users, more detailed course proposal information can be found in CIM.</p>\r\n\r\n<p class=\"display-2\"><a class=\"btn btn-lg osu-btn-primary\" href=\"https://nextcatalog.oregonstate.edu/courseadmin/\" target=\"_blank\">CIM System</a></p>"

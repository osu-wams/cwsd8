          content:
            value: |-
              <p>&nbsp;</p>
              <hr>
              <p>This page lists Postdoctoral Scholar positions. To find <a href="/postdocs/appointment-and-recruitment">Research Associate (Postdoc)</a> positions visit the OSU Jobs website. These positions are listed as:</p>
              <ul><li><span style="text-decoration: underline;">Position Type:</span> Unclassified Faculty</li>
              	<li><span style="text-decoration: underline;">Appointment Type:</span> Academic Teaching/Research Faculty</li>
              </ul>
              <p>This link will automatically filter the jobs lists based on these options: <a href="https://jobs.oregonstate.edu/postings/search?1970=1&amp;commit=Search&amp;page=1&amp;query_organizational_tier_3_id=any&amp;query_position_type_id=3&amp;utf8=%E2%9C%93">View jobs list.</a></p>
              <p>If you do not see an opening in your area of interest, try contacting specific faculty members directly and inquire about the possibility of training with them. To find faculty, visit the websites of <a href="https://oregonstate.edu/academics">Academic Colleges</a> and <a href="https://research.oregonstate.edu/research-centers-and-institutes-osu-0">Research Centers and Institutes</a>, and look through the list of faculty.</p>

  /*** Grid styles ***/
  .grid .media {
    padding: 10px;
  }
  .grid .media > .title {
    grid-area: title;
  }
  .grid .media > .img {
    grid-area: img;
  }
  .grid .media > .content {
    grid-area: bd;
  }
  .grid .media > .footer {
    grid-area: ft;
  }
  .grid .media {
    display: grid;
    grid-column-gap: 20px;
    grid-template-areas: "title" "img" "bd" "ft";
  }

  @media (min-width: 600px) {
    /* clearfix*/
    .grid .media:after {
      content: "";
      display: block;
      clear: both;
    }
    .grid .media > .media {
      margin-left: 160px;
      clear: both;
    }
    .grid .media .img {
      float: left;
      margin: 0 10px 0 0;
      width: 150px;
    }
    .grid .media > * {
      margin: 0 0 0 160px;
    }
    @supports (display: grid) {
      /* override */
      .grid .media > * {
        margin: 0;
      }
      .grid .media .img {
        width: auto;
        margin: 0;
      }
      .grid .media:after {
        content: none;
      }
      .grid .media {
        display: grid;
        grid-column-gap: 20px;
        grid-template-columns: 150px 3fr;
        grid-template-rows: auto 1fr auto;
        grid-template-areas: "img title" "img bd" "ft ft";
      }
      .grid .media.img-flexie {
        grid-template-columns: minmax(150px, 1fr) 3fr;
      }
      .grid .schedule {
        display: grid;
        grid-gap: 20px;
        grid-template-columns: 150px 1fr;
        grid-template-areas: "time desc";
        grid-template-rows: auto;
      }
      .grid .schedule-mentors {
        display: grid;
        grid-gap: 20px;
        grid-template-columns: 250px 1fr;
        grid-template-areas: "time desc";
        grid-template-rows: auto;
      }
    }

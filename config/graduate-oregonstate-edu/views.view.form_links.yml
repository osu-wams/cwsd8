          content:
            value: "<p>If you need help with the forms, please choose from the following:</p>\r\n<ul>\r\n  <li>For admissions forms and application questions, contact Graduate Admissions (<a href=\"mailto:graduate.admissions@oregonstate.edu\">graduate.admissions@oregonstate.edu</a>)</li>\r\n  <li>For student forms and policy questions, contact the Office of Graduate Education main office (<a href=\"mailto:graduate.education@oregonstate.edu\">graduate.education@oregonstate.edu</a>)</li>\r\n  <li>For ONID or login issues, contact the <a href=\"https://technology.oregonstate.edu/help\">OSU Service Desk</a></li>\r\n  <li>For technical support, contact graduate education IT (<a href=\"mailto:graduate.helpdesk@oregonstate.edu\">graduate.helpdesk@oregonstate.edu</a>) or visit open office hours, 10 to 11:30 a.m., on Tuesdays at <a href=\"https://beav.es/GS-Help\">https://beav.es/GS-Help.</a></li>\r\n</ul>\r\n<p>&nbsp;</p>\r\n<p class=\"text-center\"><a class=\"my-2 btn btn-primary\" href=\"#Admissions%20forms\">Admissions</a> <a class=\"my-2 btn btn-primary\" href=\"#Current%20student%20forms\">Current Students</a> <a class=\"my-2 btn btn-primary\" href=\"#Faculty%20forms\">Faculty Forms</a></p>\r\n<p>&nbsp;</p>"

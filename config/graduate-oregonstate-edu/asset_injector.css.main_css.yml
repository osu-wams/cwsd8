    .flexitem-max-width-35ch {
      max-width: 35ch;
    }
  }
  @media (min-width: 1200px) {
    .flexitem-job {
      width: 25%;
    }
  }
  /******** Custom styles for individual circumstances ***********/
  @media (min-width: 1200px) {
    .page-node-8021 .paragraphs-item-271 {
      min-height: 600px;
    }
  }

  /* SVG */
  .pine-icon-blue {
    fill: #006A8E;
  }

  .st9 {
    animation-name: pulse;
    animation-duration: 1s;
    animation-iteration-count: infinite;
    animation-direction: alternate;
  }

  @keyframes pulse {
    from {
      opacity: 1;
    }
    to {
      opacity: 0;
    }
  }
  .st12 {
    animation-name: bump;
    animation-duration: 0.5s;
    animation-iteration-count: infinite;
    animation-direction: alternate;
  }

  @keyframes bump {
    from {
      transform: translate(0px, 0px);
    }
    to {
      transform: translate(5px, 5px);
    }
  }
  /* Paragraphs */
  /*************** General paragraph fixes *********************/
  h3.paragraph-card-h3 {
    margin: 0;
    background-color: transparent;
  }

  @media (max-width: 980px) {

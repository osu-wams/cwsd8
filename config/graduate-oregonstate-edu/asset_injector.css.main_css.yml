    }
  }
  @media (max-width: 768px) {
    .page-node-9811 .paragraph-2-col .field-item {
      padding: 0;
    }
    .page-node-9811 .paragraphs-items .row-fluid .span6 {
      min-height: 0;
    }
  }
  /* Icons */
  .gs-icon-before:before {
    font-size: 1.2rem;
    font-family: fontAwesome;
    display: inline-block;
    width: 2rem;
    text-align: center;
  }

  @media (max-width: 768px) {

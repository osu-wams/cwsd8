    grid-gap: 2.5rem;
  }
  .grid-card__resource-fair .resource-fair-item {
    padding: 0.5rem 1rem;
    align-self: start;
  }

  ul.grid-card__admissions {
    margin: 0;
    padding-left: 0;
  }

  .grid-card__admissions {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    grid-gap: 2.5rem;
    justify-items: center;
  }
  .grid-card__admissions .grid-card__admissions_item {
    padding: 0.5rem 1rem;
    list-style: none;
  }
  .grid-card__admissions p.width-300 {

  }

  @media (min-width: 768px) {
    .grid-buttons_2_1 {
      display: grid;
      grid-gap: 2rem;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 50% 50%;
    }
    .grid-buttons_2_1 .grid-buttons_items_end {
      justify-self: end;
    }
    .grid-buttons_2_1 .grid-buttons_items_start {
      justify-self: start;

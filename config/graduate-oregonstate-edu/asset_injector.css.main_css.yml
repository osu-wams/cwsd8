  }

  /* Backgrounds */
  .background-rock {
    background-image: url("https://gradschool.oregonstate.edu/sites/gradschool.oregonstate.edu/files/2022-02/grad_core_competencies-rock-arrow_copy.jpg");
    background-position: center;
    background-size: cover;
    min-height: 600px;
  }

  .background-osuorange {
    background: #D73F09;
    color: white;
  }
  .background-osuorange h3, .background-osuorange p, .background-osuorange li, .background-osuorange li a {
    color: white;
  }
  .background-osuorange li {
    list-style-image: none;
    list-style: disc;
  }
  .background-osuorange.blur {
    box-shadow: 0px 10px 20px 1px #BCBCBC;
  }


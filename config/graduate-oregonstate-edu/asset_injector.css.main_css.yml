  /* 
  /// Color 
  */
  /** override bootstrap alert colors **/
  .alert {
    background-color: #f3d08e;
    border: 1px solid #E3C07E;
    -webkit-border-radius: 3px;
    -moz-border-radius: 3px;
    border-radius: 3px;
    color: #5c350b;
  }
  .alert h4 {
    color: #5c350b;
  }
  .alert a {
    color: black;
  }

  .alert-success {
    background-color: #CED3A0;
    border-color: #BEC390;
    color: #253700;
  }
  .alert-success h4 {
    color: #253700;
  }

  .alert-danger {
    background-color: #252525;
    border-color: #D73F09;
    color: white;
    text-shadow: none;
  }

  .alert-error {
    background-color: #f5f2ed;
    border-color: #EAE3D6;
    color: #615042;
  }

  .alert-info {
    background-color: #A7C4C9;
    border-color: #97B4B9;
    color: #1c2f43;
  }
  .alert-info h4 {
    color: #1c2f43;
  }

  /*************  BACKGROUNDS *********************/
  .bg-white {
    background-color: white;
  }

  /************** LABELS AND BADGES ***************/
  .badge.bg-primary {
    background-color: gray;
  }

  .label-important,
  .badge-important {
    background-color: #c34500;
  }

  /*.label-important[href],
  .badge-important[href] {
    background-color: #953b39;
  }*/
  .label-warning,
  .badge-warning {
    background-color: #9D601E;
  }

  /*.label-warning[href],
  .badge-warning[href] {
    background-color: #c67605;

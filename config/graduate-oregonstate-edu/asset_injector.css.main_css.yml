  /** additional bootstrap style overrides **/
  .btn-info {
    background-color: #385e86;
    background-image: -moz-linear-gradient(top, #486e96, #385e86);
    background-image: -ms-linear-gradient(top, #486e96, #385e86);
    background-image: -webkit-gradient(linear, 0 0, 0 100%, from(#486e96), to(#385e86));
    background-image: -webkit-linear-gradient(top, #486e96, #385e86);
    background-image: -o-linear-gradient(top, #486e96, #385e86);
    background-image: linear-gradient(top, #486e96, #385e86);
    background-repeat: repeat-x;
    filter: progid:DXImageTransform.Microsoft.gradient(startColorstr="#5bc0de", endColorstr="#2f96b4", GradientType=0);
    border-color: #2f96b4 #2f96b4 #1f6377;
    border-color: rgba(0, 0, 0, 0.1) rgba(0, 0, 0, 0.1) rgba(0, 0, 0, 0.25);
    *background-color: #385e86;
    /* Darken IE7 buttons by default so they stand out more given they won't have borders */
    filter: progid:DXImageTransform.Microsoft.gradient(enabled = false);
  }

  .btn-info:hover,
  .btn-info:active,
  .btn-info.active,
  .btn-info.disabled,
  .btn-info[disabled] {
    background-color: #486e96;
  }

  .btn-info:active,
  .btn-info.active {
    background-color: #385e86;
  }

  /* @import "compass/css3/transition"; */
  .red {
    background-color: #af292e;
    color: #f5f2ed;
  }
  .red:hover {
    background-color: #de7585;
    -moz-transition-property: background-color;
    -o-transition-property: background-color;
    -webkit-transition-property: background-color;
    transition-property: background-color;
    -moz-transition-duration: 0.5s;
    -o-transition-duration: 0.5s;
    -webkit-transition-duration: 0.5s;
    transition-duration: 0.5s;
    -moz-transition-timing-function: ease;
    -o-transition-timing-function: ease;
    -webkit-transition-timing-function: ease;
    transition-timing-function: ease;
  }


  /* Recruit */
  .node-type-recruit-request img {
    margin-top: 1rem;
  }

  /* Teaser */
  .node-teaser h2 a, .node-teaser h3 a {
    color: #D73F09;
  }
  .node-teaser h2 a:hover, .node-teaser h3 a:hover {
    color: #615042;
  }
  .node-teaser .node-readmore {
    margin-left: 0;
    padding-left: 0;
  }

  /* Tables */
  .table-scroll {
    position: relative;
    width: 100%;
    z-index: 1;
    margin: auto;
    overflow: scroll;
    height: 550px;
  }
  .table-scroll table {
    width: 100%;
    margin: auto;
    border-collapse: separate;
    border-spacing: 0;
  }
  .table-scroll th {
    vertical-align: top;
  }
  .table-scroll td {
    vertical-align: middle;
    text-align: center;
  }
  .table-scroll thead th {
    position: -webkit-sticky;
    position: sticky;
    top: 0;
    line-height: 1.3;
  }
  .table-scroll tfoot, .table-scroll tfoot th, .table-scroll tfoot td { /* safari and ios need the tfoot itself to be position:sticky also */
    position: -webkit-sticky;
    position: sticky;
    bottom: 0;
    z-index: 4;
  }
  .table-scroll th:first-child {
    position: -webkit-sticky;
    position: sticky;
    left: 0;
    z-index: 2;
  }
  .table-scroll thead th:first-child,
  .table-scroll tfoot th:first-child {
    z-index: 5;
  }

  .table-wrap {
    position: relative;
  }

  .view-student-stories.view-display-id-block_4 td {
    border-style: none;
  }

  .view-graduate-school-awards.view-display-id-page_1 td {
    vertical-align: top;
  }
  .view-graduate-school-awards.view-display-id-page_1 td > p {

  @media (max-width: 979px) {
    .grid-card__postdocs {
      margin: 0 auto;
      max-width: 600px;
    }
  }
  @media (min-width: 980px) {
    .grid-card__postdocs {
      display: grid;
      grid-template-columns: 1fr repeat(4, 180px) 1fr;
      grid-gap: 2.5rem;
    }

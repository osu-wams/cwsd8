  /* Job */
  @media (min-width: 768px) {
    .node-job .field {
      display: grid;
      grid-template-columns: 20ch 1fr;
      grid-template-rows: 1fr;
      grid-column-gap: 1rem;
      grid-row-gap: 0px;
    }
  }
  .node-job .field-label {
    text-decoration: underline;
  }

  #block-system-main .node-job .field-type-text-long {
    margin-bottom: 0;
  }

  .view-postdocs-open .views-row {
    border-radius: 8px;
    padding: 0.5rem 1.5rem;
    margin-bottom: 1rem;
  }
  .view-postdocs-open h3 {
    margin-bottom: 1.5rem;
  }
  .view-postdocs-open .node-job .field {
    grid-template-columns: 15ch 1fr;
  }

  @media (min-width: 1200px) {
    .view-postdocs-open .view-content {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: 1fr;
      grid-column-gap: 1rem;
      grid-row-gap: 2rem;
    }
    .view-postdocs-open .views-row {
      margin-bottom: 0;
    }
  }
  /* Course */
  .view-courses .views-row {
    padding-right: 1em;
    padding-left: 1em;
  }

  /* Grid */
  .grid .media {
    padding: 10px;
  }
  .grid .media > .title {
    grid-area: title;
  }
  .grid .media > .img {
    grid-area: img;
  }
  .grid .media > .content {
    grid-area: bd;
  }
  .grid .media > .footer {
    grid-area: ft;
  }
  .grid .media {
    display: grid;
    grid-column-gap: 20px;
    grid-template-areas: "title" "img" "bd" "ft";
  }

  @media (min-width: 600px) {
    /* clearfix*/
    .grid .media:after {
      content: "";
      display: block;
      clear: both;
    }
    .grid .media > .media {
      margin-left: 160px;
      clear: both;
    }
    .grid .media .img {
      float: left;
      margin: 0 10px 0 0;
      width: 150px;
    }
    .grid .media > * {
      margin: 0 0 0 160px;
    }
    @supports (display: grid) {
      /* override */
      .grid .media > * {
        margin: 0;
      }
      .grid .media .img {
        width: auto;
        margin: 0;
      }
      .grid .media:after {
        content: none;
      }
      .grid .media {
        display: grid;
        grid-column-gap: 20px;
        grid-template-columns: 150px 3fr;
        grid-template-rows: auto 1fr auto;
        grid-template-areas: "img title" "img bd" "ft ft";
      }
      .grid .media.img-flexie {
        grid-template-columns: minmax(150px, 1fr) 3fr;
      }
      .grid .schedule {
        display: grid;
        grid-gap: 20px;
        grid-template-columns: 150px 1fr;
        grid-template-areas: "time desc";
        grid-template-rows: auto;
      }
      .grid .schedule-mentors {
        display: grid;
        grid-gap: 20px;
        grid-template-columns: 250px 1fr;
        grid-template-areas: "time desc";
        grid-template-rows: auto;
      }
    }
  }
  .view-videos ul {
    margin-left: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-column-gap: 2rem;
    grid-row-gap: 1rem;
    grid-template-rows: auto;
  }
  @media (max-width: 768px) {
    .view-videos ul {

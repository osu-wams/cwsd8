  }

  /************** Specific paragraph fixes ***********************/
  .page-node-6196 .paragraphs-items .paragraph-menu ul {
    min-height: 1rem;
  }

  /* GCCUT gray background on 2-col paragraph */
  .paragraphs-item-1171, .paragraphs-items .field-item .paragraphs-item-1171 .field-item,
  .paragraphs-item-1571, .paragraphs-items .field-item .paragraphs-item-1571 .field-item {
    background-color: #f5f5f5;
  }

  .page-node-16497 .paragraphs-items .field-item .field-item {

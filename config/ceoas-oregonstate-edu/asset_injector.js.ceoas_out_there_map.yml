   function initialize() {
      const CEOAS_Latlng = new google.maps.LatLng(44.568562,-123.279707);
  	const myCenterLatlng = new google.maps.LatLng(13,-123.279707);
      const myOptions = {
        zoom: 2,
        center: myCenterLatlng,
        mapTypeId: google.maps.MapTypeId.HYBRID,
        mapId: "7dcff21d79511b03", // Map ID is required for advanced markers.
      };
  	
      const map = new google.maps.Map(document.getElementById("map_canvas"), myOptions);
      
      // have only ONE infowindow so that only one will be open at a time
      let infowindowX = new google.maps.InfoWindow({maxWidth: 500, headerDisabled: true}); 

  	const title01 = "Quinault Canyon, Washington - Andrew Thurber (1)";
      const marker01 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(47.354423, -125.133843),
          map: map,
          title: title01
      });
      google.maps.event.addListener(marker01, 'click', function() {
      	infowindowX.setContent('<span class="fs-6 text-success">' + title01 + "</span><br />" + '<a href="//ceoas.oregonstate.edu/directory/andrew-thurber">Andrew Thurber<\/a> was part of an exploratory cruise to Washington’s Quinault Canyon in September of 2020. He was particularly interested in finding and characterizing methane seeps in the area.');
      	infowindowX.open(map,marker01);
      });
  	
      const title02 = "Gulkana Glacier, Alaska - Erin Pettit (2)";
      const marker02 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(63.241103, -145.467586),
          map: map,
          title: title02
      });
      google.maps.event.addListener(marker02, 'click', function() {
      	infowindowX.setContent('<span class="fs-6 text-success">' + title02 + "</span><br />" + '<a href="//ceoas.oregonstate.edu/directory/erin-pettit">Erin Pettit<\/a> has been using Alaska’s Gulkana Glacier, and other glacial sites, to stand in for Europa, Jupiter’s icy moon! She and a team have been testing a special seismometer that may be used on a Europa lander in a future NASA mission.');
  		infowindowX.open(map,marker02);
      });
   
  	const title03 = "LeConte Glacier, Alaska (3)";
      const marker03 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(56.946390, -132.329389),
          map: map,
          title: title03
      });
      google.maps.event.addListener(marker03, 'click', function() {
      	infowindowX.setContent('<span class="fs-6 text-success">' + title03 + "</span><br />" + '<a href="//ceoas.oregonstate.edu/directory/jonathan-nash">Jonathan Nash<\/a> is part of a team studying the LeConte Glacier in southeast Alaska. New acoustic observations mapping the changing face of the glacier show that the rate of submarine melt is much higher than previously predicted by scientific theory. The area is considered too dangerous for manned vessels to reach, so Nash’s engineering team has developed autonomous research vessels – essentially robotic boats – that can deploy sensors in these previously inaccessible areas.');		
  		infowindowX.open(map,marker03);
      });

  	const title04 = "HJ Andrews Experimental Forest, Lane County, Oregon (4)";
      const marker04 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(44.212223, -122.255278),
          map: map,
          title: title04
      });
      google.maps.event.addListener(marker04, 'click', function() {
      	infowindowX.setContent('<span class="fs-6 text-success">' + title04 + "</span><br />" + 'Geographer <a href="//ceoas.oregonstate.edu/directory/julia-jones">Julia Jones<\/a> is very much at home in the <a href="https://andrewsforest.oregonstate.edu/">HJ Andrews Experimental Forest<\/a>, a Long-Term Ecological Research site in Lane County, Ore., administered by OSU and its partners. Her extensive research there has included exploring the conditions that lead to extreme flooding events induced by rain falling on snowpack. In another study of the forest’s use of water, she found that plantation forests beyond the age of 20 years used twice as much summertime water as old-growth forests.');		
  		infowindowX.open(map,marker04);
      });

  	const title05 = "Green Island, Taiwan - Jennifer Fehrenbacher (5)";
      const marker05 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(22.662138, 121.490145),
          map: map,
          title: title05
      });	
      google.maps.event.addListener(marker05, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title05 + "</span><br />" + '<a href="//ceoas.oregonstate.edu/directory/jennifer-fehrenbacher">Jennifer Fehrenbacher<\/a> and two students spent part of the summer of 2019 at a marine lab on Green Island off Taiwan collecting foraminifera from the ocean and raising them in the lab. These single-celled organisms incorporate seawater chemicals into their shells, and the shells of long-dead forams can therefor reveal clues about past climates.');		
  		infowindowX.open(map,marker05);
      });	

  	const title06 = "Arctic Ocean - Jenny Hutchings (6)";
      const marker06 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(84, 137),
          map: map,
          title: title06
      });
      google.maps.event.addListener(marker06, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title06 + "</span><br />" + '<a href="//ceoas.oregonstate.edu/directory/jennifer-hutchings">Jenny Hutchings<\/a> and a graduate student participated in the 2019-20 MOSAiC expedition, in which scientists studied the changing Arctic from a research vessel that was purposely trapped in the ice and drifting. MOSAiC, the largest polar study in history, aimed to take the closest look ever at the Arctic as the epicenter of global warming and to gain fundamental insights into global climate change.');
  		infowindowX.open(map,marker06);
      });	
  	
  	const title07 = "North Atlantic Ocean (7)";
      const marker07 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(61,-24),
          map: map,
          title: title07
      });
      google.maps.event.addListener(marker07, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title07 + "</span><br />" + 'A <a href="//oregonstate.edu/ua/ncs/archives/2015/feb/scientists-find-deep-ocean-evidence-atlantic-overturning-decline">study<\/a> led by <a href="//ceoas.oregonstate.edu/directory/andreas-schmittner">Andreas Schmittner<\/a> found evidence that a system of currents that brings warm water from the tropics to the North Atlantic declined at the end of the last ice age. This decline affected regional climate and provides insight into potential future climate dynamics.');
  		infowindowX.open(map,marker07);
      });	

  	const title08 = "Andrew Thurber and Rick Colwell - Colorado (8)";
      const marker08 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(38.84940948927145, -106.91713741510418),
          map: map,
          title: title08
      });
      google.maps.event.addListener(marker08, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title08 + "</span><br />" + '<a href="//ceoas.oregonstate.edu/directory/andrew-thurber">Andrew Thurber<\/a> and <a href="//ceoas.oregonstate.edu/directory/frederick-colwell">Rick Colwell<\/a> have been investigating microbial communities and methane dynamics in the watershed of the East River near Crested Butte, CO, with an emphasis on wintertime (brrr!) sampling.');
  		infowindowX.open(map,marker08);
      });	

  	const title09 = "Krill, Western Antarctic peninsula (9)";
      const marker09 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(-66.206333, -73.520308),
          map: map,
          title: title09
      });
      google.maps.event.addListener(marker09, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title09 + "</span><br />" + 'Krill, tiny shrimp-like crustaceans, swarm and thrive in Antarctic waters, supporting a diverse ecosystem that includes some of the world’s largest whales.  <a href="//ceoas.oregonstate.edu//directory/kim-bernard">Kim Bernard<\/a> and some of her students have spent two austral winters at Palmer Station in Antarctica studying the diets, health and ecology of juvenile krill.');		
  		infowindowX.open(map,marker09);
      });
  	
  	const title10 = "Alan Hills, East Antarctica - Ed Brook and Christo Buizert (10)";
      const marker10 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(-76.7, 159.7),
          map: map,
          title: title10
      });
      google.maps.event.addListener(marker10, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title10 + "</span><br />" + 'The Center for Oldest Ice Exploration (COLDEX), a multi-institution NSF-funded initiative headed up by <a href="//ceoas.oregonstate.edu/directory/ed-brook">Ed Brook<\/a> and <a href="//ceoas.oregonstate.edu/directory/christo-buizert">Christo Buizert<\/a>, is looking for the oldest ice on the planet. This ice contains clues to past climates in ice that may be as old as two to three million years. The project has had its first field season, focused on the Allan Hills in East Antarctica.');
  		infowindowX.open(map,marker10);
  	});

  	const title11 = "Clarion-Clipperton Zone in the North Pacific - Astrid Leitner (11)";
      const marker11 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(20.083685312088672, -132.2713083312764),
          map: map,
          title: title11
      });
      google.maps.event.addListener(marker11, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title11 + "</span><br />" + 'Deep-sea ecologist <a href="//ceoas.oregonstate.edu/directory/astrid-leitner">Astrid Leitner<\/a> studies how dramatic and complex undersea features like canyons and seamounts in the deep ocean affect biological communities, especially predators and prey. One place she has studied extensively is an underwater feature called the Clarion-Clipperton Zone in the North Pacific.');
  		infowindowX.open(map,marker11);
      });

  	const title12 = "Atlantic Ocean - Kipp Shearman (12)";
      const marker12 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(34.389433, -75.229262),
          map: map,
          title: title12
      });
      google.maps.event.addListener(marker12, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title12 + "</span><br />" + 'Physical oceanographer <a href="//ceoas.oregonstate.edu/directory/r-kipp-shearman">Kipp Shearman<\/a> likes to know what makes the coastal ocean tick. While he has studied physical phenomena all over the world, one focus area has been the Gulf Stream in the Atlantic Ocean. For example, in one recent study he looked at how mixing between two gyres – roughly circular ocean currents -- in the North Atlantic occurs across the Gulf Stream front.');		
  		infowindowX.open(map,marker12);
      });

  	const title13 = "Tahiti: Ancient lava flows (13)";
      const marker13 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(-17.628449, -149.574905),
          map: map,
          title: title13
      });
      google.maps.event.addListener(marker13, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title13 + "</span><br />" + 'The last time the Earth’s magnetic field reversed direction was about 770,000 years ago, and some research has suggested that a weakening of the magnetic field presaged the switch. A team of CEOAS researchers, including <a href="//ceoas.oregonstate.edu/directory/antonius-koppers">Anthony Koppers<\/a>, Brendan Reilly, <a href="//ceoas.oregonstate.edu/directory/joseph-stoner">Joe Stoner<\/a> and <a href="https://kevinkonrad.weebly.com/">Kevin Konrad<\/a> examined ancient lava flows in Tahiti’s Punaru’u Valley to look for evidence of this weakening and determine the timing of the reversal with more precision.');
  		infowindowX.open(map,marker13);
      });

  	const title14 = "Palamós Canyon, Mediterranean Sea  - Miguel Goñi (14)";
      const marker14 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(41.61640914597724, 3.499999980144658),
          map: map,
          title: title14
      });
      google.maps.event.addListener(marker14, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title14 + "</span><br />" + 'Red shrimp trawled up from the depths of the Palamós Canyon in the northwestern Mediterranean are considered one of the finest crustacean delicacies in the world. <a href="//ceoas.oregonstate.edu/directory/miguel-goni">Miguel Goñi<\/a> is part of a team that has been studying some of the environmental impacts of bottom trawling for shrimp and other species in the canyon.');
  		infowindowX.open(map,marker14);
      });

  	const title15 = "Chuckchi Sea  - Miguel Goñi (15)";
      const marker15 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(69.0265042,-177.5256858),
          map: map,
          title: title15
      });
      google.maps.event.addListener(marker15, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title15 + "</span><br />" + 'On oceanographic expeditions to the Chuckchi Sea, <a href="//ceoas.oregonstate.edu/directory/miguel-goni">Miguel Goñi<\/a> is studying how Arctic phytoplankton productivity works in the summertime when nutrients start to run out in the surface layers of the ocean.');		
  		infowindowX.open(map,marker15);
      });

  	const title16 = "Sagarmatha National Park, Nepal - Emily Eidam (16)";
      const marker16 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(27.933546608359574, 86.70265600926372),
          map: map,
          title: title16
      });
      google.maps.event.addListener(marker16, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title16 + "</span><br />" + 'In Sagarmatha National Park in Nepal, <a href="//ceoas.oregonstate.edu/directory/emily-eidam">Emily Eidam<\/a> and colleagues have been studying the sometimes-extreme water-level fluctuations in the region’s glacial lakes. These studies are important in a time of melting glaciers, as flooding and water availability have implications for nearby communities.');
  		infowindowX.open(map,marker16);
      });

  	const title17 = "Nepal - John Nabelek (17)";
      const marker17 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(27.809081, 84.967846),
          map: map,
          title: title17
      });
      google.maps.event.addListener(marker17, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title17 + "</span><br />" + '<a href="//ceoas.oregonstate.edu/directory/john-nabelek">John Nabelek<\/a> and a student were involved in installation of a monitoring system to record earthquakes and their aftershocks in the mountains of Tibet. Installed after a large quake in 2015, the network of instruments known as the Nepal Array Measuring Aftershock Seismicity Trailing Earthquake network (yes, NAMASTE) was in place for 11 months.');		
  		infowindowX.open(map,marker17);
      });

  	const title18 = "Bermuda - Adam Schultz (18)";
      const marker18 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(32.300419, -64.788375),
          map: map,
          title: title18
      });
      google.maps.event.addListener(marker18, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title18 + "</span><br />" + '<a href="//ceoas.oregonstate.edu/directory/adam-schultz">Adam Schultz<\/a> and colleagues have been studying the geomagnetic properties and electrical conductivity of the Earth’s mantle near Bermuda. They found anomalously high electrical conductivity in the area, likely attributable to hot and wet molten material rising beneath the mantle.');
  		infowindowX.open(map,marker18);
      });

  	const title19 = "Tigray, Ethiopia - Jamon Van Den Hoek (19)";
      const marker19 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(13.567231415163425, 39.42380528183428),
          map: map,
          title: title19
      });
      google.maps.event.addListener(marker19, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title19 + "</span><br />" + '<a href="//ceoas.oregonstate.edu/directory/jamon-van-den-hoek">Jamon Van Den Hoek<\/a> contributed data to a Washington Post study that used satellite imagery and analysis to document gravesites related to massacres in the Tigray region of Ethiopia last year.');		
  		infowindowX.open(map,marker19);
      });
  	
  	const title20 = "Southern Ocean - Yvette Spitz and Ricardo Matano (20)";
      const marker20 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(-52.150914, -40.469173),
          map: map,
          title: title20
      });
      google.maps.event.addListener(marker20, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title20 + "</span><br />" + 'Despite high nutrient inputs, parts of the Southern Ocean are still low in phytoplankton productivity, likely because of a lack of iron. In particular, productivity of the Pacific sector of the Southern Ocean seems to be iron-limited, while the Atlantic sector does not. Exactly where the iron is coming from in the Atlantic sector is a mystery to be investigated by <a href="//ceoas.oregonstate.edu/directory/yvette-spitz">Yvette Spitz<\/a> and <a href="//ceoas.oregonstate.edu/directory/ricardo-matano">Ricardo Matano<\/a>. This work will contribute to our understanding of the effects of iron fertilization on primary productivity in potentially the strongest carbon sink area of the Southern Ocean.');
  		infowindowX.open(map,marker20);
      });

  	const title21 = "Northern Gulf of Mexico (21)";
      const marker21 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(28.594399706937097, -90.25148066044497),
          map: map,
          title: title21
      });
      google.maps.event.addListener(marker21, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title21 + "</span><br />" + 'Lots of CEOAS folks spent part of the summer of 2022 in the northern Gulf of Mexico studying the small-scale physical processes that control the ocean’s near-surface water temperatures. The project, called “SUNRISE” (Submesoscales Under Near-Resonant Inertial Shear Experiment), is a large collaborative effort funded by NSF and NERC. <a href="//ceoas.oregonstate.edu/directory/r-kipp-shearman">Kipp Shearman<\/a>, <a href="//ceoas.oregonstate.edu/directory/jonathan-nash">Jonathan Nash<\/a>, and many others participated.');		
  		infowindowX.open(map,marker21);
      });

  	const title22 = "New Zealand - Marta Torres (22)";
      const marker22 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(-39.261702, -179.308789),
          map: map,
          title: title22
      });
      google.maps.event.addListener(marker22, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title22 + "</span><br />" + 'The Hikurangi Margin is a subduction zone off the coast of New Zealand where the Pacific Plate dives below the Australian Plate. All kinds of amazing geology and chemistry happens at subduction zones. <a href="//ceoas.oregonstate.edu/directory/marta-torres">Marta Torres<\/a> has taken sediment cores in the ocean near the margin to examine the volcanic ash in the sediments. She is particularly interested in methane chemistry at plate margins.');		
  		infowindowX.open(map,marker22);
      });

  	const title23 = "Station ALOHA - Ricardo Letelier (23)"; 
  	const marker23 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(22.75, -158.0),
          map: map,
          title: title23
      });
      google.maps.event.addListener(marker23, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title23 + "</span><br />" + 'Aloha from <a href="http://aco-ssds.soest.hawaii.edu/ALOHA/">station ALOHA<\/a>! <a href="//ceoas.oregonstate.edu/directory/ricardo-letelier">Ricardo Letelier<\/a> has been collecting data at this long-term oceanographic study site (ALOHA stands for A Long-term Oligotrophic Habitat Assessment) north of Hawaii to examine phytoplankton dynamics.');		
  		infowindowX.open(map,marker23);
      });

  	const title24 = "Argentina - Maria Kavanaugh, James Watson and Michael Harte (24)";
      const marker24 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(-49.38741319529455, -63.60741373555267),
          map: map,
          title: title24
      });
      google.maps.event.addListener(marker24, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title24 + "</span><br />" + '<a href="//ceoas.oregonstate.edu/directory/maria-kavanaugh">Maria Kavanaugh<\/a>, <a href="//ceoas.oregonstate.edu/directory/james-watson">James Watson<\/a> and <a href="//ceoas.oregonstate.edu/directory/michael-harte">Michael Harte<\/a> have found a way to identify illegal fishing activities from half a world away. Using vessel tracking data, satellite data on areas of ocean productivity, and machine learning, they developed a method for predicting whether a distant-water fishing vessel is fishing within the Argentine exclusive economic zone (EEZ) on the Patagonian Shelf, one of the world’s most productive regions for fisheries.');		
  		infowindowX.open(map,marker24);
      });

  	const title25 = "Waldport, Oregon coast - PacWave South (25)";
      const marker25 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(44.42119797389977, -124.2006056511605),
          map: map,
          title: title25
      });
      google.maps.event.addListener(marker25, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title25 + "</span><br />" + 'About seven miles off Waldport, Oregon is <a href="https://pacwaveenergy.org/">PacWave<\/a>’s <a href="http://pacwaveenergy.org/south-test-site/">South Test Site<\/a>, now under construction. PacWave South is an in-development, state-of-the-art, pre-permitted, accredited, grid-connected wave energy test facility; developed in partnership with US Department of Energy, the State of Oregon and local stakeholders.');		
  		infowindowX.open(map,marker25);
      });

  	const title26 = "Colombia - David Wrathall (26)";
      const marker26 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(-3.751520, -70.194189),
          map: map,
          title: title26
      });
      google.maps.event.addListener(marker26, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title26 + "</span><br />" + '<a href="//ceoas.oregonstate.edu/directory/david-wrathall">David Wrathall <\/a> and collaborators studied the effects of the peace accord in Colombia on deforestation. Their <a target="_blank" href="https://today.oregonstate.edu/news/peace-accord-colombia-has-increased-deforestation-biologically-diverse-rainforest">fascinating study<\/a>, using cutting-edge remote sensing techniques, determined that the accord did not focus on forest management, and as a result, significant swaths of the delicate Andes-Amazon region were converted from forested to agricultural land.');
  		infowindowX.open(map,marker26);
      });

  	const title27 = "Olympic Coast National Marine Sanctuary - Melanie Fewings and Craig Risien (27)";
      const marker27 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(47.8166, -125.5912),
          map: map,
          title: title27
      });
      google.maps.event.addListener(marker27, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title27 + "</span><br />" + '<a href="//ceoas.oregonstate.edu/directory/melanie-fewings">Melanie Fewings<\/a>, <a href="//ceoas.oregonstate.edu/directory/craig-risien">Craig Risien<\/a> and other CEOAS folks are leading a three-year effort to learn more about climate fluctuations in Olympic Coast National Marine Sanctuary using more than 20 years of oceanographic data.');		
  		infowindowX.open(map,marker27);
      });

  	const title28 = "Willamette Valley - Kelsey Emard (28)";
      const marker28 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(45.00862395054538, -123.12879613082359),
          map: map,
          title: title28
      });
      google.maps.event.addListener(marker28, 'click', function() {
  		infowindowX.setContent('<span class="fs-6 text-success">' + title28 + "</span><br />" + 'Geographer <a href="//ceoas.oregonstate.edu/directory/kelsey-emard">Kelsey Emard<\/a> is working with farmers in the Willamette Valley to determine how they use climate model projections, and conversely, how information they have gained from generations of working on the land can help inform climate models.');		
  		infowindowX.open(map,marker28);
      });
  	
  	const title29 = "Bolivia - Shan de Silva (29)";
      const marker29 = new google.maps.marker.AdvancedMarkerElement({
          position: new google.maps.LatLng(-22.75, -67.466667),
          map: map,
          title: title29

id: alumni_contact_form
title: 'Alumni Contact Form'
description: ''
categories: {  }
elements: |-
  markup:
    '#type': webform_markup
    '#markup': |-
      <h2>Update Your Information</h2>

      <p>Keep your information up-to-date to stay connected with CEOAS alumni news and events, including receiving the CEOAS alumni newsletter.</p>

      <p>Your current info also helps us connect you with alumni networks where you live and work, and with engaging volunteer opportunities to support current students. (Opt-in below)</p>

      <p>&nbsp;</p>
  full_name:
    '#type': textfield
    '#title': 'Full name'
    '#required': true
  former_name:
    '#type': textfield
    '#title': 'Former name'
    '#placeholder': '(if applicable)'
  preferred_email_address:
    '#type': email
    '#title': 'Preferred email address'
    '#required': true
  preferred_phone_number:
    '#type': tel
    '#title': 'Preferred phone number'
  grad_year:
    '#type': textfield
    '#title': 'Grad year'
  mailing_address:
    '#type': webform_address
    '#title': 'Mailing address'
    '#address__title': 'Mailing address line 1'
    '#address_2__title': 'Mailing address line 2'
  markup_01:
    '#type': webform_markup
    '#markup': '<p>Employment info:</p>'
  job_title:
    '#type': textfield
    '#title': 'Job title'
  company_org:
    '#type': textfield
    '#title': Company/Org
  updates_and_stories:
    '#type': textarea
    '#title': 'Updates and stories'
    '#placeholder': 'We love to hear from our alumni! Share an update about yourself and where you are now. (Stories of interest, awards, new positions, or other milestones important to you)'
  markup_02:
    '#type': webform_markup
    '#markup': |-
      <p>&nbsp;</p>
      <h3>Volunteering</h3>

      <p>Interested in volunteering with CEOAS? There are many ways to engage on campus or closer to home. Select any opportunities you’d like to learn more about:</p>
  hosting_and_or_planning_alumni_events_at_your_company_or_in_your:
    '#type': checkbox
    '#title': 'Hosting and/or planning alumni events at your company or in your neighborhood'
  helping_out_at_future_ceoas_events:
    '#type': checkbox
    '#title': 'Helping out at future CEOAS events'
  participate_in_mentoring_informational_interviews_with_students:
    '#type': checkbox
    '#title': 'Participate in Mentoring/Informational Interviews with students'
  speak_to_students_guest_speaker_panels_webinars:
    '#type': checkbox
    '#title': 'Speak to students (guest speaker, panels, webinars)'
  serve_on_an_alumni_board_or_committee:
    '#type': checkbox
    '#title': 'Serve on an alumni board or committee'
  general_interest_in_learning_more_about_opportunities:
    '#type': checkbox
    '#title': 'General interest in learning more about opportunities'
  captcha:
    '#type': captcha
    '#captcha_type': recaptcha/reCAPTCHA

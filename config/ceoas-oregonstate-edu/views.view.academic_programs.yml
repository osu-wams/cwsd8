          table: views
          field: area
          relationship: none
          group_type: group
          admin_label: ''
          plugin_id: text
          empty: false
          content:
            value: "<hr /><h2>Undergraduate Minors</h2>\r\n<ul>\r\n<li><a href=\"https://oregonstate.box.com/s/1kg74pkmqivomlno6ws9btp3s9cu6tof\">Earth Sciences</a> (<em>also available for Ecampus</em>)</li>\r\n<li><a href=\"https://oregonstate.box.com/s/gzey6ceszlpy8yvutlz40toc4rp43akc\">Environmental Sciences</a> (<em>also available for Ecampus</em>)</li>\r\n<li><a href=\"https://oregonstate.box.com/s/9a95breg932kvbtufs45wzr7pxrmh98z\">Geography</a> (<em>also available for Ecampus</em>)</li>\r\n<li><a href=\"https://oregonstate.box.com/s/19j25543drgtvl24rnqkco2sowo0jttb\">Geology</a></li>\r\n<li><a href=\"https://oregonstate.box.com/s/ohu7saemj12wmzc7memnnzkynrvm1xln\">Oceanography</a></li>\r\n</ul>\r\n<h2>Graduate Minor</h2>\r\n<ul>\r\n<li><a href=\"https://catalog.oregonstate.edu/college-departments/earth-ocean-atmospheric-sciences/water-conflict-management-transformation-graduate-minor/\">Water Conflict Management and Transformation</a></li>\r\n</ul>"

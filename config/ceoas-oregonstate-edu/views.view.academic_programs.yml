          admin_label: boilerplate
          plugin_id: text
          empty: false
          content:
            value: '<p>Envision yourself in a community of world-class scholars and instructors, learning to explore the Earth and solve global problems. We are home to the only comprehensive oceanographic and atmospheric research programs in Oregon, and we have equally stellar programs in geology, geography, geospatial studies, environmental sciences, and marine resource management. Whether you want to collect ice cores from Antarctica, use advanced computer models, help local fishing communities implement sustainable practices, learn about water conflict management or collect data aboard a research vessel, we have a graduate or undergraduate program for you. Launch your adventure here!</p>'
            format: full_html
          tokenize: false
      footer:
        area:

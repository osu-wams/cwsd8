          admin_label: ''
          plugin_id: text
          empty: false
          content:
            value: "<p>The College of Earth, Ocean, and Atmospheric Sciences is built on a foundation of outstanding research faculty who work together to solve today's complex, interdisciplinary environmental challenges. Our research covers the entire spectrum of Earth system science, including basic research on physical, chemical and biological processes in the solid Earth, ocean and atmosphere. We work to connect our research to societal issues, including climate change, natural hazards, water resources policy, and management of natural resources. Whether we are providing insights into the complex controls on our climate, gathering data that can inform fisheries management, or studying the human dimensions of natural resource management initiatives, we strive to solve problems that face <a href=\"/ceoas-out-there\">Oregon, the nation and the world</a>.</p>\r\n<hr /><p class=\"text-center\"><a class=\"btn osu-btn-light color-active mb-3\" href=\"/analytical-facilities\" target=\"\"><span class=\"icon-osu-desktop-alt fa-3x\"></span><br />Research Groups, Institutes, and Facilities</a>&nbsp;\r\n<a class=\"btn osu-btn-light color-active mb-3\" href=\"/undergraduate-research\"><span class=\"icon-osu-microscope fa-3x\"></span><br />Undergraduate Research</a>&nbsp;\r\n<a class=\"btn osu-btn-light color-active mb-3\" href=\"/seminars-and-lectures\"><span class=\"icon-osu-graph fa-3x\"></span><br />Seminars and Lectures</a></p>\r\n<hr />\r\n<h2 class=\"text-center\">Research Focus Areas</h2>\r\n<p>&nbsp;</p>\r\n"

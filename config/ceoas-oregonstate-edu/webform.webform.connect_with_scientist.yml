  confirmation_type: page
  confirmation_url: '<front>'
  confirmation_title: 'Connect with a Scientist'
  confirmation_message: "<p>Thank you for your interest in connecting with us about CEOAS science!</p>\r\n\r\n<p>We will do our best to get back with you within a week to link you up with just the right person or activity. We appreciate your flexibility with either content and/or timing as we work through researchers’ busy schedules to schedule your visit. In some instances, we may need to decline due to conflicting events or lab activities.</p>\r\n\r\n<p>Please feel free to contact me with additional questions,</p>\r\n\r\n<p><strong>Ryan Brown </strong>(she/her or they/them) | Outreach Coordinator<br />\r\n<a href=\"/\">College of Earth, Ocean, and Atmospheric Sciences</a> | Oregon State University<br />\r\n104 Wilkinson Hall, Corvallis, OR&nbsp; 97331<br />\r\n(541) 737-7199 | <a href=\"mailto:ryan.brown@oregonstate.edu\">ryan.brown@oregonstate.edu</a></p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p>Return to the <a href=\"/outreach-ceoas\">Outreach at CEOAS</a> page.</p>"

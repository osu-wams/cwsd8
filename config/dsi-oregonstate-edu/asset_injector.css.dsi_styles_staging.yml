    - system
id: dsi_styles_staging
label: 'DSI Styles Staging'
code: |+
  @media screen and (max-width:1200px) {
    .dsi-contact-us .dsi-profile {
      width: 49% !important;
    }
  }
  @media screen and (max-width:991px) {
    .dsi-contact-us .dsi-profile {
    	width: 100% !important;
    }
    .dsi-contact-us {
    	margin: 2rem !important;
    }
    .dsi-news-events, .dsi-project-list {
    	columns: 1;
    	column-count: 1;
    	margin: 2rem;
    }
    .block--type-dsi-block-paragraph > .block__content, 
    .block--type-dsi-h2-two-header-paragraph > .block__content, 
    .block--type-dsi-webform > .block__content,
    .block--type-dsi-image .block__content .field--name-field-media-image, 
    .block-field-blocknodestudent-success-storybody > .block__content, 
    .block-field-blocknodestudent-success-storytitle > .block__content, 
    .p-5.block-inline-blockbasic.block--type-basic,
    .col-12 .block--type-dsi-h2-two-header-paragraph.block-inline-blockdsi-h2-two-header-paragraph > .block__content {
    	padding: 2rem !important;
    }
    .p-5.block-inline-blockbasic.block--type-basic .ms-5 {
      margin-left: 0 !important;	 /* View all projects button on project detail page */
    }
    .node--type-project .field--name-field-project-partners, 
    .node--type-project .field--name-field-project-mentor, 
    .node--type-project .field--name-field-student-participants {
    	margin: 2rem !important;
    }
    .p-7.block-inline-blockdsi-image.block--type-dsi-image {
      padding: 4rem !important;	
    }
    footer .block > .block__content {
      padding: 0 0.25rem !important;
    }
  }

  .link-purpose-icon {  /* remove link icon, added by aug 2024 Madrone update */
    display: none !important;	
  }

  body #block-madrone-main-menu li.nav-item > a {
      color: #000 !important;
  }

  .col-12 .block--type-dsi-h2-two-header-paragraph > .block__content {
  	padding: 3rem !important;
  }

  .dsi-contact-us {
  }
  .dsi-contact-us header {
    margin-bottom: 50px;
    width: 100%;
  }
  .dsi-contact-us header h2 {
    font-size: 2.5rem !important;
    color: var(--osu-orange);
  }
  .dsi-contact-us .dsi-profile {
  	margin-bottom: 2.5rem;
  	padding: 0.5rem;
  	width: 32%;
    display: inline-block;
    position: relative;
  }
  .views-field-field-featured-image { width: 33%; float: left; }
  .views-field-field-person-name { 
  	width: 67%; float: right; text-align: left; padding-left: 1rem; 
  	font-size: 1.3rem;
  	font-weight: bold;
  	color: #252525;
  }
  .views-field-field-person-title-affiliation { 
  	width: 67%; float: right; text-align: left; padding-left: 1rem; 
  	font-size: 1rem;
  	color: #252525;
  }
  .views-field-field-link { 
  	width: 67%; float: right; text-align: left; padding-left: 1rem; 
  	font-size: 1rem;
  	margin-top: 0.5rem;
  }
  .views-field-field-link a { 
  	color: var(--bs-blue);
  	text-decoration: none;
  	font-weight: bold;
  }
  .views-field-field-link a:after{ 
    content: '\f061';
    font-family: FontAwesome;
    font-weight: normal;
    font-style: normal;
    text-decoration:none;
    margin-left: 0.5rem;
  } 


  .dsi-profile .views-field-field-featured-image .field--type-image .field__item img {
    padding: 0;
    border-radius: 50%;
  }

  /*
  .dsi-contact-us {
  	display: flex;
    flex-flow: row wrap;
  }
  .dsi-contact-us header {
    width: 100%;
  }
  .dsi-contact-us .dsi-profile {
  	flex: 1 0 0;
  	padding: 2rem;
  }
  .dsi-profile .views-field {
  	text-align: center;
  }
  */




  .block--type-dsi-image .block__content .field--name-field-media-image {
  	padding: 3rem;
  }

  .dsi-text-left.block--type-dsi-h2-two-header-paragraph > .block__content {
    padding-left: 0 !important;	
  }
  .dsi-text-right.block--type-dsi-h2-two-header-paragraph > .block__content {
    padding-right: 0 !important;	
  }

  .block--type-dsi-webform .field--name-body {
  	margin-bottom: 3rem;
  }

  .block--type-dsi-icon > .block__content {
    padding-top: 1rem !important;
  }

  .block-field-blocknodeprojectfield-featured-image .field--name-field-media-image img,
  .block-field-blocknodestudent-success-storyfield-featured-image .field--name-field-media-image img {
  	padding: 6rem;
    width: 100%;
    height: auto;
  }

  .block-field-blocknodestudent-success-storytitle > .block__content {
  	font-size: clamp(2rem, .328rem + 3.483vw, 2.875rem);
    line-height: 120%;
    margin-bottom: 25px;
    font-family: var(--osu-primary-header-font);
    font-weight: 600;
    padding-top: 6rem !important;
  }

  .block-field-blocknodestudent-success-storytitle > .block__content.h1 {
    padding-top: 1.5rem !important;	
  }
  }

  /* no title on project pages */
  .block-field-blocknodeprojectbody > .block__content {
    padding-top: 3rem !important;
  }

  .block-field-blocknodeprojectbody > .block__content,
  .block-field-blocknodestudent-success-storybody > .block__content {
    padding-right: 6rem !important;
    padding-bottom: 6rem !important;
    margin: auto;
  }

  .social-icons .link-purpose-icon { display: none; }
  footer .osu-link-white { font-size: 0.75rem; }

  .dsi-news-events .feed-icon { display: none; }

  .dsi-news-events h2 a div { text-decoration: none; }

  .dsi-news-events h2 a div:before { content: "Articles & Features: "; }

  .dsi-project-list .dsi-article-summary {
    margin-bottom: 2rem;
  }
  .views-element-container {
    padding-top: 2rem;
    padding-bottom: 2rem;
  }

  .node--type-project .field--name-field-project-partners {
    margin-left: 6rem;
    margin-top: 4rem;
    margin-bottom: 2rem;
  }
  .node--type-project .field--name-field-project-mentor {
    margin-left: 6rem;
    margin-top: 2rem;
    margin-bottom: 2rem;
  }
  .node--type-project .field--name-field-student-participants {
    margin-left: 6rem;
    margin-top: 2rem;
    margin-bottom: 4rem;
  }
  .node--type-project .field--name-field-project-partners .field__label,
  .node--type-project .field--name-field-project-mentor .field__label,
  .node--type-project .field--name-field-student-participants .field__label {
    font-size: 1.75rem;
    color: var(--osu-orange);
    font-weight: 500 !important;
  }

  .region.region-footer .social-icons {
    margin-top: 5rem;	
  }

  .region.region-footer .social-icons ul {
  	margin: 0;
    padding: 0;
    list-style: none;
    display: flex;
    align-items: center;
  }

  .region.region-footer .social-icons ul li a { 
    display: flex;
    gap: 25px;
    font-size: 1.5rem;
  }

  .region.region-footer .social-icons  ul li {
    padding-left: 0;
    padding-right: 25px;
  }

  .region.region-footer .social-icons  ul li:before {
    content: none;
  }

media: all
preprocess: true
